一块比脸还大的带骨小牛肉排，裹上面包糠炸至金黄，配柠檬角和烤土豆。这是米兰的国民美食，粗暴而满足。人均约 40～70 欧元。\n\n---\n\n# D9｜米兰 → 国内\n**主题：回家**\n\n- **航班**：建议选择**中午或下午**的航班（12:00～16:00 起飞），这样上午还有时间在米兰买最后的伴手礼。\n- **机场交通**：从米兰市中心到 **马尔彭萨机场（MXP）**约 50 分钟：\n  - **Malpensa Express 机场快线**：从 Milano Cadorna 或 Milano Centrale 出发，约 50 分钟，票价 13 欧元/人；\n  - **出租车/网约车**：约 90～120 欧元，适合行李较多的情况。\n- **退税**：马尔彭萨机场 T1 的退税柜台通常在值机大厅和安检后都有。如果在米兰购买了奢侈品，建议提前 3 小时到达机场办理退税和值机。\n\n带着威尼斯的水巷记忆、多洛米蒂的玫瑰金日出、加尔达湖的柠檬香气，和婚假的满足感回家。\n\n---\n\n## 附录一：全程预算拆分（2 人总计）\n\n| 项目 | 金额（人民币） | 说明 |\n|:---|:---:|:---|\n| **国际往返机票** | 18,000～28,000 | 暑假经欧洲转机经济舱，约 0.9～1.4 万/人；直飞约 1.5～2 万/人 |\n| **意大利境内交通（火车/租车/油费/停车/高速）** | 10,000～14,000 | 租车约 6 天（紧凑型 SUV），含油费、高速费、威尼斯 Tronchetto 停车费等 |\n| **住宿（8 晚）** | 16,000～28,000 | 威尼斯/米兰 1200～2000 元/晚，多洛米蒂/加尔达湖 800～1500 元/晚 |\n| **餐饮** | 10,000～16,000 | 外食人均 200～400 元/顿，简餐人均 80～150 元/顿 |\n| **门票/体验** | 3,000～5,000 | 总督宫、钟楼登顶、贡多拉（约 800 元/次）、三峰山停车费、缆车、布莱斯湖划艇、温泉等 |\n| **签证/保险/杂费** | 2,000～3,000 | 申根签证约 800 元/人，保险 200 元/人 |\n| **总计** | **约 59,000～94,000 元** | **人均 2.95～4.7 万** |\n\n> **省钱小贴士**：\n> - 威尼斯住宿是全程最贵的一项，如果预算有限，可以住 Mestre（大陆）的精品酒店，价格约为本岛的 1/3，乘火车 10 分钟可达圣露西亚火车站。\n> - 多洛米蒂的餐厅价格较高，但超市（Coop、Despar）的火腿、奶酪、面包和水果价格合理，很多民宿带厨房，可以自己做早餐和简单晚餐。\n> - 贡多拉费用固定，但可以和他人拼船（最多 6 人），将人均成本降至 150 元左右。\n\n---\n\n## 附录二：行前准备清单\n\n### 证件与签证\n- [ ] **申根签证（意大利）**：至少提前 **6～8 周**申请。7～8 月是欧洲旅游旺季，签证 slot 紧张，建议尽早预约。\n- [ ] 护照（有效期 6 个月以上）。\n- [ ] 驾照原件 + **国际驾照翻译认证件**（租租车 APP 可免费办理）。\n- [ ] 旅行保险（申根强制要求，保额 ≥ 3 万欧元）。\n\n### 预订确认（按优先级）\n1. [ ] **国际机票**\n2. [ ] **威尼斯本岛酒店**（尤其是带运河景观的房间，旺季紧张）\n3. [ ] **多洛米蒂住宿**（科尔蒂纳或奥蒂塞伊，7～8 月提前 2～3 个月预订）\n4. [ ] **租车**：维罗纳取车 → 米兰还车（建议提前预订紧凑型 SUV）\n5. [ ] **三峰山停车位**（夏季需提前预约，网址：parcheggiotrecime.it）\n6. [ ] **《最后的晚餐》门票**（如果计划去米兰，必须提前 2～3 个月预订）\n7. [ ] **维罗纳歌剧节门票**（如果行程恰逢演出日，可在 arena.it 查询）\n8. [ ] **布莱斯湖划艇/缆车**：现场租赁即可，但旺季建议早到\n\n### 衣物与装备\n- [ ] **轻便防水冲锋衣**：多洛米蒂山区天气多变，夏季也可能突然降雨。\n- [ ] **登山鞋/高帮徒步鞋**：三峰山徒步必备，碎石路段多。\n- [ ] **防晒装备**：高海拔紫外线极强，防晒霜（SPF50+）、墨镜、遮阳帽必不可少。\n- [ ] **薄羽绒或抓绒内胆**：多洛米蒂山顶和清晨气温可能降至 10℃左右。\n- [ ] **泳装**：加尔达湖温泉和夏季游泳需要。\n- [ ] **转换插头**：意大利使用**欧标双圆孔插头**（C/F 型，220V）。\n- [ ] **便携烧水壶**：意大利酒店通常不提供热水壶。\n- [ ] **少量现金**：意大利很多小店、停车场和缆车只收现金，建议携带 200～300 欧元零钱。\n\n### APP 下载\n- **Google Maps**：离线地图必备，多洛米蒂山区信号不稳定。\n- **Trenitalia / Italo**：意大利铁路官方 APP，可查询和购买火车票。\n- **TheFork**：餐厅预订（意大利版大众点评）。\n- **Parkopedia**：查找意大利城市停车场和实时空位。\n- **Google Translate**：拍照翻译菜单非常有用。\n\n---\n\n## 附录三：关键决策说明（FAQ）\n\n### Q1：为什么不直接飞到米兰，而是从威尼斯开始？\n威尼斯到米兰的自驾路线（经维罗纳、多洛米蒂、加尔达湖）是一条完美的弧线，不走回头路。如果直飞米兰，再去威尼斯会多跑约 500 公里的回头路。而且从机场体验来说，**威尼斯马可波罗机场**规模适中，入关快，作为蜜月起点更有仪式感。如果国内飞威尼斯票价过高，也可以先飞米兰，当天乘火车到威尼斯过夜。\n\n### Q2：威尼斯本岛不能开车，车停在哪里最合理？\n推荐两个方案：\n- **Tronchetto 停车场**：威尼斯本岛边缘的大型停车场，通过 Ponte della Libertà 公路桥直接可达，约 25～35 欧元/天。从停车场可乘水上巴士或 People Mover 进入本岛核心。\n- **Mestre 火车站停车场**：位于威尼斯大陆（Mestre），约 15～20 欧元/天。把车停在这里，乘火车 10 分钟到威尼斯圣露西亚火车站（Santa Lucia），不仅省钱，还能避免开车过桥的不便。\n\n### Q3：多洛米蒂自驾对驾驶技术要求高吗？\n**只要有一定山路驾驶经验，就完全没问题。** 多洛米蒂的公路维护极好，标志清晰，夏季车流虽大但秩序井然。需要注意的是：\n- 山路弯道多、坡度大，手动挡车会比较累，建议租自动挡；\n- 部分高山公路（如 Passo Giau）狭窄，会车时要减速；\n- 夏季是骑行旺季，公路上常有自行车队，超车时要保持安全距离。\n\n### Q4：三峰山徒步难度大吗？普通人能完成吗？\n**经典环线的难度属于中等**，没有技术攀爬，全程是明显的步道。主要挑战在于：\n- 海拔较高（起点 2320 米），部分人可能有轻微高反；\n- 全程约 9.5 公里，爬升 400 米，对体力有一定要求；\n- 碎石路段较多，需要防滑的登山鞋。\n如果体力有限，可以只走到 Rifugio Lavaredo（约 1 小时往返），风景已经非常震撼。带老人或小孩的游客，也可以在山顶平台附近轻松漫步。\n\n### Q5：这条线和瑞士阿尔卑斯相比有什么优势？\n多洛米蒂和瑞士阿尔卑斯相比，有三大优势：\n- **景观独特性**：白云岩（Dolomite）是一种特殊的碳酸钙岩石，在阳光照射下会呈现玫瑰金色，这是瑞士的花岗岩山峰所没有的色彩魔法；\n- **人文与美食**：意大利北部有丰富的历史遗迹（维罗纳圆形剧场、米兰大教堂）和世界顶级的饮食文化，而瑞士更偏向纯自然风光；\n- **性价比**：同等住宿和餐饮标准下，意大利北部的花费约为瑞士的 60%～70%。\n\n---\n\n## 附录四：一句话总结\n\n这 9 天，你们会在威尼斯的大运河上坐一次贡多拉，在维罗纳的圆形剧场下贴一张爱情便签，在多洛米蒂的玫瑰金日出里徒步环绕三峰山，在布莱斯湖的祖母绿湖水里划一艘木船，最后在加尔达湖畔的温泉中看着阿尔卑斯的余晖沉入意大利最深的湖泊。\n\n**这是意大利北部在夏天唯一的样子，也是你们婚假最丰盈的记忆。**\n\n---\n\n*文档生成时间：2026 年 4 月*  \n*祝你们旅途愉快，新婚快乐！*\n",
      e: "# 格鲁吉亚｜高加索雪山与红酒之乡｜9 天婚假执行手册\n\n> **旅行时间**：6～9 月（夏季/初秋黄金窗口）  \n> **旅行人数**：2 人（婚假）  \n> **总天数**：9 天 8 晚  \n> **核心目的地**：第比利斯 → 西格纳吉 → 卡兹别克山 → 库塔伊西 → 梅斯蒂亚/乌树故里  \n> **人均预算**：1.2～1.8 万元人民币（2 人总计约 2.4～3.6 万元）\n\n---\n\n## 为什么选格鲁吉亚？\n\n如果你们想要的是**\"一半北欧风光、三分之一东南亚物价、再加一份独一份的异域神秘感\"**，那么格鲁吉亚就是这个星球上最被低估的答案。\n\n这个位于欧亚十字路口的高加索小国，拥有**5000 年酿酒历史**（联合国教科文组织认定的世界葡萄酒起源地）、**海拔 5000 米的雪山冰川**、以及酷似瑞士阿尔卑斯的草甸村庄。但更迷人的是这里独特的文化气质——欧洲风情的老城、拜占庭式的修道院、苏联遗留的粗粝建筑、和热情到会让你不好意思的东道主文化，全部糅杂在一起。\n\n与北欧相比，格鲁吉亚的性价比堪称极致：\n- **风景**：卡兹别克山的圣三一教堂与挪威罗弗敦的雪山教堂异曲同工，乌树故里的碉楼村落比峡湾更小众神秘；\n- **物价**：一顿丰盛的传统晚餐人均 80～120 元，精品民宿 300～500 元/晚，租车价格约为挪威的 1/4；\n- **体验**：这里是真正的\"红酒自由\"国度——花 50 元就能在 300 年历史的酒窖里喝到传统工艺（Qvevri）酿造的自然酒。\n\n作为婚假，格鲁吉亚是**\"惊艳、松弛、微醺\"**的最佳组合。\n\n---\n\n## 行程总览\n\n| 天数 | 星期 | 路线 | 住宿地 | 核心体验 | 开车距离 |\n|:---:|:---:|:---|:---|:---|:---:|\n| D1 | 六 | 国内 → 第比利斯 | 第比利斯 | 抵达、老城漫步、Narikala 要塞日落 | — |\n| D2 | 日 | 第比利斯 | 第比利斯 | 硫磺浴、和平桥、干桥跳蚤市场 | — |\n| D3 | 一 | 第比利斯 → 西格纳吉 | 西格纳吉 | 红酒小镇品酒、城墙漫步、Bodbe 修道院 | 约 110 km |\n| D4 | 二 | 西格纳吉 → 卡兹别克山 | 斯特潘茨明达 | 军事大道自驾、Ananuri 要塞、俄格友谊纪念碑 | 约 160 km |\n| D5 | 三 | 卡兹别克山 | 斯特潘茨明达 | 圣三一教堂、雪山徒步、高加索山景 | 约 40 km |\n| D6 | 四 | 卡兹别克山 → 库塔伊西 | 库塔伊西 | 巴格拉特大教堂、格拉特修道院、科尔基斯喷泉 | 约 190 km |\n| D7 | 五 | 库塔伊西 → 梅斯蒂亚 | 梅斯蒂亚 | 斯瓦涅季碉楼村落、雪山草甸、转场休整 | 约 240 km |\n| D8 | 六 | 梅斯蒂亚 → 乌树故里 → 梅斯蒂亚 | 梅斯蒂亚 | 乌树故里徒步、欧洲最高村落、雪山牧场 | 约 80 km |\n| D9 | 日 | 梅斯蒂亚 → 第比利斯 → 国内 | — | 返程，带走红酒与雪山记忆 | 约 400 km |\n\n> **设计逻辑**：第比利斯作为入口深度停留两天；D3-D5 走东线红酒+雪山精华；D6 转场西线；D7-D8 深入斯瓦涅季的碉楼秘境；D9 视体力选择自驾回第比利斯或飞到纳塔赫塔里再接驳进城，为国际返程留出缓冲。\n\n---\n\n# D1｜国内 → 第比利斯（Tbilisi）\n**主题：抵达高加索门户**\n\n![第比利斯老城夜景](./images/tbilisi_old_town.jpg)\n*第比利斯老城与 Narikala 要塞*\n\n## 交通\n- **航班**：建议选择 **中国南方航空**（乌鲁木齐转机）或 **卡塔尔航空/阿斯塔纳航空**（多哈/阿拉木图转机），通常在当地时间 **下午 14:00-18:00 抵达第比利斯国际机场（TBS）** 最佳。\n- **机场 → 市区**：推荐乘坐 **Bolt 网约车** 或机场 taxi，车程约 25～35 分钟，费用约 40～60 GEL（约 110～160 元人民币）。地铁也可达但拖着行李不便。\n\n## 住宿\n**推荐：Stamba Hotel 或 Fabrika Hostel & Suites**\n- **Stamba Hotel**：位于 Vera 区，由苏联时代印刷厂改造的设计酒店，中庭有 6 层楼高的热带植物园。价格约 800～1200 GEL/晚（约 2200～3300 元）。\n- **Fabrika**：位于老城边缘，工业风设计青旅的升级版套房，露台酒吧是第比利斯文青聚集地。价格约 200～350 GEL/晚（约 550～950 元）。\n- **备选**：老城内的精品民宿（Airbnb），带阳台可看老城屋顶，约 150～250 GEL/晚。\n\n## 活动\n- **傍晚**：步行前往 **Meidan 广场**，这里是老城的地理中心。沿着石板路走入迷宫般的巷道，两边是木质阳台凸出的传统高加索民居，阳台上爬满藤蔓，楼下是手工艺品店和葡萄酒吧。\n- **日落前**：乘坐缆车（2.5 GEL/人，约 7 元）或徒步 20 分钟登上 **Narikala 要塞**。这座 4 世纪的要塞俯瞰着整个第比利斯老城、库拉河（Mtkvari）以及远处的现代建筑。\n- **晚餐**：推荐 **Shavi Lomi（黑狐餐厅）**，藏在老城巷子里，是传统格鲁吉亚菜的现代演绎。必点 **Khinkali（灌汤大饺）**、**Khachapuri（奶酪面包船）**、**Badrijani（核桃酱茄子卷）**。人均约 80～120 元。\n- **小贴士**：第一晚不要安排太满，吃完晚饭后在灯火通明的老城里散步，石板路、教堂钟声、街头小提琴手会让你们立刻爱上这座城市。\n\n---\n\n# D2｜第比利斯（Tbilisi）\n**主题：硫磺浴、桥梁艺术与苏联遗风**\n\n![和平桥与硫磺浴区](./images/peace_bridge.jpg)\n*和平桥（Bridge of Peace）连接老城与 Rike 公园*\n\n## 活动\n\n### 上午：硫磺浴（Abanotubani）\n第比利斯的名字在格鲁吉亚语中就是\"温暖的城市\"，因为地下有丰富的硫磺温泉。\n\n- **推荐浴池**：**Chreli Abano（No.5 浴池）**，建于 17 世纪，蓝绿色马赛克瓷砖穹顶是第比利斯的地标之一。内部有私人包间（带按摩池和桑拿）。\n- **价格**：私人包间 1 小时约 80～150 GEL（约 220～410 元），加搓澡/按摩另付 50～80 GEL。\n- **体验**：在镶嵌蓝绿色瓷砖的穹顶下泡进 38～42℃ 的硫磺泉中，空气中弥漫着淡淡的硫磺味——这是当地延续了数百年的社交和疗愈传统。作为新婚夫妇，预订一个双人包间，是婚假最放松的打开方式。\n\n### 下午：和平桥 → 干桥跳蚤市场（Dry Bridge Market）\n\n![干桥跳蚤市场](./images/dry_bridge_market.jpg)\n*干桥跳蚤市场上的苏联徽章和老相机*\n\n- **和平桥**：这座 2010 年由意大利建筑师 Michele De Lucchi 设计的步行桥，用玻璃和钢铁构成了一条跨越库拉河的\"DNA 双螺旋\"。从桥上可以拍到 Narikala 要塞与现代建筑的对比。\n- **干桥跳蚤市场**：步行约 15 分钟可达。这里是外高加索最大的露天旧货市场，出售苏联时期的勋章、老式望远镜、波斯地毯、高加索古董匕首、苏联复古相机等。\n- **淘货建议**：东西真假参半，但氛围极好。买几枚苏联徽章（5～20 GEL）或一条手工羊毛围巾作为纪念即可。大胆砍价，通常报价的 60%～70% 是合理成交价。\n\n### 晚餐\n推荐 **Funicular Restaurant Complex**（缆车山顶餐厅）或老城内的 **Iasamani。\n- **山顶餐厅**：乘坐第比利斯 oldest funicular（始建于 1905 年）上 Mtatsminda 山，在山顶俯瞰全城夜景。餐厅本身中规中矩，但景色值回票价。\n- **Iasamani**：当地人推荐的传统餐厅，烤肉（Mtsvadi）和烤鸡非常出色，人均约 60～90 元。\n\n### 晚间\n如果精力尚存，可以去 **Vino Underground** 或 **8000 Vintages** 喝一杯。这两个都是葡萄酒吧，可以按杯点酒，侍酒师会耐心讲解 Qvevri 陶罐酿酒法的历史。\n\n---\n\n# D3｜第比利斯 → 西格纳吉（Sighnaghi）\n**主题：红酒小镇与城墙日落**\n\n![西格纳吉老城与城墙](./images/sighnaghi_walls.jpg)\n*西格纳吉蜿蜒的城墙与阿拉扎尼山谷*\n\n## 交通\n- **方式**：**自驾取车**。\n- **取车点**：第比利斯市区或机场（推荐提前在 Localrent 或国际平台预订）。车型建议 **SUV/跨界车**（如丰田 RAV4、日产 X-Trail），因为后续山路和碎石路较多。\n- **路线**：沿 E60/SH42 公路向东，车程约 1.5～2 小时。\n- **距离**：约 110 公里。\n- **驾驶提示**：格鲁吉亚是**靠右行驶**，租车通常为左舵车，与中国不同。建议取车后的前 30 分钟先在市区低速适应；当地司机开车较猛、超车频繁，保持 defensive driving。\n\n## 住宿\n**推荐：Hotel BelleVue 或老城内的精品民宿**\n- **BelleVue**：位于城墙边，露台正对阿拉扎尼山谷（Alazani Valley）和高加索山脉，是西格纳吉景观最好的酒店之一。约 250～450 GEL/晚。\n- **民宿**：很多当地人家把老宅改成了带露台的 guesthouse，老板通常会免费拿出一瓶自家酿的 Saperavi 红酒招待客人。约 100～200 GEL/晚。\n\n## 活动\n\n### 下午：城墙漫步\n西格纳吉被称为\"高加索的托斯卡纳\"，也是格鲁吉亚最浪漫的城镇之一。\n\n- **城墙**：18 世纪修建的防御城墙至今保存完好，总长约 4 公里，有 20 多座塔楼。可以沿着城墙顶部行走，俯瞰红色屋顶的小镇、绿色的葡萄园山谷和远处云雾缭绕的高加索山。\n- **小镇街巷**：石板路、木质阳台、爬满紫藤的拱门，非常适合牵手漫步和拍照。\n\n### Bodbe 圣妮诺女修道院\n- **位置**：小镇东南约 2 公里，开车 5 分钟或步行 25 分钟。\n- **看点**：这是格鲁吉亚最重要的基督教圣地之一，传说 4 世纪时将基督教传入格鲁吉亚的圣妮诺修女安葬于此。修道院被精心修剪的柏树和玫瑰花丛环绕，露台可以俯瞰整个阿拉扎尼山谷。\n- **拍照**：修道院外的观景台是拍摄山谷全景的经典机位。\n\n### 傍晚：品酒体验\n西格纳吉所在的卡赫季（Kakheti）地区是格鲁吉亚最核心的葡萄酒产区。\n\n- **推荐酒庄**：**Pheasant's Tears（雉鸡之泪）** 或 **Okro's Wines**，两者都以自然酒和 Qvevri 陶罐酿造闻名。\n- **体验**：通常 20～40 GEL/人（约 55～110 元）可以品鉴 3～5 款酒，包括用陶罐埋在地底发酵半年的琥珀酒（Amber Wine）和浓郁饱满的红葡萄品种 Saperavi。\n- **小贴士**：品酒时不要空腹，酒庄通常会配奶酪、面包和核桃酱。\n\n### 晚餐\n推荐 **Okro's Restaurant** 或城墙边的 **Cafe Medea**。菜品以当地农家菜为主，烤猪肉、炖豆子（Lobio）、奶酪饼都是招牌。人均约 60～100 元。\n\n---\n\n# D4｜西格纳吉 → 卡兹别克山（Kazbegi）\n**主题：军事大道——世界上最美的公路之一**\n\n![Ananuri要塞](./images/ananuri_fortress.jpg)\n*Ananuri 要塞俯瞰 Jinvali 水库*\n\n## 自驾路线\n这一天是**全程自驾景观最震撼的一天**。你们将沿着著名的 **乔治亚军事大道（Georgian Military Highway）** 从东向西穿越大高加索山脉。\n\n- **路线**：西格纳吉 → 第比利斯（经绕城高速绕过）→ **Ananuri 要塞** → **俄格友谊纪念碑（Russia-Georgia Friendship Monument）** → **古道里（Gudauri）** → **斯特潘茨明达（Stepantsminda，即卡兹别克山镇）**。\n- **距离**：约 160 公里（西格纳吉到第比利斯 110 km，第比利斯到卡兹别克山约 150 km，合计约 260 km，但扣除绕城重复段，实际驾驶净里程约 160 km）。\n- **开车时间**：约 4.5～5.5 小时（含多次停车拍照休息）。\n\n> **路况提示**：军事大道是格鲁吉亚最重要的国道（E117），全程铺装路面，但弯道极多，尤其是 Zhinvali 到 Gudauri 段。夏季偶有落石，注意路标提示。大货车和游客大巴较多，超车需谨慎。\n\n## 途中亮点\n\n### Ananuri 要塞\n- **位置**：距第比利斯约 70 公里，Jinvali 水库北岸。\n- **看点**：这是格鲁吉亚上镜率最高的中世纪要塞之一，两座教堂和一座钟楼矗立在水库半岛上。教堂外墙上刻有精美的十字架浮雕和格鲁吉亚文字。\n- **拍照**：水库大坝是拍摄要塞倒影的经典机位。建议停留 30～45 分钟。\n\n### 俄格友谊纪念碑\n- **位置**：位于军事大道海拔最高点附近（约 2384 米），古道里以北。\n- **看点**：这座巨大的环形瓷砖壁画建于 1983 年，纪念俄格两国 200 年的\"友谊\"。虽然两国关系如今复杂，但纪念碑本身的苏联时期艺术风格和俯瞰山谷的位置使其成为必停景点。\n- **体验**：站在纪念碑内侧的观景台上，可以俯瞰 **Devil's Valley（魔鬼峡谷）**，巨大的 V 型山谷两侧是连绵的雪山。\n\n![俄格友谊纪念碑](./images/gudauri_monument.jpg)\n*俄格友谊纪念碑俯瞰高加索山谷*\n\n## 住宿\n**推荐：Rooms Hotel Kazbegi**\n- 这是卡兹别克山乃至格鲁吉亚最著名的设计酒店，由苏联时代的游客中心改造而成。几乎每一间房都正对卡兹别克山（Mt. Kazbek，海拔 5047 米）。\n- **价格**：约 400～700 GEL/晚（约 1100～1900 元）。旺季（6～9 月）需提前 2～3 个月预订。\n- **备选**：**Stancia Kazbegi** 或镇上的民宿，约 150～300 GEL/晚，部分房间也有山景。\n\n## 晚餐\n- **Rooms Hotel 餐厅**：菜品质量在线，景观一流，但价格相对较高（人均约 120～180 元）。\n- **当地选择**：镇上有不少家庭餐厅，推荐尝试 **Khinkali 和 Shashlik（高加索烤肉串）**，人均约 50～80 元。\n\n## 晚间\n如果天气晴朗，晚上走出酒店抬头就能看到漫天繁星——这里海拔约 1700 米，光污染极低。卡兹别克山的金字塔形山峰会一直在视野里，在月光下泛着冷冷的蓝光。\n\n---\n\n# D5｜卡兹别克山（Kazbegi）\n**主题：离天堂最近的教堂**\n\n![圣三一教堂与卡兹别克山](./images/gergeti_church.jpg)\n*Gergeti Trinity Church 与背后的卡兹别克主峰*\n\n这一天是整个行程的**情感高潮**。没有长途驾驶，只有一座被雪山环抱的教堂和一段令人难忘的徒步。\n\n## 上午：Gergeti Trinity Church（圣三一教堂）\n\n这座 14 世纪的教堂孤独地坐落在海拔 2170 米的山脊上，背后就是海拔 5047 米的卡兹别克山。它被当地人称为\"离天堂最近的教堂\"，也是格鲁吉亚最具标志性的画面。\n\n### 交通\n- **越野车**：从镇上包一辆四驱越野车（当地称为\"吉普\"），约 80～120 GEL/车（往返，可乘 4 人），车程 30～40 分钟。山路崎岖陡峭，普通轿车无法通行。\n- **徒步**：如果你们体力充沛，可以从镇上徒步上山，单程约 8～9 公里，爬升约 500 米，耗时 2.5～3.5 小时。下山可以徒步或包车。\n\n### 体验\n- 当越野车在最后一个弯道转过，教堂的灰色石墙突然出现在眼前，而背后的卡兹别克山如同一座巨大的金字塔直指天空——这个瞬间，你们会理解为什么这里被称为\"高加索的神圣之心\"。\n- 教堂内部小而朴素，但外部的位置和景观无与伦比。 circumambulate（绕行）教堂一周，每一个角度都是不同的雪山构图。\n- **拍照**：清晨 8:00-10:00 光线最佳，云雾较少。夏季上午游客较多，建议尽量早出发。\n\n## 下午：雪山徒步或休闲\n\n### 选项 A：Gergeti Glacier 徒步（高难度）\n- 从教堂继续向山上走，可以抵达 Gergeti 冰川脚下。单程约 6～7 公里，爬升约 800 米，往返需 5～6 小时。路况为碎石坡和高山草甸，需要一定体力。\n- 景观：沿途可以近距离观赏卡兹别克山的冰川舌、高山湖泊和成群的野花。\n\n### 选项 B：Arsha 瀑布轻徒步（轻松）\n- 从镇上向东北方向驾车约 10 分钟，有通往 Arsha 瀑布的步道。往返约 4 公里，路况平缓，沿途是小溪和森林。\n- 适合不想太累的婚假节奏。\n\n### 选项 C：在酒店发呆\n- 如果你们订到了 Rooms Hotel，下午最浪漫的选择就是坐在露台上，点一杯咖啡或红酒，看着云在卡兹别克山顶流动。这种\"住进风景里\"的松弛感，本身就是婚假的意义。\n\n## 晚餐\n推荐在酒店或镇上的一家家庭餐厅吃一顿 **格鲁吉亚传统大餐**。作为行程的高潮日，可以开一瓶好一点的 Saperavi 红酒，慢慢吃 Khachapuri、烤茄子和烤肉。\n\n---\n\n# D6｜卡兹别克山 → 库塔伊西（Kutaisi）\n**主题：从雪山到世界遗产教堂**\n\n![巴格拉特大教堂](./images/bagrati_cathedral.jpg)\n*库塔伊西的巴格拉特大教堂俯瞰里奥尼河*\n\n## 自驾路线\n- **路线**：斯特潘茨明达 → 古道里 → **俄格友谊纪念碑**（如昨天没停够可补停）→ 沿军事大道返回第比利斯方向 → 在 **Mtskheta（姆茨赫塔）** 附近转入 **S1 高速公路** 向西 → **库塔伊西（Kutaisi）**。\n- **距离**：约 190 公里。\n- **开车时间**：约 4～4.5 小时。\n- **建议**：早上 09:00 前出发，中午前后可以抵达库塔伊西。\n\n## 活动\n\n### 下午：巴格拉特大教堂（Bagrati Cathedral）\n- **位置**：库塔伊西市中心的 Ukimerioni 山上。\n- **看点**：建于 11 世纪，是格鲁吉亚中世纪建筑的巅峰之作，也是联合国教科文组织世界遗产。巨大的中央穹顶和十字形布局代表了格鲁吉亚\"黄金时代\"的宗教艺术。\n- **拍照**：站在教堂平台上可以俯瞰整个库塔伊西城和里奥尼河（Rioni River）。傍晚的暖光会让教堂的石墙呈现出金黄色。\n\n### 格拉特修道院（Gelati Monastery）\n- **位置**：市区东北约 10 公里，开车 15 分钟。\n- **看点**：由 12 世纪的大卫四世\"建国者\"创立，不仅是修道院，还是当时格鲁吉亚最高学府。教堂内部保存着大量精美的拜占庭风格壁画和马赛克，包括大卫四世本人的肖像。\n- **体验**：修道院坐落在一个绿意盎然的山谷中，氛围极其宁静。如果时间允许，在这里静坐 15 分钟，感受千年历史的沉淀。\n\n### 科尔基斯喷泉（Colchis Fountain）\n- **位置**：库塔伊西市中心的中央广场。\n- **看点**：这组现代喷泉雕塑以古希腊神话中科尔基斯王国的金羊毛传说为主题，高大的金色马匹和抽象人物形象非常有视觉冲击力。周围是咖啡馆和步行街，适合傍晚散步。\n\n## 住宿\n**推荐：Best Western Kutaisi 或老城精品民宿**\n- **Best Western**：国际连锁，干净舒适，约 150～250 GEL/晚。\n- **民宿**：库塔伊西老城有很多带院子的家庭旅馆，主人通常热情好客，约 80～150 GEL/晚。\n\n## 晚餐\n推荐 **Palaty** 或 **Hot Coffee。库塔伊西的餐饮比第比利斯更便宜，人均 40～70 元就能吃得很丰盛。尝试一下 **Imeretian Khachapuri（圆形奶酪面包）**，这是库塔伊西所在地区的特色做法。\n\n---\n\n# D7｜库塔伊西 → 梅斯蒂亚（Mestia）\n**主题：进入斯瓦涅季的碉楼王国**\n\n![梅斯蒂亚碉楼群](./images/mestia_towers.jpg)\n*梅斯蒂亚的斯瓦涅季传统碉楼与雪山背景*\n\n## 自驾路线\n这一天是**全程驾驶时间较长的一天**，但风景的转变会让你们觉得每一公里都值得。\n\n- **路线**：库塔伊西 → **祖格迪迪（Zugdidi）** → 沿 **Enguri 河谷** 进入山区 → **梅斯蒂亚（Mestia）**。\n- **距离**：约 240 公里。\n- **开车时间**：约 5.5～6.5 小时。\n- **路况提示**：从祖格迪迪到梅斯蒂亚约 140 公里，前半段是铺装山路，后半段沿 Enguri 河峡谷穿行，弯道多、隧道多，但整体路况良好。夏季偶有山体滑坡，注意路标。\n\n> **驾驶建议**：出发前在祖格迪迪的超市补充食物和水。梅斯蒂亚是山区小镇，物资相对有限且价格略高。\n\n## 活动\n\n### 下午/傍晚：抵达梅斯蒂亚\n梅斯蒂亚是**斯瓦涅季（Svaneti）**地区的门户小镇，也是联合国教科文组织世界遗产\"上斯瓦涅季\"的入口。这里的每一座村落都矗立着中世纪遗留下来的防御碉楼（Svan Towers）。\n\n- **小镇漫步**：梅斯蒂亚主街不长，两旁是木屋、碉楼和民宿。傍晚在镇中心散步，可以看到村民们坐在碉楼下聊天，牛羊悠闲地走过石板路。\n- ** ethnographic museum（民族博物馆）**：如果下午抵达较早，可以参观镇上的斯瓦涅季博物馆，了解这个与世隔绝地区的历史、宗教艺术和生活方式。\n\n## 住宿\n**推荐：Hotel Svaneti 或当地 guesthouse**\n- **Hotel Svaneti**：镇上最老牌的山景酒店之一，部分房间正对碉楼和雪山。约 200～350 GEL/晚。\n- **Guesthouse**：梅斯蒂亚很多家庭把自家改造成民宿，老板通常还会提供家常晚餐。约 100～200 GEL/晚。\n\n## 晚餐\n推荐在民宿或 **Laila 餐厅** 用餐。斯瓦涅季的特色菜包括 **Kubdari（斯瓦涅季肉馅饼）** 和 **Tashmijabi（奶酪土豆泥）**。这里的奶酪口味偏咸，但 Kubdari 里面的香料调味非常独特，值得一试。\n\n---\n\n# D8｜梅斯蒂亚 → 乌树故里（Ushguli）→ 梅斯蒂亚\n**主题：欧洲最高的村落与雪山徒步**\n\n![乌树故里村落](./images/ushguli_village.jpg)\n*乌树故里的碉楼村落与什哈拉雪山*\n\n## 自驾路线\n- **路线**：梅斯蒂亚 → 沿 **Enguri 河谷上游** 向东北 → **乌树故里（Ushguli）**。\n- **距离**：单程约 40 公里，往返约 80 公里。\n- **开车时间**：单程约 1.5～2 小时。\n- **路况提示**：这段路是整个自驾行程中路况最差的一段，部分路段为碎石路和泥路，雨季可能有涉水路段。**强烈建议租 SUV**。如自驾信心不足，也可以在梅斯蒂亚包车往返（约 150～250 GEL/车）。\n\n## 上午：抵达乌树故里\n乌树故里是**欧洲海拔最高（约 2100 米）的永久居住村落**，由四个小村庄组成，保存着 200 多座中世纪碉楼。2000 多年来，这里的居民一直过着半游牧生活，直到近几十年才通了公路。\n\n- **村落漫步**：把车停在村庄入口，步行穿过 Lamaria 教堂所在的中心区域。灰色的石碉楼、石板屋顶的农舍、远处海拔 5193 米的 **什哈拉山（Mt. Shkhara）** 构成了一幅仿佛来自中世纪的画面。\n- **Lamaria 教堂**：位于村庄最高处的一座 12 世纪教堂，从这里可以俯瞰整个乌树故里河谷和远处的雪山冰川。\n\n## 下午：轻徒步\n\n### 选项 A：通往什哈拉冰川的徒步（中等难度）\n- 从乌树故里出发，沿着河谷向什哈拉山方向徒步。单程约 8 公里，往返约 3.5～4.5 小时。\n- 沿途经过高山草甸、冰川融水溪流和成群的牛马。终点可以近距离看到什哈拉山的冰川舌。\n\n### 选项 B：村庄周边短徒步（轻松）\n- 如果时间和体力有限，可以在村庄周边走 1～2 小时。每一处高坡都是拍摄碉楼与雪山全景的绝佳机位。\n\n> **小贴士**：乌树故里海拔较高，夏季气温约 15～20℃，但风大，建议带防风外套。紫外线强烈，注意防晒。\n\n## 晚餐\n返回梅斯蒂亚后，在民宿或餐厅享用一顿丰盛的晚餐。作为倒数第二个夜晚，可以开一瓶从西格纳吉带过来的红酒，在雪山和碉楼的环绕下好好回味这趟旅程。\n\n---\n\n# D9｜梅斯蒂亚 → 第比利斯 → 国内\n**主题：告别高加索**\n\n![第比利斯圣三一主教座堂](./images/sameba_cathedral.jpg)\n*第比利斯圣三一主教座堂（Sameba）——高加索最大的东正教堂*\n\n## 交通\n### 方案 A：自驾返回第比利斯（推荐时间充裕者）\n- **路线**：梅斯蒂亚 → 祖格迪迪 → 库塔伊西 → 第比利斯。\n- **距离**：约 400 公里。\n- **开车时间**：约 7～8.5 小时。\n- **建议**：早上 06:30-07:00 出发，下午 15:00-16:00 抵达第比利斯。还车前可以去 **圣三一主教座堂（Sameba Cathedral）** 参观 1 小时，这是高加索地区最大的东正教教堂之一，金色穹顶非常震撼。\n\n### 方案 B：梅斯蒂亚飞第比利斯（推荐节省体力者）\n- **航班**：**Vanilla Sky** 常规运营的是梅斯蒂亚（Mestia, USS）↔ **纳塔赫塔里机场（Natakhtari）** 的小型螺旋桨飞机，**不是飞第比利斯国际机场 TBS**。\n- **航程**：飞行约 50 分钟；落地纳塔赫塔里后还需约 40～60 分钟接驳进第比利斯市区。\n- **注意**：航班班次少、受天气影响大，需提前预订。票价约 80～150 GEL/人。由于你们的车会留在梅斯蒂亚，这个方案**只有在租车公司支持梅斯蒂亚异地还车，或改为包车/公共交通时才成立**；否则按方案 A 自驾返程更稳妥。\n\n### 返程航班\n- 建议选择晚上 19:00-22:00 起飞的航班，这样白天还有时间在第比利斯做最后的停留和采购纪念品。\n- **机场还车**：提前与租车公司确认还车地点（通常是机场停车场）。\n\n## 离别采购\n- **红酒**：在机场免税店或第比利斯的 **Vinoteca** 买 1～2 瓶 Saperavi 或 Qvevri 琥珀酒带回家（注意托运行李限重和海关规定）。\n- **纪念品**：Churchkhela（核桃糖肠）、手工羊毛袜、苏联复古徽章。\n\n---\n\n## 附录一：全程预算拆分（2 人总计）\n\n| 项目 | 金额（人民币） | 说明 |\n|:---|:---:|:---|\n| **国际往返机票** | 8,000～16,000 | 经乌鲁木齐/多哈/阿拉木图转机经济舱，约 4,000～8,000 元/人 |\n| **租车+油费+停车** | 3,500～6,000 | 约 7 天租车，SUV 车型约 300～500 元/天，油费约 800～1200 元 |\n| **住宿（8 晚）** | 4,000～10,000 | 精品民宿/设计酒店 300～800 元/晚，普通 guesthouse 150～400 元/晚 |\n| **餐饮** | 3,000～5,500 | 外食人均 60～120 元/顿，自己做/民宿含餐人均 30～60 元/顿 |\n| **门票/体验** | 1,000～2,000 | 硫磺浴、酒庄品酒、Gergeti 越野车上山、修道院 donation |\n| **签证/保险/杂费** | 400～800 | 中国护照旅游免签 30 天，主要为保险和少量杂费 |\n| **总计** | **约 19,900～40,300 元** | **人均 1.0～2.02 万** |\n\n> **省钱小贴士**：格鲁吉亚民宿性价比极高，很多 guesthouse 含早餐且老板热情好客。红酒在酒庄直接购买比国内便宜 3～5 倍，不妨带两瓶好年份的 Saperavi 回国。\n\n---\n\n## 附录二：行前准备清单\n\n### 证件与签证\n- [ ] **中国护照旅游免签**：自 2023 年 9 月 11 日起，中国公民可免签进入格鲁吉亚旅游，单次停留 30 天；如停留目的或时长不同，再单独核对签证要求。\n- [ ] 护照（有效期 6 个月以上）。\n- [ ] 驾照原件 + **国际驾照翻译认证件**（租租车 APP 可免费办理）。\n- [ ] 旅行保险（建议保额 ≥ 30 万人民币）。\n\n### 预订确认（按优先级）\n1. [ ] **国际机票**\n2. [ ] **租车**（SUV 车型，覆盖 D3-D9）\n3. [ ] **Rooms Hotel Kazbegi**（旺季最难订，建议提前 2～3 个月）\n4. [ ] **西格纳吉/梅斯蒂亚住宿**\n5. [ ] **第比利斯住宿**\n6. [ ] **梅斯蒂亚 ↔ 纳塔赫塔里 国内航班**（如选择飞机转场，需提前预订 Vanilla Sky，并先确认梅斯蒂亚异地还车方案）\n\n### 衣物与装备\n- [ ] **防风防水冲锋衣**：山区天气多变，卡兹别克和斯瓦涅季夏季也可能降雨。\n- [ ] **薄羽绒服/抓绒内胆**：高海拔地区早晚温差大，夜间可能降至 5～10℃。\n- [ ] **防滑徒步鞋/登山鞋**：Gergeti 教堂山路和乌树故里徒步都需要。\n- [ ] **防晒用品**：高加索地区紫外线极强，海拔越高越明显。\n- [ ] **转换插头**：格鲁吉亚使用**欧标双圆孔插头**（C/F 型），电压 220V。\n- [ ] **常用药品**：肠胃药（适应新饮食）、创可贴、驱蚊液。\n- [ ] **现金**：格鲁吉亚当地货币为拉里（GEL），建议携带少量美元现金备用，大部分地方可用信用卡，但偏远村庄和小店可能只收现金。\n\n### APP 下载\n- **Bolt**：当地最主流的网约车 APP，比 taxi 便宜且透明。\n- **Maps.me / Google Maps**：离线地图必备，山区信号不稳定。\n- **Google Translate**：格鲁吉亚语很难，翻译 APP 是刚需。\n- **Booking.com / Airbnb**：住宿管理。\n- **TripAdvisor**：餐厅推荐和评分相对靠谱。\n\n---\n\n## 附录三：关键决策说明（FAQ）\n\n### Q1：为什么不走西格纳吉 ↔ 卡兹别克的直达山路？\n西格纳吉与卡兹别克山之间有一条更近的越野山路（约 80 公里），但路况极差，多为未铺装的碎石路和泥路，普通 SUV 也难以通行，且沿途无补给和信号。为了安全和舒适，我们选择返回第比利斯方向再沿军事大道北上，虽然多绕了约 100 公里，但全程铺装路面，景观也更丰富（可经过姆茨赫塔古城）。\n\n### Q2：为什么不把梅斯蒂亚/乌树故里合并成一天？\n从梅斯蒂亚到乌树故里的单程约 40 公里，但路况差，单程需 1.5～2 小时；乌树故里本身值得至少 3～4 小时的村落漫步和徒步。如果当天往返第比利斯，整个行程将超过 12 小时，极度疲惫。我们用 D7 转场到梅斯蒂亚、D8 深度游玩乌树故里，是**节奏最合理**的方案。\n\n### Q3：卡兹别克山的 Gergeti 教堂一定要包越野车上山吗？\n**不一定**，但强烈推荐。上山路段为未铺装碎石路，坡度大、弯道急，普通轿车无法通行。徒步上山单程约 8～9 公里，爬升 500 米，对体力有一定要求。婚假期间建议以舒适为主，包一辆四驱越野车（约 80～120 GEL/车往返）是最省力的方式。如果想体验徒步，可以选择徒步上山、包车下山。\n\n### Q4：军事大道自驾安全吗？\n**整体安全**，但需要谨慎驾驶。军事大道是格鲁吉亚的国道主干线，全程铺装，但弯道多、大货车多、部分路段临崖。只要保持 defensive driving、不盲目超车、避开夜间和暴雨天气，普通驾驶者完全可以应付。建议租 SUV，底盘高、视野好。\n\n### Q5：格鲁吉亚的 Qvevri 陶罐酒是什么？值得买吗？\nQvevri 是人类最古老的酿酒方式之一：将葡萄连皮带籽放入大型陶罐中，埋入地下发酵和陈酿。这种方法酿造出的\"琥珀酒\"（Amber Wine）呈深金色或琥珀色，带有单宁感和独特的干果、蜂蜜香气。这是联合国教科文组织认定的非物质文化遗产，在格鲁吉亚购买价格约为国内的 1/3～1/4，**非常值得购买**。\n\n---\n\n## 附录四：一句话总结\n\n这 9 天，你们会在第比利斯的老城巷道中迷失方向，在西格纳吉的城墙上看阿拉扎尼山谷的日落，在卡兹别克山的圣三一教堂前仰望 5000 米雪山的金字塔尖，在欧洲最高的碉楼村落里听到冰川融水的溪流声，最后在红酒的微醺中回到彼此身边。\n\n**这是高加索送给新婚夫妇的礼物——一半北欧的雪山，三分之一的东南亚物价，和一整份独属于你们的异域浪漫。**\n\n---\n\n*文档生成时间：2026 年 4 月*  \n*祝你们旅途愉快，新婚快乐！*\n",
      f: "# 北海道｜夏季花海与温泉美食｜9 天婚假执行手册\n\n> **旅行时间**：7～8 月（薰衣草花季/避暑黄金窗口）  \n> **旅行人数**：2 人（婚假）  \n> **总天数**：9 天 8 晚  \n> **核心目的地**：札幌 → 小樽 → 富良野/美瑛 → 层云峡 → 知床半岛/阿寒湖 → 带广/十胜  \n> **人均预算**：2.0～3.0 万元人民币（2 人总计约 4～6 万元）\n\n---\n\n## 为什么选北海道？\n\n如果你们想要一场**\"不出亚洲的顶级浪漫之旅\"**，7～8 月的北海道是几乎完美的答案。\n\n这个季节的北海道，平均气温只有 20～25℃， humidity 低、海风清爽，是东亚难得的天然避暑胜地。与北欧相比，北海道的风景或许没有峡湾与午夜阳光那般壮阔，但它提供的是一种**更贴近日常的幸福感**——在亚洲顶级的和牛料理店里，两人对着一盘入口即化的十胜和牛相视一笑；在富良野的薰衣草花田尽头，远处的十胜岳连峰还残留着积雪；在层云峡或阿寒湖的温泉旅馆里，换上浴衣、泡进露天风吕，抬头是满天繁星。\n\n作为婚假，北海道是**\"美食、花海与温泉\"**的最佳平衡。这里的自驾体验也极其舒适：道路宽敞、车少，但日本是**右舵车、靠左行驶**，前半天需要适应；好在沿途便利店和加油站分布密集，几乎没有北欧那种\"开进荒野\"的紧张感。签证只需日本单次/多次签证，飞行时间 3～4 小时，语言有汉字相通，一切都让这趟旅程变得轻松而甜蜜。\n\n---\n\n## 行程总览\n\n| 天数 | 星期 | 路线 | 住宿地 | 核心体验 | 开车距离 |\n|:---:|:---:|:---|:---|:---|:---:|\n| D1 | 六 | 国内 → 新千岁机场 → 札幌 | 札幌 | 抵达、大通公园、拉面横丁、啤酒园 | — |\n| D2 | 日 | 札幌 → 小樽 → 札幌 | 札幌 | 小樽运河、天狗山、寿司街、北一硝子馆 | 约 70 km |\n| D3 | 一 | 札幌 → 富良野 | 富良野 | 富田农场薰衣草花田、精灵露台、起司工坊 | 约 115 km |\n| D4 | 二 | 富良野 → 美瑛 → 层云峡 | 层云峡 | 拼布之路、四季彩之丘、白金青池、温泉 | 约 115 km |\n| D5 | 三 | 层云峡 → 阿寒湖 | 阿寒湖 | 黑岳缆车/峡谷徒步、摩周湖、硫磺山、温泉 | 约 170 km |\n| D6 | 四 | 阿寒湖 → 知床半岛 | 知床（宇登吕） | 阿寒湖游船、知床五湖徒步、知床峠、棕熊观察 | 约 140 km |\n| D7 | 五 | 知床 → 带广 | 带广 | 知床半岛晨光、带广和牛烤肉、十胜温泉 | 约 210 km |\n| D8 | 六 | 带广 → 札幌 | 札幌 | 十胜牧场、白色恋人公园、狸小路最后采购 | 约 215 km |\n| D9 | 日 | 札幌 → 新千岁机场 → 国内 | — | 返程 | 约 50 km |\n\n> **设计逻辑**：前 2 天以札幌为据点轻松适应；D3-D6 开启道北大环线自驾，把最精华的花海、峡谷、湖泊、世界遗产串在一起；D7-D8 经带广品尝顶级和牛后返回札幌，D9 从容返程。全程不走回头路，节奏张弛有度。\n\n---\n\n# D1｜国内 → 札幌（Sapporo）\n**主题：抵达北海道首府**\n\n![札幌大通公园夜景](./images/sapporo_odori_park.jpg)\n*札幌大通公园与夏日祭典的灯火*\n\n## 交通\n- **航班**：建议选择 **ANA、JAL 或春秋航空日本** 的直飞航班，**下午 14:00-17:00 抵达新千岁机场（CTS）** 最佳。国内主要城市（北京、上海、台北、香港）均有直飞，飞行时间约 3.5～4.5 小时。\n- **机场 → 札幌市区**：乘坐 **JR 快速 AirPort 号**，约 37 分钟直达札幌站，票价 1,150 日元/人。班次密集（每 15 分钟一班），无需提前购票。\n- **市内交通**：从札幌站打车到市中心酒店约 10 分钟/1,500 日元；或搭乘地铁南北线/东西线/东丰线。\n\n## 住宿\n**推荐：札幌世纪皇家酒店（Century Royal Hotel Sapporo）**\n- 位置：JR 札幌站正上方，交通极其便利。\n- 价格：约 1,200～1,800 元人民币/晚。\n- 理由：早餐连续多年被评为\"日本酒店早餐第一名\"，可以吃到北海道产的新鲜牛奶、鲑鱼子和土豆沙拉；房间宽敞，景观房可俯瞰札幌市区夜景。\n- 备选：Sapporo TV Tower 附近的 **Cross Hotel Sapporo**（设计酒店，步行 5 分钟到大通公园）。\n\n## 活动\n- **傍晚**：从酒店步行 10 分钟到 **大通公园（Odori Park）**。这座东西走向的狭长公园贯穿札幌市中心，7～8 月正值**札幌夏日祭（Sapporo Summer Festival）**，啤酒花园里挤满了穿着浴衣的当地人，空气中弥漫着烤玉米和啤酒花的香气。公园中央每隔几十米就有一个小型舞台，常有民谣或爵士演出。\n- **晚餐**：步行 5 分钟到 **札幌拉面横丁（Ganso Sapporo Ramen Yokocho）**。这条只有数十米长的小巷里聚集了 17 家老字号拉面店，每一家都只坐 10 个人左右。推荐 **味噌拉面**——这是札幌的发明，浓稠的味噌汤底配上北海道产的玉米和黄油，是抵达第一晚最温暖的仪式。\n- **夜间**：如果对啤酒感兴趣，可以去 **札幌啤酒园（Sapporo Beer Garden）** 喝一杯现榨的札幌 Classic。这里的前身是明治时代的北海道开拓使麦酒酿造所，红砖建筑本身就是历史遗迹。\n\n---\n\n# D2｜小樽（Otaru）\n**主题：情书与寿司之町**\n\n![小樽运河仓库群](./images/otaru_canal.jpg)\n*小樽运河与古老的石造仓库群*\n\n## 交通\n- **札幌 → 小樽**：乘坐 **JR 函馆本线**（快速 AirPort 或普通列车均可），约 30～40 分钟，票价 750 日元/人。建议坐列车**右侧座位**，沿途可以欣赏石狩湾的海景。\n- **小樽市内**：完全步行即可。从 JR 小樽站出发，沿着主路步行 10 分钟即可抵达运河；寿司街和北一硝子馆都在运河附近。\n\n## 活动\n\n### 上午：小樽运河与仓库群\n小樽运河是这座城市最经典的画面——两岸排列着明治到大正时期建造的**石造仓库**，如今被改造成了咖啡馆、玻璃工坊和博物馆。清晨的运河游客较少，水面平静如镜，仓库的倒影清晰可见。\n\n- **看点**：运河边的**浅草桥**是最佳拍照点；仓库群里有很多售卖小樽特产（八音盒、玻璃工艺品、LeTAO 芝士蛋糕）的店铺。\n- **小贴士**：小樽的街道很多是坡道，建议穿舒适的 walking shoes。夏季阳光明媚，但海风凉爽，带一件薄外套。\n\n### 中午：小樽寿司街（Otaru Sushi Street）\n小樽是日本最著名的寿司圣地之一，得益于紧邻日本海，这里的海鲜新鲜度堪称顶级。\n\n- **推荐餐厅**：**伊势寿司（Isezushi）** 或 **政寿司（Masazushi）**。政寿司是米其林一星，需要提前预约；伊势寿司则是当地人更偏爱的老字号，性价比更高。\n- **必点**：**海胆饭（Uni Don）**、**鲑鱼子（Ikura）**、**甜虾（Amaebi）**、**金枪鱼大腹（Otoro）**。小樽的海胆来自附近的积丹半岛，口感绵密甘甜，带着淡淡的海水味。\n- 人均：400～800 元人民币。\n\n### 下午：北一硝子馆与天狗山\n\n![北一硝子馆煤油灯咖啡厅](./images/kitaichi_glass.jpg)\n*北一硝子三号馆的煤油灯咖啡厅*\n\n- **北一硝子馆（Kitaichi Glass）**：小樽是日本玻璃工艺的重要产地，北一硝子是其中最有代表性的品牌。三号馆内的**煤油灯咖啡厅**非常浪漫——店内没有电灯，全靠 167 盏煤油灯照明，昏黄的光线透过手工玻璃折射出来，像穿越到了大正年代。推荐点一杯招牌咖啡配玻璃器皿盛装的布丁。\n- **天狗山（Mt. Tenguyama）**：乘坐缆车约 4 分钟登顶。这里是电影《情书》的取景地之一，山顶可以 360° 俯瞰小樽市区、石狩湾和日本海。如果天气晴好，还能看到远处的积丹半岛。\n\n## 晚餐\n返回札幌后，推荐去 **二条市场（Nijo Market）** 或 **札幌站拉面共和国** 吃晚餐。如果想吃得隆重一点，可以预订 **成吉思汗烤肉（Jingisukan）**——这是北海道的特色料理，在铁盘上烤羊肉，配一杯札幌啤酒。\n\n---\n\n# D3｜札幌 → 富良野（Furano）\n**主题：驶入紫色花海的梦境**\n\n![富田农场薰衣草花田](./images/farm_tomita_lavender.jpg)\n*富田农场的薰衣草花田与十胜岳连峰*\n\n## 自驾路线\n- **取车**：上午在 **JR 札幌站** 或 **新千岁机场** 的租车柜台取车（建议提前在 Toyota Rent-a-Car 或 Nippon Rent-a-Car 预订）。推荐车型：丰田 Prius 或 RAV4，省油且后备箱空间足够放两个大行李箱。\n- **路线**：札幌 → 岩见泽 → 三笠 → 富良野，沿 **国道 12 号转国道 38 号** 行驶。\n- **距离**：约 115 公里。\n- **开车时间**：约 1.5～2 小时（路况极好，夏季沿途稻田翠绿）。\n\n> **自驾提示**：日本是**右舵车、靠左行驶**，与中国相反。建议第一天避开夜驾、出停车场和转弯时多做一次确认。高速公路收费可用 ETC 卡（租车公司通常会提供，还车时结算），夏季路面干燥，整体仍然很好开。\n\n## 住宿\n**推荐：新富良野王子酒店（Shin Furano Prince Hotel）**\n- 位置：富良野市区东侧的山麓地带。\n- 价格：约 1,000～1,600 元人民币/晚。\n- 特点：酒店旁边就是**精灵露台（Ningle Terrace）**和**森之时计咖啡厅**，步行 5 分钟可达。部分房间可直接看到十胜岳连峰。\n- 备选：**富良野 Natulux Hotel**（设计酒店，位于 JR 富良野站旁，交通更便利）。\n\n## 活动\n\n### 下午：富田农场（Farm Tomita）\n这是北海道最负盛名的薰衣草花田，也是无数明信片的取景地。\n\n- **看点**：**传统薰衣草田（Traditional Lavender Field）** 位于农场中心，紫色的花毯一直铺到十胜岳山脚下；**彩色花田（Irodori Field）** 则由薰衣草、罂粟、鼠尾草等拼成条纹图案，像一块巨大的调色板。\n- **最佳时间**：7 月中下旬是薰衣草的满开期，花朵颜色最深、香气最浓。8 月上旬开始收割，但彩色花田会一直持续到 8 月底。\n- **美食**：农场的**薰衣草冰淇淋**和**薰衣草汽水**是必试的——淡淡的紫色，入口是花香与奶香的奇妙融合。\n- **小贴士**：下午 3 点后游客逐渐减少，光线也更柔和。如果想拍到没有游客的照片，可以傍晚再去一次（农场免费开放区域至日落）。\n\n### 傍晚：精灵露台（Ningle Terrace）\n\n![富良野精灵露台黄昏](./images/ningle_terrace.jpg)\n*森林中的精灵露台与手工木屋*\n\n这是一片建在森林中的**手工工艺品村落**，由作家仓本聪设计。15 座小木屋分布在蜿蜒的木板路上，每间屋子里都有一位匠人在现场制作玻璃、木雕、皮革或蜡烛。傍晚时分，木屋的暖黄色灯光在森林中亮起，配上富良野凉爽的晚风，浪漫得像童话场景。\n\n---\n\n# D4｜富良野 → 美瑛 → 层云峡（Sounkyo）\n**主题：拼布之路与青池幻境**\n\n![美瑛四季彩之丘花田](./images/shikisai_no_oka.jpg)\n*美瑛四季彩之丘的展望花田*\n\n## 自驾路线\n- **路线**：富良野 → 美瑛（约 25 公里）→ 白金青池（约 30 公里）→ 层云峡温泉（约 60 公里）。\n- **总里程**：约 115 公里。\n- **开车时间**：约 2.5～3 小时（含多次停车拍照）。\n\n## 活动\n\n### 上午：美瑛拼布之路（Patchwork Road）与四季彩之丘\n美瑛的丘陵地带被称为\"拼布之路\"，因为不同颜色的农田（小麦、马铃薯、玉米、薰衣草）像拼布一样一块块拼接在一起。\n\n- **四季彩之丘（Shikisai-no-Oka）**：位于美瑛市区东侧，是一片占地 15 公顷的展望花田。这里的特色是**丘陵地形**——花田沿着缓坡向上延伸，站在高处可以俯瞰整片彩色花海和远处的十胜岳。7～8 月有薰衣草、向日葵、波斯菊等数十种花卉同时开放。\n  - 体验：可以乘坐** tractor 游览车**或**四轮越野车（ATV）**在花田间穿梭。\n  - 美食：**薰衣草冰淇淋**和**哈密瓜（夕张蜜瓜）**切片——北海道的蜜瓜甜度极高，是夏季限定美味。\n\n### 下午：白金青池（Shirogane Blue Pond）\n\n![白金青池梦幻蓝水](./images/blue_pond.jpg)\n*美瑛白金青池的钴蓝色水面与白桦枯木*\n\n这是北海道最著名的\"幻境\"之一。池水呈现出不真实的**钴蓝色**，原因是附近白金温泉的铝成分与美瑛川的水混合后，在阳光下发生了折射。池中矗立着几棵枯死的白桦树，蓝色的水面与白色的树干形成强烈的视觉对比。\n\n- **最佳时间**：晴朗的上午 10 点至下午 2 点，阳光直射时蓝色最鲜艳。傍晚时分则会变成翡翠绿。\n- **小贴士**：青池周边蚊虫较多，建议携带驱蚊液。停车场到池边只需步行 5 分钟。\n\n### 傍晚：抵达层云峡温泉\n从青池出发，沿 **国道 39 号** 向北行驶约 1 小时即可抵达层云峡。这是大雪山国立公园内最著名的温泉乡，峡谷两侧是柱状节理的悬崖，温泉旅馆沿峡谷排列。\n\n## 住宿\n**推荐：层云峡朝阳亭（Sounkyo Onsen Choyo-tei）**\n- 类型：传统日式温泉旅馆。\n- 价格：约 1,200～2,000 元人民币/晚（含一泊二食）。\n- 特点：拥有**露天风吕（露天温泉）**，可以一边泡温泉一边仰望峡谷岩壁和星空。晚餐是日式会席料理，使用北海道产的帝王蟹、鲑鱼和山野菜。\n\n---\n\n# D5｜层云峡 → 阿寒湖（Lake Akan）\n**主题：峡谷缆车与火山湖泊**\n\n![层云峡黑岳缆车山顶](./images/kurodake_ropeway.jpg)\n*从黑岳缆车上站俯瞰层云峡与大雪山连峰*\n\n## 自驾路线\n- **路线**：层云峡 → 上川 → 旭川 → 富良野/带广方向 → 阿寒湖，主要沿 **国道 39 号转国道 241 号/国道 273 号**。\n- **距离**：约 170 公里。\n- **开车时间**：约 3～3.5 小时（中途可在带广或足寄休息站用餐）。\n\n## 活动\n\n### 上午：黑岳缆车（Kurodake Ropeway）或峡谷徒步\n- **黑岳缆车**：从层云峡温泉街乘坐缆车+吊椅直达海拔 1,520 米的**黑岳五合目**。夏季这里是高山植物园，可以看到大雪山特有的高山花卉（如驹草、高山龙胆）。天气晴好时，可以远眺北海道最高峰**旭岳（2,291 米）**。\n  - 往返时间：约 2～2.5 小时。\n  - 山顶气温：约 15℃，建议带一件防风外套。\n- **层云峡徒步**：如果不想上山，可以选择沿峡谷底部的**流星瀑布・银河瀑布步道**散步。两条瀑布从 90 米高的悬崖倾泻而下，步道全程约 40 分钟，几乎没有爬升，非常适合婚假的轻松节奏。\n\n### 下午：摩周湖与硫磺山（Mt. Iō）\n从层云峡开往阿寒湖的途中，会经过两个道东最著名的火山景观：\n\n![摩周湖全景与火山口](./images/mashu_lake.jpg)\n*摩周湖第三展望台的全景——日本透明度最高的湖泊*\n\n- **摩周湖（Lake Mashū）**：这是一个火山口湖，湖水透明度常年位居日本第一，被称为\"神秘之湖\"。从 **第三展望台** 俯瞰，碧蓝的湖水被 200 米高的火山口壁环绕，湖心有一座小岛（神婆岛）。如果运气好遇到\"摩周蓝\"（无风时的镜面效果），整个湖面会像一块巨大的蓝宝石。\n- **硫磺山（Mt. Iō / Atosanupuri）**：一座活火山，山体表面覆盖着黄色的硫磺结晶，空气中弥漫着浓烈的硫磺味。可以沿着木栈道近距离观察喷气孔和火山活动，有一种来到外星的 surreal 感。\n\n### 傍晚：阿寒湖温泉\n阿寒湖是北海道原住民阿伊努人的圣地，湖畔的温泉街已有百年历史。\n\n## 住宿\n**推荐：阿寒鹤雅别墅鄙之座（Akan Tsuruga Besso Hinanoza）**\n- 类型：高端温泉旅馆。\n- 价格：约 2,500～4,000 元人民币/晚（含一泊二食）。\n- 特点：每间客房都带有**私人露天温泉**，是北海道最浪漫的温泉住宿之一。晚餐是怀石料理，使用阿寒湖的毬藻（Marimo）和北海道产的和牛。\n- 备选：**阿寒湖鹤雅之翼（Akan Yuku no Sato Tsuruga）**，同属鹤雅集团，价格稍低，但同样可以享用大型公共温泉设施。\n\n---\n\n# D6｜阿寒湖 → 知床半岛（Shiretoko）\n**主题：世界遗产与野生棕熊**\n\n![知床五湖木栈道与原始森林](./images/shiretoko_goko.jpg)\n*知床五湖的木栈道穿越原始森林与湿地*\n\n## 自驾路线\n- **路线**：阿寒湖 → 川汤温泉 → 知床峠 → 知床五湖 → 宇登吕温泉。\n- **距离**：约 140 公里。\n- **开车时间**：约 2.5～3 小时（沿途风景极佳，会多次停车）。\n\n## 活动\n\n### 上午：阿寒湖游船与毬藻（Marimo）\n- **阿寒湖游船**：上午可以乘坐观光游船游览阿寒湖，船程约 1 小时。游船会停靠 **Churui 岛**，岛上有**毬藻展示观察中心**。毬藻（Marimo）是一种稀有的绿藻球，只在高纬度地区的少数湖泊中形成，被阿伊努人视为幸运的象征。\n- **小贴士**：夏季阿寒湖水温凉爽，清晨湖面常有薄雾，坐船穿行其中有一种仙境感。\n\n### 下午：知床五湖（Shiretoko Goko）\n知床半岛是北海道唯一的世界自然遗产，被称为\"日本最后的秘境\"。**知床五湖**是半岛最精华的徒步路线之一。\n\n- **路线选择**：\n  - **高架木栈道（免费）**：全程约 1.6 公里，约 40 分钟。沿着地面铺设的木栈道穿越原始森林和湿地，可以近距离观赏知床的原始森林和湖泊倒影。\n  - **地上步道（需付费，有导游陪同）**：全程约 3 公里，约 2.5 小时。更深入地走进五湖区域，有机会看到野生棕熊、虾夷鹿和狐狸。\n- **棕熊观察**：知床是日本棕熊密度最高的地区之一。夏季（7～8 月）是棕熊活动的高峰期。如果走地上步道，会有**专业护林员携带防熊喷雾陪同**，安全有保障。在高架木栈道上也有可能远眺到湖边觅食的棕熊。\n- **最佳时间**：下午 3 点至 5 点，阳光斜射进森林，湖面的倒影最清晰，也是野生动物最活跃的时段。\n\n### 傍晚：知床峠（Shiretoko Pass）与宇登吕温泉\n\n![知床峠远眺鄂霍次克海](./images/shiretoko_pass.jpg)\n*从知床峠俯瞰鄂霍次克海与知床连峰*\n\n- **知床峠**：海拔 738 米，是连接阿寒湖与宇登吕的公路最高点。从这里可以俯瞰鄂霍次克海和知床连峰——锯齿状的山峰直接从海面升起，气势磅礴。夏季山顶可能还有残雪，道路两侧常有虾夷鹿出没。\n- **宇登吕温泉（Utoro Onsen）**：知床半岛最大的温泉乡，面临鄂霍次克海。这里的特色是**海边露天温泉**——泡在温泉里，耳边是海浪拍打礁石的声音，抬头是知床连峰的剪影。\n\n## 住宿\n**推荐：知床第一酒店（Shiretoko Daiichi Hotel）**\n- 类型：日式温泉旅馆。\n- 价格：约 1,500～2,500 元人民币/晚（含一泊二食）。\n- 特点：拥有**临海露天温泉大浴场**，可以一边泡汤一边看日落和星空。晚餐是北海道海鲜会席，包括知床产的毛蟹、海胆和鲑鱼。\n- 备选：**知床季之风（Shiretoko no Mori Ikkei）**，更小巧精致的温泉旅馆，客房较少但服务更私密。\n\n---\n\n# D7｜知床 → 带广（Obihiro）\n**主题：半岛晨光与和牛朝圣**\n\n![带广和牛烤肉](./images/obihiro_wagyu.jpg)\n*带广十胜和牛炭火烤肉——入口即化的梦幻口感*\n\n## 自驾路线\n- **路线**：宇登吕 → 清里町 → 中標津 → 带广，主要沿 **国道 244 号转国道 236 号/国道 38 号**。\n- **距离**：约 210 公里。\n- **开车时间**：约 3.5 小时（路况良好，沿途是广阔的十胜平原牧场风光）。\n\n## 活动\n\n### 上午：知床半岛晨光与最后的秘境\n- **清晨自由活动**：如果起得早，可以在宇登吕港边散步。夏季的鄂霍次克海平静而湛蓝，远处的知床连峰笼罩在晨雾中。运气好的话，可以看到海豹在海面上露头。\n- **知床自然中心（Shiretoko Nature Center）**：这里是知床世界遗产的游客中心，有免费的展览和纪录片，可以更深入地了解知床的生态系统。中心后面有一条短途步道，约 20 分钟，可以走到瀑布观景台——**Furepe 瀑布**从悬崖上直接落入海中，被称为\"少女之泪\"。\n\n### 下午：十胜平原自驾\n从知床开往带广的途中，会穿越北海道最广阔的农业区——**十胜平原**。这里的道路笔直而空旷，两侧是一望无际的麦田、马铃薯田和放牧的牛群。夏季（7～8 月）正是农作物生长的旺季，绿色的田野延伸到地平线，与蓝天白云相接。\n\n- **途中休息站**：推荐在 **鹿追町** 或 **然别湖畔** 短暂停留。然别湖是北海道海拔最高的湖泊，湖水清澈见底，湖畔有天然温泉足汤可以免费泡脚。\n\n### 傍晚：带广和牛烤肉\n带广是**十胜和牛**的故乡，这里的和牛以肉质细腻、油花均匀闻名，是日本顶级和牛产地之一。\n\n- **推荐餐厅**：**猪肉饭 Panchō 本店**（虽然叫猪肉饭，但也有顶级和牛）或 **炭火烧肉 Furusato**。更高端的可以选择 **Kita no Ryoba** 或 **十胜精肉店直营烤肉店**。\n- **必点**：**十胜和牛里脊（Sirloin）**、**霜降牛肉（Marbled Beef）**、**牛舌（Gyutan）**。十胜和牛的油脂熔点极低，放在炭火上轻轻一烤，入口即化，带着淡淡的奶香和甜味。\n- 人均：500～1,000 元人民币。\n\n## 住宿\n**推荐：带广温泉 Casa Inn Hotel 或带广绿丘酒店**\n- 价格：约 800～1,200 元人民币/晚。\n- 特点：带广市区酒店以商务酒店为主，但大多附带**天然温泉大浴场**，可以消除一天长途驾驶的疲劳。\n- 备选：**十胜川温泉第一酒店（Tokachigawa Onsen Daiichi Hotel）**，位于带广市郊的十胜川温泉乡，这里的温泉是罕见的**植物性沼泽温泉（Moor Spring）**，泉水呈琥珀色，富含天然有机物，泡完后皮肤特别滑嫩。\n\n---\n\n# D8｜带广 → 札幌（Sapporo）\n**主题：牧场风光与甜蜜收尾**\n\n![白色恋人公园欧式花园](./images/shiroi_koibito_park.jpg)\n*白色恋人公园的玫瑰花园与欧式城堡*\n\n## 自驾路线\n- **路线**：带广 → 札幌，主要沿 **道东自动车道（E38/E39）转道央自动车道（E5）**。\n- **距离**：约 215 公里。\n- **开车时间**：约 3～3.5 小时（高速公路为主，非常顺畅）。\n\n> **还车提示**：建议在札幌市区的租车点或新千岁机场还车。如果第二天一早的航班较早，可以在 D8 傍晚直接把车还到新千岁机场，然后乘 JR 回札幌市区住宿（约 37 分钟）。\n\n## 活动\n\n### 上午：十胜牧场或幸福车站\n- **十胜牧场（Tokachi Ranch）**：位于带广市郊，是一片开阔的放牧牧场。夏季可以看到成群的乳牛在绿色的草原上悠闲吃草，远处是十胜岳连峰。牧场内有售卖新鲜牛奶和冰淇淋的商店，推荐尝试**十胜鲜奶冰淇淋**——奶香浓郁，口感绵密。\n- **幸福车站（Kōfuku Station）**：这是 JR 广尾线上已废弃的一座小车站，因为站名\"幸福\"而成为了恋人们的朝圣地。车站内保留了旧式月台和车厢，可以买到\"幸福车票\"作为纪念。\n\n### 下午：白色恋人公园（Shiroi Koibito Park）\n\n![白色恋人公园城堡与花园](./images/shiroi_koibito_castle.jpg)\n*白色恋人公园的白色城堡与夏日玫瑰*\n\n抵达札幌后，推荐前往 **白色恋人公园**。这里是北海道最著名的甜点品牌\"白色恋人\"的主题公园，园内有一座白色的欧式城堡、玫瑰花园和巧克力工厂。\n\n- **看点**：城堡内的巧克力博物馆可以看到白色恋人的制作流程；夏季花园里的玫瑰花盛开，非常适合拍照。\n- **体验**：可以预约 **亲手制作白色恋人饼干** 的工坊课程（约 30 分钟），在饼干上画上属于你们的图案，作为婚假的甜蜜纪念。\n- **购物**：公园内的商店有白色恋人各种限定口味的饼干和巧克力，是回国送礼的最佳选择。\n\n### 傍晚：狸小路最后采购\n- **狸小路商店街（Tanukikoji Shopping Arcade）**：札幌最古老的商店街，全长约 900 米，有 200 多家店铺。这里可以买到北海道的所有特产：白色恋人、LeTAO 芝士蛋糕、薯条三兄弟、ROYCE 生巧克力、北海道牛奶糖等。\n- **晚餐**：推荐 **汤咖喱（Soup Curry）**——这是札幌发明的料理，将咖喱做成汤的形式，配上炸得酥脆的鸡腿和蔬菜。推荐餐厅 **GARAKU** 或 **Suage+**。\n\n---\n\n# D9｜札幌 → 新千岁机场 → 国内\n**主题：回家**\n\n- **交通**：从札幌站乘坐 **JR 快速 AirPort 号** 到新千岁机场，约 37 分钟，票价 1,150 日元/人。建议预留至少 2 小时在机场办理登机手续和免税购物。\n- **机场购物**：新千岁机场是日本最好逛的机场之一，安检区内外都有大量的北海道特产店和餐厅。如果还没买够，可以在机场最后补货。\n- **航班**：建议选择 **上午 10:00～12:00 起飞** 的航班，这样前一天晚上可以充分休息，也不会太赶。\n- **归途**：带着薰衣草的香气、温泉的暖意、和牛的回味，以及 9 天的甜蜜记忆回家。\n\n---\n\n## 附录一：全程预算拆分（2 人总计）\n\n| 项目 | 金额（人民币） | 说明 |\n|:---|:---:|:---|\n| **国际往返机票** | 8,000～16,000 | 暑假直飞经济舱，约 4,000～8,000 元/人（上海/北京出发常有特价） |\n| **北海道境内交通** | 4,000～6,000 | 7 天租车约 3,000～4,500 元（含保险），油费+高速费约 1,000～1,500 元 |\n| **JR/机场快线** | 600～800 | 新千岁↔札幌、札幌↔小樽 |\n| **住宿（8 晚）** | 12,000～22,000 | 札幌商务酒店 800～1,500 元/晚，温泉旅馆 1,500～3,500 元/晚 |\n| **餐饮** | 8,000～14,000 | 外食人均 150～400 元/顿，温泉旅馆晚餐人均 300～600 元 |\n| **门票/体验** | 1,500～2,500 | 黑岳缆车、知床五湖导游、白色恋人公园、花田游览车等 |\n| **签证/保险/杂费** | 1,500～2,500 | 日本签证约 300～600 元/人，保险 100～200 元/人 |\n| **总计** | **约 35,600～64,800 元** | **人均 1.78～3.24 万** |\n\n> **省钱小贴士**：北海道的便利店（Seicomart、Lawson、7-Eleven）美食非常丰富，早餐和简餐可以在便利店解决；温泉旅馆通常包含晚餐和早餐，是性价比很高的选择。租车建议提前 1～2 个月在官网预订，夏季是旺季，临时租车价格会翻倍。\n\n---\n\n## 附录二：行前准备清单\n\n### 证件与签证\n- [ ] **日本签证**：至少提前 **4～6 周** 申请。7～8 月是赴日旅游旺季，建议尽早办理。\n- [ ] 护照（有效期 6 个月以上）。\n- [ ] 中国驾照原件 + **日文翻译件**（JAF 或租车公司认可的翻译件，需提前办理）。\n- [ ] 国际信用卡（Visa/Mastercard，用于租车押金和高速 ETC）。\n- [ ] 旅行保险（建议购买含医疗救援和航班延误的保险）。\n\n### 预订确认（按优先级）\n1. [ ] **国际机票**\n2. [ ] **租车**（札幌或新千岁机场取车，7 天，推荐 Toyota / Nippon / Times Car Rental）\n3. [ ] **温泉旅馆**（阿寒湖鹤雅、层云峡朝阳亭、知床温泉旅馆等旺季房源紧张）\n4. [ ] **富良野/札幌住宿**\n5. [ ] **白色恋人公园饼干制作体验**（如感兴趣，官网可预约）\n6. [ ] **米其林/人气餐厅**（如政寿司、GARAKU 汤咖喱等）\n\n### 衣物与装备\n- [ ] **薄外套/防晒衣**：北海道夏季早晚凉爽（15～20℃），山区和海边风大。\n- [ ] **短袖 T 恤 + 长裤/长裙**：白天阳光强烈但气温舒适，约 22～28℃。\n- [ ] **防晒霜 + 墨镜 + 遮阳帽**：夏季紫外线强，花田和海边几乎没有遮阴。\n- [ ] **防水徒步鞋/舒适运动鞋**：知床五湖徒步和层云峡峡谷步道需要。\n- [ ] **驱蚊液**：夏季花田和湖边蚊虫较多。\n- [ ] **转换插头**：日本使用**两脚扁型插头（A 型）**，电压 100V。\n- [ ] **便携烧水壶**：日本人习惯喝冰水/常温水，旅馆通常只有咖啡机没有热水壶。\n- [ ] **少量现金**：日本乡村地区（尤其是知床、带广的乡村小店）仍有很多只收现金的店铺。\n\n### APP 下载\n- **Google Maps**：自驾导航必备，离线地图可提前下载。\n- **Navitime / Japan Maps**：日本本土导航 APP，高速公路费和加油站信息更准确。\n- **Google Translate**：拍照翻译菜单和路牌。\n- **Tabelog**：日本版\"大众点评\"，找餐厅必备。\n- **Jalan / Rakuten Travel**：预订温泉旅馆和日本酒店。\n- **Hyperdia**：查询 JR 时刻表和票价。\n\n---\n\n## 附录三：关键决策说明（FAQ）\n\n### Q1：为什么不直飞旭川或带广，而是从札幌开始自驾？\n札幌是北海道最大的城市，航班选择最多、租车网点最全、价格最便宜。从札幌出发自驾可以形成一个**完美的逆时针环线**（札幌→富良野→美瑛→层云峡→阿寒湖→知床→带广→札幌），全程不走回头路，沿途风景类型丰富且变化自然。如果直飞旭川或带广，航班少、租车贵，反而会增加旅行成本。\n\n### Q2：北海道自驾和中国有什么不同？\n北海道自驾和中国**不完全一样**，最重要的区别是日本采用**右舵车、靠左行驶**。除了这一点，另外还有两项需要特别注意：\n- **限速较低**：高速公路通常限速 100 km/h，国道 50～70 km/h，市区 40 km/h，且测速和巡逻较多，建议严格遵守；\n- **行人优先**：日本路口通常没有红绿灯，车辆必须无条件礼让行人；遇到\"止まれ（停车再开）\"标志时，必须完全停稳 3 秒再前进。\n\n### Q3：知床的棕熊会不会很危险？\n知床是日本棕熊密度最高的地区，但只要**遵守规定、不单独行动、不携带食物进入步道**，风险是极低的。知床五湖的木栈道区域有护林员巡逻；如果选择地上步道，则**必须由专业导游带领**，且导游会携带防熊喷雾。棕熊通常对人类有回避行为，夏季游客较多时更是如此。看到棕熊反而是很难得的幸运体验。\n\n### Q4：薰衣草最佳观赏期到底是什么时候？\n富良野薰衣草的**满开期通常在 7 月中旬至 7 月底**，此时颜色最深、花穗最饱满。7 月上旬开始开花，8 月上旬开始收割。如果你们的行程在 8 月，也不必担心——**四季彩之丘、富田农场的彩色花田、向日葵田** 会一直盛开到 8 月底，只是薰衣草区域会变小。7 月中下旬是绝对的黄金窗口。\n\n### Q5：如果预算充裕，有什么可以提升体验的？\n- **阿寒湖鹤雅别墅鄙之座**：升级到有私人露天温泉的客房，享受完全私密的二人时光；\n- **直升机观光**：在富良野或知床都有直升机游览项目，从空中俯瞰花海和半岛，震撼度完全不同（约 2,000～3,500 元/人/15 分钟）；\n- **米其林/高级和牛**：在札幌预订 **Molière（米其林三星，法式料理）** 或 **花小路 さわ田（米其林三星，怀石料理）**，体验北海道食材的巅峰表达。\n\n---\n\n## 附录四：一句话总结\n\n这 9 天，你们会从札幌的拉面横丁出发，开车穿过富良野紫色的薰衣草花田和十胜平原的牧场，在层云峡和阿寒湖的温泉里看星空，在世界遗产知床半岛的原始森林里寻找棕熊的足迹，最后在带广的炭火边分享一盘入口即化的十胜和牛。\n\n**这是北海道在夏天最温柔的样子，也是你们婚假里最值得珍藏的味道。**\n\n---\n\n*文档生成时间：2026 年 4 月*  \n*祝你们旅途愉快，新婚快乐！*\n",
      g: "# 苏格兰｜高地史诗与威士忌之旅｜9 天婚假执行手册\n\n> **旅行时间**：6～8 月（夏季/长白昼窗口）  \n> **旅行人数**：2 人（婚假）  \n> **总天数**：9 天 8 晚  \n> **核心目的地**：爱丁堡 → 格拉斯哥/斯特灵 → 格伦科峡谷 → 斯凯岛 → 尼斯湖 → NC500 公路  \n> **人均预算**：2.5～3.5 万元人民币（2 人总计约 5～7 万元）\n\n---\n\n## 为什么选苏格兰？\n\n如果你们钟情于挪威的峡湾与午夜阳光，却又渴望一场**人文更厚重、传说更缭绕**的旅程，苏格兰是北欧气质最完美的「英伦分身」。\n\n这里的地貌同样魔幻——苍茫的高地如同被巨人的手掌揉皱过，灰色的山峦在薄雾中若隐若现，湖泊深不见底，悬崖直插大西洋。但挪威的荒野是清冷的新教气质，苏格兰的荒野却浸透了凯尔特神话、氏族悲歌和威士忌的焦糖香。每一块苔藓覆盖的石头都在低语，每一座破败的古堡都藏着 Romeo 与 Juliet 式的家族恩怨。\n\n6～8 月的苏格兰，白昼可以拉长到 18 个小时以上，和挪威一样拥有「用不完的白昼」。但你们的夜晚不会只在看太阳，而是在爱丁堡的老酒馆里听一场民谣 live，在斯凯岛的民宿客厅里就着 peat smoke 味的威士忌聊到窗帘外的天依然明亮。\n\n**作为婚假，苏格兰是「壮丽风景」与「浪漫人文」的黄金交叉点。**\n\n---\n\n## 行程总览\n\n| 天数 | 星期 | 路线 | 住宿地 | 核心体验 | 开车距离 |\n|:---:|:---:|:---|:---|:---|:---:|\n| D1 | 六 | 国内 → 爱丁堡 | 爱丁堡 | 抵达、休整、老城初探 | — |\n| D2 | 日 | 爱丁堡 | 爱丁堡 | 爱丁堡城堡、皇家英里、卡尔顿山日落 | — |\n| D3 | 一 | 爱丁堡 → 斯特灵 → 格拉斯哥 → 洛蒙德湖 | 洛蒙德湖/特罗萨克斯 | 斯特灵城堡、格拉斯哥西区、进入高地门户 | 约 110 km |\n| D4 | 二 | 洛蒙德湖 → 格伦科 → 马莱格 → 斯凯岛 | 波特里 | 格伦科峡谷三姐妹山、马莱格渡轮、上岛 | 约 180 km |\n| D5 | 三 | 斯凯岛（北/东环线） | 波特里 | 老人峰徒步、裙岩悬崖、仙女池 | 约 90 km |\n| D6 | 四 | 斯凯岛（西/南环线） | 波特里 | 内斯特角灯塔、邓韦根城堡、珊瑚海滩 | 约 120 km |\n| D7 | 五 | 斯凯岛 → 格伦科 → 尼斯湖 | 因弗内斯 | 格伦科观景台深度停留、厄克特城堡、尼斯湖 | 约 160 km |\n| D8 | 六 | 尼斯湖 → NC500 精华段 → 皮特洛赫里 → 爱丁堡 | 爱丁堡/格拉斯哥 | NC500 公路、皮特洛赫里小镇、返回城市 | 约 280 km |\n| D9 | 日 | 爱丁堡/格拉斯哥 → 国内 | — | 返程 | — |\n\n> **设计逻辑**：爱丁堡双城作为文化开场；D3 由南向北渐入高地，斯特灵和格拉斯哥作为人文缓冲；D4-D6 把斯凯岛作为行程核心，马莱格渡轮上岛体验仪式感；D7-D8 走经典北高地环线返回，不走回头路。\n\n---\n\n# D1｜国内 → 爱丁堡（Edinburgh）\n**主题：抵达北方雅典**\n\n![爱丁堡城堡俯瞰皇家英里大道](./images/edinburgh_castle.jpg)\n*爱丁堡城堡俯瞰皇家英里大道*\n\n## 交通\n- **航班**：建议选择 **英国航空 BA**、**维珍航空 VS** 或 **阿联酋航空 EK** 的联程航班，**下午 14:00-17:00 抵达爱丁堡机场（EDI）** 最佳。国内无直飞，通常经伦敦希思罗或阿姆斯特丹转机一次。\n- **机场 → 市区**：乘坐 **Airlink 100 快线大巴**，约 30 分钟到达王子街（Waverley Bridge），票价约 5.5 英镑/人；或打车约 25 分钟，费用 20～25 英镑。\n\n## 住宿\n**推荐：The Scotsman Hotel 或 Kimpton Charlotte Square Hotel**\n- **The Scotsman Hotel**：位于北桥（North Bridge），由旧苏格兰人报社大楼改造，正对卡尔顿山。价格约 180～280 英镑/晚。\n- **Kimpton Charlotte Square**：乔治式联排别墅酒店，内部庭院安静，步行 5 分钟到王子街。价格约 200～320 英镑/晚。\n- 备选：老城皇家英里沿线的精品民宿（Airbnb），可以体验「住在 300 年历史的石头房子里」的感觉。\n\n## 活动\n- **傍晚**：从酒店步行至 **王子街花园（Princes Street Gardens）**，仰望矗立在火山岩上的爱丁堡城堡。这是你们对这座城市的第一印象——一座城市与一座城堡共生 900 年。\n- **晚餐**：推荐 **The Witchery by the Castle**，位于城堡脚下的皇家英里大道上，是 Edinburgh 最具哥特浪漫气质的餐厅。16 世纪的地下石窖、天鹅绒座椅、烛光摇曳，招牌菜是苏格兰龙虾和鹿肉。人均约 60～90 英镑，**建议提前预订**。\n- **夜间**：如果精力尚可，在皇家英里大道上随便找一家 pub 听一场现场民谣。苏格兰风笛在这里不是旅游表演，而是当地人的音乐语言。\n\n## 小贴士\n抵达当晚不要安排太多行程。爱丁堡是一座需要「用脚步丈量坡度」的城市，老城的石板路和 7 层楼高的陡坡会在第一天就给你下马威。早点休息，明天才是真正的高能开始。\n\n---\n\n# D2｜爱丁堡（Edinburgh）\n**主题：在石与火之间漫步**\n\n![爱丁堡老城街道](./images/edinburgh_old_town.jpg)\n*爱丁堡老城蜿蜒的石板街道*\n\n## 上午：爱丁堡城堡（Edinburgh Castle）\n\n![爱丁堡城堡入口](./images/edinburgh_castle_gate.jpg)\n*爱丁堡城堡正门与半月炮台*\n\n- **时间**：建议 09:00 开门即入场，避开旅行团高峰。\n- **门票**：约 19.5 英镑/人，建议提前官网预订。\n- **看点**：\n  - **皇冠珠宝室（Crown Jewels）**：苏格兰王冠、权杖和命运之石，是苏格兰独立的象征。\n  - **圣玛格丽特礼拜堂（St Margaret's Chapel）**：城堡内最古老的建筑，约 1130 年，比城堡本身还早。\n  - **半月炮台（Half Moon Battery）**：俯瞰全城的最佳位置，可以清晰地看到新城区乔治式建筑的网格与老城中世纪迷宫的对比。\n  - **一点钟鸣炮（One O'Clock Gun）**：每天 13:00 鸣炮，这项传统自 1861 年延续至今（除了周日）。\n\n> **历史感**：这座城堡不是童话里的王子公主城堡，而是一座真正的军事要塞。它见证了苏格兰与英格兰数百年的战争、詹姆斯六世南下继承英格兰王位、以及玛丽女王的悲剧。站在城墙上，你会理解为什么苏格兰人总说「We were a country before we were a region」。\n\n## 下午：皇家英里大道（Royal Mile）与威士忌体验中心\n\n- **路线**：从城堡正门沿 **Royal Mile** 一路向东走到底，约 1.8 公里。这是爱丁堡老城的主轴，两旁是 16-17 世纪的高耸石屋、关闭（Close，狭窄的巷道）、教堂和议会大楼。\n- **荷里路德宫（Palace of Holyroodhouse）**：Royal Mile 的终点，英国王室在苏格兰的官邸。如果兴趣不大，可以在宫殿花园外拍照即可。\n- **苏格兰威士忌体验中心（The Scotch Whisky Experience）**：位于 Royal Mile 靠近城堡的一端。推荐预订 **Silver Tour**（约 23 英镑/人），乘坐橡木桶形状的小火车穿越威士忌酿造过程，最后品尝 3 种不同产区的威士忌。对于新手，这是最高效的入门方式。\n\n## 傍晚：卡尔顿山（Calton Hill）日落\n\n![卡尔顿山日落](./images/calton_hill_sunset.jpg)\n*从卡尔顿山俯瞰爱丁堡新城与福斯湾*\n\n- **时间**：夏季日落约 21:30-22:00，但最美的光线在 20:00-21:00。\n- **路线**：从王子街向东步行 10 分钟即可登顶，几乎没有难度。\n- **景观**：山顶有仿古希腊的未完工纪念碑、纳尔逊纪念塔，以及俯瞰全城的最佳视角。向东可以看到福斯湾（Firth of Forth）和远处的北海；向西可以看到城堡剪影在夕阳中变成金色。\n- **浪漫时刻**：带一瓶超市买的白葡萄酒或本地精酿啤酒，坐在山顶的草地上等待天黑。这是爱丁堡最像电影的一幕。\n\n## 晚餐\n推荐 **Ondori」，位于 Leith 区的意大利/苏格兰融合餐厅，或者老城里的 **The Dogs**（现代苏格兰菜，性价比极高）。如果想更 casual，可以在 **Stockbridge** 街区找一家 gastro pub。\n\n---\n\n# D3｜爱丁堡 → 斯特灵（Stirling）→ 格拉斯哥（Glasgow）→ 洛蒙德湖（Loch Lomond）\n**主题：从王国之心驶入高地门户**\n\n![斯特灵城堡](./images/stirling_castle.jpg)\n*斯特灵城堡俯瞰苏格兰中部平原*\n\n## 自驾开始\n- **取车**：上午在爱丁堡 Waverley 火车站附近或机场取车。苏格兰高地公共交通不便，**从今天起开启自驾**。\n- **重要提醒**：英国是**右舵左行**。前 30 分钟请格外小心环岛（Roundabout）的行驶方向，建议先在市区低速适应。\n\n## 上午：斯特灵城堡（Stirling Castle）\n- **距离**：爱丁堡 → 斯特灵约 60 公里，车程 1 小时。\n- **门票**：约 17 英镑/人。\n- **看点**：\n  - 斯特灵被称为「苏格兰的咽喉」，因为它是低地通往高地的要塞。\n  - 城堡内还原了 16 世纪詹姆斯五世的宫廷装饰，是苏格兰城堡中「王室生活感」最强的一座。\n  - 从城墙可以远眺 **华莱士纪念碑（Wallace Monument）**——一座维多利亚时代的哥特式尖塔，纪念《勇敢的心》主人公威廉·华莱士。\n\n> **历史感**：如果说爱丁堡城堡是军事要塞，斯特灵城堡就是苏格兰王室的摇篮。玛丽女王在这里加冕，詹姆斯六世在这里长大。它的战略地位让苏格兰人相信：「谁控制了斯特灵，谁就控制了苏格兰。」\n\n## 下午：格拉斯哥西区（Glasgow West End）\n- **距离**：斯特灵 → 格拉斯哥约 40 公里，车程 40 分钟。\n- **活动**：格拉斯哥是苏格兰最大的城市，但与爱丁堡的古典气质截然不同——这里是工业革命的引擎、朋克音乐的发源地、以及苏格兰最热情（也最粗犷）的城市。\n- **推荐停留**：\n  - **凯文葛罗夫艺术博物馆（Kelvingrove Art Museum）**：免费入场，收藏了萨尔瓦多·达利的《十字架上的圣约翰基督》。\n  - **阿什顿巷（Ashton Lane）**：一条鹅卵石铺成的小巷，两旁是酒吧、餐厅和独立电影院，挂满了串灯，非常适合拍照和喝一杯咖啡。\n\n## 傍晚：进入高地，抵达洛蒙德湖\n- **距离**：格拉斯哥 → 洛蒙德湖（Balloch 或 Luss 小镇）约 30 公里，车程 35 分钟。\n- **路线**：沿 A82 公路向北，这是苏格兰最著名的景观公路之一。当城市的痕迹逐渐消失，取而代之的是湖泊、松树林和远处开始出现的高地山影时，你们会有一种「真正开始旅行」的仪式感。\n\n## 住宿\n**推荐：Lodge on Loch Lomond Hotel 或 Loch Lomond 湖畔 Airbnb**\n- 价格：约 150～250 英镑/晚。\n- 特点：湖畔景观房，夏季傍晚可以在湖边散步，看天鹅和水鸟。\n\n## 晚餐\n酒店餐厅或 **The Drovers Inn**，一家 1705 年开业的老酒馆，据说闹鬼，但氛围极好，壁炉里烧着真正的柴火。\n\n---\n\n# D4｜洛蒙德湖 → 格伦科峡谷（Glencoe）→ 马莱格（Mallaig）→ 斯凯岛（Isle of Skye）\n**主题：穿越苏格兰最美的公路**\n\n![格伦科峡谷三姐妹山](./images/glencoe_three_sisters.jpg)\n*格伦科峡谷标志性的三姐妹山*\n\n## 自驾路线\n- **洛蒙德湖 → 格伦科**：沿 A82 公路继续向北，约 70 公里，车程 1.5 小时。这是全世界最美的公路之一，沿途经过 **特罗萨克斯国家公园（Trossachs）**、**兰诺克沼地（Rannoch Moor）** 和最终抵达格伦科峡谷。\n- **格伦科 → 马莱格**：约 75 公里，车程 1.5 小时。这段路会经过威廉堡（Fort William），英国本土最高峰 **本尼维斯山（Ben Nevis）** 就在西侧。\n- **马莱格 → 斯凯岛（Armadale）**：乘 **Caledonian MacBrayne 轮渡**，航程约 30 分钟。夏季班次密集，约每小时一班。\n\n## 上午：格伦科峡谷（Glencoe）\n\n格伦科是苏格兰高地的代名词。这里的山体呈现出一种奇异的阶梯状纹理，是冰川侵蚀留下的痕迹。山谷常年笼罩在云雾中，阳光偶尔穿透云层，照亮某一座山峰的顶部——这种景象被称为「上帝的聚光灯」。\n\n- **三姐妹山（Three Sisters）**：位于 A82 公路旁，有三条清晰的停车场。最经典的机位在 **Three Sisters Carpark**，可以拍到三座锯齿状山峰并排而立。\n- **Glencoe Visitor Centre**：了解 1692 年「格伦科大屠杀」的历史——坎贝尔氏族在 hospitality 的名义下屠杀了麦克唐纳氏族 38 人。这是苏格兰历史上最黑暗的背叛之一，也让这片土地多了一层悲怆的氛围。\n- **徒步推荐**：如果有 1.5 小时，可以走 **Glencoe Lochan Trail**，一条轻松的环湖步道，湖水倒映着松林和远山。\n\n> **摄影建议**：格伦科的天气变化极快，前一秒大雾弥漫，后一秒阳光普照。不要急着离开，在停车场多等 15 分钟，天气可能会给你惊喜。\n\n## 下午：马莱格轮渡与上岛\n- **马莱格** 是一个宁静的白色渔村，轮渡码头附近有几家海鲜餐馆。推荐在 **The Tea Garden** 吃一份龙虾卷或蟹肉三明治。\n- **轮渡体验**：当船驶离马莱格，你们会逐渐看到斯凯岛锯齿状的 **库林山脉（Cuillin Mountains）** 出现在海平面上。黑色的山体像一堵墙从海中升起，这种视觉冲击几乎和挪威罗弗敦的雪山一样震撼。\n\n## 住宿\n**强烈推荐：波特里（Portree）的 The Royal Hotel 或 Cuillin Hills Hotel**\n- **Cuillin Hills Hotel**：位于波特里郊区的小山坡上，所有房间都面向波特里海湾和远处的库林山。价格约 200～350 英镑/晚。\n- 备选：波特里镇中心的精品民宿或 B&B。斯凯岛的住宿在夏季非常紧张，建议提前 2-3 个月预订。\n\n## 晚餐\n波特里港口边有一排彩色房子，其中最著名的是 **The Seafood Restaurant**，主打当天捕捞的龙虾、扇贝和鳕鱼。需要提前预订，人均约 40～60 英镑。如果订不到，旁边的 **Sea Breezes** 也是当地人推荐的海鲜餐厅。\n\n---\n\n# D5｜斯凯岛（北/东环线）\n**主题：在精灵与巨人的土地上行走**\n\n![斯凯岛老人峰](./images/old_man_of_storr.jpg)\n*晨曦中的老人峰徒步路线*\n\n## 上午：老人峰（Old Man of Storr）徒步\n\n这是斯凯岛乃至苏格兰排名第一的徒步路线。\n\n- **起点**：位于 A855 公路旁，波特里以北约 15 分钟车程。\n- **距离**：往返约 3.8 公里。\n- **爬升**：约 270 米。\n- **时间**：往返 1.5～2.5 小时。\n- **难度**：中等。前半段是碎石坡和土路，后半段需要在岩石间攀爬，但不需要专业装备。\n\n### 景观价值\n登顶后，你们会看到苏格兰最著名的自然地标之一——**老人峰**，一座从山坡突兀升起的巨大玄武岩柱。传说这是一位巨人在死后石化成的山峰。背景是特罗特尼什半岛（Trotternish Ridge）锯齿状的山脊线，以及远处蓝色的大西洋。\n\n> **徒步建议**：\n> - 早上 7:00-8:00 出发，避开旅行团和正午的风；\n> - 穿防水登山鞋，苏格兰高地夏季多雨，岩石湿滑；\n> - 山顶风极大，即使是 7 月也建议带防风冲锋衣；\n> - 老人峰本身不是最高点，继续向前走到主观景台才是最佳机位。\n\n## 下午：裙岩悬崖（Kilt Rock）与仙女池（Fairy Pools）\n\n![裙岩悬崖](./images/kilt_rock.jpg)\n*裙岩悬崖与 Mealt 瀑布*\n\n### 裙岩悬崖（Kilt Rock & Mealt Falls）\n- **位置**：A855 公路沿线，老人峰以北约 15 分钟车程。\n- **看点**：高达 55 米的玄武岩悬崖，岩柱垂直排列如同苏格兰传统格裙（Kilt）的褶皱。悬崖边有一条 **Mealt 瀑布** 直接坠入大海。观景台上设有免费的望远镜和说明牌。\n\n### 仙女池（Fairy Pools）\n- **位置**：位于 Cuillin 山脉脚下，波特里以西约 30 分钟车程（沿 B8009 和 Glen Brittle 路）。\n- **看点**：一系列清澈的碧蓝色水潭，由山间溪流串联而成，背景是黑色的库林山。水温常年冰冷，但夏季有勇敢者在此跳水游泳。\n- **徒步**：从停车场到第一个水潭约 20 分钟步行，路况平坦但可能泥泞。\n\n> **凯尔特传说**：斯凯岛的名字来源于古诺尔斯语「Skye」，意为「云雾笼罩的岛屿」。这里流传着大量精灵、巨人和仙女的传说。当地人至今仍相信某些山丘和湖泊是精灵的领地，晚上最好不要打扰。\n\n## 晚餐\n回到波特里，如果昨晚没有吃到海鲜，今晚务必补上。或者可以在镇上的超市（Co-op）购买当地食材，回民宿自己做一顿高地牛排配红酒——斯凯岛的自炊体验也是一种浪漫。\n\n---\n\n# D6｜斯凯岛（西/南环线）\n**主题：大陆尽头的灯塔与古堡**\n\n![内斯特角灯塔](./images/neist_point_lighthouse.jpg)\n*内斯特角灯塔——苏格兰最西端的地标*\n\n## 上午：内斯特角灯塔（Neist Point Lighthouse）\n\n![内斯特角悬崖](./images/neist_point_cliffs.jpg)\n*内斯特角灯塔与周围的海蚀悬崖*\n\n- **位置**：斯凯岛最西端，波特里以西约 1 小时车程（沿 B8009 和 single-track 公路）。\n- **看点**：\n  - 这座灯塔建于 1909 年，矗立在一条狭窄海岬的尽头，被《国家地理》评为「全球最美灯塔」之一。\n  - 从停车场步行到灯塔约 20 分钟（下坡），回程上坡约 30 分钟。沿途可以看到壮观的海蚀悬崖，夏季常有鲸鱼、海豚和海豹出没。\n  - 最佳拍摄点在通往灯塔的石板路中段，以及灯塔东侧的悬崖边（注意安全）。\n\n> **自驾提醒**：通往内斯特角的路是一条狭窄的单车道（Single-track road），每隔一段设有会车点（Passing place）。遇到对向来车时，请主动倒车进入 passing place 避让。英国司机通常会用挥手或闪灯表示感谢。\n\n## 下午：邓韦根城堡（Dunvegan Castle）与珊瑚海滩（Coral Beach）\n\n### 邓韦根城堡\n- **位置**：波特里以西约 30 分钟车程，是**苏格兰一直有人居住的最古老城堡**（自 13 世纪起）。\n- **看点**：\n  - 城堡是麦克劳德氏族（Clan MacLeod）的祖宅，内部收藏了大量家族文物和油画。\n  - 花园非常精美，尤其是夏季，玫瑰和绣球花盛开。\n  - 可以乘船到附近的 **海豹殖民地** 观赏海豹。\n\n### 珊瑚海滩（Coral Beach）\n- **位置**：邓韦根以北约 10 分钟车程。\n- **看点**：这里的「沙子」其实是海藻钙化后形成的白色碎屑，在阳光下呈现出奇异的白色。海水呈现出加勒比海般的 turquoise 色，与周围深色高地形成强烈对比。\n- **徒步**：从停车场到海滩约 25 分钟步行，路况平缓。\n\n> **浪漫时刻**：如果天气晴朗，珊瑚海滩是斯凯岛最像热带海岛的地方。带一条毯子和一些零食，坐在白色的「沙滩」上，看着绿松石色的海水拍打岸边——这是婚假里最适合野餐的一站。\n\n## 晚餐\n回到波特里，推荐尝试 **The Cellar**，一家米其林指南推荐的现代苏格兰海鲜餐厅，人均约 60～80 英镑，需提前预订。\n\n---\n\n# D7｜斯凯岛 → 格伦科峡谷 → 尼斯湖（Loch Ness）\n**主题：重返峡谷，追寻水怪传说**\n\n![格伦科观景台](./images/glencoe_viewpoint.jpg)\n*从 Glencoe 观景台俯瞰峡谷全景*\n\n## 自驾路线\n- **斯凯岛 → 格伦科**：从斯凯桥（Skye Bridge）离开岛屿，沿 A87 公路向东至威廉堡附近，再沿 A82 公路向南进入格伦科峡谷，约 120 公里，车程 2 小时。\n- **格伦科 → 尼斯湖（厄克特城堡）**：从格伦科沿 A82 向北折返经过威廉堡，继续沿 A82 向北沿尼斯湖前行，约 80 公里，车程 1.5 小时。\n- **尼斯湖 → 因弗内斯**：约 25 公里，车程 30 分钟。\n\n## 上午：重返格伦科，三姐妹山观景台深度停留\n\n由于 D4 是从南向北穿过格伦科，而今天是从北向南（从斯凯岛过来），所以你们会从另一个角度重新欣赏这座峡谷。\n\n- **Three Sisters Carpark**：今天可以花时间走到 **Lost Valley（Coire Gabhail）** 的入口。这是一条通往隐藏山谷的徒步路线，据说 1692 年格伦科大屠杀时，部分麦克唐纳氏族成员逃入这个山谷避难。\n  - 往返约 4 公里，爬升约 300 米，难度中等偏上，需要穿越溪流和碎石坡。\n  - 如果时间或体力有限，可以在停车场附近的山谷底部拍照，同样壮观。\n- **Glencoe Viewpoint**：位于 A82 公路南侧，是拍摄峡谷全景的最佳机位之一。\n\n## 下午：尼斯湖与厄克特城堡（Urquhart Castle）\n\n![厄克特城堡](./images/urquhart_castle.jpg)\n*厄克特城堡遗址矗立在尼斯湖畔*\n\n- **厄克特城堡**：位于尼斯湖（Loch Ness）西岸，是苏格兰出镜率最高的城堡遗址之一。\n  - 门票：约 14 英镑/人。\n  - 历史：这座城堡始建于 13 世纪，在 17 世纪英国内战期间被部分炸毁，如今只剩下断壁残垣。但正是这些废墟与尼斯湖的深绿色湖水形成了极具戏剧性的画面。\n  - **水怪传说**：尼斯湖水怪（Nessie）的故事始于 1933 年，但当地传说可以追溯到 6 世纪。城堡设有专门的「水怪展览」，展示了历年来的目击记录和（大部分是造假的）照片。\n\n> **有趣的事实**：尼斯湖是英国淡水容量最大的湖泊，最深处达 227 米。湖水因泥炭而呈现出不透明的深绿色/黑色，这为水怪传说提供了完美的视觉条件——因为什么都看不见。\n\n## 住宿\n**因弗内斯（Inverness）**\n- 这是苏格兰高地的首府，也是进入 NC500 公路的门户。\n- **推荐：Rocpool Reserve Hotel 或 Glenmoriston Town House**\n  - 价格：约 150～250 英镑/晚。\n  - 特点：位于尼斯河畔，步行可达市中心餐厅和酒吧。\n\n## 晚餐\n推荐 **The Mustard Seed**，一家位于因弗内斯河边的现代苏格兰菜餐厅，招牌是高地鹿肉和扇贝。人均约 35～50 英镑。\n\n---\n\n# D8｜尼斯湖 → NC500 精华段 → 皮特洛赫里（Pitlochry）→ 爱丁堡\n**主题：北海岸公路与低地归途**\n\n![NC500 公路沿海段](./images/nc500_coastal_road.jpg)\n*NC500 公路蜿蜒于苏格兰北海岸*\n\n## 自驾路线\n- **因弗内斯 → NC500 东段 → 皮特洛赫里**：约 180 公里，车程 3.5～4 小时。\n- **皮特洛赫里 → 爱丁堡**：约 110 公里，车程 1.5～2 小时。\n- **总里程**：约 280～300 公里。\n\n## 上午：NC500 公路精华段体验\n\nNC500（North Coast 500）被称为「苏格兰的 66 号公路」，是一条环绕苏格兰最北端的 500 英里环线。由于时间限制，我们只能体验其中一小段。\n\n- **推荐路段**：从因弗内斯出发，沿 A9 公路向北约 30 公里后转入 **A836 沿海公路**，经过 **Black Isle（黑岛，实际上是一个半岛）** 和 **Dornoch Firth**。这段路拥有开阔的海景、白色的沙滩和偶尔出现的海豚。\n- **Dornoch 小镇**：可以短暂停留，参观 **Dornoch Cathedral**（麦当娜 2000 年在此举行婚礼）和小镇的主街。\n- **Glenmorangie 酒厂**：位于 Tain，如果对威士忌感兴趣，可以预约参观这家以「长颈鹿蒸馏器」闻名的高地威士忌酒厂。\n\n> **设计取舍**：完整的 NC500 需要 4-5 天才能充分体验。在 9 天的行程中，我们只能「浅尝辄止」。但如果你们将来重返苏格兰，NC500 是首选的补课内容。\n\n## 下午：皮特洛赫里（Pitlochry）\n\n![皮特洛赫里小镇](./images/pitlochry_town.jpg)\n*维多利亚风格的高地小镇皮特洛赫里*\n\n- **位置**：位于珀斯郡（Perthshire），被称为「通往高地的门户」。\n- **看点**：\n  - 这是一个典型的维多利亚风格小镇，主街两旁是石砌建筑、茶室、羊毛制品店和威士忌商店。\n  - **Blair Athol 酒厂**：位于小镇中心，可以免费参观并品尝威士忌。\n  - **Pitlochry Dam 与鲑鱼阶梯**：夏季可以看到鲑鱼洄游跳上人工阶梯的奇观。\n- **购物**：这里是购买苏格兰特产的好地方——羊绒围巾、哈里斯粗花呢（Harris Tweed）、短饼（Shortbread）和威士忌。\n\n## 傍晚：返回爱丁堡\n- 从皮特洛赫里沿 A9 公路向南，约 1.5 小时即可抵达爱丁堡。\n- **住宿**：建议住在机场附近（如 Holiday Inn Edinburgh Airport），方便第二天早班机。如果想再享受一晚城市氛围，可以回到市中心的酒店。\n\n## 晚餐\n如果回爱丁堡，推荐在 **Leith 区** 吃最后一顿晚餐。这里是爱丁堡的美食中心，有数家米其林餐厅和海鲜酒馆。\n\n---\n\n# D9｜爱丁堡/格拉斯哥 → 国内\n**主题：归途**\n\n- **航班**：建议预订 10:00～13:00 起飞的航班。爱丁堡机场（EDI）规模不大，提前 2 小时抵达即可。\n- **还车**：如果在爱丁堡机场还车，请提前加满油，并检查是否有新的刮擦痕迹。\n- **离境前**：在机场的 **WHSmith** 或 **World Duty Free** 购买最后一瓶苏格兰威士忌作为纪念。推荐 **Macallan、Glenfiddich 或 Lagavulin**。\n\n带着 9 天的高地风、威士忌香和城堡记忆回家。\n\n---\n\n## 附录一：全程预算拆分（2 人总计）\n\n| 项目 | 金额（人民币） | 说明 |\n|:---|:---:|:---|\n| **国际往返机票** | 18,000～28,000 | 暑假经伦敦/阿姆斯特丹转机经济舱，约 0.9～1.4 万/人 |\n| **租车（7 天）** | 7,000～12,000 | 含自动挡车型（英国右舵建议租自动挡）、全险、油费约 1500～2500 元 |\n| **轮渡/停车/过路费** | 800～1,500 | 马莱格 → 斯凯岛轮渡（约 40 英镑/车+2人）、少量停车费和过桥费 |\n| **住宿（8 晚）** | 16,000～26,000 | 城市酒店/精品民宿 1200～2000 元/晚，高地 B&B 800～1500 元/晚 |\n| **餐饮** | 10,000～15,000 | 外食人均 200～350 元/顿，自己做人均 80～150 元/顿 |\n| **门票/体验** | 2,500～4,000 | 爱丁堡城堡、斯特灵城堡、厄克特城堡、威士忌体验中心、酒厂 tour |\n| **签证/保险/杂费** | 2,500～3,500 | 英国签证约 1000 元/人，保险 200 元/人 |\n| **总计** | **约 56,800～90,000 元** | **人均 2.84～4.5 万** |\n\n> **省钱小贴士**：英国超市（Tesco、Sainsbury's、Co-op）物价合理，苏格兰的牛肉、三文鱼和奶酪质量极高。建议订带厨房的民宿，自己做早餐和几顿晚餐，可以省下近三分之一的餐饮预算。另外，苏格兰很多博物馆和自然景观（如格伦科峡谷、NC500 公路）完全免费。\n\n---\n\n## 附录二：行前准备清单\n\n### 证件与签证\n- [ ] **英国签证（Standard Visitor Visa）**：至少提前 **8～10 周** 申请。7～8 月是签证和旅游旺季，slot 非常紧张。\n- [ ] 护照（有效期 6 个月以上）。\n- [ ] 驾照原件 + **英文翻译件**（租租车 APP 可免费办理国际驾照翻译认证件，英国租车通常接受中国驾照+翻译件）。\n- [ ] 旅行保险（保额建议 ≥ 30 万人民币）。\n\n### 预订确认（按优先级）\n1. [ ] **国际机票**\n2. [ ] **斯凯岛住宿（波特里 Cuillin Hills Hotel 或 B&B）**——瓶颈项，夏季提前 2-3 个月预订\n3. [ ] **爱丁堡住宿（老城或新城精品酒店）**\n4. [ ] **租车预订**：爱丁堡取车，爱丁堡/格拉斯哥还车，**务必选择自动挡**\n5. [ ] **马莱格 → 斯凯岛（Armadale）轮渡票**（CalMac 官网提前预订，夏季班次多但仍建议提前订）\n6. [ ] **爱丁堡城堡、威士忌体验中心门票**（旺季建议提前官网购买）\n7. [ ] **热门餐厅预订**（The Witchery by the Castle、The Cellar 等需提前数周预订）\n\n### 衣物与装备\n- [ ] **防水冲锋衣 + 软壳/抓绒内胆**：苏格兰高地夏季多雨多风，气温 10～20℃。\n- [ ] **防水徒步鞋/登山鞋**：老人峰、格伦科徒步必备。\n- [ ] **轻便雨衣/雨裤**：比雨伞实用（高地风大，雨伞会被吹翻）。\n- [ ] **薄羽绒服或厚抓绒**：斯凯岛和格伦科傍晚可能只有 8-12℃。\n- [ ] **防晒霜 + 墨镜**：长白昼下紫外线较强。\n- [ ] **转换插头**：英国使用**英标三脚方型插头（G 型）**。\n- [ ] **保温杯/便携烧水壶**：英国人喜欢喝冷水，中国人的胃可能需要热水。\n- [ ] **少量零食/泡面**：高地小镇超市关门较早，夜间可能找不到餐厅。\n\n### APP 下载\n- **Google Maps**：离线地图必备（高地部分地区信号微弱）。\n- **Trainline**：查询和购买英国火车票。\n- **CalMac Ferries**：苏格兰西海岸轮渡时刻查询与购票。\n- **Booking.com / Airbnb**：住宿管理。\n- **OpenTable / Resy**：餐厅预订。\n\n---\n\n## 附录三：关键决策说明（FAQ）\n\n### Q1：为什么不走完整的 NC500 环线？\n完整的 NC500 约 500 英里（800 公里），沿途有很多值得深度停留的海岸小镇、白沙滩和威士忌酒厂。但完整走完至少需要 4-5 天，会严重压缩斯凯岛和爱丁堡的时间。作为婚假，我们把 NC500 当作「开胃酒」而非「主菜」，只体验其东段精华，把核心精力留给斯凯岛和格伦科。\n\n### Q2：英国右舵左行会不会很难适应？\n对于有经验的司机来说，**前 30 分钟需要集中注意力**，之后很快就能适应。关键注意点：\n- 环岛（Roundabout）是顺时针方向行驶，进入环岛时让行右侧来车；\n- 苏格兰高地有很多 **Single-track road**（单车道），遇到对向来车要倒车进入 **Passing place** 避让；\n- **务必租自动挡**，右舵+手动挡对新手是地狱级难度；\n- 英国车速单位是 **英里（mph）**，注意限速标志。\n\n### Q3：斯凯岛真的值得待三天吗？\n**绝对值得。** 斯凯岛是苏格兰高地的精华所在，地貌多样——黑色的库林山、碧蓝的仙女池、白色的珊瑚海滩、世界尽头的灯塔。而且岛上的节奏很慢，住宿以 B&B 和精品酒店为主，非常适合婚假「住进风景里」的度假感。如果压缩到两天，老人峰和仙女池的徒步都会很赶，失去了松弛感。\n\n### Q4：为什么需要英国签证而不是申根签证？\n英国（包括苏格兰、英格兰、威尔士、北爱尔兰）**从来不是申根区成员**。即使你们有有效的申根签证，进入英国仍然需要单独申请英国 Standard Visitor Visa。另外，从英国飞往申根国家（如法国、荷兰）也需要出示申根签证，行程中不涉及，但请记住这是两个独立的签证体系。\n\n### Q5：苏格兰的威士忌该怎么选？作为新手从哪里开始？\n苏格兰威士忌主要分为五大产区，风味差异极大：\n- **低地（Lowland）**：清淡、花香、青草味，适合入门；\n- **高地（Highland）**：果香、蜂蜜、微辛，种类最多；\n- **斯佩塞（Speyside）**：甜美、果干、坚果味，受众最广；\n- **艾雷岛（Islay）**：浓重的泥煤烟熏味，像消毒水+培根，爱的人极爱，厌的人极厌；\n- **坎贝尔镇（Campbeltown）**：海洋、烟熏、油脂感，风格介于高地和艾雷之间。\n\n**新手推荐**：从 **Glenfiddich 12 年**（斯佩塞，甜美果香）或 **Glenmorangie 10 年**（高地，花香蜂蜜）开始。如果想尝试泥煤，可以从 **Highland Park 12 年**（奥克尼岛，温和泥煤）过渡，不要一上来就喝 **Laphroaig**。\n\n---\n\n## 附录四：一句话总结\n\n这 9 天，你们会在爱丁堡的石头巷弄里听风笛低回，在斯凯岛的晨雾中攀登老人峰，在格伦科的暴雨后等待一束「上帝的聚光灯」，最后在尼斯湖畔的城堡废墟旁，开一瓶泥煤味的威士忌，聊到窗外天依然亮着。\n\n**苏格兰不会给你完美的天气，但会给你完美的故事——这才是婚假最值得收藏的记忆。**\n\n---\n\n*文档生成时间：2026 年 4 月*  \n*祝你们旅途愉快，新婚快乐！*\n",
      h: "# 土耳其｜热气球与地中海蓝｜9 天婚假执行手册\n\n> **旅行时间**：5～6 月 或 9～10 月（春秋季黄金窗口，避开盛夏酷暑）  \n> **旅行人数**：2 人（婚假）  \n> **总天数**：9 天 8 晚  \n> **核心目的地**：卡帕多奇亚 → 安塔利亚 → D400 沿海公路 → 卡什 → 费特希耶  \n> **人均预算**：1.5～2.5 万元人民币（2 人总计约 3～5 万元）\n\n---\n\n## 为什么选土耳其？\n\n如果你们想要一场**\"冷热两极、色彩爆炸\"**的婚假，土耳其是北欧冷色调之外最惊艳的答案。\n\n与挪威的冰川峡湾、冰岛的熔岩黑沙滩不同，土耳其是一场关于**高度与深度、火焰与海水的极致对话**。清晨，你们在卡帕多奇亚的\"月球表面\"乘热气球升空，看数百只彩球同时点燃晨曦，把玫瑰色的山谷染成流动的油画；午后，你们在地中海的D400公路上自驾，左手是托罗斯山脉的苍翠峭壁，右手是爱琴海与地中海交汇的果冻蓝。傍晚，你们躺在Ölüdeniz死海的沙滩上，看滑翔伞像候鸟一样从 Babadağ 山顶缓缓飘落。从洞穴酒店到悬崖海滩，从拜占庭壁画到奥斯曼市集——这里的每一天都在上演**\"异域风情\"与\"浪漫松弛\"**的双重奏。\n\n作为婚假，土耳其是**\"视觉冲击\"与\"高性价比\"**的罕见组合：它有世界级体验（热气球、滑翔伞、最美沿海公路），物价却只有西欧的一半。如果你们想要一场既有\" wow 时刻\"、又能慢下来享受彼此的旅行，这里就是正确答案。\n\n---\n\n## 行程总览\n\n| 天数 | 星期 | 路线 | 住宿地 | 核心体验 | 开车距离 |\n|:---:|:---:|:---|:---|:---|:---:|\n| D1 | 六 | 国内 → 卡帕多奇亚 | 格雷梅 | 抵达、入住洞穴酒店、日落观景台 | 约 70 km |\n| D2 | 日 | 卡帕多奇亚 | 格雷梅 | **热气球日出** + 格雷梅露天博物馆 + 玫瑰谷徒步 | 约 30 km |\n| D3 | 一 | 卡帕多奇亚 | 格雷梅 | **德林库尤地下城** + **乌奇希萨尔城堡** + 陶艺小镇 | 约 40 km |\n| D4 | 二 | 卡帕 → 安塔利亚 | 安塔利亚 | 从高原驶向地中海，漫步老城卡莱伊奇 | 约 540 km 或 — |\n| D5 | 三 | 安塔利亚 → 卡什 | 卡什 | **D400 沿海公路**启程，抵达地中海风情小镇 | 约 180 km |\n| D6 | 四 | 卡什 | 卡什 | **Kekova 沉没之城**船游 + **Kaputas Beach** 果冻海 | 约 30 km |\n| D7 | 五 | 卡什 → 费特希耶 | 费特希耶/Ölüdeniz | D400 精华段收官，抵达死海蓝湖 | 约 110 km |\n| D8 | 六 | 费特希耶 | 费特希耶 | **滑翔伞** + **Ölüdeniz 蓝湖** + **蝴蝶谷** | 约 30 km |\n| D9 | 日 | 费特希耶 → 达拉曼 → 国内 | — | 返程 | 约 55 km |\n\n> **设计逻辑**：前 3 天在卡帕多奇亚沉浸在\"月球地貌\"与热气球的高光中；D4 完成从内陆高原到地中海的转场；D5-D7 用 3 天慢驾 D400 全球最美沿海公路；最后 2 天在费特希耶以滑翔伞和蓝湖收尾，节奏张弛有度。\n\n---\n\n# D1｜国内 → 卡帕多奇亚（Cappadocia）\n**主题：抵达月球表面**\n\n![格雷梅洞穴酒店露台](./images/goreme_cave_hotel.jpg)\n*格雷梅的洞穴酒店露台，背景是仙人烟囱与热气球*\n\n## 交通\n- **国际航班**：国内城市（北京/上海/广州/成都）飞 **伊斯坦布尔（IST 或 SAW）**，再转机飞往卡帕多奇亚。\n- **境内航班**：伊斯坦布尔 → **开塞利机场（Kayseri, ASR）** 或 **内夫谢希尔机场（Nevşehir, NAV）**。推荐飞开塞利——航班更多、票价更便宜，距格雷梅约 1 小时车程。\n- **机场 → 格雷梅**：提前预订酒店接送机（约 10～15 欧元/人），或在机场租车柜台取车后自驾前往。土耳其是**靠右行驶**，租车通常为左舵车，中国司机适应成本较低。\n- **取车建议**：如果 D4 计划自驾前往安塔利亚，可在开塞利机场取车；如果 D4 选择飞安塔利亚，则先不租车，抵达当天包车到酒店即可。\n\n## 住宿\n**强烈推荐：洞穴酒店（Cave Hotel）**\n\n洞穴酒店是卡帕多奇亚的灵魂体验——它们凿穿火山凝灰岩而建，冬暖夏凉，墙壁保留着岩石的原始纹理。\n\n- **Sultan Cave Suites**：网红露台拍热气球的首选举机位，服务成熟，约 800～1,500 元/晚。\n- **Museum Hotel**：乌奇希萨尔附近的奢华洞穴酒店，联合国教科文组织世界遗产酒店成员，自带古董收藏和无边泳池，约 2,000～3,500 元/晚。\n- **Koza Cave Hotel**：格雷梅中心位置，性价比高，露台景观同样出色，约 500～900 元/晚。\n\n> **预订提示**：5～6 月和 9～10 月是卡帕旺季，洞穴酒店（尤其是网红露台房型）通常提前 2～3 个月售罄。如果还没订，这是第一件要做的事。\n\n## 活动\n- **下午**：抵达后先入住，感受洞穴房间的独特氛围——没有直角墙壁，床头就是千年岩层。\n- **傍晚**：步行前往 **Sunset Point（格雷梅日落观景台）**，约 15 分钟上山。在这里俯瞰整个格雷梅小镇，看夕阳把仙人烟囱（Fairy Chimneys）染成金红色与粉紫色。\n- **小贴士**：卡帕多奇亚海拔约 1,100 米，早晚温差大，即使 5～6 月也需要一件薄外套。日落观景台风大，建议带防风外套。\n\n## 晚餐\n- **推荐：Seten Anatolian Cuisine**（格雷梅镇中心）\n  - 招牌：**Testi Kebab（瓦罐牛肉）**——把牛肉、蔬菜、香料密封在陶罐中慢烤，上桌时由服务员敲碎陶罐，香气四溢。\n  - 人均：约 150～250 元人民币。\n- **备选：Dibek Traditional Home Cuisine**，百年老宅改造的家庭餐厅，同样可以体验瓦罐菜，氛围更温馨。\n\n---\n\n# D2｜卡帕多奇亚（Cappadocia）\n**主题：热气球与玫瑰谷**\n\n![格雷梅热气球日出](./images/cappadocia_balloons.jpg)\n*格雷梅山谷的数百只热气球同时升空*\n\n这一天是**整个 9 天行程情感价值最高的一天**。没有长途驾驶，只有两个世界级的体验：热气球日出，和玫瑰谷徒步。\n\n## 清晨：热气球日出（必体验）\n\n卡帕多奇亚的热气球被《国家地理》评为\"一生必做\"的旅程之一，也是全球最适合乘热气球的地方——稳定的气流、独特的地貌、壮观的日出。\n\n- **预订**：必须提前在官网预订。推荐 **Butterfly Balloons**、**Royal Balloon** 或 **Kapadokya Balloons** 这三家老牌公司，安全记录好、飞行员经验丰富。\n- **价格**：约 1,800～2,500 元/人（视季节和筐大小而定，16 人筐最便宜，8-12 人筐体验更好）。\n- **流程**：\n  - 04:30 酒店接人，前往起飞场地；\n  - 05:00 左右看热气球充气点火，巨大的彩色球体在晨曦中缓缓立起；\n - 05:30 起飞，飞行约 1～1.5 小时，穿越玫瑰谷、爱情谷、仙人烟囱之间；\n  - 07:00 降落在拖车平台上，开香槟庆祝，颁发飞行证书。\n\n> **景观价值**：当太阳从地平线升起，数百只热气球同时漂浮在格雷梅山谷上空，岩石被染成玫瑰金。这种画面——**\"地球上最像月球的地方，被人类赋予了最浪漫的色彩\"**——是国内任何风景都无法复制的。你们会在这 1 小时里，不断听见彼此说\"太美了\"。\n\n## 上午：格雷梅露天博物馆（Göreme Open Air Museum）\n\n- **距离**：距格雷梅镇中心约 1.5 公里，可步行或驾车。\n- **看点**：这里是拜占庭时期修道院社区的遗址，约有 30 多座岩石教堂和修道院。最著名的包括 **黑暗教堂（Karanlık Kilise）** 和 **苹果教堂（Elmalı Kilise）**，内部保存着 10～12 世纪的拜占庭壁画。\n- **门票**：约 30 欧元/人；黑暗教堂需额外付费。\n- **小贴士**：壁画禁止闪光灯拍照。建议请一位英文导游（约 200～300 元），能更好地理解每幅画背后的故事。\n\n![格雷梅露天博物馆壁画](./images/goreme_open_air_museum.jpg)\n*黑暗教堂内保存完好的拜占庭壁画*\n\n## 下午：玫瑰谷徒步（Rose Valley）\n\n- **路线**：从 Göreme 出发，经 Çavuşin 到玫瑰谷，有多种环线可选。推荐 **Göreme → Kızılçukur（红谷）→ Çavuşin** 的环线，约 4 公里，耗时 2～3 小时。\n- **景观**：下午 4 点后阳光斜射，山谷中的岩石会呈现出玫瑰红、橙黄、粉紫的渐变色，因此得名\"玫瑰谷\"。\n- **难度**：中等偏下，部分路段有碎石，建议穿防滑徒步鞋。\n\n## 晚餐\n- 推荐 **Kale Terasse Restoran**，露台餐厅可以俯瞰格雷梅夜景。点一份 **Pottery Kebab** 和土耳其烤肉拼盘，人均约 150 元。\n- 或去小镇上的 **Pumpkin Göreme**，主打南瓜料理和甜点，温馨的家庭式餐厅。\n\n---\n\n# D3｜卡帕多奇亚（Cappadocia）\n**主题：地下迷宫与天空之城**\n\n![乌奇希萨尔城堡俯瞰](./images/uchisar_castle.jpg)\n*从乌奇希萨尔城堡俯瞰卡帕多奇亚的仙人烟囱全景*\n\n## 上午：德林库尤地下城（Derinkuyu Underground City）\n\n卡帕多奇亚地下有数十座古代地下城，最深、最震撼的是 **德林库尤** 和 **凯马克利（Kaymaklı）**。我们选择德林库尤，因为它更深、更完整。\n\n- **距离**：格雷梅 → 德林库尤约 35 公里，车程 40 分钟。\n- **历史**：始建于公元前 8 世纪，由赫梯人开凿，后在拜占庭时期被基督徒扩建为躲避阿拉伯军队入侵的避难所。最深达 **85 米**，可容纳约 **2 万人**。\n- **看点**：\n  - 八层垂直向下的隧道、通风井、酒窖、马厩、教堂、学校和墓地；\n  - 最底层的 **十字架教堂** 和 **洗礼堂**；\n  - 滚石石门——古代人用来阻挡入侵者的圆形石门，至今仍可推动。\n- **门票**：约 13 欧元/人。\n- **小贴士**：地下城隧道狭窄低矮（部分仅 1.3 米高），幽闭恐惧症患者慎入。建议戴帽子保护头部，穿防滑鞋。\n\n![德林库尤地下城](./images/derinkuyu_underground_city.jpg)\n*德林库尤地下城的狭窄隧道与滚石石门*\n\n## 下午：乌奇希萨尔城堡（Uçhisar Castle）与鸽子谷\n\n- **乌奇希萨尔城堡**：卡帕多奇亚地区的最高点（高约 60 米），由整块火山岩雕琢而成。登顶后可以 360 度俯瞰整个卡帕多奇亚——格雷梅、玫瑰谷、爱情谷、阿瓦诺斯平原尽收眼底。\n- **鸽子谷（Pigeon Valley）**：连接乌奇希萨尔和格雷梅的峡谷，因岩壁上密密麻麻的鸽子洞而得名。徒步约 1 小时，沿途有很多仙人烟囱和蓝眼睛树（Nazar Tree）。\n- **阿瓦诺斯（Avanos）**：陶艺小镇，位于克孜勒河（Kızılırmak，红河）畔。可以参观陶艺工坊，亲手制作一件陶器作为婚假纪念。\n\n## 晚餐\n- 回到格雷梅，推荐 **Topdeck Cave Restaurant**，洞穴餐厅氛围极佳，主打安纳托利亚传统料理，人均约 150～200 元。\n- 如果想换口味，格雷梅镇上有几家不错的披萨店和意大利餐厅。\n\n---\n\n# D4｜卡帕多奇亚 → 安塔利亚（Antalya）\n**主题：从月球表面驶向地中海**\n\n![安塔利亚老城罗马港](./images/antalya_old_town.jpg)\n*安塔利亚老城卡莱伊奇的罗马港与地中海日落*\n\n这一天是整个行程的**转场日**——从卡帕多奇亚的内陆高原，一路南下抵达地中海。有两种方案可选。\n\n## 方案 A：自驾（推荐，景观更丰富）\n\n- **路线**：格雷梅 → 科尼亚（Konya）→ 安塔利亚。\n- **距离**：约 540 公里。\n- **时间**：约 6.5～7.5 小时（含 2～3 次休息）。\n- **途中亮点**：\n  - 经过 **图兹湖（Tuz Gölü）** 东缘（ optional 绕路约 30 分钟），夏季湖面会呈现粉红色；\n  - 穿越 **托罗斯山脉（Taurus Mountains）**，从高原逐渐下降到地中海，沿途风景从荒原变为森林；\n  - 在科尼亚或阿克塞基（Akseki）休息吃午餐。\n\n## 方案 B：飞安塔利亚（更轻松）\n\n- **航班**：开塞利机场 ✈ 安塔利亚机场，约 1.5 小时（每周班次有限，需提前查好）。\n- **租车**：抵达安塔利亚机场后取车，开启地中海自驾段。\n- **适合人群**：不想开长途、或担心山路驾驶的新手司机。\n\n## 住宿\n**推荐：卡莱伊奇老城区（Kaleiçi）**\n\n- **Tuvana Hotel**：奥斯曼老宅改造的精品酒店，庭院种满柠檬树和九重葛，约 800～1,500 元/晚。\n- **Puding Marina Residence**：位于罗马港边，地中海景观房可直接看到游艇和夕阳，约 600～1,000 元/晚。\n- **La Boutique Hotel**：设计酒店，屋顶露台有小型无边泳池，约 700～1,200 元/晚。\n\n## 活动\n- **傍晚**：漫步 **哈德良门（Hadrian's Gate）**，这座大理石拱门建于公元 130 年，是罗马皇帝哈德良访问帕加马王国时的纪念建筑。\n- **罗马港（Roman Harbour）**：老城边缘的古老港口，现在停满了游艇和海盗船。坐在港口边的咖啡馆，看地中海的日落把天空染成橘红与粉紫。\n\n## 晚餐\n- **Arma Restaurant**：位于老城悬崖边，拥有安塔利亚最佳海景露台。主打地中海海鲜和土耳其料理，人均约 200～350 元，需提前预订。\n- **鱼市场（Balık Pazarı）**：位于市中心，自选新鲜海鲜后交给周边餐厅现场烹饪，价格更实惠，人均约 150 元。\n\n---\n\n# D5｜安塔利亚 → 卡什（Kaş）\n**主题：D400，全球最美沿海公路之一**\n\n![卡什小镇港口](./images/kas_harbor.jpg)\n*卡什小镇的彩色房屋与地中海港口*\n\n从今天起，你们正式开始**D400 沿海公路自驾**——这条被无数旅行媒体评为\"全球最美沿海公路\"的路线，是土耳其之行的自驾高光。\n\n## 自驾路线\n- **路线**：安塔利亚 → Kemer → Phaselis → Olympos → 卡什（Kaş）。\n- **距离**：约 180 公里。\n- **时间**：约 3.5～4.5 小时（含停靠）。\n- **路况**：D400 公路路况极好，沿海段限速 70～90 km/h。注意弯道多，不要盲目超车。土耳其是**靠右行驶**，租车通常为左舵车。\n\n## 途中亮点\n\n### Phaselis 古城\n- 位于森林与海滩之间的古罗马港口城市遗址。\n- 特色：三条古罗马大道、浴场遗址、以及直接伸向地中海的码头。可以在古码头的海水中游泳，背景是两千年的石柱。\n- 门票：约 10 欧元/人。\n\n### Olympos 海滩\n- 一条河流入海口形成的沙滩，两岸是茂密的悬铃木森林。\n- 这里也是火虫（Chimaera）和 Olympos 古城的所在地，如果时间充裕可以停留 1 小时。\n\n## 卡什（Kaş）\n\n卡什是地中海沿岸最迷人的小镇之一——彩色房屋沿着山坡层层叠叠，港口停满了木制的古帆船（Gulet），街头种满九重葛和柠檬树。\n\n- **活动**：\n  - 傍晚在小镇中心散步，逛独立设计师的小店和手工珠宝店；\n  - 卡什是土耳其顶级的潜水胜地，可以报名体验潜水（约 300～400 元/人）；\n  - 在港口边找一家悬崖酒吧，点一杯土耳其红茶或 Efes 啤酒，看夕阳沉入海平面。\n\n## 住宿\n- **Lukka Exclusive Hotel**：悬崖海景精品酒店，无边泳池直接面向地中海，约 1,000～1,800 元/晚。\n- **Hideaway Hotel**：位于半岛顶端，安静私密，房间自带海景阳台，约 800～1,500 元/晚。\n- **卡什老城区 Airbnb/精品民宿**：选择众多，约 400～800 元/晚。\n\n## 晚餐\n- **Smiley's Restaurant**：海边餐厅，主打新鲜海鲈鱼、章鱼沙拉和烤虾，人均约 150～250 元。\n- **Cinarlar Pizza & Restaurant**：想换口味的话，这里的披萨和意大利面评价很高。\n\n\n---\n\n# D6｜卡什（Kaş）\n**主题：沉没之城与果冻海**\n\n![Kaputas Beach 奶蓝色海湾](./images/kaputas_beach.jpg)\n*D400 公路边的 Kaputas Beach，悬崖夹缝中的奶蓝色海湾*\n\n这一天是**地中海最梦幻的一天**。你们会乘船探访一座沉没在水下的古罗马城市，然后在路边偶遇一片让全世界旅行者停车的\"果冻海\"。\n\n## 上午：Kekova 沉没之城船游\n\n- **预订**：卡什港口有很多旅行社提供 Kekova 一日游，推荐选择 **小型木船（Gulet）** 的 6 岛/沉没之城线路，约 200～350 元/人，含午餐。\n- **航程**：从 Üçağız 村（距卡什约 25 分钟车程）上船，全程约 4～5 小时。\n- **亮点**：\n  - **Kekova 沉没之城**：由于公元 2 世纪的一场地震，这座古罗马港口城市的大半沉入水下。今天，透过清澈的浅水，你们可以看到 submerged 的台阶、墙壁和码头遗迹；\n  - **Simena 城堡**：船会在 Kaleköy（Simena）停靠，你们可以爬上一座中世纪城堡，俯瞰 Kekova 海湾的全景；\n  - **游泳停靠**：船会在多个无人海湾抛锚，让你们直接跳入地中海的碧蓝水中。\n\n![Kekova 沉没之城](./images/kekova_sunken_city.jpg)\n*Kekova 海湾中水下的古罗马建筑遗迹*\n\n## 下午：Kaputas Beach\n\n- **位置**：D400 公路从卡什往费特希耶方向约 20 公里处，公路直接从悬崖上方俯冲到海滩。\n- **特色**：两片高耸的悬崖夹出一条狭窄的峡谷，谷底是一片奶蓝色与绿松石色渐变的沙滩。海水清澈见底，被称为\"土耳其最美海滩\"。\n- **停车**：路边有免费停车场，旺季下午人较多，建议傍晚 4 点后到达。\n- **小贴士**：海滩没有遮阳设施，建议自带遮阳伞、水和零食。海浪不大，非常适合游泳。\n\n## 住宿\n- 可以选择继续住在卡什（如果明天早上再出发去费特希耶），或傍晚驱车约 1.5 小时前往费特希耶/Ölüdeniz 住宿。\n- **推荐继续住卡什**：这样可以有更多时间享受小镇的夜晚，明天上午再悠闲出发。\n\n## 晚餐\n- 如果回卡什，推荐 **Natur-el**：一家健康的素食/海鲜餐厅，庭院氛围很棒，人均约 150 元。\n- 或去港口边的 **Meydan Restaurant**，土耳其烤肉和海鲜都很出色。\n\n---\n\n# D7｜卡什 → 费特希耶（Fethiye）\n**主题：死海蓝与滑翔伞圣地**\n\n![Ölüdeniz 蓝湖与海滩](./images/oludeniz_beach.jpg)\n*Ölüdeniz（土耳其死海）的绿松石色海水与白色沙滩*\n\n## 自驾路线\n- **路线**：卡什 → Kaputas Beach → Kalkan → 费特希耶/Ölüdeniz。\n- **距离**：约 110 公里。\n- **时间**：约 2～2.5 小时（不含 Kaputas 停留）。\n- **途中**：会经过 **Kalkan**——一个以白色房屋和屋顶餐厅闻名的英式度假小镇，可以在此午餐。\n\n## 下午：Ölüdeniz 蓝湖（土耳其死海）\n\n- **Ölüdeniz** 意为\"死海\"，因为海湾被一座沙洲与大海隔开，内部水域几乎无浪、无流，平静如镜。\n- **海水颜色**：从岸边向深海过渡，呈现出白色 → 薄荷绿 → 绿松石蓝 → 深蓝的渐变，是土耳其最具标志性的海水颜色。\n- **活动**：\n  - 躺在 Belcekız Beach 的白色沙滩上晒太阳；\n  - 租一艘皮划艇或 Stand-up Paddle，划向蓝湖深处；\n  - 傍晚在海滨步道散步，看滑翔伞陆续从 Babadağ 山顶降落在沙滩上。\n\n## 住宿\n- **Yacht Classic Hotel**：费特希耶码头的精品酒店，设计现代，拥有游艇码头景观，约 800～1,500 元/晚。\n- **Liberty Hotels Lykia**：位于 Ölüdeniz 海滩边的大型全包度假村，私人海滩和多个泳池，约 1,000～2,000 元/晚。\n- **Sugar Beach Club**：Ölüdeniz 海滩边的精品民宿/酒店，出门就是沙滩，约 600～1,200 元/晚。\n\n## 晚餐\n- **费特希耶鱼市场（Fethiye Fish Market）**：位于市中心，几十家海鲜摊位 surrounded by 餐厅。你们可以自选龙虾、海鲈鱼、鱿鱼等海鲜，交给周边餐厅按 kilo 计价加工。新鲜、热闹、性价比高，人均约 150～250 元。\n\n---\n\n# D8｜费特希耶（Fethiye）\n**主题：飞翔在地中海上空**\n\n![费特希耶滑翔伞俯瞰蓝湖](./images/paragliding_oludeniz.jpg)\n*从 Babadağ 山顶滑翔伞俯瞰 Ölüdeniz 蓝湖的全景*\n\n这一天是**整个自驾段的高潮**——你们会从 1,900 米的山顶起飞，像鸟儿一样翱翔在地中海上空。\n\n## 上午：滑翔伞（Paragliding）\n\n费特希耶的 Ölüdeniz 被公认为**全球最佳滑翔伞体验地**之一——稳定的热气流、壮阔的海湾全景、以及完美的着陆沙滩。\n\n- **预订**：推荐 **Gravity**、**Reaction** 或 **Infinity** 这三家老牌公司，安全记录好、教练专业。\n- **价格**：约 700～1,200 元/人（含照片/视频套餐约额外 300～500 元）。**建议购买照片视频套餐**——这是你们婚假最值得保存的画面之一。\n- **流程**：\n  - 08:00 酒店接人，乘面包车上 Babadağ 山（约 40 分钟盘山公路）；\n  - 09:00 抵达山顶起飞场，穿戴装备、听安全简报；\n  - 09:30 迎风起跑，跃入空中。飞行时间约 25～40 分钟（视气流而定）；\n  - 10:30 降落在 Ölüdeniz 沙滩上，立刻在海边咖啡馆复盘刚才的 video。\n\n> **体验价值**：当你们双脚离地的那一刻，整个 Ölüdeniz 蓝湖就在脚下展开——奶蓝色的海湾、白色的沙滩、远处费特希耶的城镇和山脉。教练会带你们做 360 度盘旋，甚至尝试刺激的\"螺旋下降\"。这不仅是视觉冲击，更是一种\"共同征服天空\"的亲密感。\n\n## 下午：蝴蝶谷（Butterfly Valley）\n\n- **交通**：从 Ölüdeniz 海滩乘船约 30 分钟到达（旺季每天多班船，约 50～80 元/人往返）。\n- **特色**：一个被 350 米高悬崖环绕的隐秘峡谷，因夏季栖息着 80 多种蝴蝶而得名。峡谷内有一条溪流和几处瀑布，可以涉水徒步深入。\n- **活动**：\n  - 在峡谷深处的瀑布下游泳；\n  - 躺在沙滩上晒太阳，看蝴蝶在野花间飞舞；\n  - 峡谷尽头有一处小型的天然跳水台（约 3 米高）。\n- **注意**：最后一班回程船通常在 17:00-18:00，注意时间安排。\n\n![蝴蝶谷瀑布](./images/butterfly_valley.jpg)\n*蝴蝶谷深处的瀑布与悬崖环绕的隐秘海滩*\n\n## 晚间\n- 如果还有精力，可以参加 **海盗船日落巡游**（约 2～3 小时），在船上跳舞、跳水、看地中海日落。\n- 或在酒店露台或海边餐厅，享用最后一顿地中海晚餐，回顾这 9 天的旅程。\n\n---\n\n# D9｜费特希耶 → 达拉曼机场 → 国内\n**主题：返程，带回地中海的蓝**\n\n![D400 沿海公路](./images/d400_coastal_road.jpg)\n*D400 公路沿海段，左手青山右手碧海*\n\n- **自驾**：费特希耶/Ölüdeniz → **达拉曼机场（Dalaman, DLM）**，约 55 公里，车程约 1 小时。\n- **航班**：建议预订 **中午 12:00-15:00 起飞** 的航班，经伊斯坦布尔转机回国。这样上午不用太匆忙，还能在酒店享用最后一顿早餐。\n- **机场还车**：达拉曼机场有各大租车公司柜台，还车手续简便。\n- **购物**：机场免税店可以买到 **土耳其软糖（Lokum）**、**开心果**、**玫瑰水**、**土耳其咖啡** 和 **蓝眼睛饰品（Nazar）**。\n\n---\n\n## 附录一：全程预算拆分（2 人总计）\n\n| 项目 | 金额（人民币） | 说明 |\n|:---|:---:|:---|\n| **国际往返机票** | 10,000～18,000 | 淡季/中转经济舱，约 5,000～9,000 元/人 |\n| **土耳其境内机票** | 1,500～3,000 | 开塞利/安塔利亚段（如选择直飞替代自驾） |\n| **租车 + 油费** | 2,500～4,500 | 约 5～6 天租车，油费约 1,000～1,500 元 |\n| **住宿（8 晚）** | 6,000～12,000 | 洞穴酒店/地中海民宿约 400～1,000 元/晚 |\n| **餐饮** | 5,000～8,000 | 外食人均 100～200 元/顿，土耳其物价亲民 |\n| **门票/体验** | 4,000～6,000 | 热气球约 1,800～2,500/人，滑翔伞约 700～1,000/人，船游/门票等 |\n| **签证/保险/杂费** | 1,000～2,000 | 电子签约 450 元/人，保险约 150 元/人 |\n| **总计** | **约 30,000～53,500 元** | **人均 1.5～2.68 万元** |\n\n> **省钱小贴士**：土耳其整体物价远低于西欧，超市（Migros、BIM、Şok）购买水果、面包、奶酪非常便宜。建议订带厨房的洞穴酒店或民宿，自己做早餐和简单晚餐，可以进一步压缩预算。\n\n---\n\n## 附录二：行前准备清单\n\n### 证件与签证\n- [ ] **土耳其电子签（e-Visa）**：官网 www.evisa.gov.tr 申请，约 **60 美元**（约 430 元人民币），有效期 180 天，单次停留 30 天。通常几分钟到几小时内出签。\n- [ ] 护照（有效期 6 个月以上）。\n- [ ] 驾照原件 + **国际驾照翻译认证件**（租租车 APP 可免费办理）。土耳其承认中国驾照+翻译件租车。\n- [ ] 旅行保险（建议保额 ≥ 30 万元人民币，涵盖热气球和滑翔伞等高风险运动）。\n\n### 预订确认（按优先级）\n1. [ ] **国际机票**\n2. [ ] **洞穴酒店（格雷梅）**：旺季最紧张，建议提前 2～3 个月预订\n3. [ ] **热气球**：Butterfly / Royal / Kapadokya Balloons，提前 1～2 个月预订\n4. [ ] **卡帕 → 安塔利亚机票**（如选择飞而非自驾）\n5. [ ] **租车**：开塞利/安塔利亚机场取车 → 达拉曼机场还车\n6. [ ] **卡什/费特希耶住宿**\n7. [ ] **滑翔伞**：Gravity / Reaction / Infinity，提前 1 周预订即可\n8. [ ] **Kekova 沉没之城船游**：可抵达卡什后在当地港口预订\n\n### 衣物与装备\n- [ ] **轻薄羽绒服/抓绒外套**：卡帕多奇亚早晚温差大，5～6 月和 9～10 月清晨热气球时可能只有 10℃\n- [ ] **防晒衣 + 高倍防晒霜**：地中海阳光强烈，紫外线极高\n- [ ] **墨镜 + 遮阳帽**：热气球和海上都必需\n- [ ] **泳衣**：Kaputas Beach、Ölüdeniz、蝴蝶谷都需要\n- [ ] **防滑徒步鞋**：玫瑰谷徒步、乌奇希萨尔城堡、地下城都需要\n- [ ] **沙滩鞋/溯溪鞋**：蝴蝶谷瀑布涉水用\n- [ ] **转换插头**：土耳其使用**欧标双圆孔插头（C/F 型）**\n- [ ] **便携烧水壶**：土耳其人习惯喝红茶和冷水，但中国人早上需要热水\n- [ ] **少量零食/泡面**：自驾途中或洞穴酒店深夜备用\n\n### APP 下载\n- **Google Maps**：离线地图必备，D400 部分山区信号弱\n- **Uber / BiTaksi**：土耳其打车软件（伊斯坦布尔、安塔利亚、费特希耶可用）\n- **Mobimilet / Enuygun**：查询土耳其境内航班和长途大巴\n- **Tripadvisor / Google 翻译**：餐厅选择和菜单翻译\n- **Booking.com / Airbnb**：住宿管理\n\n---\n\n## 附录三：关键决策说明（FAQ）\n\n### Q1：为什么不从伊斯坦布尔开始或结束？\n伊斯坦布尔是一座世界级的城市，有蓝色清真寺、圣索菲亚大教堂、大巴扎和博斯普鲁斯海峡。但 9 天时间有限，如果把伊斯坦布尔纳入行程，至少需要 2 整天，这会严重压缩卡帕多奇亚和 D400 沿海公路的时间。我们选择**把伊斯坦布尔留到下次**，用这 9 天专注于\"热气球 + 地中海自驾\"这对王炸组合。\n\n### Q2：卡帕多奇亚热气球取消率高吗？如果取消了怎么办？\n卡帕多奇亚的热气球对天气要求极高——风速、能见度、降水都会影响起飞。5～6 月和 9～10 月的取消率约为 10%～20%，冬季更高。如果 D2 清晨取消，大多数公司会提供免费改期到 D3 的服务。建议**在卡帕多奇亚预留 2 个清晨**（D2 和 D3），这样如果 D2 取消，D3 还有补飞机会。如果实在两早都取消，可申请全额退款。\n\n### Q3：D400 自驾危险吗？土耳其开车和中国有什么区别？\n土耳其是**靠右行驶**，租车通常为左舵车，交通标志和规则对中国司机来说相对容易适应。D400 沿海公路路况极好，但弯道多、部分路段临悬崖，建议：\n- 不要超速，尤其在弯道和城镇路段；\n- 土耳其司机开车比较激进，变道和超车频繁，保持冷静；\n- 山路避免夜间驾驶；\n- 建议租一辆自动挡 SUV（如斯柯达 Kodiaq、大众 Tiguan），动力足、视野好。\n\n### Q4：土耳其安全吗？\n土耳其整体对游客非常友好，卡帕多奇亚、安塔利亚、卡什、费特希耶等旅游目的地治安良好。但需要注意：\n- 伊斯坦布尔等大城市有针对游客的扒手，建议不要背敞开式背包；\n- 街头小贩和出租车司机有时会\"热情过度\"，坚定但礼貌地拒绝即可；\n- 避免前往土耳其东南部边境地区（与叙利亚、伊拉克接壤），这些区域不在本次行程路线中。\n\n### Q5：如果预算充裕，有什么可以提升体验的？\n- **热气球小筐**：选择 8～12 人小筐（比 16～20 人大筐贵约 500～800 元/人），空间更宽敞、拍照更自由、体验更私密；\n- **私人游艇出海**：在卡什或费特希耶包一艘私人 Gulet 游艇出海，约 3,000～6,000 元/天，含船长、船员和午餐；\n- **洞穴酒店升级**：预订 Museum Hotel 或 Argos in Cappadocia 的套房，享受私人泳池或露台；\n- **滑翔伞+直升机组合**：部分公司提供直升机观光 Babadağ 山和 Ölüdeniz 海湾（约 2,000 元/人/15 分钟）。\n\n---\n\n## 附录四：一句话总结\n\n这 9 天，你们会在卡帕多奇亚的\"月球表面\"乘热气球看日出，在千年地下城中牵手穿越狭窄的隧道，然后自驾 D400 公路沿着地中海一路向西，在 Kaputas Beach 的果冻海里游泳，最后从 Babadağ 山顶滑翔而下，俯瞰 Ölüdeniz 那片不可思议的蓝。\n\n**这是土耳其写给新婚夫妇最热烈的情书——一半是火焰，一半是海水。**\n\n---\n\n*文档生成时间：2026 年 4 月*  \n*祝你们旅途愉快，新婚快乐！*\n"

    let map, markersLayer, linesLayer, currentPlan = 'a';
    const docPanel = document.getElementById('docPanel');
    const docBackdrop = document.getElementById('docBackdrop');
    const docContent = document.getElementById('docContent');
    const docTitle = document.getElementById('docTitle');

    // Configure marked renderer for anchor injection
    const renderer = new marked.Renderer();
    renderer.heading = function(token) {
      // marked v14+ passes a token object { text, depth, raw }, older versions pass (text, level)
      const text = (typeof token === 'string') ? token : (token.text || '');
      const level = (typeof token === 'string') ? arguments[1] : (token.depth || 1);
      const m = text.match(/D(\d+)/i);
      const id = m ? `id="anchor-d${m[1]}"` : '';
      return `<h${level} ${id}>${text}</h${level}>`;
    };
    marked.setOptions({ renderer });

    function initMap() {
      map = L.map('map', {
        zoomControl: false,
        attributionControl: false,
        minZoom: 3
      }).setView(plans.a.center, plans.a.zoom);

      L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; OpenStreetMap &copy; CARTO',
        subdomains: 'abcd',
        maxZoom: 19
      }).addTo(map);

      L.control.zoom({ position: 'bottomright' }).addTo(map);
      L.control.attribution({ position: 'bottomright' }).addTo(map);

      markersLayer = L.layerGroup().addTo(map);
      linesLayer = L.layerGroup().addTo(map);

      renderPlan('a');
    }

    function getLineStyle(type) {
      switch(type) {
        case 'fly': return { color: '#ff8b94', weight: 2, opacity: 0.9, dashArray: '6,6' };
        case 'ferry': return { color: '#9ecbf3', weight: 2.5, opacity: 0.85, dashArray: '4,4' };
        case 'train': return { color: '#b4a7d6', weight: 2.5, opacity: 0.85, dashArray: '8,6' };
        default: return { color: '#ffd3b6', weight: 2.5, opacity: 0.85 };
      }
    }

    function iconFor(p) {
      const text = (p.name || '') + ',' + (p.tags || []).join(',');
      if (/热气球/.test(text)) return '🎈';
      if (/滑翔伞/.test(text)) return '🪂';
      if (/潜水/.test(text)) return '🤿';
      if (/红酒|葡萄酒/.test(text)) return '🍷';
      if (/和牛|烤肉/.test(text)) return '🥩';
      if (/花田|薰衣草/.test(text)) return '🌸';
      if (/灯塔/.test(text)) return '🔦';
      if (/蓝湖|海滩|海岸/.test(text)) return '🏖️';
      if (/地下城/.test(text)) return '🏰';
      if (/峡湾|瀑布|冰川|地热|间歇泉|岩石|悬崖|山峰|峡谷|火山|自然|山口|山谷/.test(text)) return '⛰️';
      if (/城堡|教堂|博物馆|美术馆|歌剧院/.test(text)) return '🏰';
      if (/火车|轮渡|机场|大桥|运河/.test(text)) return '🚆';
      if (/温泉|桑拿|泳池/.test(text)) return '♨️';
      if (/公园|乐园|花园|森林/.test(text)) return '🌲';
      if (/足球|球场/.test(text)) return '⚽';
      if (/生蚝|海鲜|美食|鱼市|餐厅/.test(text)) return '🦪';
      if (/徒步|登山|裂缝/.test(text)) return '🥾';
      return '📍';
    }

    function makeMarker(p, planKey) {
      const color = plans[planKey].color;
      const iconHtml = `<div class="marker-ring" style="color:${color}"></div><div style="font-size:16px; filter:drop-shadow(0 1px 2px rgba(0,0,0,.6));">${iconFor(p)}</div>`;
      const icon = L.divIcon({
        className: 'custom-marker',
        html: iconHtml,
        iconSize: [36,36],
        iconAnchor: [18,18],
        popupAnchor: [0,-20]
      });
      icon.options.color = color;
      const marker = L.marker([p.lat, p.lng], { icon });
      marker.pointId = p.id;

      const imgPath = p.img ? images[planKey] + p.img : '';
      const imgHtml = imgPath
        ? `<img class="popup-media" src="${imgPath}" alt="${p.name}" onerror="this.style.display='none'">`
        : `<div class="popup-media" style="display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#1a2540,#0b1020);color:#9fb3d8;font-size:12px;">暂无图片</div>`;

      const tagsHtml = (p.tags || []).map(t => `<span class="popup-tag">${t}</span>`).join(' ');

      const popupContent = `
        ${imgHtml}
        <div class="popup-body">
          <div class="popup-title">${p.name}</div>
          <p class="popup-desc">${p.desc}</p>
          <div style="margin-top:8px;">${tagsHtml}</div>
          <button class="popup-doc-btn" data-point-id="${p.id}" data-plan="${planKey}" data-anchor="${p.docAnchor || ''}">📖 查看本日行程详情</button>
        </div>
      `;

      marker.bindPopup(popupContent, { maxWidth: 280, className: 'nordic-popup' });
      let closeTimeout;
      marker.on('mouseover', function () { clearTimeout(closeTimeout); this.openPopup(); });
      marker.on('mouseout', function () { closeTimeout = setTimeout(() => this.closePopup(), 200); });
      marker.on('popupopen', function () {
        const el = this.getPopup().getElement();
        if (el) {
          el.addEventListener('mouseenter', () => clearTimeout(closeTimeout));
          el.addEventListener('mouseleave', () => { closeTimeout = setTimeout(() => this.closePopup(), 200); });
        }
      });
      return marker;
    }

    function renderPlan(key) {
      currentPlan = key;
      markersLayer.clearLayers();
      linesLayer.clearLayers();
      const plan = plans[key];

      // Draw lines first (under markers)
      plan.routes.forEach(r => {
        const fromP = plan.points.find(p => p.id === r.from);
        const toP = plan.points.find(p => p.id === r.to);
        if (!fromP || !toP) return;
        const latlngs = [[fromP.lat, fromP.lng], [toP.lat, toP.lng]];
        const line = L.polyline(latlngs, getLineStyle(r.type));
        line.addTo(linesLayer);
      });

      // Draw markers
      plan.points.forEach(p => {
        makeMarker(p, key).addTo(markersLayer);
      });

      // Fit bounds with padding
      const group = new L.featureGroup(markersLayer.getLayers());
      map.flyToBounds(group.getBounds(), { padding: [60,60], duration: 1.2 });
    }

    // Doc Panel functions
    function openDocPanel(planKey, anchor = null) {
      const plan = plans[planKey];
      docTitle.textContent = plan ? `${plan.name} · 行程详情` : '行程详情';
      docPanel.style.setProperty('--accent-doc', plan ? plan.color : '#9ecbf3');
      docPanel.classList.add('open');
      docBackdrop.classList.add('open');
      docPanel.dataset.plan = planKey;

      const md = mdContent[planKey] || '';
      if (!md) {
        docContent.innerHTML = '<div style="padding:40px 20px;text-align:center;color:var(--text-sub);">暂无文档内容</div>';
        return;
      }
      try {
        const htmlParsed = marked.parse(md);
        docContent.innerHTML = htmlParsed;
        // Fix relative image paths for each plan's images folder
        docContent.querySelectorAll('img').forEach(img => {
          const src = img.getAttribute('src');
          if (src && src.startsWith('./images/')) {
            img.src = imageDirs[planKey] + src.replace('./images/', '');
          }
        });
        linkifyPointNamesInDOM(docContent, planKey);
        if (anchor) {
          setTimeout(() => highlightAnchor(anchor), 60);
        }
      } catch (err) {
        docContent.innerHTML = `<div style="padding:40px 20px;text-align:center;color:var(--text-sub);">
          <div style="font-size:32px;margin-bottom:12px;">⚠️</div>
          <p>文档渲染失败</p>
          <pre style="margin-top:12px;text-align:left;background:rgba(255,255,255,0.05);padding:10px;border-radius:8px;font-size:12px;overflow:auto;">${err.message}</pre>
        </div>`;
      }
    }

    function closeDocPanel() {
      docPanel.classList.remove('open');
      docBackdrop.classList.remove('open');
      // Remove anchor highlights
      docPanel.querySelectorAll('.anchor-highlight').forEach(el => el.classList.remove('anchor-highlight'));
    }

    function highlightAnchor(anchor) {
      const el = document.getElementById(`anchor-${anchor}`);
      if (!el) return;
      el.scrollIntoView({ behavior: 'smooth', block: 'start' });
      docPanel.querySelectorAll('.anchor-highlight').forEach(e => e.classList.remove('anchor-highlight'));
      el.classList.add('anchor-highlight');
      setTimeout(() => {
        el.classList.remove('anchor-highlight');
      }, 2500);
    }

    function linkifyPointNamesInDOM(container, planKey) {
      const plan = plans[planKey];
      if (!plan) return;

      // Build candidates from names + aliases, longest first to avoid partial replacements
      const candidates = [];
      plan.points.forEach(p => {
        const texts = [p.name, ...(p.aliases || [])];
        texts.forEach(text => {
          if (text) candidates.push({ text, pointId: p.id, planKey });
        });
      });
      candidates.sort((a, b) => b.text.length - a.text.length || a.text.localeCompare(b.text));

      const seen = new Set();
      const uniqueCandidates = candidates.filter(c => {
        if (seen.has(c.text)) return false;
        seen.add(c.text);
        return true;
      });

      uniqueCandidates.forEach(c => {
        const walker = document.createTreeWalker(container, NodeFilter.SHOW_TEXT, null, false);
        const nodesToReplace = [];
        while (walker.nextNode()) {
          const node = walker.currentNode;
          if (node.parentElement && node.parentElement.closest('a, .doc-to-map')) continue;
          if (node.textContent.includes(c.text)) {
            nodesToReplace.push(node);
          }
        }
        nodesToReplace.forEach(node => {
          const parts = node.textContent.split(c.text);
          if (parts.length <= 1) return;
          const frag = document.createDocumentFragment();
          parts.forEach((part, i) => {
            frag.appendChild(document.createTextNode(part));
            if (i < parts.length - 1) {
              const a = document.createElement('a');
              a.href = '#';
              a.className = 'doc-to-map';
              a.dataset.pointId = c.pointId;
              a.dataset.plan = c.planKey;
              a.textContent = c.text;
              frag.appendChild(a);
            }
          });
          node.parentNode.replaceChild(frag, node);
        });
      });
    }

    function showDocPulse(lat, lng) {
      const pulseMarker = L.marker([lat, lng], {
        icon: L.divIcon({
          className: 'doc-pulse-marker',
          html: '<div class="doc-pulse-ring"></div>',
          iconSize: [80, 80],
          iconAnchor: [40, 40]
        }),
        zIndexOffset: 1000
      }).addTo(map);
      setTimeout(() => {
        if (map.hasLayer(pulseMarker)) map.removeLayer(pulseMarker);
      }, 3000);
    }

    function flyToPoint(planKey, pointId) {
      if (currentPlan !== planKey) {
        document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
        const tabBtn = document.querySelector(`.tab[data-plan="${planKey}"]`);
        if (tabBtn) tabBtn.classList.add('active');
        renderPlan(planKey);
      }
      setTimeout(() => {
        let targetMarker = null;
        markersLayer.eachLayer(layer => {
          if (layer.pointId === pointId) targetMarker = layer;
        });
        if (targetMarker) {
          const latlng = targetMarker.getLatLng();
          map.flyTo(latlng, Math.max(map.getZoom(), 8), { duration: 1.2 });
          targetMarker.openPopup();
          showDocPulse(latlng.lat, latlng.lng);
        }
      }, currentPlan === planKey ? 50 : 1300);
    }

    // Event listeners
    document.querySelectorAll('.tab').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderPlan(btn.dataset.plan);
      });
    });

    document.querySelectorAll('.tab-doc-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        openDocPanel(btn.dataset.plan);
      });
    });

    document.getElementById('map').addEventListener('click', (e) => {
      const btn = e.target.closest('.popup-doc-btn');
      if (btn) {
        e.stopPropagation();
        e.preventDefault();
        openDocPanel(btn.dataset.plan, btn.dataset.anchor);
      }
    });

    docBackdrop.addEventListener('click', closeDocPanel);
    document.getElementById('docClose').addEventListener('click', closeDocPanel);

    docContent.addEventListener('click', (e) => {
      const link = e.target.closest('.doc-to-map');
      if (link) {
        e.preventDefault();
        const planKey = link.dataset.plan;
        const pointId = link.dataset.pointId;
        flyToPoint(planKey, pointId);
      }
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && docPanel.classList.contains('open')) {
        closeDocPanel();
      }
    });

    window.addEventListener('DOMContentLoaded', initMap);
  </script>
</body>
</html>
