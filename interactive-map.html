2\n\n## \u4f4f\u5bbf\n**\u63a8\u8350\uff1aHotel Metropole\uff08\u5927\u90fd\u4f1a\u9152\u5e97\uff09\u6216 Bauer Palazzo**\n- \u4f4d\u7f6e\uff1a\u5723\u9a6c\u53ef\u5e7f\u573a\u6b65\u884c 3\uff5e5 \u5206\u949f\uff0c\u5927\u8fd0\u6cb3\u6cbf\u5cb8\u3002\n- \u4ef7\u683c\uff1a\u7ea6 350\uff5e600 \u6b27\u5143/\u665a\u3002\n- \u7406\u7531\uff1a\u63a8\u5f00\u7a97\u5c31\u662f\u5927\u8fd0\u6cb3\uff0c\u6e05\u6668\u548c\u9ec4\u660f\u7684\u5a01\u5c3c\u65af\u6700\u8ff7\u4eba\u3002\u4f5c\u4e3a\u5a5a\u5047\uff0c\u5728\u5a01\u5c3c\u65af\u4f4f\u4e00\u665a\u8fd0\u6cb3\u666f\u89c2\u623f\u662f**\u5fc5\u987b\u7684\u6295\u8d44**\u3002Bauer Palazzo \u7684\u9732\u53f0\u9910\u5385\u662f\u62cd\u6444\u8d21\u591a\u62c9\u548c\u5927\u8fd0\u6cb3\u7684\u7ecf\u5178\u673a\u4f4d\u3002\n- \u5907\u9009\uff1a\u5982\u679c\u9884\u7b97\u6709\u9650\uff0c\u53ef\u4ee5\u9009\u62e9 Cannaregio \u6216 Dorsoduro \u533a\u57df\u7684\u8bbe\u8ba1\u6c11\u5bbf\uff08\u7ea6 150\uff5e250 \u6b27\u5143/\u665a\uff09\uff0c\u66f4\u5b89\u9759\u3001\u66f4\u672c\u5730\u5316\u3002\n\n## \u6d3b\u52a8\n- **\u508d\u665a**\uff1a\u4ece\u9152\u5e97\u6b65\u884c\u5230 **\u91cc\u4e9a\u6258\u6865\uff08Ponte di Rialto\uff09**\uff0c\u8fd9\u662f\u5927\u8fd0\u6cb3\u4e0a\u6700\u53e4\u8001\u3001\u6700\u58ee\u89c2\u7684\u6865\u6881\u3002\u7ad9\u5728\u6865\u4e2d\u592e\uff0c\u5de6\u53f3\u4e24\u4fa7\u662f\u5a01\u5c3c\u65af\u6700\u7ecf\u5178\u7684\u753b\u9762\u2014\u2014\u7c89\u8272\u7684\u5bab\u6bbf\u3001\u7a7f\u68ad\u7684\u8d21\u591a\u62c9\u3001\u6a59\u7ea2\u8272\u7684\u843d\u65e5\u3002\n- **\u665a\u9910**\uff1a\u63a8\u8350 **Antiche Carampane**\uff0c\u85cf\u5728\u5df7\u5f04\u6df1\u5904\u7684\u672c\u5730\u6d77\u9c9c\u9910\u5385\uff0c\u62db\u724c\u662f**\u8718\u86db\u87f9\u610f\u9762\uff08Tagliolini al Gransporco\uff09**\u548c**\u70b8\u5c0f\u6d77\u9c9c\uff08Fritto Misto\uff09**\u3002\u4eba\u5747\u7ea6 80\uff5e120 \u6b27\u5143\u3002\u5a01\u5c3c\u65af\u6e38\u5ba2\u9910\u5385\u5f88\u591a\uff0c\u8fd9\u5bb6\u662f\u672c\u5730\u4eba\u4e5f\u4f1a\u5149\u987e\u7684\u5b9d\u85cf\u3002\n- **\u5c0f\u8d34\u58eb**\uff1a\u5a01\u5c3c\u65af\u665a\u4e0a 9 \u70b9\u540e\u5929\u8272\u624d\u5b8c\u5168\u6697\u4e0b\u6765\u3002\u665a\u9910\u540e\u6cbf\u7740\u5927\u8fd0\u6cb3\u6563\u6b65\uff0c\u770b\u706f\u706b\u5012\u6620\u5728\u6c34\u9762\u4e0a\uff0c\u4f1a\u6709\u4e00\u79cd\u7a7f\u8d8a\u5230 16 \u4e16\u7eaa\u7684\u604d\u60da\u611f\u3002\n\n---\n\n# D2\uff5c\u5a01\u5c3c\u65af\uff08Venice\uff09\n**\u4e3b\u9898\uff1a\u8ff7\u5931\u4e0e\u5de1\u6e38**\n\n![\u5723\u9a6c\u53ef\u5e7f\u573a\u4e0e\u603b\u7763\u5bab](./D_\u610f\u5927\u5229\u591a\u6d1b\u7c73\u8482\u5a01\u5c3c\u65af/images/st_marks_square.jpg)\n*\u5723\u9a6c\u53ef\u5e7f\u573a\u4e0a\u7684\u949f\u697c\u4e0e\u603b\u7763\u5bab*\n\n## \u4e0a\u5348\uff1a\u5723\u9a6c\u53ef\u5e7f\u573a\uff08Piazza San Marco\uff09\n\u8fd9\u662f\u6b27\u6d32\u6700\u7f8e\u7684\u5ba2\u5385\uff0c\u4e5f\u662f\u5a01\u5c3c\u65af 1000 \u5e74\u6d77\u6d0b\u9738\u6743\u7684\u8c61\u5f81\u3002\n\n- **\u5723\u9a6c\u53ef\u5927\u6559\u5802\uff08Basilica di San Marco\uff09**\uff1a\u62dc\u5360\u5ead\u98ce\u683c\u7684\u91d1\u8272\u7a79\u9876\u3001\u9a6c\u8d5b\u514b\u9576\u5d4c\u753b\u3001\u4ece\u541b\u58eb\u5766\u4e01\u5821\u63a0\u593a\u6765\u7684\u9752\u94dc\u9a8f\u9a6c\u2014\u2014\u8fd9\u5ea7\u6559\u5802\u662f\u5a01\u5c3c\u65af\u4f5c\u4e3a\"\u4e1c\u65b9\u5973\u738b\"\u7684\u5ba3\u8a00\u3002\u5efa\u8bae\u63d0\u524d\u5728\u7f51\u4e0a\u9884\u8ba2 **Pala d'Oro \u9ec4\u91d1\u796d\u575b\u5c4f**\u548c**\u9732\u53f0\u767b\u4e34**\u7684\u8054\u7968\u3002\n- **\u603b\u7763\u5bab\uff08Palazzo Ducale\uff09**\uff1a\u54e5\u7279\u5f0f\u5efa\u7b51\u7684\u5dc5\u5cf0\uff0c\u5185\u90e8\u6709\u4e01\u6258\u5217\u6258\u7684\u5de8\u5e45\u5929\u9876\u753b\u300a\u5929\u5802\u300b\uff0c\u4ee5\u53ca\u8457\u540d\u7684**\u53f9\u606f\u6865\uff08Ponte dei Sospiri\uff09**\u2014\u2014\u4f20\u8bf4\u56da\u72af\u8fc7\u6865\u65f6\u900f\u8fc7\u5c0f\u7a97\u770b\u5230\u5916\u9762\u7684\u4e16\u754c\uff0c\u4f1a\u53d1\u51fa\u6700\u540e\u4e00\u58f0\u53f9\u606f\u3002\n- **\u949f\u697c\uff08Campanile\uff09**\uff1a\u4e58\u7535\u68af\u767b\u9876\uff0c\u4fef\u77b0\u5a01\u5c3c\u65af 118 \u5ea7\u5c9b\u5c7f\u548c\u8fdc\u5904\u6f5f\u6e56\u7684\u78a7\u84dd\u6c34\u9762\u3002\n\n> **\u65f6\u95f4\u5efa\u8bae**\uff1a\u65e9\u4e0a 8:30 \u524d\u5230\u8fbe\u5e7f\u573a\uff0c\u53ef\u4ee5\u907f\u5f00\u65c5\u884c\u56e2\u7684\u4eba\u6f6e\u3002\u5e7f\u573a\u4e0a\u7684\u9732\u5929\u5496\u5561\u9986\uff08\u5982 Florian \u6216 Quadri\uff09\u4e00\u676f\u5496\u5561\u8981 15\uff5e20 \u6b27\u5143\uff0c\u4e14\u4f34\u6709\u4e50\u961f\u6f14\u594f\u2014\u2014\u8fd9\u4e0d\u662f\u559d\u5496\u5561\uff0c\u662f\u4e70\u5ea7\u4f4d\u548c\u6c1b\u56f4\u3002\u5982\u679c\u53ea\u662f\u60f3\u4f11\u606f\uff0c\u5efa\u8bae\u53bb\u65c1\u8fb9\u7684\u5df7\u5b50\u91cc\u627e\u666e\u901a\u5496\u5561\u9986\u3002\n\n## \u4e0b\u5348\uff1a\u5f69\u8272\u5c9b\uff08Burano\uff09\n\n![\u5e03\u62c9\u8bfa\u5f69\u8272\u623f\u5c4b](./D_\u610f\u5927\u5229\u591a\u6d1b\u7c73\u8482\u5a01\u5c3c\u65af/images/burano_colorful_houses.jpg)\n*\u5e03\u62c9\u8bfa\u5c9b\u4e0a\u7684\u5f69\u8679\u8272\u6e14\u6c11\u5c0f\u5c4b*\n\n- **\u4ea4\u901a**\uff1a\u4ece\u5723\u9a6c\u53ef\u5e7f\u573a\u9644\u8fd1\u7684\u7801\u5934\u4e58\u5750 **LN \u53f7\u7ebf\u6c34\u4e0a\u5df4\u58eb**\uff0c\u7ea6 45 \u5206\u949f\u62b5\u8fbe Burano\u3002\n- **\u770b\u70b9**\uff1a\u5c9b\u4e0a\u6bcf\u4e00\u680b\u623f\u5b50\u90fd\u88ab\u6f06\u6210\u4e86\u4e0d\u540c\u7684\u989c\u8272\u2014\u2014\u67e0\u6aac\u9ec4\u3001\u8584\u8377\u7eff\u3001\u73ca\u745a\u7c89\u3001\u5929\u84dd\u8272\u3002\u4f20\u8bf4\u6e14\u6c11\u4eec\u51fa\u6d77\u5f52\u6765\u65f6\uff0c\u9700\u8981\u901a\u8fc7\u623f\u5b50\u7684\u989c\u8272\u5728\u96fe\u4e2d\u8fa8\u8ba4\u81ea\u5df1\u7684\u5bb6\u3002\u5982\u4eca\u8fd9\u91cc\u662f\u5a01\u5c3c\u65af\u6700\u4e0a\u955c\u7684\u5730\u65b9\uff0c\u4e5f\u662f**\u857e\u4e1d\u5de5\u827a**\u7684\u53d1\u6e90\u5730\u3002\n- **\u6d3b\u52a8**\uff1a\u5728\u5c9b\u4e0a\u6162\u6162\u901b\uff0c\u4e70\u4e00\u76d2\u624b\u5de5\u857e\u4e1d\u624b\u5e15\u4f5c\u4e3a\u5a5a\u5047\u7eaa\u5ff5\uff1b\u5728\u8fd0\u6cb3\u8fb9\u7684\u51b0\u6dc7\u6dcb\u5e97\u4e70\u4e00\u4e2a Gelato\uff1b\u627e\u4e00\u5bb6\u5c0f\u9910\u9986\u5403**\u58a8\u9c7c\u9762\uff08Spaghetti al Nero di Seppia\uff09**\uff0c\u5403\u5b8c\u5634\u5507\u4f1a\u67d3\u6210\u9ed1\u8272\u2014\u2014\u8fd9\u662f\u5a01\u5c3c\u65af\u7279\u6709\u7684\u6d6a\u6f2b\u6076\u4f5c\u5267\u3002\n\n## \u508d\u665a\uff1a\u8d21\u591a\u62c9\u5de1\u6e38\n\n![\u8d21\u591a\u62c9\u5728\u5927\u8fd0\u6cb3\u4e0a](./D_\u610f\u5927\u5229\u591a\u6d1b\u7c73\u8482\u5a01\u5c3c\u65af/images/gondola_venice.jpg)\n*\u9ec4\u660f\u65f6\u5206\u7684\u8d21\u591a\u62c9\u5de1\u6e38*\n\n- **\u65f6\u957f**\uff1a30 \u5206\u949f\u3002\n- **\u4ef7\u683c**\uff1a\u5b98\u65b9\u5b9a\u4ef7\u767d\u5929 80 \u6b27\u5143/\u8239\uff0c\u665a\u4e0a 19:00 \u540e 100 \u6b27\u5143/\u8239\uff08\u6700\u591a\u5750 6 \u4eba\uff09\u3002\u53ef\u4ee5\u62fc\u8239\uff0c\u4e5f\u53ef\u4ee5\u72ec\u4eab\u3002\n- **\u8def\u7ebf**\uff1a\u4ece\u5723\u9a6c\u53ef\u5e7f\u573a\u9644\u8fd1\u7684\u7801\u5934\u51fa\u53d1\uff0c\u7a7f\u8fc7\u5c0f\u6865\u548c\u72ed\u7a84\u7684\u6c34\u5df7\uff08Rio\uff09\uff0c\u6700\u7ec8\u6c47\u5165\u5927\u8fd0\u6cb3\u3002\u8239\u592b\u4f1a\u5531\u51e0\u53e5\u610f\u5927\u5229\u6c11\u6b4c\uff0c\u6868\u58f0\u6b38\u4e43\uff0c\u6c34\u6ce2\u8361\u6f3e\u3002\n- **\u5a5a\u5047\u4ef7\u503c**\uff1a\u8fd9\u4e5f\u8bb8\u662f\u4e16\u754c\u4e0a\u6700\u8d35\u7684 30 \u5206\u949f\u5212\u8239\u4f53\u9a8c\uff0c\u4f46\u5728\u5a01\u5c3c\u65af\uff0c\u5750\u4e00\u6b21\u8d21\u591a\u62c9\u4e0d\u662f\"\u65c5\u6e38\u9879\u76ee\"\uff0c\u800c\u662f**\u8fdb\u5165\u8fd9\u5ea7\u57ce\u5e02\u68a6\u5883\u7684\u95e8\u7968**\u3002\u4f5c\u4e3a\u65b0\u5a5a\u592b\u5987\uff0c\u8fd9\u4e00\u523b\u7684\u4eea\u5f0f\u611f\u65e0\u53ef\u66ff\u4ee3\u3002\n\n## \u665a\u9910\n\u63a8\u8350 **Osteria alle Testiere**\uff0c\u4e00\u5bb6\u53ea\u6709 8 \u5f20\u684c\u5b50\u7684\u5c0f\u5e97\uff0c\u4e3b\u6253\u5f53\u5929\u4ece\u6f5f\u6e56\u6355\u635e\u7684\u6d77\u9c9c\u3002\u6ca1\u6709\u56fa\u5b9a\u83dc\u5355\uff0c\u53a8\u5e08\u6839\u636e\u65e9\u6668\u9c7c\u5e02\u7684\u6536\u83b7\u51b3\u5b9a\u505a\u4ec0\u4e48\u3002\u4eba\u5747\u7ea6 100\uff5e150 \u6b27\u5143\uff0c\u5fc5\u987b\u63d0\u524d\u9884\u8ba2\u3002\n\n---\n\n# D3\uff5c\u5a01\u5c3c\u65af \u2192 \u7ef4\u7f57\u7eb3\uff08Verona\uff09\u2192 \u79d1\u5c14\u8482\u7eb3\u4e39\u4f69\u4f50\uff08Cortina d'Ampezzo\uff09\n**\u4e3b\u9898\uff1a\u4ece\u7f57\u5bc6\u6b27\u6731\u4e3d\u53f6\u5230\u767d\u4e91\u5ca9\u5927\u95e8**\n\n![\u7ef4\u7f57\u7eb3\u5706\u5f62\u5267\u573a](./D_\u610f\u5927\u5229\u591a\u6d1b\u7c73\u8482\u5a01\u5c3c\u65af/images/verona_arena.jpg)\n*\u7ef4\u7f57\u7eb3\u5706\u5f62\u5267\u573a\u2014\u2014\u4e16\u754c\u4e0a\u4fdd\u5b58\u6700\u5b8c\u597d\u7684\u53e4\u7f57\u9a6c\u5267\u573a\u4e4b\u4e00*\n\n## \u4ea4\u901a\n\u4ece\u4eca\u5929\u8d77\uff0c\u4f60\u4eec\u6b63\u5f0f\u5f00\u542f**\u81ea\u9a7e**\u6a21\u5f0f\u3002\n- **\u5a01\u5c3c\u65af \u2192 \u7ef4\u7f57\u7eb3**\uff1a\n  - \u4e0a\u5348\u9000\u623f\u540e\uff0c\u4e58\u5750\u6c34\u4e0a\u5df4\u58eb\u6216\u9152\u5e97\u5b89\u6392\u7684\u63a5\u9a73\u8239\u5230 **Tronchetto \u505c\u8f66\u573a**\uff08\u6216\u524d\u4e00\u665a\u63d0\u524d\u5c06\u8f66\u505c\u653e\u5728 **Mestre \u706b\u8f66\u7ad9\u505c\u8f66\u573a**\uff0c\u4e58\u706b\u8f66\u5230\u7ef4\u7f57\u7eb3\u53d6\u8f66\u2014\u2014\u540e\u8005\u66f4\u4fbf\u5b9c\uff0c\u505c\u8f66\u8d39\u7ea6 15\uff5e20 \u6b27\u5143/\u5929\uff09\u3002\n  - \u5982\u679c\u4ece Tronchetto \u5f00\u8f66\uff0c\u6cbf A4 \u9ad8\u901f\u516c\u8def\u5411\u4e1c\u884c\u9a76\u7ea6 120 \u516c\u91cc\uff0c\u7ea6 1.5 \u5c0f\u65f6\u62b5\u8fbe\u7ef4\u7f57\u7eb3\u3002\n- **\u7ef4\u7f57\u7eb3 \u2192 \u79d1\u5c14\u8482\u7eb3\u4e39\u4f69\u4f50**\uff1a\n  - \u4e0b\u5348\u6e38\u89c8\u7ed3\u675f\u540e\uff0c\u4ece\u7ef4\u7f57\u7eb3\u5411\u5317\u9a76\u5165\u591a\u6d1b\u7c73\u8482\u5c71\u533a\u3002\u524d\u6bb5\u662f\u9ad8\u901f\u516c\u8def\uff0c\u8fdb\u5165\u5c71\u533a\u540e\u53d8\u4e3a\u98ce\u666f\u516c\u8def\uff08SS51\uff09\uff0c\u7ea6 150 \u516c\u91cc\uff0c\u5f00\u8f66\u7ea6 2.5 \u5c0f\u65f6\u3002\n- **\u603b\u91cc\u7a0b**\uff1a\u7ea6 270 \u516c\u91cc\u3002\n\n> **\u79df\u8f66\u63d0\u793a**\uff1a\u5efa\u8bae\u5728\u7ef4\u7f57\u7eb3\u673a\u573a\u6216\u5e02\u533a\u53d6\u8f66\uff08Hertz\u3001Avis\u3001Sixt \u5747\u6709\u95e8\u5e97\uff09\uff0c\u8f66\u578b\u63a8\u8350**\u7d27\u51d1\u578b SUV \u6216\u65c5\u884c\u8f66**\uff08\u5982\u5b9d\u9a6c X1\u3001\u5965\u8fea Q3\u3001\u6c83\u5c14\u6c83 V60\uff09\uff0c\u610f\u5927\u5229\u5c71\u533a\u516c\u8def\u5f2f\u9053\u591a\u3001\u5761\u5ea6\u5927\uff0c\u52a8\u529b\u5145\u8db3\u4e14\u5e95\u76d8\u8f83\u9ad8\u7684\u8f66\u66f4\u4ece\u5bb9\u3002\n\n## \u7ef4\u7f57\u7eb3\u6d3b\u52a8\n\n### \u6731\u4e3d\u53f6\u6545\u5c45\uff08Casa di Giulietta\uff09\n- \u4f4d\u4e8e\u5e02\u4e2d\u5fc3\u5361\u4f69\u7f57\u8def\uff08Via Cappello\uff09\uff0c\u662f\u4e00\u5ea7\u4e2d\u4e16\u7eaa\u5854\u697c\u3002\n-  courtyard \u91cc\u6709\u4e00\u5ea7\u6731\u4e3d\u53f6\u7684\u9752\u94dc\u96d5\u50cf\uff0c\u4f20\u8bf4\u6478\u5979\u7684\u53f3\u80f8\u4f1a\u5e26\u6765\u7231\u60c5\u597d\u8fd0\u2014\u2014\u73b0\u5728\u88ab\u65e0\u6570\u6e38\u5ba2\u6478\u5f97\u9503\u4eae\u3002\n- \u5899\u4e0a\u8d34\u6ee1\u4e86\u7231\u60c5\u4fbf\u7b7e\uff0c\u4e8c\u697c\u662f\u8457\u540d\u7684\"\u6731\u4e3d\u53f6\u9633\u53f0\"\uff0c\u636e\u8bf4\u7f57\u5bc6\u6b27\u5c31\u662f\u5728\u8fd9\u91cc\u5411\u6731\u4e3d\u53f6\u6c42\u7231\u7684\u3002\n- **\u5a5a\u5047\u4ef7\u503c**\uff1a\u867d\u7136\u8fd9\u662f\u4e00\u4e2a\u534a\u865a\u6784\u7684\u666f\u70b9\uff0c\u4f46\u7ef4\u7f57\u7eb3\u4f5c\u4e3a\"\u7231\u4e4b\u57ce\"\u7684\u6c1b\u56f4\u662f\u771f\u5b9e\u7684\u3002\u5728\u4fbf\u7b7e\u5899\u4e0a\u8d34\u4e00\u5f20\u4f60\u4eec\u7684\u540d\u5b57\uff0c\u662f\u65b0\u5a5a\u592b\u5987\u7684\u53ef\u7231\u4eea\u5f0f\u3002\n\n### \u7ef4\u7f57\u7eb3\u5706\u5f62\u5267\u573a\uff08Arena di Verona\uff09\n- \u5efa\u4e8e\u516c\u5143 1 \u4e16\u7eaa\uff0c\u662f\u4e16\u754c\u4e0a\u4fdd\u5b58\u6700\u5b8c\u597d\u3001\u4ecd\u5728\u4f7f\u7528\u7684\u53e4\u7f57\u9a6c\u5706\u5f62\u5267\u573a\u4e4b\u4e00\uff0c\u53ef\u5bb9\u7eb3 3 \u4e07\u540d\u89c2\u4f17\u3002\n- 7\uff5e8 \u6708\u662f**\u7ef4\u7f57\u7eb3\u6b4c\u5267\u8282\uff08Arena di Verona Opera Festival\uff09**\u7684\u5b63\u8282\uff0c\u665a\u4e0a\u901a\u5e38\u4f1a\u4e0a\u6f14\u300a\u963f\u4f9d\u8fbe\u300b\u300a\u5361\u95e8\u300b\u300a\u6258\u65af\u5361\u300b\u7b49\u7ecf\u5178\u6b4c\u5267\u3002\n- \u5982\u679c\u4f60\u4eec\u65f6\u95f4\u5141\u8bb8\u4e14\u6070\u597d\u6709\u6f14\u51fa\uff0c\u5f3a\u70c8\u5efa\u8bae\u9884\u8ba2\u4e00\u573a\u665a\u95f4\u6b4c\u5267\u2014\u2014\u5728\u661f\u7a7a\u4e0b\u7684\u53e4\u7f57\u9a6c\u5267\u573a\u91cc\u542c\u300a\u5361\u95e8\u300b\u7684\u548f\u53f9\u8c03\uff0c\u662f\u610f\u5927\u5229\u80fd\u7ed9\u4f60\u4eec\u7684\u6700\u9ad8\u7ea7\u6d6a\u6f2b\u3002\n\n## \u5348\u9910\n\u63a8\u8350 **Osteria Le Civette**\uff0c\u4f4d\u4e8e\u5706\u5f62\u5267\u573a\u9644\u8fd1\uff0c\u4e3b\u6253\u7ef4\u7f57\u7eb3\u4f20\u7edf\u83dc\u3002**Amarone \u7ea2\u9152\u7096\u725b\u8089\uff08Stracotto all'Amarone\uff09**\u662f\u5f53\u5730\u540d\u4ea7\uff0c\u8089\u8d28\u9165\u70c2\uff0c\u9171\u6c41\u6d53\u90c1\u3002\u4eba\u5747\u7ea6 40\uff5e60 \u6b27\u5143\u3002\n\n## \u4f4f\u5bbf\n**\u63a8\u8350\uff1aCristallo Resort & Spa\uff08\u514b\u91cc\u65af\u5854\u6d1b\u6e29\u6cc9\u5ea6\u5047\u9152\u5e97\uff09**\n- \u4f4d\u7f6e\uff1a\u79d1\u5c14\u8482\u7eb3\u4e39\u4f69\u4f50\u5c0f\u9547\u8fb9\u7f18\uff0c\u6b63\u5bf9\u767d\u4e91\u5ca9\u5c71\u5cf0\u3002\n- \u4ef7\u683c\uff1a\u7ea6 400\uff5e700 \u6b27\u5143/\u665a\u3002\n- \u7279\u70b9\uff1a\u591a\u6d1b\u7c73\u8482\u6700\u4f20\u5947\u7684\u9152\u5e97\u4e4b\u4e00\uff0c\u5efa\u4e8e 1901 \u5e74\uff0c\u66fe\u63a5\u5f85\u8fc7\u65e0\u6570\u7687\u5ba4\u548c\u597d\u83b1\u575e\u660e\u661f\u3002\u62e5\u6709\u7edd\u4f73\u7684SPA\u8bbe\u65bd\u548c\u5c71\u666f\u9732\u53f0\u3002\n- \u5907\u9009\uff1a**Hotel Corona** \u6216\u5c0f\u9547\u4e0a\u7684\u7cbe\u54c1\u6728\u5c4b\u6c11\u5bbf\uff08\u7ea6 200\uff5e350 \u6b27\u5143/\u665a\uff09\u3002\n\n> **\u8bbe\u8ba1\u903b\u8f91**\uff1a\u79d1\u5c14\u8482\u7eb3\u662f 1956 \u5e74\u51ac\u5965\u4f1a\u4e3e\u529e\u5730\uff0c\u4e5f\u662f\u591a\u6d1b\u7c73\u8482\u6700\u5962\u534e\u3001\u8bbe\u65bd\u6700\u5b8c\u5584\u7684\u5c0f\u9547\u3002\u628a\u5b83\u4f5c\u4e3a\u591a\u6d1b\u7c73\u8482\u81ea\u9a7e\u7684\u5927\u672c\u8425\uff0c\u53ef\u4ee5\u8f90\u5c04\u4e09\u5cf0\u5c71\u3001Sella Ronda\u3001Passo Giau \u7b49\u6838\u5fc3\u666f\u70b9\u3002\n\n---\n\n# D4\uff5c\u79d1\u5c14\u8482\u7eb3\u4e39\u4f69\u4f50 \u2192 \u4e09\u5cf0\u5c71\uff08Tre Cime di Lavaredo\uff09\u2192 Sella Ronda\n**\u4e3b\u9898\uff1a\u591a\u6d1b\u7c73\u8482\u7684\u56fe\u817e**\n\n![\u4e09\u5cf0\u5c71\u65e5\u51fa](./D_\u610f\u5927\u5229\u591a\u6d1b\u7c73\u8482\u5a01\u5c3c\u65af/images/tre_cime.jpg)\n*\u4e09\u5cf0\u5c71\uff08Tre Cime di Lavaredo\uff09\u2014\u2014\u591a\u6d1b\u7c73\u8482\u6700\u5177\u6807\u5fd7\u6027\u7684\u767d\u4e91\u5ca9\u5cf0\u7fa4*\n\n\u8fd9\u662f\u6574\u4e2a\u884c\u7a0b\u4e2d**\u81ea\u7136\u666f\u89c2\u6700\u9707\u64bc\u7684\u4e00\u5929**\u3002\u4e09\u5cf0\u5c71\u662f\u591a\u6d1b\u7c73\u8482\u7684\u7075\u9b42\uff0c\u4e5f\u662f\u963f\u5c14\u5351\u65af\u5c71\u8109\u6700\u4e0a\u955c\u7684\u5c71\u5cf0\u4e4b\u4e00\u3002\n\n## \u4e0a\u5348\uff1a\u4e09\u5cf0\u5c71\u5f92\u6b65\n\n### \u4ea4\u901a\n- \u4ece\u79d1\u5c14\u8482\u7eb3\u5f00\u8f66\u7ea6 30 \u5206\u949f\u5230 **Misurina \u6e56**\uff0c\u518d\u6cbf\u5c71\u8def\u5f00\u7ea6 15 \u5206\u949f\u5230\u8fbe **Rifugio Auronzo \u505c\u8f66\u573a**\uff08\u6d77\u62d4 2320 \u7c73\uff09\u3002\n- **\u6ce8\u610f**\uff1a\u590f\u5b63\u4e09\u5cf0\u5c71\u516c\u8def\u6781\u4e3a\u70ed\u95e8\uff0c\u505c\u8f66\u573a\u6bcf\u5929 10:00 \u524d\u5c31\u6ee1\u5458\u3002\u5efa\u8bae**\u65e9\u4e0a 7:30 \u524d\u4ece\u9152\u5e97\u51fa\u53d1**\uff0c\u6216\u8005\u524d\u4e00\u665a\u76f4\u63a5\u4f4f\u5728\u5c71\u91cc\u7684 Rifugio\uff08\u9ad8\u5c71\u5c0f\u5c4b\uff09\u3002\n- \u505c\u8f66\u8d39\uff1a\u7ea6 30 \u6b27\u5143/\u8f66\uff08\u590f\u5b63\u65fa\u5b63\uff09\u3002\n\n### \u5f92\u6b65\u8def\u7ebf\n**\u7ecf\u5178\u73af\u7ebf\u8def\u7ebf\uff1aRifugio Auronzo \u2192 Rifugio Lavaredo \u2192 Forcella Lavaredo \u2192 \u4e09\u5cf0\u5c71\u5317\u5761 \u2192 Rifugio Locatelli \u2192 \u8fd4\u56de Auronzo**\n- \u8ddd\u79bb\uff1a\u7ea6 9.5 \u516c\u91cc\uff08\u73af\u7ebf\uff09\u3002\n- \u722c\u5347\uff1a\u7ea6 400 \u7c73\u3002\n- \u65f6\u95f4\uff1a3.5\uff5e4.5 \u5c0f\u65f6\u3002\n- \u96be\u5ea6\uff1a\u4e2d\u7b49\u3002\u8def\u7ebf\u6e05\u6670\uff0c\u5927\u90e8\u5206\u662f\u788e\u77f3\u548c\u571f\u8def\uff0c\u6ca1\u6709\u6280\u672f\u96be\u5ea6\u3002\n\n### \u666f\u89c2\u4ef7\u503c\n- **\u4e09\u5cf0\u5c71\u672c\u4f53**\uff1a\u4e09\u5ea7\u952f\u9f7f\u72b6\u7684\u767d\u4e91\u5ca9\u5de8\u5cf0\u4ece\u6d77\u62d4 3000 \u7c73\u5904\u62d4\u5730\u800c\u8d77\uff0c\u5ca9\u58c1\u5782\u76f4\u5982\u5200\u524a\u3002\u6e05\u6668\u7684\u9633\u5149\u4ece\u4e1c\u65b9\u7167\u6765\uff0c\u5c71\u5cf0\u4f1a\u5448\u73b0\u51fa**\u73ab\u7470\u91d1\u8272\u5230\u4eae\u767d\u8272\u7684\u6e10\u53d8**\u2014\u2014\u8fd9\u79cd\u73b0\u8c61\u88ab\u79f0\u4e3a\"Enrosadira\"\uff08\u963f\u5c14\u5351\u65af\u4e4b\u5149\uff09\uff0c\u662f\u591a\u6d1b\u7c73\u8482\u6700\u72ec\u7279\u7684\u81ea\u7136\u5947\u89c2\u3002\n- **Rifugio Locatelli**\uff1a\u4f4d\u4e8e\u4e09\u5cf0\u5c71\u5317\u5761\u7684\u89c2\u666f\u53f0\uff0c\u53ef\u4ee5\u62cd\u5230\u4e09\u5cf0\u5c71\u5012\u6620\u5728\u9ad8\u5c71\u5c0f\u6e56\u4e2d\u7684\u7ecf\u5178\u753b\u9762\u3002\u8fd9\u91cc\u4e5f\u662f\u62cd\u6444\u5a5a\u7eb1\u7167\u7684\u70ed\u95e8\u673a\u4f4d\u3002\n- **Cappella degli Alpini**\uff1a\u4e00\u5ea7\u5efa\u5728\u5c71\u5761\u4e0a\u7684\u5c0f\u5c0f\u6559\u5802\uff0c\u80cc\u666f\u5c31\u662f\u4e09\u5cf0\u5c71\u7684\u5de8\u578b\u5ca9\u58c1\uff0c\u6bd4\u4f8b\u60ac\u6b8a\u5f97\u4ee4\u4eba\u656c\u754f\u3002\n\n> **\u5f92\u6b65\u5efa\u8bae**\uff1a\n> - \u7a7f**\u767b\u5c71\u978b\u6216\u9ad8\u5e2e\u5f92\u6b65\u978b**\uff0c\u788e\u77f3\u8def\u6bb5\u5bb9\u6613\u5d34\u811a\uff1b\n> - \u5e26\u8db3\u6c34\u548c\u9632\u6652\u971c\uff0c\u9ad8\u6d77\u62d4\u7d2b\u5916\u7ebf\u6781\u5f3a\uff1b\n> - \u5c71\u9876\u5929\u6c14\u591a\u53d8\uff0c\u5373\u4f7f\u662f 7 \u6708\u4e5f\u8981\u5e26\u4e00\u4ef6**\u9632\u98ce\u5916\u5957\u6216\u8584\u7fbd\u7ed2**\uff1b\n> - \u5982\u679c\u4f53\u529b\u6709\u9650\uff0c\u53ef\u4ee5\u53ea\u8d70\u5230 Rifugio Lavaredo\uff08\u7ea6 1 \u5c0f\u65f6\u5f80\u8fd4\uff09\uff0c\u98ce\u666f\u5df2\u7ecf\u8db3\u591f\u9707\u64bc\u3002\n\n![\u4e09\u5cf0\u5c71\u5317\u5761\u5c0f\u6559\u5802](./D_\u610f\u5927\u5229\u591a\u6d1b\u7c73\u8482\u5a01\u5c3c\u65af/images/tre_cime_chapel.jpg)\n*\u4e09\u5cf0\u5c71\u811a\u4e0b\u7684 Cappella degli Alpini \u5c0f\u6559\u5802*\n\n## \u4e0b\u5348\uff1aSella Ronda \u516c\u8def\u81ea\u9a7e\n- \u4ece\u4e09\u5cf0\u5c71\u8fd4\u56de\u79d1\u5c14\u8482\u7eb3\u540e\uff0c\u53ef\u4ee5\u5f00\u8f66\u7ed5\u4e00\u6bb5 **Sella Ronda**\u2014\u2014\u8fd9\u662f\u56f4\u7ed5 Sella \u7fa4\u5c71\u7684\u4e00\u6761\u73af\u5f62\u9ad8\u5c71\u516c\u8def\uff0c\u8fde\u63a5 Passo Gardena\u3001Passo Sella\u3001Passo Pordoi \u548c Passo Campolongo \u56db\u4e2a\u5c71\u53e3\u3002\n- \u5373\u4f7f\u4e0d\u5b8c\u6210\u5b8c\u6574\u73af\u7ebf\uff08\u7ea6 4 \u5c0f\u65f6\uff09\uff0c\u53ea\u5f00\u5176\u4e2d\u4e00\u6bb5\u4e5f\u8db3\u591f\u60ca\u8273\u3002\u516c\u8def\u5728\u6d77\u62d4 2000 \u7c73\u4ee5\u4e0a\u7684\u5c71\u810a\u95f4\u76d8\u65cb\uff0c\u4e00\u4fa7\u662f\u5782\u76f4\u7684\u767d\u4e91\u5ca9\u60ac\u5d16\uff0c\u53e6\u4e00\u4fa7\u662f\u6df1\u7eff\u8272\u7684\u5c71\u8c37\u548c\u6563\u843d\u7684\u6728\u5c4b\u3002\n- **Passo Giau** \u4e0d\u5728 Sella Ronda \u4e3b\u73af\u7ebf\u4e0a\uff0c\u4f46\u79bb\u79d1\u5c14\u8482\u7eb3\u5f88\u8fd1\uff08\u7ea6 20 \u5206\u949f\u8f66\u7a0b\uff09\uff0c\u53ef\u4ee5\u4f5c\u4e3a\u508d\u665a\u7684\u52a0\u9910\u2014\u2014\u65e5\u843d\u65f6\u5206\u8fd9\u91cc\u662f\u6574\u4e2a\u591a\u6d1b\u7c73\u8482\u6700\u58ee\u4e3d\u7684\u5c71\u53e3\u4e4b\u4e00\u3002\n\n## \u665a\u9910\n\u56de\u5230\u79d1\u5c14\u8482\u7eb3\u5c0f\u9547\uff0c\u63a8\u8350 **El Camineto**\u3002\u8fd9\u5bb6\u9910\u5385\u4ee5**\u9ad8\u5c71\u5976\u916a\u706b\u9505\uff08Fonduta\uff09**\u3001**\u91ce\u732a\u8089\u610f\u9762\uff08Pappardelle al Cinghiale\uff09**\u548c**\u70e4\u9e7f\u8089**\u95fb\u540d\u3002\u914d\u4e0a\u5f53\u5730\u917f\u9020\u7684**Prosecco \u8d77\u6ce1\u9152**\uff0c\u662f\u5bf9\u4e00\u5929\u5f92\u6b65\u6700\u597d\u7684\u7292\u8d4f\u3002\u4eba\u5747\u7ea6 60\uff5e90 \u6b27\u5143\u3002\n\n---\n\n# D5\uff5c\u79d1\u5c14\u8482\u7eb3\u4e39\u4f69\u4f50 \u2192 \u5e03\u83b1\u65af\u6e56\uff08Lago di Braies\uff09\u2192 \u5bcc\u7eb3\u65af\u5c71\u8c37\uff08Val di Funes\uff09\n**\u4e3b\u9898\uff1a\u963f\u5c14\u5351\u65af\u7684\u660e\u4fe1\u7247**\n\n![\u5e03\u83b1\u65af\u6e56\u6cdb\u821f](./D_\u610f\u5927\u5229\u591a\u6d1b\u7c73\u8482\u5a01\u5c3c\u65af/images/lago_braies.jpg)\n*\u5e03\u83b1\u65af\u6e56\u7684\u7956\u6bcd\u7eff\u8272\u6e56\u6c34\u4e0e\u6728\u8d28\u5212\u8247*\n\n## \u4e0a\u5348\uff1a\u5e03\u83b1\u65af\u6e56\uff08Lago di Braies\uff09\n\u8fd9\u662f\u591a\u6d1b\u7c73\u8482\u6700\u7f51\u7ea2\u7684\u6e56\u6cca\uff0c\u4e5f\u662f Instagram \u4e0a\u51fa\u955c\u7387\u6700\u9ad8\u7684\u610f\u5927\u5229\u9ad8\u5c71\u6e56\u4e4b\u4e00\u3002\n\n- **\u4ea4\u901a**\uff1a\u4ece\u79d1\u5c14\u8482\u7eb3\u5f00\u8f66\u7ea6 1 \u5c0f\u65f6\uff08\u7ea6 60 \u516c\u91cc\uff09\uff0c\u6cbf\u98ce\u666f\u516c\u8def\u5411\u5317\u8fdb\u5165 Pusteria \u5c71\u8c37\u3002\n- **\u770b\u70b9**\uff1a\u6e56\u6c34\u5448\u73b0\u51fa\u4e0d\u53ef\u601d\u8bae\u7684**\u7956\u6bcd\u7eff\u8272\u5230\u84dd\u7eff\u8272**\uff0c\u80cc\u666f\u662f\u5782\u76f4\u7684 Croda del Becco \u5c71\u5cf0\uff08\u6d77\u62d4 2810 \u7c73\uff09\u3002\u6e56\u8fb9\u6709\u4e00\u5ea7\u5c0f\u6559\u5802\u548c\u4e00\u6392\u6728\u8d28\u5212\u8247\uff0c\u662f\u62cd\u6444\u5a5a\u7eb1\u7167\u7684\u7edd\u4f73\u80cc\u666f\u3002\n- **\u6d3b\u52a8**\uff1a\n  - **\u79df\u5212\u8247\u6e38\u6e56**\uff1a\u7ea6 25 \u6b27\u5143/\u5c0f\u65f6\u3002\u5728\u5e73\u9759\u7684\u6e56\u9762\u4e0a\u5212\u8239\uff0c\u5c71\u5cf0\u5012\u5f71\u89e6\u624b\u53ef\u53ca\uff0c\u662f\u591a\u6d1b\u7c73\u8482\u6700\u6d6a\u6f2b\u7684\u4f53\u9a8c\u4e4b\u4e00\u3002\n  - **\u73af\u6e56\u5f92\u6b65**\uff1a\u7ea6 3.5 \u516c\u91cc\uff0c\u5e73\u8def\uff0c1\uff5e1.5 \u5c0f\u65f6\u3002\u53ef\u4ee5\u907f\u5f00\u4eba\u7fa4\uff0c\u627e\u5230\u5c5e\u4e8e\u81ea\u5df1\u7684\u6e56\u8fb9\u89d2\u843d\u3002\n\n> **\u65f6\u95f4\u5efa\u8bae**\uff1a\u5e03\u83b1\u65af\u6e56\u590f\u5b63 09:00 \u540e\u505c\u8f66\u573a\u5c31\u5f00\u59cb\u6392\u961f\u3002\u5efa\u8bae**\u65e9\u4e0a 8:00 \u524d\u62b5\u8fbe**\uff0c\u6216\u8005\u524d\u4e00\u665a\u4f4f\u5728\u6e56\u8fb9\u9644\u8fd1\u7684\u9152\u5e97\u3002\u5982\u679c 10:00 \u540e\u624d\u5230\uff0c\u4f53\u9a8c\u4f1a\u5927\u6253\u6298\u6263\u3002\n\n## \u4e0b\u5348\uff1a\u5bcc\u7eb3\u65af\u5c71\u8c37\uff08Val di Funes\uff09\u4e0e Santa Maddalena\n\n![\u5bcc\u7eb3\u65af\u5c71\u8c37\u6559\u5802\u65e5\u843d](./D_\u610f\u5927\u5229\u591a\u6d1b\u7c73\u8482\u5a01\u5c3c\u65af/images/val_di_funes.jpg)\n*\u5bcc\u7eb3\u65af\u5c71\u8c37\u7684 Santa Maddalena \u6559\u5802\u4e0e\u952f\u9f7f\u72b6\u767d\u4e91\u5ca9\u5c71\u5cf0*\n\n- **\u4ea4\u901a**\uff1a\u4ece\u5e03\u83b1\u65af\u6e56\u5f00\u8f66\u7ea6 1 \u5c0f\u65f6\uff08\u7ea6 50 \u516c\u91cc\uff09\u5230\u8fbe\u5bcc\u7eb3\u65af\u5c71\u8c37\u3002\n- **\u770b\u70b9**\uff1a\u8fd9\u91cc\u6709\u591a\u6d1b\u7c73\u8482\u6700\u5177\u4ee3\u8868\u6027\u7684\u7530\u56ed\u753b\u9762\u2014\u2014\u4e00\u5ea7\u5c0f\u5c0f\u7684**Santa Maddalena \u6559\u5802**\u5750\u843d\u5728\u7fe0\u7eff\u7684\u8349\u7538\u4e0a\uff0c\u80cc\u666f\u662f\u952f\u9f7f\u72b6\u7684 Odle \u7fa4\u5cf0\u3002\u65e5\u843d\u65f6\u5206\uff08\u7ea6 19:30-20:30\uff09\uff0c\u5c71\u5cf0\u88ab\u67d3\u6210\u73ab\u7470\u91d1\u8272\uff0c\u6559\u5802\u7684\u5c16\u9876\u526a\u5f71\u5982\u540c\u7ae5\u8bdd\u4e16\u754c\u3002\n- **\u62cd\u6444\u673a\u4f4d**\uff1a\n  - \u6559\u5802\u540e\u65b9\u7684\u5c71\u5761\u662f\u6700\u4f73\u673a\u4f4d\uff0c\u4f46\u9700\u8981\u5c0a\u91cd\u79c1\u4eba\u9886\u5730\uff1b\n  - \u66f4\u63a8\u8350\u4ece\u6751\u5e84\u4e3b\u8def\u5c3d\u5934\u7684\u516c\u5171\u6b65\u9053\u8fdb\u5165\uff0c\u89c6\u91ce\u5f00\u9614\u4e14\u5408\u6cd5\u3002\n\n## \u508d\u665a\uff1aSeceda \u5c71\u9876\uff08\u53ef\u9009\uff09\n- \u5982\u679c\u4f60\u4eec\u4f53\u529b\u5c1a\u597d\uff0c\u53ef\u4ee5\u4ece\u5965\u8482\u585e\u4f0a\uff08Ortisei\uff09\u4e58\u5750 **Seceda \u7f06\u8f66**\uff08\u7ea6 15 \u5206\u949f\uff09\u4e0a\u5230\u6d77\u62d4 2500 \u7c73\u7684\u5c71\u9876\u3002\n- \u8fd9\u91cc\u662f\u591a\u6d1b\u7c73\u8482\u53e6\u4e00\u4e2a\u53f2\u8bd7\u7ea7\u673a\u4f4d\u2014\u2014\u4ece\u5c71\u9876\u4fef\u77b0\uff0cGeisler/Odle \u7fa4\u5cf0\u50cf\u4e00\u5835\u5de8\u5927\u7684\u5200\u950b\u5899\u7a81\u7136\u4ece\u7eff\u8272\u8349\u7538\u4e2d\u62d4\u8d77\uff0c\u843d\u5dee\u8d85\u8fc7 1000 \u7c73\u3002\u65e5\u843d\u65f6\u5206\u7684\u660e\u6697\u5bf9\u6bd4\u6781\u5176\u5f3a\u70c8\u3002\n- \u7f06\u8f66\u590f\u5b63\u8fd0\u8425\u5230 18:00 \u5de6\u53f3\uff0c\u5efa\u8bae\u67e5\u597d\u65f6\u95f4\u3002\n\n## \u4f4f\u5bbf\n**\u63a8\u8350\uff1aAdler Spa Resort Dolomiti\uff08\u5965\u8482\u585e\u4f0a\uff09\u6216\u5bcc\u7eb3\u65af\u5c71\u8c37\u7684\u7cbe\u54c1\u6c11\u5bbf**\n- Adler \u662f\u591a\u6d1b\u7c73\u8482\u6700\u8457\u540d\u7684 Wellness \u9152\u5e97\u4e4b\u4e00\uff0c\u62e5\u6709\u9876\u7ea7SPA\u548c\u6cf3\u6c60\uff0c\u4ef7\u683c\u5728 400\uff5e700 \u6b27\u5143/\u665a\u3002\n- \u66f4\u672c\u5730\u5316\u4e14\u6027\u4ef7\u6bd4\u66f4\u9ad8\u7684\u9009\u62e9\u662f\u5bcc\u7eb3\u65af\u5c71\u8c37\u6216 Santa Cristina \u7684**\u5bb6\u5ead\u5f0f\u6728\u5c4b\u9152\u5e97\uff08Garni\uff09**\uff0c\u7ea6 150\uff5e250 \u6b27\u5143/\u665a\uff0c\u901a\u5e38\u5305\u542b\u4e30\u76db\u7684\u963f\u5c14\u5351\u65af\u65e9\u9910\u3002\n\n---\n\n# D6\uff5c\u5965\u8482\u585e\u4f0a \u2192 Passo Giau \u2192 \u9a6c\u5c14\u83ab\u62c9\u8fbe\uff08Marmolada\uff09\u2192 \u79d1\u5c14\u8482\u7eb3\n**\u4e3b\u9898\uff1a\u9ad8\u5c71\u516c\u8def\u7684\u5dc5\u5cf0**\n\n![Passo Giau \u873f\u8712\u516c\u8def](./D_\u610f\u5927\u5229\u591a\u6d1b\u7c73\u8482\u5a01\u5c3c\u65af/images/passo_giau.jpg)\n*Passo Giau \u5c71\u53e3\u2014\u2014\u591a\u6d1b\u7c73\u8482\u6700\u58ee\u4e3d\u7684\u81ea\u9a7e\u516c\u8def\u4e4b\u4e00*\n\n\u8fd9\u4e00\u5929\u662f**\u591a\u6d1b\u7c73\u8482\u81ea\u9a7e\u7684\u7cbe\u534e\u65e5**\u3002\u4f60\u4eec\u4f1a\u7a7f\u8d8a\u6b27\u6d32\u6700\u7f8e\u7684\u9ad8\u5c71\u516c\u8def\u4e4b\u4e00\uff0c\u611f\u53d7\u963f\u5c14\u5351\u65af\u5c71\u8109\u7684\u78c5\u7934\u6c14\u52bf\u3002\n\n## \u4e0a\u5348\uff1aPasso Giau\uff08\u6d77\u62d4 2236 \u7c73\uff09\n\n- **\u8def\u7ebf**\uff1a\u4ece\u5965\u8482\u585e\u4f0a/\u79d1\u5c14\u8482\u7eb3\u51fa\u53d1\uff0c\u6cbf SP638 \u516c\u8def climbing \u81f3 Passo Giau \u5c71\u53e3\u3002\n- **\u666f\u89c2**\uff1a\u8fd9\u6761\u516c\u8def\u5728\u591a\u6d1b\u7c73\u8482\u81ea\u9a7e\u7231\u597d\u8005\u5fc3\u4e2d\u6392\u540d\u7b2c\u4e00\u3002\u516c\u8def\u5728\u9661\u5ced\u7684\u5c71\u5761\u4e0a\u5448\u4e4b\u5b57\u5f62\u6500\u5347\uff0c\u6bcf\u4e00\u4e2a\u53d1\u5361\u5f2f\u90fd\u5e26\u6765\u65b0\u7684\u9707\u64bc\u89c6\u89d2\u3002\u5230\u8fbe\u5c71\u53e3\u540e\uff0c360 \u5ea6\u88ab\u767d\u4e91\u5ca9\u5de8\u5cf0\u73af\u7ed5\u2014\u2014\u4e1c\u5357\u65b9\u5411\u662f Cinque Torri\uff0c\u897f\u5317\u65b9\u5411\u662f Nuvolau \u548c Averau\u3002\n- **\u5c71\u9876 Rifugio**\uff1aPasso Giau \u5c71\u9876\u6709\u4e00\u5bb6 Rifugio Passo Giau\uff0c\u9732\u53f0\u662f\u62cd\u6444\u5c71\u666f\u548c\u516c\u8def\u66f2\u7ebf\u7684\u7edd\u4f73\u4f4d\u7f6e\u3002\u5728\u8fd9\u91cc\u559d\u4e00\u676f\u9ad8\u5c71\u5496\u5561\uff0c\u5403\u4e00\u5757\u82f9\u679c\u6d3e\uff08Apfelstrudel\uff09\uff0c\u662f\u5bf9\u81ea\u9a7e\u6700\u597d\u7684\u4e2d\u573a\u4f11\u606f\u3002\n\n## \u4e0b\u5348\uff1aCinque Torri \u4e0e\u9a6c\u5c14\u83ab\u62c9\u8fbe\n\n- **Cinque Torri\uff08\u4e94\u5854\u5c71\uff09**\uff1a\u4ece Passo Giau \u4e0b\u5c71\u7ea6 15 \u5206\u949f\u5373\u5230\u3002\u8fd9\u91cc\u662f\u7b2c\u4e00\u6b21\u4e16\u754c\u5927\u6218\u7684\u9057\u5740\u533a\uff0c\u5c71\u4e0a\u6709\u4fdd\u5b58\u5b8c\u597d\u7684\u6218\u58d5\u548c\u9732\u5929\u535a\u7269\u9986\u3002\u4e94\u5ea7\u5947\u7279\u7684\u767d\u4e91\u5ca9\u5c16\u5854\u4ece\u8349\u7538\u4e2d\u5347\u8d77\uff0c\u5f62\u72b6\u602a\u5f02\u800c\u4f18\u7f8e\uff0c\u662f\u6500\u5ca9\u5723\u5730\uff0c\u4e5f\u9002\u5408\u8f7b\u677e\u5f92\u6b65\u3002\n- **\u9a6c\u5c14\u83ab\u62c9\u8fbe\uff08Marmolada\uff09**\uff1a\u591a\u6d1b\u7c73\u8482\u6700\u9ad8\u5cf0\uff08\u6d77\u62d4 3343 \u7c73\uff09\uff0c\u88ab\u79f0\u4e3a\"\u591a\u6d1b\u7c73\u8482\u7684\u5973\u738b\"\u3002\u590f\u5b63\u53ef\u4ee5\u4e58\u5750\u7f06\u8f66\u767b\u4e0a\u5c71\u9876\u7684\u51b0\u5ddd\u533a\uff0c\u4fef\u77b0\u6574\u4e2a\u5c71\u8109\u3002\u4ece Passo Fedaia \u770b\u9a6c\u5c14\u83ab\u62c9\u8fbe\u7684\u5317\u58c1\uff0c\u662f\u963f\u5c14\u5351\u65af\u6700\u58ee\u89c2\u7684\u51b0\u5ca9\u6df7\u5408\u5c71\u4f53\u4e4b\u4e00\u3002\n\n## \u4f4f\u5bbf\n\u5efa\u8bae\u8fd4\u56de**\u79d1\u5c14\u8482\u7eb3\u4e39\u4f69\u4f50**\u4f4f\u5bbf\uff0c\u65b9\u4fbf\u7b2c\u4e8c\u5929\u5411\u5357\u51fa\u53d1\u524d\u5f80\u52a0\u5c14\u8fbe\u6e56\u3002\u5982\u679c\u4e0d\u60f3\u79fb\u52a8\uff0c\u4e5f\u53ef\u4ee5\u4f4f\u5728 **Canazei\uff08\u5361\u7eb3\u6cfd\u4f0a\uff09**\uff0c\u8fd9\u662f Dolomiti Superski \u533a\u57df\u7684\u53e6\u4e00\u4e2a\u6838\u5fc3\u5c0f\u9547\uff0c\u6c1b\u56f4\u66f4\u4f11\u95f2\u3002\n\n## \u665a\u9910\n\u5728\u79d1\u5c14\u8482\u7eb3\u5c1d\u8bd5 **Ristorante Tivoli**\uff0c\u8fd9\u662f\u7c73\u5176\u6797\u63a8\u8350\u7684\u9910\u5385\uff0c\u4e3b\u6253\u73b0\u4ee3\u963f\u5c14\u5351\u65af\u6599\u7406\u3002**\u677e\u9732\u610f\u9762\uff08Tagliolini al Tartufo\uff09**\u548c\u591a\u6d1b\u7c73\u8482\u672c\u5730\u5976\u916a\u662f\u5fc5\u70b9\u3002\u4eba\u5747\u7ea6 80\uff5e120 \u6b27\u5143\u3002\n\n---\n\n# D7\uff5c\u591a\u6d1b\u7c73\u8482 \u2192 SS48 \u5200\u810a\u516c\u8def \u2192 \u52a0\u5c14\u8fbe\u6e56\uff08Sirmione\uff09\n**\u4e3b\u9898\uff1a\u4ece\u96ea\u5c71\u5230\u6e56\u6cca\u7684\u8fc7\u6e21**\n\n![\u52a0\u5c14\u8fbe\u6e56\u897f\u5c14\u82d7\u5185](./D_\u610f\u5927\u5229\u591a\u6d1b\u7c73\u8482\u5a01\u5c3c\u65af/images/sirmione_garda.jpg)\n*\u52a0\u5c14\u8fbe\u6e56\u7554\u7684\u897f\u5c14\u82d7\u5185\u5c0f\u9547\u4e0e\u65af\u5361\u5229\u6770\u7f57\u57ce\u5821*\n\n## \u81ea\u9a7e\u8def\u7ebf\n- **\u591a\u6d1b\u7c73\u8482 \u2192 \u7279\u4f26\u6258\uff08Trento\uff09**\uff1a\u6cbf SS48 \u516c\u8def\u5411\u5357\uff0c\u7a7f\u8d8a **Passo Costalunga \u548c Passo Rolle**\uff08\u5982\u679c\u8d70\u4e1c\u7ebf\uff09\u6216\u6cbf A22 \u9ad8\u901f\u516c\u8def\u76f4\u4e0b\uff08\u66f4\u5feb\uff09\u3002\n- **\u7279\u4f26\u6258 \u2192 \u52a0\u5c14\u8fbe\u6e56**\uff1a\u6cbf\u516c\u8def\u5411\u5357\u7ea6 1 \u5c0f\u65f6\uff0c\u62b5\u8fbe\u897f\u5c14\u82d7\u5185\uff08Sirmione\uff09\u3002\n- **\u603b\u91cc\u7a0b**\uff1a\u7ea6 180\uff5e220 \u516c\u91cc\uff08\u53d6\u51b3\u4e8e\u5177\u4f53\u8def\u7ebf\uff09\u3002\n- **\u5f00\u8f66\u65f6\u95f4**\uff1a\u7ea6 3.5\uff5e4.5 \u5c0f\u65f6\uff08\u542b\u4f11\u606f\u548c\u62cd\u7167\uff09\u3002\n\n> **\u8def\u7ebf\u5efa\u8bae**\uff1a\u5982\u679c\u65f6\u95f4\u5145\u88d5\uff0c\u53ef\u4ee5\u8d70\u98ce\u666f\u8def\u7ebf\u7ecf\u8fc7 **Passo Rolle** \u548c **Pale di San Martino**\uff0c\u8fd9\u662f\u591a\u6d1b\u7c73\u8482\u53e6\u4e00\u4e2a\u4e16\u754c\u7ea7\u7684\u5c71\u666f\u533a\u57df\uff1b\u5982\u679c\u60f3\u8f7b\u677e\u4e00\u4e9b\uff0c\u76f4\u63a5\u8d70 A22 \u9ad8\u901f\u516c\u8def\u5357\u4e0b\uff0c\u6cbf\u9014\u6b23\u8d4f\u963f\u5c14\u5351\u65af\u5c71\u5357\u9e93\u7684\u8461\u8404\u56ed\u548c\u6a44\u6984\u6811\u6797\u3002\n\n## \u897f\u5c14\u82d7\u5185\uff08Sirmione\uff09\n\u8fd9\u662f\u52a0\u5c14\u8fbe\u6e56\u4e0a\u6700\u7f8e\u4e3d\u7684\u5c0f\u9547\uff0c\u4f38\u5165\u6e56\u4e2d\u7684\u72ed\u957f\u534a\u5c9b\u4e0a\u5e03\u6ee1\u4e86\u67e0\u6aac\u6811\u3001\u6e29\u6cc9\u6d74\u573a\u548c\u4e2d\u4e16\u7eaa\u57ce\u5821\u3002\n\n- **\u65af\u5361\u5229\u6770\u7f57\u57ce\u5821\uff08Castello Scaligero\uff09**\uff1a\u4e00\u5ea7\u5efa\u4e8e 13 \u4e16\u7eaa\u7684\u6c34\u4e0a\u57ce\u5821\uff0c\u901a\u8fc7\u4e00\u5ea7\u6728\u6865\u4e0e\u9646\u5730\u76f8\u8fde\u3002\u767b\u4e0a\u5854\u697c\u53ef\u4ee5\u4fef\u77b0\u6574\u4e2a\u52a0\u5c14\u8fbe\u6e56\u7684\u78a7\u84dd\u6c34\u9762\u3002\n- **\u5361\u56fe\u5362\u65af\u77f3\u7a9f\uff08Grotte di Catullo\uff09**\uff1a\u7f57\u9a6c\u8bd7\u4eba\u5361\u56fe\u5362\u65af\u7684\u522b\u5885\u9057\u5740\uff0c\u4f4d\u4e8e\u534a\u5c9b\u5c3d\u5934\u7684\u5c71\u5761\u4e0a\uff0c\u53ef\u4ee5\u8fdc\u773a\u6e56\u6cca\u5317\u5cb8\u7684\u7fa4\u5c71\u3002\n- **\u6e29\u6cc9**\uff1a\u897f\u5c14\u82d7\u5185\u4ee5\u786b\u78fa\u6e29\u6cc9\u95fb\u540d\uff0c\u6e56\u7554\u6709\u591a\u5bb6\u6e29\u6cc9\u6d74\u573a\uff08\u5982 Terme di Sirmione \u548c Aquaria Thermal SPA\uff09\u3002\u5728\u963f\u5c14\u5351\u65af\u5f92\u6b65\u51e0\u5929\u540e\uff0c\u6ce1\u4e00\u4e2a\u6e29\u6cc9\u662f\u8eab\u4f53\u7684\u6551\u8d4e\u3002\n\n## \u4f4f\u5bbf\n**\u63a8\u8350\uff1aHotel Sirmione e Promessi Sposi**\n- \u4f4d\u7f6e\uff1a\u897f\u5c14\u82d7\u5185\u8001\u57ce\u5165\u53e3\u9644\u8fd1\uff0c\u4e34\u6e56\u3002\n- \u4ef7\u683c\uff1a\u7ea6 250\uff5e450 \u6b27\u5143/\u665a\u3002\n- \u7279\u70b9\uff1a\u62e5\u6709\u79c1\u4eba\u6e56\u6ee9\u548c\u9732\u5929\u6cf3\u6c60\uff0c\u90e8\u5206\u623f\u95f4\u5e26\u6709\u6e56\u666f\u9633\u53f0\u3002\n- \u5907\u9009\uff1a\u8001\u57ce\u5185\u7684\u7cbe\u54c1\u6c11\u5bbf\u6216\u6e56\u7554\u7684 Agriturismo\uff08\u519c\u5bb6\u4e50\uff09\u3002\n\n## \u665a\u9910\n\u897f\u5c14\u82d7\u5185\u7684\u9910\u5385\u4ee5**\u67e0\u6aac\u98ce\u5473\u6599\u7406**\u548c**\u6e56\u9c7c**\u95fb\u540d\u3002\u63a8\u8350 **Ristorante L'Arcimboldo**\uff0c\u62db\u724c\u83dc\u662f**\u9999\u714e\u767d\u9c7c\uff08Coregone\uff09**\u548c**\u67e0\u6aac\u610f\u5f0f\u70e9\u996d\uff08Risotto al Limone\uff09**\u3002\u914d\u4e0a\u4e00\u676f\u52a0\u5c14\u8fbe\u6e56\u672c\u5730\u7684**Lugana \u767d\u8461\u8404\u9152**\uff0c\u5728\u6e56\u7554\u9732\u53f0\u4e0a\u770b\u7740\u5915\u9633\u6c89\u5165\u6e56\u9762\u3002\u4eba\u5747\u7ea6 50\uff5e80 \u6b27\u5143\u3002\n\n---\n\n# D8\uff5c\u897f\u5c14\u82d7\u5185 \u2192 \u7c73\u5170\uff08Milano\uff09\n**\u4e3b\u9898\uff1a\u4ece\u6e56\u7554\u5230\u65f6\u5c1a\u4e4b\u90fd**\n\n![\u7c73\u5170\u5927\u6559\u5802](./D_\u610f\u5927\u5229\u591a\u6d1b\u7c73\u8482\u5a01\u5c3c\u65af/images/milan_duomo.jpg)\n*\u7c73\u5170\u5927\u6559\u5802\uff08Duomo di Milano\uff09\u4e0e\u57c3\u9a6c\u52aa\u57c3\u83b1\u4e8c\u4e16\u957f\u5eca*\n\n## \u4e0a\u5348\uff1a\u52a0\u5c14\u8fbe\u6e56\u544a\u522b\n- \u65e9\u4e0a\u5728\u897f\u5c14\u82d7\u5185\u518d\u6563\u6b65\u4e00\u5708\uff0c\u6216\u8005\u79df\u4e00\u8258\u5c0f\u8239\u5728\u6e56\u4e2d\u5de1\u6e38\uff08\u65e0\u9700\u9a7e\u7167\uff0c\u7ea6 40 \u6b27\u5143/\u5c0f\u65f6\uff09\u3002\u4ece\u6c34\u4e0a\u770b\u57ce\u5821\u548c\u5c0f\u9547\uff0c\u662f\u53e6\u4e00\u79cd\u89d2\u5ea6\u7684\u7f8e\u3002\n- **\u8d2d\u7269**\uff1a\u897f\u5c14\u82d7\u5185\u6709\u5f88\u591a\u67e0\u6aac\u4e3b\u9898\u7684\u7eaa\u5ff5\u54c1\u5e97\u2014\u2014\u67e0\u6aac\u9152\uff08Limoncello\uff09\u3001\u67e0\u6aac\u9999\u7682\u3001\u67e0\u6aac\u5de7\u514b\u529b\uff0c\u9002\u5408\u4f5c\u4e3a\u4f34\u624b\u793c\u3002\n\n## \u4e0b\u5348\uff1a\u7c73\u5170\n- **\u4ea4\u901a**\uff1a\u4ece\u897f\u5c14\u82d7\u5185\u5f00\u8f66\u7ea6 1.5 \u5c0f\u65f6\uff08\u7ea6 140 \u516c\u91cc\uff09\u62b5\u8fbe\u7c73\u5170\u5e02\u533a\u3002\n- **\u505c\u8f66**\uff1a\u7c73\u5170 ZTL\uff08\u9650\u884c\u533a\uff09\u975e\u5e38\u4e25\u683c\uff0c\u5efa\u8bae\u5c06\u8f66\u505c\u653e\u5728\u9152\u5e97\u5408\u4f5c\u505c\u8f66\u573a\u6216\u57ce\u5916\u7684 P+R\uff0c\u7136\u540e\u6b65\u884c\u6e38\u89c8\u3002\n\n## \u6d3b\u52a8\n\n### \u7c73\u5170\u5927\u6559\u5802\uff08Duomo di Milano\uff09\n- \u4e16\u754c\u7b2c\u4e8c\u5927\u6559\u5802\uff0c\u54e5\u7279\u5f0f\u5efa\u7b51\u7684\u5dc5\u5cf0\uff0c\u5916\u5899\u4e0a\u6709 3400 \u591a\u5ea7\u96d5\u50cf\u3002\n- \u5efa\u8bae\u8d2d\u4e70**\u767b\u9876\u7535\u68af\u7968**\uff0c\u5230\u5c4b\u9876\u9732\u53f0\u8fd1\u8ddd\u79bb\u6b23\u8d4f\u5c16\u5854\u548c\u91d1\u8272\u5723\u6bcd\u50cf\uff08La Madonnina\uff09\uff0c\u540c\u65f6\u4fef\u77b0\u6574\u4e2a\u7c73\u5170\u57ce\u3002\n\n### \u57c3\u9a6c\u52aa\u57c3\u83b1\u4e8c\u4e16\u957f\u5eca\uff08Galleria Vittorio Emanuele II\uff09\n- \u4e16\u754c\u4e0a\u6700\u53e4\u8001\u7684\u8d2d\u7269\u4e2d\u5fc3\u4e4b\u4e00\uff0c\u7a79\u9876\u662f\u73bb\u7483\u548c\u94c1\u7ed3\u6784\u7684\u6770\u4f5c\u3002\n- \u5730\u9762\u4e0a\u7684\u516c\u725b\u9a6c\u8d5b\u514b\u662f\u4e00\u4e2a\u8457\u540d\u4f20\u7edf\u2014\u2014\u7528\u811a\u8ddf\u8e29\u7740\u516c\u725b\u7684\u751f\u6b96\u5668\u65cb\u8f6c\u4e09\u5708\uff0c\u4f1a\u5e26\u6765\u597d\u8fd0\u3002\u73b0\u5728\u90a3\u91cc\u5df2\u7ecf\u78e8\u51fa\u4e86\u4e00\u4e2a\u5c0f\u5751\u3002\n- \u957f\u5eca\u4e24\u4fa7\u662f Prada\u3001Gucci\u3001Louis Vuitton \u7b49\u5962\u4f88\u54c1\u724c\u7684\u65d7\u8230\u5e97\u3002\u5373\u4f7f\u4e0d\u8d2d\u7269\uff0c\u6765\u8fd9\u91cc\u559d\u5496\u5561\u3001\u770b\u4eba\u4e5f\u8db3\u591f\u6109\u60a6\u3002\n\n### \u65af\u798f\u5c14\u624e\u57ce\u5821\uff08Castello Sforzesco\uff09\u4e0e\u611f\u6069\u5723\u6bcd\u5802\uff08Santa Maria delle Grazie\uff09\n- \u5982\u679c\u65f6\u95f4\u5145\u88d5\uff0c\u53ef\u4ee5\u53bb\u611f\u6069\u5723\u6bcd\u5802\u770b\u8fbe\u00b7\u82ac\u5947\u7684\u300a\u6700\u540e\u7684\u665a\u9910\u300b\u3002\u4f46\u95e8\u7968**\u5fc5\u987b\u63d0\u524d\u6570\u6708\u9884\u8ba2**\uff0c\u73b0\u573a\u51e0\u4e4e\u4e70\u4e0d\u5230\u3002\n- \u65af\u798f\u5c14\u624e\u57ce\u5821\u662f\u7c73\u5170\u6700\u5927\u7684\u5386\u53f2\u5efa\u7b51\uff0c\u5185\u90e8\u6709\u591a\u5bb6\u535a\u7269\u9986\uff0c\u57ce\u5821\u540e\u7684\u516c\u56ed\u662f\u5e02\u6c11\u4f11\u95f2\u7684\u597d\u53bb\u5904\u3002\n\n## \u4f4f\u5bbf\n**\u63a8\u8350\uff1aBulgari Hotel Milano \u6216 Hotel Spadari al Duomo**\n- Bulgari Hotel \u4f4d\u4e8e\u8499\u7279\u62ff\u7834\u4ed1\u5927\u8857\u9644\u8fd1\uff0c\u662f\u7c73\u5170\u6700\u5962\u534e\u7684\u8bbe\u8ba1\u9152\u5e97\u4e4b\u4e00\uff08\u7ea6 800\uff5e1500 \u6b27\u5143/\u665a\uff09\u3002\n- Hotel Spadari al Duomo \u4f4d\u7f6e\u6781\u4f73\uff0c f9\u6bd4\u3002\n- **\u5e72\u6865\u8df3\u86a4\u5e02\u573a**\uff1a\u6b65\u884c\u7ea6 15 \u5206\u949f\u53ef\u8fbe\u3002\u8fd9\u91cc\u662f\u5916\u9ad8\u52a0\u7d22\u6700\u5927\u7684\u9732\u5929\u65e7\u8d27\u5e02\u573a\uff0c\u51fa\u552e\u82cf\u8054\u65f6\u671f\u7684\u52cb\u7ae0\u3001\u8001\u5f0f\u671b\u8fdc\u955c\u3001\u6ce2\u65af\u5730\u6bef\u3001\u9ad8\u52a0\u7d22\u53e4\u8463\u5315\u9996\u3001\u82cf\u8054\u590d\u53e4\u76f8\u673a\u7b49\u3002\n- **\u6dd8\u8d27\u5efa\u8bae**\uff1a\u4e1c\u897f\u771f\u5047\u53c2\u534a\uff0c\u4f46\u6c1b\u56f4\u6781\u597d\u3002\u4e70\u51e0\u679a\u82cf\u8054\u5fbd\u7ae0\uff085\uff5e20 GEL\uff09\u6216\u4e00\u6761\u624b\u5de5\u7f8a\u6bdb\u56f4\u5dfe\u4f5c\u4e3a\u7eaa\u5ff5\u5373\u53ef\u3002\u5927\u80c6\u780d\u4ef7\uff0c\u901a\u5e38\u62a5\u4ef7\u7684 60%\uff5e70% \u662f\u5408\u7406\u6210\u4ea4\u4ef7\u3002\n\n### \u665a\u9910\n\u63a8\u8350 **Funicular Restaurant Complex**\uff08\u7f06\u8f66\u5c71\u9876\u9910\u5385\uff09\u6216\u8001\u57ce\u5185\u7684 **Iasamani\u3002\n- **\u5c71\u9876\u9910\u5385**\uff1a\u4e58\u5750\u7b2c\u6bd4\u5229\u65af oldest funicular\uff08\u59cb\u5efa\u4e8e 1905 \u5e74\uff09\u4e0a Mtatsminda \u5c71\uff0c\u5728\u5c71\u9876\u4fef\u77b0\u5168\u57ce\u591c\u666f\u3002\u9910\u5385\u672c\u8eab\u4e2d\u89c4\u4e2d\u77e9\uff0c\u4f46\u666f\u8272\u503c\u56de\u7968\u4ef7\u3002\n- **Iasamani**\uff1a\u5f53\u5730\u4eba\u63a8\u8350\u7684\u4f20\u7edf\u9910\u5385\uff0c\u70e4\u8089\uff08Mtsvadi\uff09\u548c\u70e4\u9e21\u975e\u5e38\u51fa\u8272\uff0c\u4eba\u5747\u7ea6 60\uff5e90 \u5143\u3002\n\n### \u665a\u95f4\n\u5982\u679c\u7cbe\u529b\u5c1a\u5b58\uff0c\u53ef\u4ee5\u53bb **Vino Underground** \u6216 **8000 Vintages** \u559d\u4e00\u676f\u3002\u8fd9\u4e24\u4e2a\u90fd\u662f\u8461\u8404\u9152\u5427\uff0c\u53ef\u4ee5\u6309\u676f\u70b9\u9152\uff0c\u4f8d\u9152\u5e08\u4f1a\u8010\u5fc3\u8bb2\u89e3 Qvevri \u9676\u7f50\u917f\u9152\u6cd5\u7684\u5386\u53f2\u3002\n\n---\n\n# D3\uff5c\u7b2c\u6bd4\u5229\u65af \u2192 \u897f\u683c\u7eb3\u5409\uff08Sighnaghi\uff09\n**\u4e3b\u9898\uff1a\u7ea2\u9152\u5c0f\u9547\u4e0e\u57ce\u5899\u65e5\u843d**\n\n![\u897f\u683c\u7eb3\u5409\u8001\u57ce\u4e0e\u57ce\u5899](./E_\u683c\u9c81\u5409\u4e9a/images/sighnaghi_walls.jpg)\n*\u897f\u683c\u7eb3\u5409\u873f\u8712\u7684\u57ce\u5899\u4e0e\u963f\u62c9\u624e\u5c3c\u5c71\u8c37*\n\n## \u4ea4\u901a\n- **\u65b9\u5f0f**\uff1a**\u81ea\u9a7e\u53d6\u8f66**\u3002\n- **\u53d6\u8f66\u70b9**\uff1a\u7b2c\u6bd4\u5229\u65af\u5e02\u533a\u6216\u673a\u573a\uff08\u63a8\u8350\u63d0\u524d\u5728 Localrent \u6216\u56fd\u9645\u5e73\u53f0\u9884\u8ba2\uff09\u3002\u8f66\u578b\u5efa\u8bae **SUV/\u8de8\u754c\u8f66**\uff08\u5982\u4e30\u7530 RAV4\u3001\u65e5\u4ea7 X-Trail\uff09\uff0c\u56e0\u4e3a\u540e\u7eed\u5c71\u8def\u548c\u788e\u77f3\u8def\u8f83\u591a\u3002\n- **\u8def\u7ebf**\uff1a\u6cbf E60/SH42 \u516c\u8def\u5411\u4e1c\uff0c\u8f66\u7a0b\u7ea6 1.5\uff5e2 \u5c0f\u65f6\u3002\n- **\u8ddd\u79bb**\uff1a\u7ea6 110 \u516c\u91cc\u3002\n- **\u9a7e\u9a76\u63d0\u793a**\uff1a\u683c\u9c81\u5409\u4e9a\u4e3a**\u53f3\u8235\u9a7e\u9a76**\uff0c\u4e0e\u4e2d\u56fd\u76f8\u540c\uff0c\u4e0a\u624b\u65e0\u538b\u529b\u3002\u4f46\u5f53\u5730\u53f8\u673a\u5f00\u8f66\u8f83\u731b\uff0c\u8d85\u8f66\u9891\u7e41\uff0c\u4fdd\u6301 defensive driving\u3002\n\n## \u4f4f\u5bbf\n**\u63a8\u8350\uff1aHotel BelleVue \u6216\u8001\u57ce\u5185\u7684\u7cbe\u54c1\u6c11\u5bbf**\n- **BelleVue**\uff1a\u4f4d\u4e8e\u57ce\u5899\u8fb9\uff0c\u9732\u53f0\u6b63\u5bf9\u963f\u62c9\u624e\u5c3c\u5c71\u8c37\uff08Alazani Valley\uff09\u548c\u9ad8\u52a0\u7d22\u5c71\u8109\uff0c\u662f\u897f\u683c\u7eb3\u5409\u666f\u89c2\u6700\u597d\u7684\u9152\u5e97\u4e4b\u4e00\u3002\u7ea6 250\uff5e450 GEL/\u665a\u3002\n- **\u6c11\u5bbf**\uff1a\u5f88\u591a\u5f53\u5730\u4eba\u5bb6\u628a\u8001\u5b85\u6539\u6210\u4e86\u5e26\u9732\u53f0\u7684 guesthouse\uff0c\u8001\u677f\u901a\u5e38\u4f1a\u514d\u8d39\u62ff\u51fa\u4e00\u74f6\u81ea\u5bb6\u917f\u7684 Saperavi \u7ea2\u9152\u62db\u5f85\u5ba2\u4eba\u3002\u7ea6 100\uff5e200 GEL/\u665a\u3002\n\n## \u6d3b\u52a8\n\n### \u4e0b\u5348\uff1a\u57ce\u5899\u6f2b\u6b65\n\u897f\u683c\u7eb3\u5409\u88ab\u79f0\u4e3a\"\u9ad8\u52a0\u7d22\u7684\u6258\u65af\u5361\u7eb3\"\uff0c\u4e5f\u662f\u683c\u9c81\u5409\u4e9a\u6700\u6d6a\u6f2b\u7684\u57ce\u9547\u4e4b\u4e00\u3002\n\n- **\u57ce\u5899**\uff1a18 \u4e16\u7eaa\u4fee\u5efa\u7684\u9632\u5fa1\u57ce\u5899\u81f3\u4eca\u4fdd\u5b58\u5b8c\u597d\uff0c\u603b\u957f\u7ea6 4 \u516c\u91cc\uff0c\u6709 20 \u591a\u5ea7\u5854\u697c\u3002\u53ef\u4ee5\u6cbf\u7740\u57ce\u5899\u9876\u90e8\u884c\u8d70\uff0c\u4fef\u77b0\u7ea2\u8272\u5c4b\u9876\u7684\u5c0f\u9547\u3001\u7eff\u8272\u7684\u8461\u8404\u56ed\u5c71\u8c37\u548c\u8fdc\u5904\u4e91\u96fe\u7f2d\u7ed5\u7684\u9ad8\u52a0\u7d22\u5c71\u3002\n- **\u5c0f\u9547\u8857\u5df7**\uff1a\u77f3\u677f\u8def\u3001\u6728\u8d28\u9633\u53f0\u3001\u722c\u6ee1\u7d2b\u85e4\u7684\u62f1\u95e8\uff0c\u975e\u5e38\u9002\u5408\u7275\u624b\u6f2b\u6b65\u548c\u62cd\u7167\u3002\n\n### Bodbe \u5723\u59ae\u8bfa\u5973\u4fee\u9053\u9662\n- **\u4f4d\u7f6e**\uff1a\u5c0f\u9547\u4e1c\u5357\u7ea6 2 \u516c\u91cc\uff0c\u5f00\u8f66 5 \u5206\u949f\u6216\u6b65\u884c 25 \u5206\u949f\u3002\n- **\u770b\u70b9**\uff1a\u8fd9\u662f\u683c\u9c81\u5409\u4e9a\u6700\u91cd\u8981\u7684\u57fa\u7763\u6559\u5723\u5730\u4e4b\u4e00\uff0c\u4f20\u8bf4 4 \u4e16\u7eaa\u65f6\u5c06\u57fa\u7763\u6559\u4f20\u5165\u683c\u9c81\u5409\u4e9a\u7684\u5723\u59ae\u8bfa\u4fee\u5973\u5b89\u846c\u4e8e\u6b64\u3002\u4fee\u9053\u9662\u88ab\u7cbe\u5fc3\u4fee\u526a\u7684\u67cf\u6811\u548c\u73ab\u7470\u82b1\u4e1b\u73af\u7ed5\uff0c\u9732\u53f0\u53ef\u4ee5\u4fef\u77b0\u6574\u4e2a\u963f\u62c9\u624e\u5c3c\u5c71\u8c37\u3002\n- **\u62cd\u7167**\uff1a\u4fee\u9053\u9662\u5916\u7684\u89c2\u666f\u53f0\u662f\u62cd\u6444\u5c71\u8c37\u5168\u666f\u7684\u7ecf\u5178\u673a\u4f4d\u3002\n\n### \u508d\u665a\uff1a\u54c1\u9152\u4f53\u9a8c\n\u897f\u683c\u7eb3\u5409\u6240\u5728\u7684\u5361\u8d6b\u5b63\uff08Kakheti\uff09\u5730\u533a\u662f\u683c\u9c81\u5409\u4e9a\u6700\u6838\u5fc3\u7684\u8461\u8404\u9152\u4ea7\u533a\u3002\n\n- **\u63a8\u8350\u9152\u5e84**\uff1a**Pheasant's Tears\uff08\u96c9\u9e21\u4e4b\u6cea\uff09** \u6216 **Okro's Wines**\uff0c\u4e24\u8005\u90fd\u4ee5\u81ea\u7136\u9152\u548c Qvevri \u9676\u7f50\u917f\u9020\u95fb\u540d\u3002\n- **\u4f53\u9a8c**\uff1a\u901a\u5e38 20\uff5e40 GEL/\u4eba\uff08\u7ea6 55\uff5e110 \u5143\uff09\u53ef\u4ee5\u54c1\u9274 3\uff5e5 \u6b3e\u9152\uff0c\u5305\u62ec\u7528\u9676\u7f50\u57cb\u5728\u5730\u5e95\u53d1\u9175\u534a\u5e74\u7684\u7425\u73c0\u9152\uff08Amber Wine\uff09\u548c\u6d53\u90c1\u9971\u6ee1\u7684\u7ea2\u8461\u8404\u54c1\u79cd Saperavi\u3002\n- **\u5c0f\u8d34\u58eb**\uff1a\u54c1\u9152\u65f6\u4e0d\u8981\u7a7a\u8179\uff0c\u9152\u5e84\u901a\u5e38\u4f1a\u914d\u5976\u916a\u3001\u9762\u5305\u548c\u6838\u6843\u9171\u3002\n\n### \u665a\u9910\n\u63a8\u8350 **Okro's Restaurant** \u6216\u57ce\u5899\u8fb9\u7684 **Cafe Medea**\u3002\u83dc\u54c1\u4ee5\u5f53\u5730\u519c\u5bb6\u83dc\u4e3a\u4e3b\uff0c\u70e4\u732a\u8089\u3001\u7096\u8c46\u5b50\uff08Lobio\uff09\u3001\u5976\u916a\u997c\u90fd\u662f\u62db\u724c\u3002\u4eba\u5747\u7ea6 60\uff5e100 \u5143\u3002\n\n---\n\n# D4\uff5c\u897f\u683c\u7eb3\u5409 \u2192 \u5361\u5179\u522b\u514b\u5c71\uff08Kazbegi\uff09\n**\u4e3b\u9898\uff1a\u519b\u4e8b\u5927\u9053\u2014\u2014\u4e16\u754c\u4e0a\u6700\u7f8e\u7684\u516c\u8def\u4e4b\u4e00**\n\n![Ananuri\u8981\u585e](./E_\u683c\u9c81\u5409\u4e9a/images/ananuri_fortress.jpg)\n*Ananuri \u8981\u585e\u4fef\u77b0 Jinvali \u6c34\u5e93*\n\n## \u81ea\u9a7e\u8def\u7ebf\n\u8fd9\u4e00\u5929\u662f**\u5168\u7a0b\u81ea\u9a7e\u666f\u89c2\u6700\u9707\u64bc\u7684\u4e00\u5929**\u3002\u4f60\u4eec\u5c06\u6cbf\u7740\u8457\u540d\u7684 **\u4e54\u6cbb\u4e9a\u519b\u4e8b\u5927\u9053\uff08Georgian Military Highway\uff09** \u4ece\u4e1c\u5411\u897f\u7a7f\u8d8a\u5927\u9ad8\u52a0\u7d22\u5c71\u8109\u3002\n\n- **\u8def\u7ebf**\uff1a\u897f\u683c\u7eb3\u5409 \u2192 \u7b2c\u6bd4\u5229\u65af\uff08\u7ecf\u7ed5\u57ce\u9ad8\u901f\u7ed5\u8fc7\uff09\u2192 **Ananuri \u8981\u585e** \u2192 **\u4fc4\u683c\u53cb\u8c0a\u7eaa\u5ff5\u7891\uff08Russia-Georgia Friendship Monument\uff09** \u2192 **\u53e4\u9053\u91cc\uff08Gudauri\uff09** \u2192 **\u65af\u7279\u6f58\u8328\u660e\u8fbe\uff08Stepantsminda\uff0c\u5373\u5361\u5179\u522b\u514b\u5c71\u9547\uff09**\u3002\n- **\u8ddd\u79bb**\uff1a\u7ea6 160 \u516c\u91cc\uff08\u897f\u683c\u7eb3\u5409\u5230\u7b2c\u6bd4\u5229\u65af 110 km\uff0c\u7b2c\u6bd4\u5229\u65af\u5230\u5361\u5179\u522b\u514b\u5c71\u7ea6 150 km\uff0c\u5408\u8ba1\u7ea6 260 km\uff0c\u4f46\u6263\u9664\u7ed5\u57ce\u91cd\u590d\u6bb5\uff0c\u5b9e\u9645\u9a7e\u9a76\u51c0\u91cc\u7a0b\u7ea6 160 km\uff09\u3002\n- **\u5f00\u8f66\u65f6\u95f4**\uff1a\u7ea6 4.5\uff5e5.5 \u5c0f\u65f6\uff08\u542b\u591a\u6b21\u505c\u8f66\u62cd\u7167\u4f11\u606f\uff09\u3002\n\n> **\u8def\u51b5\u63d0\u793a**\uff1a\u519b\u4e8b\u5927\u9053\u662f\u683c\u9c81\u5409\u4e9a\u6700\u91cd\u8981\u7684\u56fd\u9053\uff08E117\uff09\uff0c\u5168\u7a0b\u94fa\u88c5\u8def\u9762\uff0c\u4f46\u5f2f\u9053\u6781\u591a\uff0c\u5c24\u5176\u662f Zhinvali \u5230 Gudauri \u6bb5\u3002\u590f\u5b63\u5076\u6709\u843d\u77f3\uff0c\u6ce8\u610f\u8def\u6807\u63d0\u793a\u3002\u5927\u8d27\u8f66\u548c\u6e38\u5ba2\u5927\u5df4\u8f83\u591a\uff0c\u8d85\u8f66\u9700\u8c28\u614e\u3002\n\n## \u9014\u4e2d\u4eae\u70b9\n\n### Ananuri \u8981\u585e\n- **\u4f4d\u7f6e**\uff1a\u8ddd\u7b2c\u6bd4\u5229\u65af\u7ea6 70 \u516c\u91cc\uff0cJinvali \u6c34\u5e93\u5317\u5cb8\u3002\n- **\u770b\u70b9**\uff1a\u8fd9\u662f\u683c\u9c81\u5409\u4e9a\u4e0a\u955c\u7387\u6700\u9ad8\u7684\u4e2d\u4e16\u7eaa\u8981\u585e\u4e4b\u4e00\uff0c\u4e24\u5ea7\u6559\u5802\u548c\u4e00\u5ea7\u949f\u697c\u77d7\u7acb\u5728\u6c34\u5e93\u534a\u5c9b\u4e0a\u3002\u6559\u5802\u5916\u5899\u4e0a\u523b\u6709\u7cbe\u7f8e\u7684\u5341\u5b57\u67b6\u6d6e\u96d5\u548c\u683c\u9c81\u5409\u4e9a\u6587\u5b57\u3002\n- **\u62cd\u7167**\uff1a\u6c34\u5e93\u5927\u575d\u662f\u62cd\u6444\u8981\u585e\u5012\u5f71\u7684\u7ecf\u5178\u673a\u4f4d\u3002\u5efa\u8bae\u505c\u7559 30\uff5e45 \u5206\u949f\u3002\n\n### \u4fc4\u683c\u53cb\u8c0a\u7eaa\u5ff5\u7891\n- **\u4f4d\u7f6e**\uff1a\u4f4d\u4e8e\u519b\u4e8b\u5927\u9053\u6d77\u62d4\u6700\u9ad8\u70b9\u9644\u8fd1\uff08\u7ea6 2384 \u7c73\uff09\uff0c\u53e4\u9053\u91cc\u4ee5\u5317\u3002\n- **\u770b\u70b9**\uff1a\u8fd9\u5ea7\u5de8\u5927\u7684\u73af\u5f62\u74f7\u7816\u58c1\u753b\u5efa\u4e8e 1983 \u5e74\uff0c\u7eaa\u5ff5\u4fc4\u683c\u4e24\u56fd 200 \u5e74\u7684\"\u53cb\u8c0a\"\u3002\u867d\u7136\u4e24\u56fd\u5173\u7cfb\u5982\u4eca\u590d\u6742\uff0c\u4f46\u7eaa\u5ff5\u7891\u672c\u8eab\u7684\u82cf\u8054\u65f6\u671f\u827a\u672f\u98ce\u683c\u548c\u4fef\u77b0\u5c71\u8c37\u7684\u4f4d\u7f6e\u4f7f\u5176\u6210\u4e3a\u5fc5\u505c\u666f\u70b9\u3002\n- **\u4f53\u9a8c**\uff1a\u7ad9\u5728\u7eaa\u5ff5\u7891\u5185\u4fa7\u7684\u89c2\u666f\u53f0\u4e0a\uff0c\u53ef\u4ee5\u4fef\u77b0 **Devil's Valley\uff08\u9b54\u9b3c\u5ce1\u8c37\uff09**\uff0c\u5de8\u5927\u7684 V \u578b\u5c71\u8c37\u4e24\u4fa7\u662f\u8fde\u7ef5\u7684\u96ea\u5c71\u3002\n\n![\u4fc4\u683c\u53cb\u8c0a\u7eaa\u5ff5\u7891](./E_\u683c\u9c81\u5409\u4e9a/images/gudauri_monument.jpg)\n*\u4fc4\u683c\u53cb\u8c0a\u7eaa\u5ff5\u7891\u4fef\u77b0\u9ad8\u52a0\u7d22\u5c71\u8c37*\n\n## \u4f4f\u5bbf\n**\u63a8\u8350\uff1aRooms Hotel Kazbegi**\n- \u8fd9\u662f\u5361\u5179\u522b\u514b\u5c71\u4e43\u81f3\u683c\u9c81\u5409\u4e9a\u6700\u8457\u540d\u7684\u8bbe\u8ba1\u9152\u5e97\uff0c\u7531\u82cf\u8054\u65f6\u4ee3\u7684\u6e38\u5ba2\u4e2d\u5fc3\u6539\u9020\u800c\u6210\u3002\u51e0\u4e4e\u6bcf\u4e00\u95f4\u623f\u90fd\u6b63\u5bf9\u5361\u5179\u522b\u514b\u5c71\uff08Mt. Kazbek\uff0c\u6d77\u62d4 5047 \u7c73\uff09\u3002\n- **\u4ef7\u683c**\uff1a\u7ea6 400\uff5e700 GEL/\u665a\uff08\u7ea6 1100\uff5e1900 \u5143\uff09\u3002\u65fa\u5b63\uff086\uff5e9 \u6708\uff09\u9700\u63d0\u524d 2\uff5e3 \u4e2a\u6708\u9884\u8ba2\u3002\n- **\u5907\u9009**\uff1a**Stancia Kazbegi** \u6216\u9547\u4e0a\u7684\u6c11\u5bbf\uff0c\u7ea6 150\uff5e300 GEL/\u665a\uff0c\u90e8\u5206\u623f\u95f4\u4e5f\u6709\u5c71\u666f\u3002\n\n## \u665a\u9910\n- **Rooms Hotel \u9910\u5385**\uff1a\u83dc\u54c1\u8d28\u91cf\u5728\u7ebf\uff0c\u666f\u89c2\u4e00\u6d41\uff0c\u4f46\u4ef7\u683c\u76f8\u5bf9\u8f83\u9ad8\uff08\u4eba\u5747\u7ea6 120\uff5e180 \u5143\uff09\u3002\n- **\u5f53\u5730\u9009\u62e9**\uff1a\u9547\u4e0a\u6709\u4e0d\u5c11\u5bb6\u5ead\u9910\u5385\uff0c\u63a8\u8350\u5c1d\u8bd5 **Khinkali \u548c Shashlik\uff08\u9ad8\u52a0\u7d22\u70e4\u8089\u4e32\uff09**\uff0c\u4eba\u5747\u7ea6 50\uff5e80 \u5143\u3002\n\n## \u665a\u95f4\n\u5982\u679c\u5929\u6c14\u6674\u6717\uff0c\u665a\u4e0a\u8d70\u51fa\u9152\u5e97\u62ac\u5934\u5c31\u80fd\u770b\u5230\u6f2b\u5929\u7e41\u661f\u2014\u2014\u8fd9\u91cc\u6d77\u62d4\u7ea6 1700 \u7c73\uff0c\u5149\u6c61\u67d3\u6781\u4f4e\u3002\u5361\u5179\u522b\u514b\u5c71\u7684\u91d1\u5b57\u5854\u5f62\u5c71\u5cf0\u4f1a\u4e00\u76f4\u5728\u89c6\u91ce\u91cc\uff0c\u5728\u6708\u5149\u4e0b\u6cdb\u7740\u51b7\u51b7\u7684\u84dd\u5149\u3002\n\n---\n\n# D5\uff5c\u5361\u5179\u522b\u514b\u5c71\uff08Kazbegi\uff09\n**\u4e3b\u9898\uff1a\u79bb\u5929\u5802\u6700\u8fd1\u7684\u6559\u5802**\n\n![\u5723\u4e09\u4e00\u6559\u5802\u4e0e\u5361\u5179\u522b\u514b\u5c71](./E_\u683c\u9c81\u5409\u4e9a/images/gergeti_church.jpg)\n*Gergeti Trinity Church \u4e0e\u80cc\u540e\u7684\u5361\u5179\u522b\u514b\u4e3b\u5cf0*\n\n\u8fd9\u4e00\u5929\u662f\u6574\u4e2a\u884c\u7a0b\u7684**\u60c5\u611f\u9ad8\u6f6e**\u3002\u6ca1\u6709\u957f\u9014\u9a7e\u9a76\uff0c\u53ea\u6709\u4e00\u5ea7\u88ab\u96ea\u5c71\u73af\u62b1\u7684\u6559\u5802\u548c\u4e00\u6bb5\u4ee4\u4eba\u96be\u5fd8\u7684\u5f92\u6b65\u3002\n\n## \u4e0a\u5348\uff1aGergeti Trinity Church\uff08\u5723\u4e09\u4e00\u6559\u5802\uff09\n\n\u8fd9\u5ea7 14 \u4e16\u7eaa\u7684\u6559\u5802\u5b64\u72ec\u5730\u5750\u843d\u5728\u6d77\u62d4 2170 \u7c73\u7684\u5c71\u810a\u4e0a\uff0c\u80cc\u540e\u5c31\u662f\u6d77\u62d4 5047 \u7c73\u7684\u5361\u5179\u522b\u514b\u5c71\u3002\u5b83\u88ab\u5f53\u5730\u4eba\u79f0\u4e3a\"\u79bb\u5929\u5802\u6700\u8fd1\u7684\u6559\u5802\"\uff0c\u4e5f\u662f\u683c\u9c81\u5409\u4e9a\u6700\u5177\u6807\u5fd7\u6027\u7684\u753b\u9762\u3002\n\n### \u4ea4\u901a\n- **\u8d8a\u91ce\u8f66**\uff1a\u4ece\u9547\u4e0a\u5305\u4e00\u8f86\u56db\u9a71\u8d8a\u91ce\u8f66\uff08\u5f53\u5730\u79f0\u4e3a\"\u5409\u666e\"\uff09\uff0c\u7ea6 80\uff5e120 GEL/\u8f66\uff08\u5f80\u8fd4\uff0c\u53ef\u4e58 4 \u4eba\uff09\uff0c\u8f66\u7a0b 30\uff5e40 \u5206\u949f\u3002\u5c71\u8def\u5d0e\u5c96\u9661\u5ced\uff0c\u666e\u901a\u8f7f\u8f66\u65e0\u6cd5\u901a\u884c\u3002\n- **\u5f92\u6b65**\uff1a\u5982\u679c\u4f60\u4eec\u4f53\u529b\u5145\u6c9b\uff0c\u53ef\u4ee5\u4ece\u9547\u4e0a\u5f92\u6b65\u4e0a\u5c71\uff0c\u5355\u7a0b\u7ea6 8\uff5e9 \u516c\u91cc\uff0c\u722c\u5347\u7ea6 500 \u7c73\uff0c\u8017\u65f6 2.5\uff5e3.5 \u5c0f\u65f6\u3002\u4e0b\u5c71\u53ef\u4ee5\u5f92\u6b65\u6216\u5305\u8f66\u3002\n\n### \u4f53\u9a8c\n- \u5f53\u8d8a\u91ce\u8f66\u5728\u6700\u540e\u4e00\u4e2a\u5f2f\u9053\u8f6c\u8fc7\uff0c\u6559\u5802\u7684\u7070\u8272\u77f3\u5899\u7a81\u7136\u51fa\u73b0\u5728\u773c\u524d\uff0c\u800c\u80cc\u540e\u7684\u5361\u5179\u522b\u514b\u5c71\u5982\u540c\u4e00\u5ea7\u5de8\u5927\u7684\u91d1\u5b57\u5854\u76f4\u6307\u5929\u7a7a\u2014\u2014\u8fd9\u4e2a\u77ac\u95f4\uff0c\u4f60\u4eec\u4f1a\u7406\u89e3\u4e3a\u4ec0\u4e48\u8fd9\u91cc\u88ab\u79f0\u4e3a\"\u9ad8\u52a0\u7d22\u7684\u795e\u5723\u4e4b\u5fc3\"\u3002\n- \u6559\u5802\u5185\u90e8\u5c0f\u800c\u6734\u7d20\uff0c\u4f46\u5916\u90e8\u7684\u4f4d\u7f6e\u548c\u666f\u89c2\u65e0\u4e0e\u4f26\u6bd4\u3002 circumambulate\uff08\u7ed5\u884c\uff09\u6559\u5802\u4e00\u5468\uff0c\u6bcf\u4e00\u4e2a\u89d2\u5ea6\u90fd\u662f\u4e0d\u540c\u7684\u96ea\u5c71\u6784\u56fe\u3002\n- **\u62cd\u7167**\uff1a\u6e05\u6668 8:00-10:00 \u5149\u7ebf\u6700\u4f73\uff0c\u4e91\u96fe\u8f83\u5c11\u3002\u590f\u5b63\u4e0a\u5348\u6e38\u5ba2\u8f83\u591a\uff0c\u5efa\u8bae\u5c3d\u91cf\u65e9\u51fa\u53d1\u3002\n\n## \u4e0b\u5348\uff1a\u96ea\u5c71\u5f92\u6b65\u6216\u4f11\u95f2\n\n### \u9009\u9879 A\uff1aGergeti Glacier \u5f92\u6b65\uff08\u9ad8\u96be\u5ea6\uff09\n- \u4ece\u6559\u5802\u7ee7\u7eed\u5411\u5c71\u4e0a\u8d70\uff0c\u53ef\u4ee5\u62b5\u8fbe Gergeti \u51b0\u5ddd\u811a\u4e0b\u3002\u5355\u7a0b\u7ea6 6\uff5e7 \u516c\u91cc\uff0c\u722c\u5347\u7ea6 800 \u7c73\uff0c\u5f80\u8fd4\u9700 5\uff5e6 \u5c0f\u65f6\u3002\u8def\u51b5\u4e3a\u788e\u77f3\u5761\u548c\u9ad8\u5c71\u8349\u7538\uff0c\u9700\u8981\u4e00\u5b9a\u4f53\u529b\u3002\n- \u666f\u89c2\uff1a\u6cbf\u9014\u53ef\u4ee5\u8fd1\u8ddd\u79bb\u89c2\u8d4f\u5361\u5179\u522b\u514b\u5c71\u7684\u51b0\u5ddd\u820c\u3001\u9ad8\u5c71\u6e56\u6cca\u548c\u6210\u7fa4\u7684\u91ce\u82b1\u3002\n\n### \u9009\u9879 B\uff1aArsha \u7011\u5e03\u8f7b\u5f92\u6b65\uff08\u8f7b\u677e\uff09\n- \u4ece\u9547\u4e0a\u5411\u4e1c\u5317\u65b9\u5411\u9a7e\u8f66\u7ea6 10 \u5206\u949f\uff0c\u6709\u901a\u5f80 Arsha \u7011\u5e03\u7684\u6b65\u9053\u3002\u5f80\u8fd4\u7ea6 4 \u516c\u91cc\uff0c\u8def\u51b5\u5e73\u7f13\uff0c\u6cbf\u9014\u662f\u5c0f\u6eaa\u548c\u68ee\u6797\u3002\n- \u9002\u5408\u4e0d\u60f3\u592a\u7d2f\u7684\u5a5a\u5047\u8282\u594f\u3002\n\n### \u9009\u9879 C\uff1a\u5728\u9152\u5e97\u53d1\u5446\n- \u5982\u679c\u4f60\u4eec\u8ba2\u5230\u4e86 Rooms Hotel\uff0c\u4e0b\u5348\u6700\u6d6a\u6f2b\u7684\u9009\u62e9\u5c31\u662f\u5750\u5728\u9732\u53f0\u4e0a\uff0c\u70b9\u4e00\u676f\u5496\u5561\u6216\u7ea2\u9152\uff0c\u770b\u7740\u4e91\u5728\u5361\u5179\u522b\u514b\u5c71\u9876\u6d41\u52a8\u3002\u8fd9\u79cd\"\u4f4f\u8fdb\u98ce\u666f\u91cc\"\u7684\u677e\u5f1b\u611f\uff0c\u672c\u8eab\u5c31\u662f\u5a5a\u5047\u7684\u610f\u4e49\u3002\n\n## \u665a\u9910\n\u63a8\u8350\u5728\u9152\u5e97\u6216\u9547\u4e0a\u7684\u4e00\u5bb6\u5bb6\u5ead\u9910\u5385\u5403\u4e00\u987f **\u683c\u9c81\u5409\u4e9a\u4f20\u7edf\u5927\u9910**\u3002\u4f5c\u4e3a\u884c\u7a0b\u7684\u9ad8\u6f6e\u65e5\uff0c\u53ef\u4ee5\u5f00\u4e00\u74f6\u597d\u4e00\u70b9\u7684 Saperavi \u7ea2\u9152\uff0c\u6162\u6162\u5403 Khachapuri\u3001\u70e4\u8304\u5b50\u548c\u70e4\u8089\u3002\n\n---\n\n# D6\uff5c\u5361\u5179\u522b\u514b\u5c71 \u2192 \u5e93\u5854\u4f0a\u897f\uff08Kutaisi\uff09\n**\u4e3b\u9898\uff1a\u4ece\u96ea\u5c71\u5230\u4e16\u754c\u9057\u4ea7\u6559\u5802**\n\n![\u5df4\u683c\u62c9\u7279\u5927\u6559\u5802](./E_\u683c\u9c81\u5409\u4e9a/images/bagrati_cathedral.jpg)\n*\u5e93\u5854\u4f0a\u897f\u7684\u5df4\u683c\u62c9\u7279\u5927\u6559\u5802\u4fef\u77b0\u91cc\u5965\u5c3c\u6cb3*\n\n## \u81ea\u9a7e\u8def\u7ebf\n- **\u8def\u7ebf**\uff1a\u65af\u7279\u6f58\u8328\u660e\u8fbe \u2192 \u53e4\u9053\u91cc \u2192 **\u4fc4\u683c\u53cb\u8c0a\u7eaa\u5ff5\u7891**\uff08\u5982\u6628\u5929\u6ca1\u505c\u591f\u53ef\u8865\u505c\uff09\u2192 \u6cbf\u519b\u4e8b\u5927\u9053\u8fd4\u56de\u7b2c\u6bd4\u5229\u65af\u65b9\u5411 \u2192 \u5728 **Mtskheta\uff08\u59c6\u8328\u8d6b\u5854\uff09** \u9644\u8fd1\u8f6c\u5165 **S1 \u9ad8\u901f\u516c\u8def** \u5411\u897f \u2192 **\u5e93\u5854\u4f0a\u897f\uff08Kutaisi\uff09**\u3002\n- **\u8ddd\u79bb**\uff1a\u7ea6 190 \u516c\u91cc\u3002\n- **\u5f00\u8f66\u65f6\u95f4**\uff1a\u7ea6 4\uff5e4.5 \u5c0f\u65f6\u3002\n- **\u5efa\u8bae**\uff1a\u65e9\u4e0a 09:00 \u524d\u51fa\u53d1\uff0c\u4e2d\u5348\u524d\u540e\u53ef\u4ee5\u62b5\u8fbe\u5e93\u5854\u4f0a\u897f\u3002\n\n## \u6d3b\u52a8\n\n### \u4e0b\u5348\uff1a\u5df4\u683c\u62c9\u7279\u5927\u6559\u5802\uff08Bagrati Cathedral\uff09\n- **\u4f4d\u7f6e**\uff1a\u5e93\u5854\u4f0a\u897f\u5e02\u4e2d\u5fc3\u7684 Ukimerioni \u5c71\u4e0a\u3002\n- **\u770b\u70b9**\uff1a\u5efa\u4e8e 11 \u4e16\u7eaa\uff0c\u662f\u683c\u9c81\u5409\u4e9a\u4e2d\u4e16\u7eaa\u5efa\u7b51\u7684\u5dc5\u5cf0\u4e4b\u4f5c\uff0c\u4e5f\u662f\u8054\u5408\u56fd\u6559\u79d1\u6587\u7ec4\u7ec7\u4e16\u754c\u9057\u4ea7\u3002\u5de8\u5927\u7684\u4e2d\u592e\u7a79\u9876\u548c\u5341\u5b57\u5f62\u5e03\u5c40\u4ee3\u8868\u4e86\u683c\u9c81\u5409\u4e9a\"\u9ec4\u91d1\u65f6\u4ee3\"\u7684\u5b97\u6559\u827a\u672f\u3002\n- **\u62cd\u7167**\uff1a\u7ad9\u5728\u6559\u5802\u5e73\u53f0\u4e0a\u53ef\u4ee5\u4fef\u77b0\u6574\u4e2a\u5e93\u5854\u4f0a\u897f\u57ce\u548c\u91cc\u5965\u5c3c\u6cb3\uff08Rioni River\uff09\u3002\u508d\u665a\u7684\u6696\u5149\u4f1a\u8ba9\u6559\u5802\u7684\u77f3\u5899\u5448\u73b0\u51fa\u91d1\u9ec4\u8272\u3002\n\n### \u683c\u62c9\u7279\u4fee\u9053\u9662\uff08Gelati Monastery\uff09\n- **\u4f4d\u7f6e**\uff1a\u5e02\u533a\u4e1c\u5317\u7ea6 10 \u516c\u91cc\uff0c\u5f00\u8f66 15 \u5206\u949f\u3002\n- **\u770b\u70b9**\uff1a\u7531 12 \u4e16\u7eaa\u7684\u5927\u536b\u56db\u4e16\"\u5efa\u56fd\u8005\"\u521b\u7acb\uff0c\u4e0d\u4ec5\u662f\u4fee\u9053\u9662\uff0c\u8fd8\u662f\u5f53\u65f6\u683c\u9c81\u5409\u4e9a\u6700\u9ad8\u5b66\u5e9c\u3002\u6559\u5802\u5185\u90e8\u4fdd\u5b58\u7740\u5927\u91cf\u7cbe\u7f8e\u7684\u62dc\u5360\u5ead\u98ce\u683c\u58c1\u753b\u548c\u9a6c\u8d5b\u514b\uff0c\u5305\u62ec\u5927\u536b\u56db\u4e16\u672c\u4eba\u7684\u8096\u50cf\u3002\n- **\u4f53\u9a8c**\uff1a\u4fee\u9053\u9662\u5750\u843d\u5728\u4e00\u4e2a\u7eff\u610f\u76ce\u7136\u7684\u5c71\u8c37\u4e2d\uff0c\u6c1b\u56f4\u6781\u5176\u5b81\u9759\u3002\u5982\u679c\u65f6\u95f4\u5141\u8bb8\uff0c\u5728\u8fd9\u91cc\u9759\u5750 15 \u5206\u949f\uff0c\u611f\u53d7\u5343\u5e74\u5386\u53f2\u7684\u6c89\u6dc0\u3002\n\n### \u79d1\u5c14\u57fa\u65af\u55b7\u6cc9\uff08Colchis Fountain\uff09\n- **\u4f4d\u7f6e**\uff1a\u5e93\u5854\u4f0a\u897f\u5e02\u4e2d\u5fc3\u7684\u4e2d\u592e\u5e7f\u573a\u3002\n- **\u770b\u70b9**\uff1a\u8fd9\u7ec4\u73b0\u4ee3\u55b7\u6cc9\u96d5\u5851\u4ee5\u53e4\u5e0c\u814a\u795e\u8bdd\u4e2d\u79d1\u5c14\u57fa\u65af\u738b\u56fd\u7684\u91d1\u7f8a\u6bdb\u4f20\u8bf4\u4e3a\u4e3b\u9898\uff0c\u9ad8\u5927\u7684\u91d1\u8272\u9a6c\u5339\u548c\u62bd\u8c61\u4eba\u7269\u5f62\u8c61\u975e\u5e38\u6709\u89c6\u89c9\u51b2\u51fb\u529b\u3002\u5468\u56f4\u662f\u5496\u5561\u9986\u548c\u6b65\u884c\u8857\uff0c\u9002\u5408\u508d\u665a\u6563\u6b65\u3002\n\n## \u4f4f\u5bbf\n**\u63a8\u8350\uff1aBest Western Kutaisi \u6216\u8001\u57ce\u7cbe\u54c1\u6c11\u5bbf**\n- **Best Western**\uff1a\u56fd\u9645\u8fde\u9501\uff0c\u5e72\u51c0\u8212\u9002\uff0c\u7ea6 150\uff5e250 GEL/\u665a\u3002\n- **\u6c11\u5bbf**\uff1a\u5e93\u5854\u4f0a\u897f\u8001\u57ce\u6709\u5f88\u591a\u5e26\u9662\u5b50\u7684\u5bb6\u5ead\u65c5\u9986\uff0c\u4e3b\u4eba\u901a\u5e38\u70ed\u60c5\u597d\u5ba2\uff0c\u7ea6 80\uff5e150 GEL/\u665a\u3002\n\n## \u665a\u9910\n\u63a8\u8350 **Palaty** \u6216 **Hot Coffee\u3002\u5e93\u5854\u4f0a\u897f\u7684\u9910\u996e\u6bd4\u7b2c\u6bd4\u5229\u65af\u66f4\u4fbf\u5b9c\uff0c\u4eba\u5747 40\uff5e70 \u5143\u5c31\u80fd\u5403\u5f97\u5f88\u4e30\u76db\u3002\u5c1d\u8bd5\u4e00\u4e0b **Imeretian Khachapuri\uff08\u5706\u5f62\u5976\u916a\u9762\u5305\uff09**\uff0c\u8fd9\u662f\u5e93\u5854\u4f0a\u897f\u6240\u5728\u5730\u533a\u7684\u7279\u8272\u505a\u6cd5\u3002\n\n---\n\n# D7\uff5c\u5e93\u5854\u4f0a\u897f \u2192 \u6885\u65af\u8482\u4e9a\uff08Mestia\uff09\n**\u4e3b\u9898\uff1a\u8fdb\u5165\u65af\u74e6\u6d85\u5b63\u7684\u7889\u697c\u738b\u56fd**\n\n![\u6885\u65af\u8482\u4e9a\u7889\u697c\u7fa4](./E_\u683c\u9c81\u5409\u4e9a/images/mestia_towers.jpg)\n*\u6885\u65af\u8482\u4e9a\u7684\u65af\u74e6\u6d85\u5b63\u4f20\u7edf\u7889\u697c\u4e0e\u96ea\u5c71\u80cc\u666f*\n\n## \u81ea\u9a7e\u8def\u7ebf\n\u8fd9\u4e00\u5929\u662f**\u5168\u7a0b\u9a7e\u9a76\u65f6\u95f4\u8f83\u957f\u7684\u4e00\u5929**\uff0c\u4f46\u98ce\u666f\u7684\u8f6c\u53d8\u4f1a\u8ba9\u4f60\u4eec\u89c9\u5f97\u6bcf\u4e00\u516c\u91cc\u90fd\u503c\u5f97\u3002\n\n- **\u8def\u7ebf**\uff1a\u5e93\u5854\u4f0a\u897f \u2192 **\u7956\u683c\u8fea\u8fea\uff08Zugdidi\uff09** \u2192 \u6cbf **Enguri \u6cb3\u8c37** \u8fdb\u5165\u5c71\u533a \u2192 **\u6885\u65af\u8482\u4e9a\uff08Mestia\uff09**\u3002\n- **\u8ddd\u79bb**\uff1a\u7ea6 240 \u516c\u91cc\u3002\n- **\u5f00\u8f66\u65f6\u95f4**\uff1a\u7ea6 5.5\uff5e6.5 \u5c0f\u65f6\u3002\n- **\u8def\u51b5\u63d0\u793a**\uff1a\u4ece\u7956\u683c\u8fea\u8fea\u5230\u6885\u65af\u8482\u4e9a\u7ea6 140 \u516c\u91cc\uff0c\u524d\u534a\u6bb5\u662f\u94fa\u88c5\u5c71\u8def\uff0c\u540e\u534a\u6bb5\u6cbf Enguri \u6cb3\u5ce1\u8c37\u7a7f\u884c\uff0c\u5f2f\u9053\u591a\u3001\u96a7\u9053\u591a\uff0c\u4f46\u6574\u4f53\u8def\u51b5\u826f\u597d\u3002\u590f\u5b63\u5076\u6709\u5c71\u4f53\u6ed1\u5761\uff0c\u6ce8\u610f\u8def\u6807\u3002\n\n> **\u9a7e\u9a76\u5efa\u8bae**\uff1a\u51fa\u53d1\u524d\u5728\u7956\u683c\u8fea\u8fea\u7684\u8d85\u5e02\u8865\u5145\u98df\u7269\u548c\u6c34\u3002\u6885\u65af\u8482\u4e9a\u662f\u5c71\u533a\u5c0f\u9547\uff0c\u7269\u8d44\u76f8\u5bf9\u6709\u9650\u4e14\u4ef7\u683c\u7565\u9ad8\u3002\n\n## \u6d3b\u52a8\n\n### \u4e0b\u5348/\u508d\u665a\uff1a\u62b5\u8fbe\u6885\u65af\u8482\u4e9a\n\u6885\u65af\u8482\u4e9a\u662f**\u65af\u74e6\u6d85\u5b63\uff08Svaneti\uff09**\u5730\u533a\u7684\u95e8\u6237\u5c0f\u9547\uff0c\u4e5f\u662f\u8054\u5408\u56fd\u6559\u79d1\u6587\u7ec4\u7ec7\u4e16\u754c\u9057\u4ea7\"\u4e0a\u65af\u74e6\u6d85\u5b63\"\u7684\u5165\u53e3\u3002\u8fd9\u91cc\u7684\u6bcf\u4e00\u5ea7\u6751\u843d\u90fd\u77d7\u7acb\u7740\u4e2d\u4e16\u7eaa\u9057\u7559\u4e0b\u6765\u7684\u9632\u5fa1\u7889\u697c\uff08Svan Towers\uff09\u3002\n\n- **\u5c0f\u9547\u6f2b\u6b65**\uff1a\u6885\u65af\u8482\u4e9a\u4e3b\u8857\u4e0d\u957f\uff0c\u4e24\u65c1\u662f\u6728\u5c4b\u3001\u7889\u697c\u548c\u6c11\u5bbf\u3002\u508d\u665a\u5728\u9547\u4e2d\u5fc3\u6563\u6b65\uff0c\u53ef\u4ee5\u770b\u5230\u6751\u6c11\u4eec\u5750\u5728\u7889\u697c\u4e0b\u804a\u5929\uff0c\u725b\u7f8a\u60a0\u95f2\u5730\u8d70\u8fc7\u77f3\u677f\u8def\u3002\n- ** ethnographic museum\uff08\u6c11\u65cf\u535a\u7269\u9986\uff09**\uff1a\u5982\u679c\u4e0b\u5348\u62b5\u8fbe\u8f83\u65e9\uff0c\u53ef\u4ee5\u53c2\u89c2\u9547\u4e0a\u7684\u65af\u74e6\u6d85\u5b63\u535a\u7269\u9986\uff0c\u4e86\u89e3\u8fd9\u4e2a\u4e0e\u4e16\u9694\u7edd\u5730\u533a\u7684\u5386\u53f2\u3001\u5b97\u6559\u827a\u672f\u548c\u751f\u6d3b\u65b9\u5f0f\u3002\n\n## \u4f4f\u5bbf\n**\u63a8\u8350\uff1aHotel Svaneti \u6216\u5f53\u5730 guesthouse**\n- **Hotel Svaneti**\uff1a\u9547\u4e0a\u6700\u8001\u724c\u7684\u5c71\u666f\u9152\u5e97\u4e4b\u4e00\uff0c\u90e8\u5206\u623f\u95f4\u6b63\u5bf9\u7889\u697c\u548c\u96ea\u5c71\u3002\u7ea6 200\uff5e350 GEL/\u665a\u3002\n- **Guesthouse**\uff1a\u6885\u65af\u8482\u4e9a\u5f88\u591a\u5bb6\u5ead\u628a\u81ea\u5bb6\u6539\u9020\u6210\u6c11\u5bbf\uff0c\u8001\u677f\u901a\u5e38\u8fd8\u4f1a\u63d0\u4f9b\u5bb6\u5e38\u665a\u9910\u3002\u7ea6 100\uff5e200 GEL/\u665a\u3002\n\n## \u665a\u9910\n\u63a8\u8350\u5728\u6c11\u5bbf\u6216 **Laila \u9910\u5385** \u7528\u9910\u3002\u65af\u74e6\u6d85\u5b63\u7684\u7279\u8272\u83dc\u5305\u62ec **Kubdari\uff08\u65af\u74e6\u6d85\u5b63\u8089\u9985\u997c\uff09** \u548c **Tashmijabi\uff08\u5976\u916a\u571f\u8c46\u6ce5\uff09**\u3002\u8fd9\u91cc\u7684\u5976\u916a\u53e3\u5473\u504f\u54b8\uff0c\u4f46 Kubdari \u91cc\u9762\u7684\u9999\u6599\u8c03\u5473\u975e\u5e38\u72ec\u7279\uff0c\u503c\u5f97\u4e00\u8bd5\u3002\n\n---\n\n# D8\uff5c\u6885\u65af\u8482\u4e9a \u2192 \u4e4c\u6811\u6545\u91cc\uff08Ushguli\uff09\u2192 \u6885\u65af\u8482\u4e9a\n**\u4e3b\u9898\uff1a\u6b27\u6d32\u6700\u9ad8\u7684\u6751\u843d\u4e0e\u96ea\u5c71\u5f92\u6b65**\n\n![\u4e4c\u6811\u6545\u91cc\u6751\u843d](./E_\u683c\u9c81\u5409\u4e9a/images/ushguli_village.jpg)\n*\u4e4c\u6811\u6545\u91cc\u7684\u7889\u697c\u6751\u843d\u4e0e\u4ec0\u54c8\u62c9\u96ea\u5c71*\n\n## \u81ea\u9a7e\u8def\u7ebf\n- **\u8def\u7ebf**\uff1a\u6885\u65af\u8482\u4e9a \u2192 \u6cbf **Enguri \u6cb3\u8c37\u4e0a\u6e38** \u5411\u4e1c\u5317 \u2192 **\u4e4c\u6811\u6545\u91cc\uff08Ushguli\uff09**\u3002\n- **\u8ddd\u79bb**\uff1a\u5355\u7a0b\u7ea6 40 \u516c\u91cc\uff0c\u5f80\u8fd4\u7ea6 80 \u516c\u91cc\u3002\n- **\u5f00\u8f66\u65f6\u95f4**\uff1a\u5355\u7a0b\u7ea6 1.5\uff5e2 \u5c0f\u65f6\u3002\n- **\u8def\u51b5\u63d0\u793a**\uff1a\u8fd9\u6bb5\u8def\u662f\u6574\u4e2a\u81ea\u9a7e\u884c\u7a0b\u4e2d\u8def\u51b5\u6700\u5dee\u7684\u4e00\u6bb5\uff0c\u90e8\u5206\u8def\u6bb5\u4e3a\u788e\u77f3\u8def\u548c\u6ce5\u8def\uff0c\u96e8\u5b63\u53ef\u80fd\u6709\u6d89\u6c34\u8def\u6bb5\u3002**\u5f3a\u70c8\u5efa\u8bae\u79df SUV**\u3002\u5982\u81ea\u9a7e\u4fe1\u5fc3\u4e0d\u8db3\uff0c\u4e5f\u53ef\u4ee5\u5728\u6885\u65af\u8482\u4e9a\u5305\u8f66\u5f80\u8fd4\uff08\u7ea6 150\uff5e250 GEL/\u8f66\uff09\u3002\n\n## \u4e0a\u5348\uff1a\u62b5\u8fbe\u4e4c\u6811\u6545\u91cc\n\u4e4c\u6811\u6545\u91cc\u662f**\u6b27\u6d32\u6d77\u62d4\u6700\u9ad8\uff08\u7ea6 2100 \u7c73\uff09\u7684\u6c38\u4e45\u5c45\u4f4f\u6751\u843d**\uff0c\u7531\u56db\u4e2a\u5c0f\u6751\u5e84\u7ec4\u6210\uff0c\u4fdd\u5b58\u7740 200 \u591a\u5ea7\u4e2d\u4e16\u7eaa\u7889\u697c\u30022000 \u591a\u5e74\u6765\uff0c\u8fd9\u91cc\u7684\u5c45\u6c11\u4e00\u76f4\u8fc7\u7740\u534a\u6e38\u7267\u751f\u6d3b\uff0c\u76f4\u5230\u8fd1\u51e0\u5341\u5e74\u624d\u901a\u4e86\u516c\u8def\u3002\n\n- **\u6751\u843d\u6f2b\u6b65**\uff1a\u628a\u8f66\u505c\u5728\u6751\u5e84\u5165\u53e3\uff0c\u6b65\u884c\u7a7f\u8fc7 Lamaria \u6559\u5802\u6240\u5728\u7684\u4e2d\u5fc3\u533a\u57df\u3002\u7070\u8272\u7684\u77f3\u7889\u697c\u3001\u77f3\u677f\u5c4b\u9876\u7684\u519c\u820d\u3001\u8fdc\u5904\u6d77\u62d4 5193 \u7c73\u7684 **\u4ec0\u54c8\u62c9\u5c71\uff08Mt. Shkhara\uff09** \u6784\u6210\u4e86\u4e00\u5e45\u4eff\u4f5b\u6765\u81ea\u4e2d\u4e16\u7eaa\u7684\u753b\u9762\u3002\n- **Lamaria \u6559\u5802**\uff1a\u4f4d\u4e8e\u6751\u5e84\u6700\u9ad8\u5904\u7684\u4e00\u5ea7 12 \u4e16\u7eaa\u6559\u5802\uff0c\u4ece\u8fd9\u91cc\u53ef\u4ee5\u4fef\u77b0\u6574\u4e2a\u4e4c\u6811\u6545\u91cc\u6cb3\u8c37\u548c\u8fdc\u5904\u7684\u96ea\u5c71\u51b0\u5ddd\u3002\n\n## \u4e0b\u5348\uff1a\u8f7b\u5f92\u6b65\n\n### \u9009\u9879 A\uff1a\u901a\u5f80\u4ec0\u54c8\u62c9\u51b0\u5ddd\u7684\u5f92\u6b65\uff08\u4e2d\u7b49\u96be\u5ea6\uff09\n- \u4ece\u4e4c\u6811\u6545\u91cc\u51fa\u53d1\uff0c\u6cbf\u7740\u6cb3\u8c37\u5411\u4ec0\u54c8\u62c9\u5c71\u65b9\u5411\u5f92\u6b65\u3002\u5355\u7a0b\u7ea6 8 \u516c\u91cc\uff0c\u5f80\u8fd4\u7ea6 3.5\uff5e4.5 \u5c0f\u65f6\u3002\n- \u6cbf\u9014\u7ecf\u8fc7\u9ad8\u5c71\u8349\u7538\u3001\u51b0\u5ddd\u878d\u6c34\u6eaa\u6d41\u548c\u6210\u7fa4\u7684\u725b\u9a6c\u3002\u7ec8\u70b9\u53ef\u4ee5\u8fd1\u8ddd\u79bb\u770b\u5230\u4ec0\u54c8\u62c9\u5c71\u7684\u51b0\u5ddd\u820c\u3002\n\n### \u9009\u9879 B\uff1a\u6751\u5e84\u5468\u8fb9\u77ed\u5f92\u6b65\uff08\u8f7b\u677e\uff09\n- \u5982\u679c\u65f6\u95f4\u548c\u4f53\u529b\u6709\u9650\uff0c\u53ef\u4ee5\u5728\u6751\u5e84\u5468\u8fb9\u8d70 1\uff5e2 \u5c0f\u65f6\u3002\u6bcf\u4e00\u5904\u9ad8\u5761\u90fd\u662f\u62cd\u6444\u7889\u697c\u4e0e\u96ea\u5c71\u5168\u666f\u7684\u7edd\u4f73\u67 ru Sushi Street\uff09\n\u5c0f\u6a3d\u662f\u65e5\u672c\u6700\u8457\u540d\u7684\u5bff\u53f8\u5723\u5730\u4e4b\u4e00\uff0c\u5f97\u76ca\u4e8e\u7d27\u90bb\u65e5\u672c\u6d77\uff0c\u8fd9\u91cc\u7684\u6d77\u9c9c\u65b0\u9c9c\u5ea6\u582a\u79f0\u9876\u7ea7\u3002\n\n- **\u63a8\u8350\u9910\u5385**\uff1a**\u4f0a\u52bf\u5bff\u53f8\uff08Isezushi\uff09** \u6216 **\u653f\u5bff\u53f8\uff08Masazushi\uff09**\u3002\u653f\u5bff\u53f8\u662f\u7c73\u5176\u6797\u4e00\u661f\uff0c\u9700\u8981\u63d0\u524d\u9884\u7ea6\uff1b\u4f0a\u52bf\u5bff\u53f8\u5219\u662f\u5f53\u5730\u4eba\u66f4\u504f\u7231\u7684\u8001\u5b57\u53f7\uff0c\u6027\u4ef7\u6bd4\u66f4\u9ad8\u3002\n- **\u5fc5\u70b9**\uff1a**\u6d77\u80c6\u996d\uff08Uni Don\uff09**\u3001**\u9c91\u9c7c\u5b50\uff08Ikura\uff09**\u3001**\u751c\u867e\uff08Amaebi\uff09**\u3001**\u91d1\u67aa\u9c7c\u5927\u8179\uff08Otoro\uff09**\u3002\u5c0f\u6a3d\u7684\u6d77\u80c6\u6765\u81ea\u9644\u8fd1\u7684\u79ef\u4e39\u534a\u5c9b\uff0c\u53e3\u611f\u7ef5\u5bc6\u7518\u751c\uff0c\u5e26\u7740\u6de1\u6de1\u7684\u6d77\u6c34\u5473\u3002\n- \u4eba\u5747\uff1a400\uff5e800 \u5143\u4eba\u6c11\u5e01\u3002\n\n### \u4e0b\u5348\uff1a\u5317\u4e00\u785d\u5b50\u9986\u4e0e\u5929\u72d7\u5c71\n\n![\u5317\u4e00\u785d\u5b50\u9986\u7164\u6cb9\u706f\u5496\u5561\u5385](./F_\u5317\u6d77\u9053/images/kitaichi_glass.jpg)\n*\u5317\u4e00\u785d\u5b50\u4e09\u53f7\u9986\u7684\u7164\u6cb9\u706f\u5496\u5561\u5385*\n\n- **\u5317\u4e00\u785d\u5b50\u9986\uff08Kitaichi Glass\uff09**\uff1a\u5c0f\u6a3d\u662f\u65e5\u672c\u73bb\u7483\u5de5\u827a\u7684\u91cd\u8981\u4ea7\u5730\uff0c\u5317\u4e00\u785d\u5b50\u662f\u5176\u4e2d\u6700\u6709\u4ee3\u8868\u6027\u7684\u54c1\u724c\u3002\u4e09\u53f7\u9986\u5185\u7684**\u7164\u6cb9\u706f\u5496\u5561\u5385**\u975e\u5e38\u6d6a\u6f2b\u2014\u2014\u5e97\u5185\u6ca1\u6709\u7535\u706f\uff0c\u5168\u9760 167 \u76cf\u7164\u6cb9\u706f\u7167\u660e\uff0c\u660f\u9ec4\u7684\u5149\u7ebf\u900f\u8fc7\u624b\u5de5\u73bb\u7483\u6298\u5c04\u51fa\u6765\uff0c\u50cf\u7a7f\u8d8a\u5230\u4e86\u5927\u6b63\u5e
