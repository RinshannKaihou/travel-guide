<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>婚假 · 互动旅行地图</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    :root {
      --bg-deep: #0b1020;
      --bg-panel: rgba(16, 22, 42, 0.85);
      --accent-dk: #e8b4b8;
      --accent-no: #9ecbf3;
      --accent-is: #a8e6cf;
      --accent-se: #ffd3b6;
      --accent-it: #f4a261;
      --accent-ge: #e9c46a;
      --accent-jp: #a8dadc;
      --accent-sc: #b8c5d6;
      --accent-tr: #f4a3a8;
      --text-main: #f2f5fa;
      --text-sub: #b8c2d8;
      --line-drive: #ffd3b6;
      --line-fly: #ff8b94;
      --line-ferry: #9ecbf3;
      --line-train: #b4a7d6;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      font-family: 'Inter', 'Noto Serif SC', sans-serif;
      background: var(--bg-deep);
      color: var(--text-main);
      overflow: hidden;
    }
    #map { position: absolute; inset: 0; z-index: 1; }

    /* UI Panel */
    .ui-layer {
      position: absolute;
      z-index: 10;
      pointer-events: none;
      inset: 0;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 22px;
    }
    .top-bar {
      pointer-events: auto;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      justify-content: space-between;
    }
    .title-card {
      background: var(--bg-panel);
      backdrop-filter: blur(12px) saturate(140%);
      -webkit-backdrop-filter: blur(12px) saturate(140%);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 18px;
      padding: 14px 18px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.25);
    }
    .title-card h1 {
      margin: 0;
      font-family: 'Noto Serif SC', serif;
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 0.5px;
    }
    .title-card p {
      margin: 4px 0 0;
      font-size: 12px;
      color: var(--text-sub);
    }

    /* Tabs */
    .tabs {
      display: flex;
      gap: 8px;
      background: var(--bg-panel);
      backdrop-filter: blur(12px) saturate(140%);
      -webkit-backdrop-filter: blur(12px) saturate(140%);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px;
      padding: 6px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.25);
      overflow-x: auto;
      max-width: 100%;
      flex-wrap: nowrap;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .tabs::-webkit-scrollbar { display: none; }
    .tab {
      appearance: none;
      border: none;
      background: transparent;
      color: var(--text-sub);
      padding: 8px 12px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all .2s ease;
      display: flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .tab:hover { color: var(--text-main); background: rgba(255,255,255,0.05); }
    .tab.active { color: #0b1020; font-weight: 600; }
    .tab[data-plan="a"].active { background: var(--accent-dk); }
    .tab[data-plan="b"].active { background: var(--accent-is); color: #0b2a1f; }
    .tab[data-plan="c"].active { background: var(--accent-se); color: #3d261a; }
    .tab[data-plan="no"].active { background: var(--accent-no); color: #0b1f2e; }
    .tab[data-plan="d"].active { background: var(--accent-it); color: #3d261a; }
    .tab[data-plan="e"].active { background: var(--accent-ge); color: #3d261a; }
    .tab[data-plan="f"].active { background: var(--accent-jp); color: #0b1f2e; }
    .tab[data-plan="g"].active { background: var(--accent-sc); color: #0b1f2e; }
    .tab[data-plan="h"].active { background: var(--accent-tr); color: #3d261a; }

    .tab-doc-btn {
      margin-left: 4px;
      padding: 2px 5px;
      border-radius: 6px;
      font-size: 11px;
      background: rgba(255,255,255,0.1);
      cursor: pointer;
      transition: background .2s;
      line-height: 1;
    }
    .tab-doc-btn:hover { background: rgba(255,255,255,0.25); }
    .tab.active .tab-doc-btn { background: rgba(0,0,0,0.12); }
    .tab.active .tab-doc-btn:hover { background: rgba(0,0,0,0.22); }

    /* Legend */
    .legend {
      pointer-events: auto;
      align-self: flex-start;
      background: var(--bg-panel);
      backdrop-filter: blur(12px) saturate(140%);
      -webkit-backdrop-filter: blur(12px) saturate(140%);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px;
      padding: 12px 14px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.25);
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-top: 10px;
    }
    .legend-row {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 12px;
      color: var(--text-sub);
    }
    .line-dot { width: 22px; height: 2px; border-radius: 2px; }
    .line-dot.drive { background: var(--line-drive); }
    .line-dot.fly { background: repeating-linear-gradient(90deg, var(--line-fly), var(--line-fly) 4px, transparent 4px, transparent 7px); height: 2px; }
    .line-dot.ferry { background: repeating-linear-gradient(90deg, var(--line-ferry), var(--line-ferry) 3px, transparent 3px, transparent 6px); height: 2px; }
    .line-dot.train { background: repeating-linear-gradient(90deg, var(--line-train), var(--line-train) 5px, transparent 5px, transparent 8px); height: 2px; }

    /* Leaflet custom popup */
    .leaflet-popup-content-wrapper {
      background: rgba(16, 22, 42, 0.95);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 14px;
      color: var(--text-main);
      box-shadow: 0 20px 50px rgba(0,0,0,0.35);
      padding: 0;
      overflow: hidden;
    }
    .leaflet-popup-content {
      margin: 0;
      width: 280px !important;
    }
    .leaflet-popup-tip {
      background: rgba(16, 22, 42, 0.95);
    }
    .popup-media {
      width: 100%;
      height: 150px;
      object-fit: cover;
      display: block;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .popup-body { padding: 12px 14px 14px; }
    .popup-title {
      font-family: 'Noto Serif SC', serif;
      font-size: 15px;
      font-weight: 700;
      margin: 0 0 6px;
    }
    .popup-desc {
      font-size: 12px;
      color: var(--text-sub);
      line-height: 1.6;
      margin: 0;
    }
    .popup-tag {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 999px;
      background: rgba(255,255,255,0.08);
      color: var(--text-sub);
      margin-top: 10px;
    }
    .popup-doc-btn {
      appearance: none;
      border: none;
      background: rgba(255,255,255,0.1);
      color: var(--text-sub);
      padding: 6px 10px;
      border-radius: 8px;
      font-size: 12px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      transition: all .2s;
      margin-top: 10px;
    }
    .popup-doc-btn:hover { background: rgba(255,255,255,0.18); color: var(--text-main); }

    /* Custom marker */
    .custom-marker {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.25), rgba(255,255,255,0) 60%), rgba(16,22,42,0.9);
      border: 2px solid currentColor;
      display: grid;
      place-items: center;
      font-size: 14px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.35), 0 0 0 4px rgba(0,0,0,0.15);
      transition: transform .2s ease;
    }
    .custom-marker:hover { transform: scale(1.1); }

    /* pulse ring */
    .marker-ring {
      position: absolute;
      inset: -8px;
      border-radius: 50%;
      border: 1px solid currentColor;
      opacity: .35;
      animation: pulse 2.2s infinite ease-out;
    }
    @keyframes pulse {
      0% { transform: scale(0.85); opacity: .45; }
      100% { transform: scale(1.35); opacity: 0; }
    }

    /* Doc Panel */
    #docPanel {
      position: fixed;
      top: 0; right: 0; bottom: 0;
      width: 460px;
      max-width: 92vw;
      background: var(--bg-panel);
      backdrop-filter: blur(16px) saturate(150%);
      -webkit-backdrop-filter: blur(16px) saturate(150%);
      border-left: 1px solid rgba(255,255,255,0.08);
      transform: translateX(100%);
      transition: transform .35s cubic-bezier(.2,.8,.2,1);
      z-index: 100;
      display: flex;
      flex-direction: column;
    }
    #docPanel.open { transform: translateX(0); }
    #docBackdrop {
      position: fixed; inset: 0; background: rgba(0,0,0,.45);
      opacity: 0; pointer-events: none; transition: opacity .3s;
      z-index: 99;
    }
    #docBackdrop.open { opacity: 1; pointer-events: auto; }

    #docHeader {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 18px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      flex-shrink: 0;
    }
    #docTitle {
      font-family: 'Noto Serif SC', serif;
      font-size: 16px;
      font-weight: 600;
      margin: 0;
    }
    #docHeaderActions {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    #docHeaderHint {
      font-size: 12px;
      color: var(--text-sub);
    }
    #docClose {
      appearance: none;
      border: none;
      background: rgba(255,255,255,0.08);
      color: var(--text-sub);
      width: 32px;
      height: 32px;
      border-radius: 8px;
      font-size: 18px;
      cursor: pointer;
      display: grid;
      place-items: center;
      transition: background .2s;
    }
    #docClose:hover { background: rgba(255,255,255,0.15); color: var(--text-main); }

    #docContent {
      flex: 1;
      overflow-y: auto;
      padding: 18px 22px 40px;
      font-size: 14px;
      line-height: 1.75;
      color: var(--text-main);
    }
    #docContent h1 {
      font-family: 'Noto Serif SC', serif;
      font-size: 18px;
      margin: 28px 0 14px;
      padding-bottom: 8px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    #docContent h2 {
      font-size: 15px;
      margin: 22px 0 12px;
      color: var(--text-main);
    }
    #docContent h3 {
      font-size: 14px;
      margin: 16px 0 8px;
      color: var(--text-sub);
    }
    #docContent p { margin: 10px 0; }
    #docContent img {
      max-width: 100%;
      border-radius: 10px;
      margin: 10px 0;
      display: block;
    }
    #docContent a { color: #9ecbf3; text-decoration: none; }
    #docContent a:hover { text-decoration: underline; }
    #docContent table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
      margin: 12px 0;
    }
    #docContent th, #docContent td {
      border: 1px solid rgba(255,255,255,0.1);
      padding: 6px 8px;
      text-align: left;
    }
    #docContent th { background: rgba(255,255,255,0.05); }
    #docContent blockquote {
      border-left: 3px solid rgba(255,255,255,0.15);
      margin: 12px 0;
      padding-left: 14px;
      color: var(--text-sub);
    }
    #docContent ul, #docContent ol { padding-left: 20px; margin: 10px 0; }
    #docContent hr { border: none; border-top: 1px solid rgba(255,255,255,0.08); margin: 20px 0; }
    #docContent code {
      background: rgba(255,255,255,0.08);
      padding: 2px 6px;
      border-radius: 6px;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 12px;
    }

    #docContent h1[id^="anchor-"],
    #docContent h2[id^="anchor-"] {
      transition: background .3s, border-color .3s, padding-left .3s, margin-left .3s;
      border-left: 3px solid transparent;
      padding-left: 0;
      margin-left: 0;
      border-radius: 0 8px 8px 0;
    }
    #docContent h1.anchor-highlight,
    #docContent h2.anchor-highlight {
      background: rgba(255,255,255,0.08);
      border-left: 3px solid var(--accent-doc, #9ecbf3);
      padding-left: 12px;
      margin-left: -15px;
    }

    .doc-to-map {
      color: #ffd3b6 !important;
      font-weight: 500;
      border-bottom: 1px dashed rgba(255,211,182,0.4);
    }
    .doc-to-map:hover {
      border-bottom-style: solid;
    }

    @keyframes pulse-gold {
      0% { transform: scale(0.5); opacity: .9; }
      100% { transform: scale(2); opacity: 0; }
    }
    .doc-pulse-ring {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      border: 2px solid #ffd700;
      background: rgba(255, 215, 0, 0.15);
      animation: pulse-gold 3s ease-out forwards;
    }

    /* Responsive */
    @media (max-width: 640px) {
      .ui-layer { padding: 12px; }
      .title-card h1 { font-size: 16px; }
      .tab { font-size: 12px; padding: 6px 10px; }
      #docPanel { max-width: 92vw; }
    }
  </style>
</head>
<body>
  <div id="map"></div>
  <div class="ui-layer">
    <div class="top-bar">
      <div class="title-card">
        <h1>婚假 · 互动旅行地图</h1>
        <p>鼠标悬停地点查看简介，点击标签切换方案</p>
      </div>
      <div class="tabs">
        <button class="tab active" data-plan="a">🇩🇰🇳🇴 丹麦+挪威<span class="tab-doc-btn" data-plan="a" title="查看行程文档">📄</span></button>
        <button class="tab" data-plan="b">🇮🇸 冰岛环岛<span class="tab-doc-btn" data-plan="b" title="查看行程文档">📄</span></button>
        <button class="tab" data-plan="c">🇸🇪🇩🇰 瑞典+丹麦<span class="tab-doc-btn" data-plan="c" title="查看行程文档">📄</span></button>
        <button class="tab" data-plan="no">🇳🇴 挪威峡湾<span class="tab-doc-btn" data-plan="no" title="查看行程文档">📄</span></button>
        <button class="tab" data-plan="d">🇮🇹 意多洛米蒂<span class="tab-doc-btn" data-plan="d" title="查看行程文档">📄</span></button>
        <button class="tab" data-plan="e">🇬🇪 格鲁吉亚<span class="tab-doc-btn" data-plan="e" title="查看行程文档">📄</span></button>
        <button class="tab" data-plan="f">🇯🇵 北海道<span class="tab-doc-btn" data-plan="f" title="查看行程文档">📄</span></button>
        <button class="tab" data-plan="g">🏴󠁧󠁢󠁳󠁣󠁴󠁿 苏格兰<span class="tab-doc-btn" data-plan="g" title="查看行程文档">📄</span></button>
        <button class="tab" data-plan="h">🇹🇷 土耳其<span class="tab-doc-btn" data-plan="h" title="查看行程文档">📄</span></button>
      </div>
    </div>
    <div class="legend">
      <div class="legend-row"><div class="line-dot drive"></div>自驾 / 公路</div>
      <div class="legend-row"><div class="line-dot fly"></div>航班</div>
      <div class="legend-row"><div class="line-dot ferry"></div>轮渡 / 游船</div>
      <div class="legend-row"><div class="line-dot train"></div>火车 / 高铁</div>
    </div>
  </div>

  <!-- Doc Panel -->
  <div id="docBackdrop"></div>
  <div id="docPanel">
    <div id="docHeader">
      <h2 id="docTitle">行程详情</h2>
      <div id="docHeaderActions">
        <span id="docHeaderHint">点击地图地点可返回</span>
        <button id="docClose" title="关闭">×</button>
      </div>
    </div>
    <div id="docContent"></div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    // Data
    const images = {
      a: './A_挪威丹麦/images/',
      b: './B_冰岛/images/',
      c: './C_瑞典丹麦/images/',
      no: './挪威/images/',
      d: './D_意大利多洛米蒂威尼斯/images/',
      e: './E_格鲁吉亚/images/',
      f: './F_北海道/images/',
      g: './G_苏格兰/images/',
      h: './H_土耳其/images/'
    };

    const mdContent = {
      a: "# 挪威 + 丹麦｜峡湾童话双国记｜9 天婚假执行手册\n\n> **旅行时间**：7～8 月（夏季黄金窗口）  \n> **旅行人数**：2 人（婚假）  \n> **总天数**：9 天 8 晚  \n> **核心目的地**：哥本哈根 → 北西兰岛 → 欧登塞 → 卑尔根 → 松恩峡湾 → 盖朗厄尔峡湾 → 大西洋公路  \n> **人均预算**：3.0～4.0 万元人民币（舒适不奢华，2 人总计约 6～8 万元）\n\n---\n\n## 为什么选挪威 + 丹麦？\n\n这是北欧唯一能做到**\"风景震撼\"与\"人文美食\"双满分**的两国组合。\n\n如果你们想要的是\"国内没有的壮丽风光\"，挪威的峡湾、发卡弯公路和午夜阳光是正确答案；如果你们同时也不想放弃米其林餐厅、童话城堡和松弛的城市漫步，丹麦就是最完美的另一半。\n\n- **丹麦**负责温柔：安徒生的故乡、米其林密度最高的城市、可以骑自行车逛遍的哥本哈根、海边悬崖上的现代美术馆。\n- **挪威**负责震撼：世界最陡的高山火车、冲入大海的公路、垂直的峡湾悬崖和粉紫色的午夜阳光。\n\n这 9 天，你们会在伊埃斯科城堡的迷宫花园里牵手，也会在老鹰之路与 Gudbrandsjuvet 的峡谷观景台上惊叹；会在哥本哈根的米其林餐厅里碰杯，也会在艾于兰峡湾的民宿露台上看太阳不落山。\n\n**这是\"震撼\"与\"松弛\"的最佳双国平衡。**\n\n---\n\n## 行程总览\n\n| 天数 | 星期 | 路线 | 住宿地 | 核心体验 | 开车距离 |\n|:---:|:---:|:---|:---|:---|:---:|\n| D1 | 六 | 国内 → 哥本哈根 | 哥本哈根 | 新港彩色房子、运河游船、适应极昼 | — |\n| D2 | 日 | 哥本哈根 | 哥本哈根 | 克里斯蒂安堡宫、设计区、趣伏里公园 | — |\n| D3 | 一 | 北西兰岛 | 哥本哈根 | 克伦堡城堡、路易斯安那现代美术馆 | 约 100 km |\n| D4 | 二 | 欧登塞 → 卑尔根 | 卑尔根 | 伊埃斯科城堡、安徒生博物馆、晚班机飞挪威 | 丹麦境内约 200 km |\n| D5 | 三 | 卑尔根 → 弗洛姆 → 艾于兰 | 艾于兰 | 布吕根、弗洛姆高山火车、峡湾游船 | — |\n| D6 | 四 | 艾于兰 → 盖朗厄尔 | 盖朗厄尔 | 自驾峡湾公路、老鹰之路俯瞰 | 约 200 km |\n| D7 | 五 | 盖朗厄尔 → 老鹰之路 → Gudbrandsjuvet → 大西洋公路 → 克里斯蒂安松 | 克里斯蒂安松 | 老鹰之路 + Gudbrandsjuvet + 大西洋公路海上飞车 | 约 300 km |\n| D8 | 六 | 克里斯蒂安松 → 奥斯陆 | 奥斯陆 | 飞回首都，最后的城市之夜 | — |\n| D9 | 日 | 奥斯陆 → 国内 | — | 返程 | — |\n\n> **设计逻辑**：丹麦 3.5 天慢游童话与人文；挪威 4.5 天自驾峡湾精华；不走罗弗敦（时间不够），但保留了挪威南部最震撼的峡湾与公路。奥斯陆只作为返程中转口。\n\n---\n\n# D1｜国内 → 哥本哈根（Copenhagen）\n**主题：抵达童话王国**\n\n![哥本哈根新港](./images/nyhavn.jpg)\n*哥本哈根新港（Nyhavn）彩色房子与运河*\n\n## 交通\n- **航班**：建议选择 **北欧航空 SAS**、**汉莎航空** 或 **芬兰航空** 的直飞或一次转机航班，**下午 14:00-17:00 抵达哥本哈根凯斯楚普机场（CPH）** 最佳。\n- **机场 → 市区**：地铁 M2 线约 15 分钟到市中心，或机场快线火车约 13 分钟到中央车站（København H）。\n- **租车**：抵达当天不租车。哥本哈根市区非常适合步行+地铁，且停车极贵。建议**D3 早上再取车**，用于北西兰岛和欧登塞的自驾。\n\n## 住宿\n**推荐：Hotel Sanders 或 Hotel Kong Arthur**\n- **Hotel Sanders**：位于 Indre By（内城区），设计酒店，北欧极简风，步行 10 分钟到新港。\n- **Hotel Kong Arthur**：位于 Nørrebro，价格更适中，自带庭院和温泉池，步行可达湖区散步。\n- 价格：约 1500～2500 DKK/晚。\n\n## 活动\n- **傍晚**：在新港（Nyhavn）散步。这里曾是安徒生住过的地方（他在 18、20 和 67 号都住过）。彩色房子从赭黄到深红排列，夏季傍晚阳光把它们照得像糖果盒。\n- **晚餐**：\n  - **Restaurant Barr**：Noma 前团队打造的新北欧料理，位于 Nyhavn 尽头的老仓库里，氛围轻松，人均约 800 DKK。\n  - 或 **Torvehallerne KBH**：哥本哈根最美的室内食品市场，生蚝、开放三明治（Smørrebrød）、新鲜海鲜，人均 200～400 DKK。\n- **小贴士**：7～8 月的哥本哈根晚上 10 点天还亮着。吃完饭后在运河边散步，看着夕阳把彩色房子的倒影染成金色，是抵达丹麦最好的开场。\n\n---\n\n# D2｜哥本哈根（Copenhagen）\n**主题：设计、历史与童话之夜**\n\n![克里斯蒂安堡宫](./images/christiansborg.jpg)\n*克里斯蒂安堡宫与皇家马厩*\n\n## 活动\n\n### 上午：克里斯蒂安堡宫（Christiansborg Slot）\n- 这里是丹麦议会、最高法院和首相办公室的所在地，也是王室举行国宴的地方。\n- **必做**：登上塔楼（免费），这是哥本哈根市区最高点，可以 360 度俯瞰全城——能看到远处的厄勒海峡大桥和瑞典海岸。\n- 宫殿地下还有**罗马时期遗址博物馆**，可以看到 1167 年城堡原址的地基。\n\n### 下午：设计区漫步与阿美琳堡宫\n- **设计区**：Strøget 步行街附近集中了 Hay House、Georg Jensen、Illums Bolighus 等北欧设计名店。即使不买，光是看橱窗陈列也是一种视觉享受。\n- **阿美琳堡宫（Amalienborg）**：中午 12:00 看**皇家卫队换岗仪式**。卫队身着黑色熊皮帽和红色军装，从罗森堡宫步行过来，气势庄严。\n- **救主堂（Vor Frelsers Kirke）**：螺旋塔楼可以攀登，从外部螺旋楼梯登顶，俯瞰克里斯钦自由城（Christiania）的彩色涂鸦屋顶。\n\n### 晚上：趣伏里公园（Tivoli Gardens）\n- 这是世界上最古老的游乐园之一（1843 年开园），也是华特·迪士尼建造迪士尼乐园的灵感来源。\n- 夏季夜晚，花园里有超过 10 万盏灯装饰，还有现场古典音乐会和烟花表演。\n- **晚餐**：趣伏里园内的 **Nimb** 餐厅（米其林推荐）或园外的 **Kadeau**（新北欧料理一星）。\n\n---\n\n# D3｜北西兰岛（Nordsjælland）\n**主题：城堡与现代艺术的对话**\n\n![克伦堡城堡](./images/kronborg.jpg)\n*克伦堡城堡——莎士比亚《哈姆雷特》的取景地*\n\n## 自驾路线\n- **取车**：早上在哥本哈根中央车站或机场附近取车。推荐 Europcar、Hertz。\n- **路线**：哥本哈根 → 赫尔辛格（Helsingør）约 45 分钟 → 路易斯安那美术馆约 20 分钟 → 返回哥本哈根。\n- **总里程**：约 100 公里。\n\n## 上午：克伦堡宫（Kronborg Slot）\n- 这座海边城堡是**莎士比亚《哈姆雷特》的故事发生地**，每年夏天城堡里都会上演《哈姆雷特》露天戏剧。\n- 城堡位于厄勒海峡最窄处，正对瑞典的赫尔辛堡，历史上是控制波罗的海入口的军事要塞。\n- **必看**：地下隧道（Kasematterne）——昏暗潮湿的石砌地道，传说中丹麦传奇英雄 Holger Danske 就在这里沉睡，一旦丹麦遭遇危机，他就会苏醒。\n\n## 下午：路易斯安那现代艺术博物馆（Louisiana Museum of Modern Art）\n\n![路易斯安那美术馆雕塑花园](./images/louisiana.jpg)\n*路易斯安那美术馆的雕塑花园与厄勒海峡*\n\n这是**全球最美的海边现代美术馆**，没有之一。\n\n- **建筑**：美术馆依山而建，白色混凝土建筑与绿色植被融为一体，巨大的落地窗将海景框成一幅幅活的画作。\n- **雕塑花园**：室外花园里摆放着亚历山大·考尔德（Alexander Calder）的动态雕塑、亨利·摩尔（Henry Moore）的青铜人体。夏天，游客可以躺在草坪上，看着海面上的瑞典渡轮缓缓驶过。\n- **咖啡厅**：馆内咖啡厅拥有全馆最佳海景位，点一杯咖啡和一块丹麦酥（Wienerbrød），是北西兰岛最惬意的下午茶。\n\n## 晚餐\n返回哥本哈根市区，推荐 **Alchemist**（二星，需提前数月预订）或性价比更高的 **Marv & Ben**（新派丹麦菜，人均 400 DKK）。\n\n---\n\n# D4｜欧登塞（Odense）→ 卑尔根（Bergen）\n**主题：从童话城堡到峡湾之门**\n\n![伊埃斯科城堡](./images/egeskov.jpg)\n*伊埃斯科城堡——欧洲保存最完好的文艺复兴水边城堡*\n\n## 自驾路线\n- **路线**：哥本哈根 → 欧登塞（Odense）约 1.5 小时。途中务必绕去伊埃斯科城堡（Egeskov Slot），距欧登塞约 30 分钟。\n- **总里程**：约 200 公里。\n\n## 上午：伊埃斯科城堡（Egeskov Slot）\n- 建于 1554 年，是**欧洲保存最好的文艺复兴水边城堡**。护城河环绕，尖塔倒映在水中，迷宫花园占地超过 4 公顷。\n- **浪漫体验**：城堡主人 Michael 伯爵至今住在这里（住在一侧 wing，游客区域在另一侧）。花园里有一座巨大的树顶迷宫和一座悬浮在空中的树顶步道（Treetop Walk）。\n- 如果天气好，在城堡草坪上野餐是极其浪漫的体验。\n\n## 下午：欧登塞市区\n- **安徒生博物馆（H.C. Andersen Museum）**：2021 年由日本建筑师隈研吾重新设计，建筑本身就像一个巨大的童话盒子，倾斜的屋顶和玻璃幕墙充满梦幻感。\n- **安徒生童年故居**：位于博物馆隔壁，是一座黄色的小房子，内部保持着 19 世纪初的原貌。\n- **欧登塞老城步行街**：鹅卵石街道、彩色木屋、街头艺人和咖啡馆。\n\n## 晚上：飞赴挪威\n- **还车**：欧登塞市区或哥本哈根机场还车（取决于航班时间）。\n- **航班**：**SAS 或 Norwegian 晚班机**（约 19:00-20:00 起飞），哥本哈根(CPH) ✈ 卑尔根(BGO)，航程约 1 小时 20 分钟。\n- **抵达卑尔根**：机场取第二段租的车（建议预订四驱 SUV，如沃尔沃 XC60），自驾 30 分钟到市区酒店。\n\n## 住宿\n**推荐：Radisson Blu Royal Hotel, Bergen**\n- 位置：布吕根港口内，出门就是彩色木屋。\n- 价格：约 2000～2800 NOK/晚。\n\n---\n\n# D5｜卑尔根 → 弗洛姆 → 艾于兰（Aurland）\n**主题：全世界最美的火车线路**\n\n![卑尔根布吕根彩色木屋](./images/bryggen.jpg)\n*卑尔根布吕根世界文化遗产港区*\n\n## 上午：卑尔根市区\n- **布吕根（Bryggen）**：世界文化遗产，一排排三角屋顶的彩色木屋沿着码头排列。这里是汉萨同盟时期（14 世纪）的贸易港口遗址。\n- **鱼市场（Fisketorget）**：现场吃帝王蟹、龙虾、三文鱼汤。\n- **弗洛伊恩山缆车（Fløibanen）**：山顶俯瞰卑尔根全景，红色屋顶的城市 nestled 在绿色山谷与蓝色海湾之间。\n\n## 下午：挪威缩影精华段\n\n![弗洛姆高山火车与瀑布](./images/flamsbana.jpg)\n*弗洛姆高山火车停靠在 Kjosfossen 瀑布站*\n\n### 卑尔根 → Myrdal（高山火车站）\n- 乘坐 **Bergensbanen（卑尔根铁路）**，约 2 小时。欧洲海拔最高的干线铁路，穿越哈当厄高原。\n\n### Myrdal → 弗洛姆（Flåm）：弗洛姆高山火车（Flåmsbana）\n- **全世界最陡的标准轨距铁路**，20 公里内海拔从 866 米骤降至海平面。\n- **中途停靠 Kjosfossen 瀑布**：落差 225 米，夏季常有穿着传统服饰的\"山妖\"舞者表演。\n- **选座技巧**：下行坐**左侧**风景更佳。\n\n### 弗洛姆 → 艾于兰：峡湾游船\n- 游览 **艾于兰峡湾（Aurlandsfjorden）** 和 **纳柔依峡湾（Nærøyfjorden）**——后者是联合国教科文组织世界遗产。\n- 终点 **Gudvangen**，再乘大巴/出租车到艾于兰（约 30 分钟）。\n\n> **行李提示**：这一天换乘频繁，建议前一晚在卑尔根将大件行李**寄存在酒店或寄送到后续酒店**，只带轻便背包。\n\n## 住宿\n**强烈推荐：29|2 Aurland**\n- 峡湾景观设计酒店，房间极少，**落地窗正对艾于兰峡湾**。傍晚坐在露台上看太阳滑向雪山背后，是这一天的高潮。\n- 备选：**Fretheim Hotel**，老牌峡湾酒店，花园可直接走到峡湾边。\n\n---\n\n# D6｜艾于兰 → 盖朗厄尔（Geiranger）\n**主题：峡湾自驾的巅峰**\n\n![艾于兰峡湾与雪山](./images/aurlandsfjorden.jpg)\n*从 Stegastein 观景台俯瞰艾于兰峡湾*\n\n## 自驾路线\n- **取车**：上午在 Sogndal 市区或机场取车（如果从艾于兰打车到 Sogndal 约 40 分钟）。\n- **路线**：Sogndal → **Lærdal 隧道**（世界最长公路隧道，24.5 公里）→ Stryn → Hellesylt → 乘轮渡进入盖朗厄尔峡湾 → 盖朗厄尔小镇。\n- **总里程**：约 200 公里（陆路）+ 轮渡。\n- **开车时间**：约 4.5～5.5 小时（含多次停车）。\n\n## 途中亮点\n\n### Lærdal 隧道\n- 全长 24.5 公里，是世界上最长的公路隧道。\n- 隧道中设有三个\"洞穴\"休息区，用蓝色和黄色灯光模拟日出，像地下宫殿。\n\n### Hellesylt → Geiranger 轮渡\n- 轮渡上会远眺 **\"七姐妹瀑布（De Syv Søstre）\"**——七道水流从 250 米高的悬崖同时倾泻而下。\n- **重要提示**：7～8 月非常热门，建议提前在 Fjord1 官网预订船票。\n\n![盖朗厄尔峡湾七姐妹瀑布](./images/geirangerfjord.jpg)\n*盖朗厄尔峡湾的七姐妹瀑布*\n\n## 下午：老鹰之路（Ørnevegen）\n- **11 个发卡弯**，在约 6 公里内攀升 620 米海拔。\n- **观景台 Ørnesvingen**：俯瞰盖朗厄尔峡湾像一条深蓝色丝带蜿蜒在灰色群山之间。\n- **时间建议**：下午 5 点后再去，避开邮轮游客，光线柔和。\n\n## 住宿\n**推荐：Hotel Union Geiranger**\n- 拥有盖朗厄尔最好的**室外温水泳池**——泡在池子里看着峡湾和雪山。\n\n---\n\n# D7｜盖朗厄尔 → 老鹰之路 → Gudbrandsjuvet → 大西洋公路 → 克里斯蒂安松（Kristiansund）\n**主题：世界最美公路之一**\n\n![老鹰之路俯瞰](./images/ornevegen.jpg)\n*从老鹰之路 Ørnesvingen 观景台俯瞰盖朗厄尔峡湾*\n\n这一天是整个自驾行程的高潮。由于 **Trollstigen 在 2026 年仍未恢复常规通行**，这里改为当前可执行的**Valldal 绕行版**，依然保留峡湾公路和大西洋公路两段高光。\n\n## 自驾路线\n**盖朗厄尔 → 老鹰之路（Ørnevegen）→ Eidsdal–Linge 轮渡 → Valldal → Gudbrandsjuvet → Vestnes / Molde → 大西洋公路（Atlanterhavsveien）→ 克里斯蒂安松**\n\n### 第一段：老鹰之路（Ørnevegen）+ Gudbrandsjuvet\n- 从盖朗厄尔出发，先沿 **老鹰之路** 翻上山脊，再通过 **Eidsdal–Linge** 轮渡进入 Valldal 山谷。\n- **Gudbrandsjuvet** 位于 63 号公路旁，是一条被现代观景平台包裹的狭窄峡谷。河水在深槽中急冲而下，建筑和自然结合得非常克制，是绕行版里最值回票价的停靠点。\n- **当前说明**：截至 **2026 年 4 月 11 日**，Trollstigen 路段仍关闭，因此不把穿越 Trollstigen 写入主路线。\n\n### 第二段：大西洋公路（Atlanterhavsveien）\n\n![大西洋公路 Storseisundet 大桥](./images/atlantic_road.jpg)\n*大西洋公路的标志性桥梁 Storseisundet Bridge*\n\n- 全长仅 8.3 公里，由 8 座桥梁连接小岛和礁石。\n- **Storseisundet Bridge**：从某个角度望去，桥面在最高点突然弯曲下坠，仿佛**公路在前方断入大海**。开车驶上桥顶时，会有一种\"要冲入海里\"的错觉。\n- 这是《卫报》评选的\"世界最佳公路旅行\"之一。\n\n> **AutoPASS 提示**：挪威高速公路、隧道、桥梁普遍收费。租车通常会自带 AutoPASS 电子标签，还车时由租车公司统一结算。西部峡湾全程建议预留 **500～800 NOK** 的过路费预算。\n\n## 住宿\n**克里斯蒂安松（Kristiansund）**\n- **推荐：Thon Hotel Kristiansund**\n- 城市安静，停车方便，晚上可以品尝当地特产 **Klipfish（盐渍鳕鱼）**。推荐餐厅 **Sørlandet**。\n\n---\n\n# D8｜克里斯蒂安松 → 奥斯陆\n**主题：从峡湾回到城市**\n\n![奥斯陆歌剧院与海港](./images/oslo.jpg)\n*奥斯陆歌剧院与比约维卡港区*\n\n## 交通\n- **航班**：Widerøe 或 SAS **克里斯蒂安松(KSU) ✈ 奥斯陆(OSL)**，约 1 小时。建议预订上午或中午的航班。\n- **机场 → 市区**：机场快线 Flytoget，20 分钟直达奥斯陆中央车站。\n- **还车**：克里斯蒂安松机场还掉第一段租的车。\n\n## 奥斯陆晚间\n- **住宿**：Thon Hotel Opera 或 Hotel Continental。\n- **晚餐**：\n  - **Kontrast**（米其林一星，北欧新派料理，人均约 1500 元，需提前预订）\n  - 或 **Mathallen Oslo** 美食广场（更轻松，人均 300～500 元）\n- **散步**：沿着 Aker Brygge 码头散步，享受极昼下的城市夜景。\n\n---\n\n# D9｜奥斯陆 → 国内\n**主题：回家**\n\n- **航班**：早班机返程（建议 10:00～12:00 起飞）。\n- 带着丹麦的童话记忆、挪威的峡湾震撼和婚假的满足感回家。\n\n---\n\n## 附录一：全程预算拆分（2 人总计）\n\n| 项目 | 金额（人民币） | 说明 |\n|:---|:---:|:---|\n| **国际往返机票** | 22,000～32,000 | 暑假直飞/一次转机经济舱，约 1.1～1.6 万/人 |\n| **丹麦境内机票/火车** | 0 | 全程自驾或地铁，无境内飞行 |\n| **跨国机票（CPH→BGO）** | 2,000～4,000 | 哥本哈根飞卑尔根，约 1000～2000 元/人 |\n| **挪威境内机票（KSU→OSL）** | 1,500～3,000 | 克里斯蒂安松飞奥斯陆 |\n| **租车** | 8,000～12,000 | 约 5 天租车（丹麦 1 天 + 挪威 4 天），含异地还车费 |\n| **轮渡/火车/停车/油费/过路费** | 3,500～5,000 | 含峡湾轮渡、弗洛姆高山火车、油费、AutoPASS |\n| **住宿（8 晚）** | 18,000～26,000 | 峡湾民宿/城市酒店 1200～2500 元/晚 |\n| **餐饮** | 12,000～18,000 | 丹麦米其林/挪威外食，人均 300～600 元/顿 |\n| **门票/体验** | 2,000～3,000 | 城堡门票、缆车、游船 |\n| **签证/保险/杂费** | 2,000～3,000 | 申根签证约 800 元/人，保险 200 元/人 |\n| **总计** | **约 68,000～106,000 元** | **人均 3.4～5.3 万** |\n\n> **省钱小贴士**：挪威餐饮极贵，但超市价格合理。建议订带厨房的民宿，自己做早餐和晚餐。丹麦的 Torvehallerne 食品市场和街头热狗（Rød Pølse）也是性价比之选。\n\n---\n\n## 附录二：行前准备清单\n\n### 证件与签证\n- [ ] **申根签证**：至少提前 6～8 周申请。7～8 月是高峰期。\n- [ ] 护照（有效期 6 个月以上）。\n- [ ] 驾照原件 + 英文翻译件（租租车 APP 可免费办理）。\n- [ ] 旅行保险（申根强制要求，保额 ≥ 3 万欧元）。\n\n### 预订确认（按优先级）\n1. [ ] 国际机票\n2. [ ] CPH → BGO 航班\n3. [ ] KSU → OSL 航班\n4. [ ] 丹麦租车（哥本哈根取还，1 天）\n5. [ ] 挪威租车（卑尔根机场取车 → 克里斯蒂安松机场还车）\n6. [ ] 29|2 Aurland 或 Fretheim Hotel\n7. [ ] Hotel Union Geiranger\n8. [ ] 哥本哈根、卑尔根、奥斯陆酒店\n9. [ ] 弗洛姆高山火车票 + 峡湾游船票（vy.no 购买）\n10. [ ] Hellesylt → Geiranger 轮渡票（Fjord1 官网预订）\n\n### 衣物与装备\n- [ ] 防水冲锋衣 + 软壳/抓绒内胆\n- [ ] 防水徒步鞋/登山鞋\n- [ ] 轻便雨衣\n- [ ] 薄羽绒服（峡湾山顶风大）\n- [ ] 防晒霜 + 墨镜\n- [ ] 转换插头（欧标 C/F 型）\n- [ ] 少量零食/泡面\n\n### APP 下载\n- **Google Maps**：离线地图必备\n- **Vy**：挪威铁路官方 APP\n- **Fjord1 / Torghatten Nord**：轮渡购票\n- **Rejseplanen**：丹麦公共交通查询\n- **TheFork**：餐厅预订\n\n---\n\n## 附录三：关键决策说明（FAQ）\n\n### Q1：为什么不去罗弗敦？\n罗弗敦是挪威最震撼的群岛，但从大西洋公路前往罗弗敦需要再飞一次或经历漫长的轮渡（克里斯蒂安松 → 博德 → Moskenes 轮渡 → 雷讷），往返至少占用 2 整天。在 9 天的双国行程中，保留罗弗敦会严重压缩丹麦的时间。我们选择**用丹麦的童话体验替代罗弗敦**，换取更平衡的节奏。\n\n### Q2：丹麦只租一天车够吗？\n够。哥本哈根市区完全不需要车（地铁+步行+自行车即可）。D3 早上取车去北西兰岛，当晚回哥本哈根；D4 开车去欧登塞，下午/傍晚还车。这样只租一天即可省去昂贵的市区停车费。\n\n### Q3：为什么不从欧登塞开车去挪威？\n欧登塞到奥斯陆开车约 6 小时，到卑尔根约 9 小时，还要经历跨海轮渡。时间和成本都不如飞过去。CPH → BGO 的航班密集且便宜（尤其是 SAS 会员日或 Norwegian 促销时），是最优选择。\n\n### Q4：Trollstigen 关闭后，这条路还值得吗？\n**值得。** 2026 版虽然不再把 Trollstigen 作为必经段，但老鹰之路、Valldal 山谷、Gudbrandsjuvet 和大西洋公路依然足够精彩，而且路线更稳定、执行风险更低。对婚假行程来说，这种“少一点赌路况、多一点确定性”的版本反而更合理。\n\n---\n\n## 附录四：一句话总结\n\n这 9 天，你们会在哥本哈根的新港运河边看彩色房子倒映在夕阳里，在伊埃斯科城堡的迷宫花园里牵手，然后飞到挪威，坐着世界最陡的火车滑入峡湾，开车经过悬在空中的老鹰之路、Valldal 山谷的 Gudbrandsjuvet 和冲入海里的大西洋公路。\n\n**这是丹麦的温柔与挪威的壮丽，写给彼此最好的婚假情书。**\n\n---\n\n*文档生成时间：2026 年 4 月*  \n*祝你们旅途愉快，新婚快乐！*\n",
      b: "# 冰岛｜火山与冰川的环岛史诗｜9 天婚假执行手册\n\n> **旅行时间**：6～8 月（夏季/午夜阳光窗口）  \n> **旅行人数**：2 人（婚假）  \n> **总天数**：9 天 8 晚  \n> **核心目的地**：雷克雅未克 → 斯奈山半岛 → 北部冰岛 → 东部峡湾 → 南部海岸 → 黄金圈  \n> **人均预算**：3.5～4.5 万元人民币（2 人总计约 7～9 万元）\n\n---\n\n## 为什么选冰岛？\n\n如果你们想要的是**\"地球上最不像地球的地方\"**，那么冰岛是唯一的答案。\n\n这里没有森林，没有高楼大厦，甚至没有蚊子。整个国家建在一座巨大的火山岛上，地表被熔岩、苔藓、冰川和瀑布覆盖。夏季的冰岛拥有**午夜阳光**——太阳在午夜时分依然悬挂在地平线上方，把天空染成淡粉色。这意味着你们可以晚上 11 点还在黑沙滩上看海浪，凌晨 1 点还在钻石沙滩上拍冰块。\n\n与挪威相比：\n- **挪威**是深邃峡湾与红色渔民小屋的\"壮丽度假\"；\n- **冰岛**是火山喷发口、冰川舌和黑沙滩的\"异世界探险\"。\n\n作为婚假，冰岛是一场**探险型浪漫**。你们会一起走过两大洲的裂缝，一起在冰川上徒步，一起在温泉里看黑色熔岩原。这种共同经历的\" WOW 时刻\"，会让这趟旅行成为你们关系里的一个里程碑。\n\n---\n\n## 行程总览\n\n| 天数 | 星期 | 路线 | 住宿地 | 核心体验 | 开车距离 |\n|:---:|:---:|:---|:---|:---|:---:|\n| D1 | 六 | 国内 → 雷克雅未克 | 雷克雅未克 | 蓝湖温泉、首都漫步、适应极昼 | 约 50 km |\n| D2 | 日 | 雷克雅未克 → 斯奈山半岛 | 斯蒂基斯霍尔米 | 教会山、黑教堂、阿尔纳斯塔皮悬崖 | 约 200 km |\n| D3 | 一 | 斯奈山半岛 → 北部冰岛 | 阿克雷里 | 犀牛石、锡格吕菲厄泽、冰岛最北小镇 | 约 350 km |\n| D4 | 二 | 北部冰岛 → 米湖 | 米湖/埃伊尔斯塔济 | 黛提瀑布、众神瀑布、米湖地热区 | 约 250 km |\n| D5 | 三 | 米湖 → 东部峡湾 | 埃伊尔斯塔济 | 塞济斯菲厄泽、都皮沃古尔、野生驯鹿 | 约 200 km |\n| D6 | 四 | 东部峡湾 → 杰古沙龙冰河湖 | 霍芬/教堂镇 | 冰河湖船游、钻石沙滩、冰川徒步 | 约 280 km |\n| D7 | 五 | 南部海岸 | 维克/塞尔福斯 | 黑沙滩、斯科加瀑布、塞里雅兰瀑布 | 约 200 km |\n| D8 | 六 | 黄金圈 → 雷克雅未克 | 雷克雅未克 | 辛格维利尔国家公园、间歇泉、黄金瀑布 | 约 200 km |\n| D9 | 日 | 雷克雅未克 → 国内 | — | 返程 | 约 50 km |\n\n> **设计逻辑**：经典的 1 号公路逆时针环岛。D1 从凯夫拉维克机场取车，D9 机场还车，全程一辆车，行李始终在后备箱里。每天开车 2～4 小时，景点密集但节奏可控。\n\n---\n\n# D1｜国内 → 雷克雅未克（Reykjavík）\n**主题：抵达世界尽头**\n\n![蓝湖温泉](./images/blue_lagoon.jpg)\n*蓝湖温泉——黑色熔岩原中的奶蓝色温泉*\n\n## 交通\n- **航班**：建议选择 **冰岛航空 Icelandair** 或 **北欧航空 SAS** 的直飞或一次转机航班，**下午 14:00-17:00 抵达凯夫拉维克国际机场（KEF）** 最佳。\n- **机场 → 蓝湖**：约 20 分钟车程。蓝湖位于机场和雷克雅未克之间，是抵达后放松的最佳第一站。\n- **租车**：强烈建议在**凯夫拉维克机场取车**，并租满 9 天。夏季环岛推荐租 **四驱 SUV**（如斯巴鲁 Outback、丰田 RAV4、路虎 Discovery），因为部分路段是碎石路，且风大时轿车容易飘。\n- **主要租车公司**：Hertz、Avis、Budget、Blue Car Rental（冰岛本地口碑极好）。\n\n## 下午：蓝湖温泉（Blue Lagoon）\n- 这是冰岛最著名的地热温泉，水温常年保持在 37～39℃。\n- 湖水呈奶蓝色，是因为富含二氧化硅和矿物质。池底覆盖着白色的硅泥，可以免费取用敷脸。\n- **预订提示**：必须**提前在官网预订入场时段**。建议预订下午 16:00-18:00 的场次（如果航班较早）或抵达当天晚上（如果航班下午到达）。\n- **套餐**：Comfort（基础，约 80 欧元）含毛巾和一杯饮品；Premium（约 110 欧元）额外含浴袍、拖鞋和面膜小样。\n\n## 晚上：雷克雅未克市区\n- **自驾**：蓝湖 → 雷克雅未克市区约 45 分钟。\n- **住宿**：\n  - **推荐：Ion Adventure Hotel**（设计酒店，位于市区外 1 小时，极光/熔岩景观极佳，但偏离环岛路线）\n  - **更实用：Reykjavík Residence Hotel**（位于市中心，步行到主街，有厨房可以自己做早餐）\n  - 价格：约 2000～3500 元人民币/晚。\n- **晚餐**：\n  - **Grillmarkaðurinn**（\"烧烤市场\"，冰岛最佳餐厅之一，羊肉和鲸鱼排很有名，人均约 800 元）\n  - 或 **Bæjarins Beztu Pylsur**（冰岛最著名的热狗摊，克林顿曾光顾，约 50 元一个，位于港口边）\n\n> **小贴士**：冰岛夏季天黑只有约 2 小时（而且是\"黄昏\"而不是真正的黑）。抵达当晚不用早睡，趁天还亮着在市区逛逛，感受\"时间被偷走\"的奇妙感。\n\n---\n\n# D2｜雷克雅未克 → 斯奈山半岛（Snæfellsnes）\n**主题：冰岛缩影**\n\n![教会山与瀑布](./images/kirkjufell.jpg)\n*斯奈山半岛的教会山（Kirkjufell）与教会山瀑布*\n\n斯奈山半岛被称为\"冰岛缩影\"，因为这里集中了冰岛几乎所有地貌：火山、冰川、黑沙滩、熔岩原、渔村和瀑布。\n\n## 自驾路线\n- **路线**：雷克雅未克 → Borgarnes（约 1 小时）→ 斯奈山半岛环岛 → 斯蒂基斯霍尔米（Stykkishólmur）。\n- **总里程**：约 200 公里。\n- **开车时间**：约 3～4 小时（含多次停车）。\n\n## 途中亮点\n\n### 教会山（Kirkjufell）与教会山瀑布\n- 教会山是一座高约 463 米的独立山峰，形状像一座教堂的尖顶，因此得名。\n- 它出现在《权力的游戏》第七季中，是\"箭头山\"的取景地。\n- **最佳拍摄点**：山脚下的 Kirkjufellsfoss 瀑布。从瀑布后方的小桥拍摄，可以把瀑布作为前景、教会山作为背景。\n- **时间建议**：夏季午夜阳光期间（晚上 10 点以后），游客散去，光线柔和，是拍摄的最佳时机。\n\n### 阿尔纳斯塔皮（Arnarstapi）与海德纳尔（Hellnar）\n- 这两个小渔村位于半岛南岸，之间有著名的**悬崖步道**。\n- **Gatklettur 海蚀洞**：一个天然形成的拱形岩石洞，海浪从中穿过。\n- **Lóndrangar 怪物海岸**：两座从海中拔地而起的玄武岩柱，高达 75 米，传说中这里是巨魔被阳光石化后留下的。\n\n### 黑教堂（Búðakirkja）\n- 位于 Búðir 小村的黑色木质教堂，矗立在一片熔岩原中，背景是远处的雪山和海洋。\n- 这是冰岛最具代表性的\"孤独感\"照片机位之一。夏季时，周围的苔原会开满紫色和粉色的野花。\n\n## 住宿\n**斯蒂基斯霍尔米（Stykkishólmur）**\n- 这是斯奈山半岛最大的小镇（人口约 1100），也是电影《白日梦想家》中格陵兰小镇的取景地。\n- **推荐：Hotel Fransiskus**，由一座老修道院改造而成，安静且富有历史感。\n- 或 **Airbnb 海景小屋**：半岛上有很多独立的度假小屋，带厨房，可以自己做饭。\n\n---\n\n# D3｜斯奈山半岛 → 北部冰岛（North Iceland）\n**主题：穿越冰岛心脏**\n\n![犀牛石 Hvítserkur](./images/hvitserkur.jpg)\n*Vatnsnes 半岛上的犀牛石 Hvítserkur*\n\n## 自驾路线\n- **路线**：斯蒂基斯霍尔米 → Vatnsnes 半岛（犀牛石）→ Blönduós → 锡格吕菲厄泽（Siglufjörður）→ 阿克雷里（Akureyri）。\n- **总里程**：约 350 公里。\n- **开车时间**：约 5～6 小时（含停车）。\n\n## 途中亮点\n\n### 犀牛石（Hvítserkur）\n- 位于 Vatnsnes 半岛海岸边，是一座高约 15 米的玄武岩海蚀柱。\n- 从某个角度看，它像一头正在饮水的犀牛（或大象、巨龙）。\n- 低潮时可以走到礁石附近，涨潮时它被海水环绕，更加神秘。\n\n### 锡格吕菲厄泽（Siglufjörður）\n- 冰岛本岛最北端的小镇，曾是 20 世纪初冰岛鲱鱼产业的中心。\n- **鲱鱼时代博物馆（Herring Era Museum）**：了解这个小镇曾经的辉煌，博物馆内还保留着当年的工厂设备和渔村场景。\n- 小镇被高山环绕，夏天时野花遍野，色彩极为丰富。\n\n## 住宿\n**阿克雷里（Akureyri）**\n- 冰岛第二大城市（人口约 1.8 万），被称为\"北方之都\"。\n- **推荐：Hotel Kea**，位于市中心主街，历史悠久，位置极佳。\n- 或 **Icelandair Hotel Akureyri**，位于植物园旁边，环境安静。\n- **红心信号灯**：阿克雷里的红绿灯是爱心形状的——这是 2008 年金融危机后，当地政府为了提振民心而做的改变，现在已成为城市的标志。\n\n## 晚餐\n阿克雷里的餐厅比南部性价比更高。推荐 **Rub 23**（亚洲融合海鲜，人均约 500 元）或 **Bautinn**（冰岛传统菜，羊肉汤和龙虾汤很棒）。\n\n---\n\n# D4｜北部冰岛 → 米湖（Mývatn）\n**主题：火山与瀑布的交响曲**\n\n![黛提瀑布 Dettifoss](./images/dettifoss.jpg)\n*欧洲水量最大的瀑布——黛提瀑布*\n\n## 自驾路线\n- **路线**：阿克雷里 → 众神瀑布（Goðafoss）→ 米湖（Mývatn）→ 黛提瀑布（Dettifoss）→ 埃伊尔斯塔济（Egilsstaðir）。\n- **总里程**：约 250 公里。\n- **开车时间**：约 4～5 小时（山路+碎石路）。\n\n## 途中亮点\n\n### 众神瀑布（Goðafoss）\n- 名字意为\"众神的瀑布\"，因为公元 1000 年冰岛皈依基督教时，当地首领在这里将旧神像投入瀑布中。\n- 瀑布呈弧形，宽约 30 米，水流分散成多道水帘，夏季时周围的苔原翠绿，非常适合拍照。\n\n### 米湖地热区（Námafjall Hverir）\n- 这里是冰岛最活跃的地热区之一，地表布满硫磺坑、蒸汽孔和沸腾的泥浆池。\n- **景观**：地面呈现出橙黄、灰白、暗红的斑斓色彩，空气中弥漫着浓烈的硫磺味（像臭鸡蛋）。\n- 附近还有 **Grjótagjá 洞穴温泉**——《权力的游戏》中琼恩·雪诺和耶哥蕊特的\"定情之地\"。但水温现在过高，已禁止泡澡，只能外观。\n\n### 黛提瀑布（Dettifoss）\n- **欧洲水量最大的瀑布**，每秒流量可达 500 立方米。\n- 瀑布宽约 100 米，落差 44 米，水流从宽阔的悬崖边缘倾泻而下，发出雷鸣般的轰鸣。\n- **电影取景地**：它是雷德利·斯科特《普罗米修斯》开场的外星景观取景地。\n- **注意**：通往瀑布的 864 号公路是**碎石路**，对底盘较低的车不太友好。建议开慢一点（限速 80，建议开到 40-50）。\n\n## 住宿\n**埃伊尔斯塔济（Egilsstaðir）**\n- 冰岛东部最大的城镇，是东部峡湾的门户。\n- **推荐：Lake Hotel Egilsstaðir**，位于 Lake Lagarfljót 湖边，风景宁静。\n- 或 **Airbnb 小屋**：东部住宿选择较少，建议提前预订。\n\n---\n\n# D5｜东部峡湾（East Fjords）\n**主题：冰岛最安静的角落**\n\n![塞济斯菲厄泽 Seyðisfjörður](./images/seydisfjordur.jpg)\n*塞济斯菲厄泽的彩虹路和蓝色教堂*\n\n东部峡湾是冰岛游客最少、却最具回报的地区之一。这里没有著名的\"大景点\"，但每一个转弯都是一幅画。\n\n## 自驾路线\n- **路线**：埃伊尔斯塔济 → 塞济斯菲厄泽（Seyðisfjörður）→ 都皮沃古尔（Djúpivogur）→ 埃伊尔斯塔济。\n- **总里程**：约 200 公里（往返+支线）。\n- **开车时间**：约 4 小时。\n\n## 途中亮点\n\n### 塞济斯菲厄泽（Seyðisfjörður）\n- 一座藏在峡湾尽头的小镇，以**蓝色教堂（Bláa Kirkjan）**和教堂前的**彩虹路**闻名。\n- 小镇四周是 1000 多米高的雪山，夏天时瀑布从山上倾泻而下，直接流进海里。\n- 这里是冰岛艺术氛围最浓的小镇之一，有很多画廊和独立设计师的工作室。\n- **轮渡**：从丹麦法罗群岛和丹麦本土开往冰岛的 Smyril Line 轮渡，就停靠在这个小镇。\n\n### 都皮沃古尔（Djúpivogur）\n- 一个安静的渔村，以**\"蛋步道（Eggin í Gleðivík）\"**闻名——海边排列着 34 颗巨大的花岗岩蛋，代表冰岛本地 34 种鸟类。\n- 从都皮沃古尔向南远眺，可以看到冰岛最高的独立山峰 **Hvannadalshnúkur**（2110 米，位于瓦特纳冰川上）。\n\n### 野生驯鹿\n- 冰岛唯一的本土大型哺乳动物就是**驯鹿**（19 世纪从挪威引入），而东部峡湾是它们最主要的栖息地。\n- 夏季时，驯鹿会出现在高地和峡湾之间的平原上。如果运气好，你们会在路边看到一群棕色的驯鹿正在吃草。\n\n## 住宿\n回到埃伊尔斯塔济住宿，或者继续向东开到 **Brekkan** 或 **Fáskrúðsfjörður** 的小旅馆。\n\n---\n\n# D6｜东部峡湾 → 杰古沙龙冰河湖（Jökulsárlón）\n**主题：冰与钻石**\n\n![杰古沙龙冰河湖](./images/jokulsarlon.jpg)\n*杰古沙龙冰河湖上的蓝色浮冰*\n\n这一天是冰岛**最梦幻的一天**。你们会从安静的峡湾驶入冰的世界。\n\n## 自驾路线\n- **路线**：埃伊尔斯塔济 → 霍芬镇（Höfn）→ 杰古沙龙冰河湖。\n- **总里程**：约 280 公里。\n- **开车时间**：约 4 小时。\n\n## 途中亮点\n\n### 杰古沙龙冰河湖（Jökulsárlón）\n- 冰岛最著名的自然景点之一，也是**007《择日而亡》和《古墓丽影》的取景地**。\n- 这是一个深达 200 米的冰川湖，巨大的蓝色冰块从 Breiðamerkurjökull 冰川断裂后漂浮在湖面上。\n- **冰河湖船游（必体验）**：\n  - **两栖船（Amphibian Boat）**：约 40 分钟，可以近距离看到浮冰和海豹。\n  - **快艇（Zodiac Boat）**：约 1 小时，穿梭在大冰块之间，体验更震撼。\n  - **预订**：必须提前在官网预订，夏季每天有很多班次。\n\n### 钻石沙滩（Diamond Beach）\n\n![钻石沙滩](./images/diamond_beach.jpg)\n*钻石沙滩上的冰块在阳光下闪烁*\n\n- 冰河湖对面就是钻石沙滩。冰川碎块被海浪冲上岸，散落在黑色的火山沙滩上。\n- 在阳光下，透明的冰块像钻石一样闪烁，因此得名。\n- **午夜阳光拍摄**：夏季晚上 10 点以后游客散去，光线低平，是拍摄冰块最好的时间。你们可以一直待到晚上 11 点，天依然亮着。\n\n### 冰川徒步（可选）\n- 如果时间充裕，可以在 **斯卡夫塔山（Skaftafell）** 参加冰川徒步团。这里有瓦特纳冰川的分支，可以在向导带领下踏上冰川表面，探索冰缝和冰洞。\n- 冰川徒步约 3 小时，需提前预订（推荐 Icelandic Mountain Guides 或 Troll Expeditions）。\n\n## 住宿\n**霍芬镇（Höfn）或教堂镇（Kirkjubæjarklaustur）**\n- 霍芬镇以**龙虾**闻名，是吃冰岛龙虾汤（Humar Soup）的最佳地点。推荐餐厅 **Humarhöfnin**。\n- 住宿选择：Hotel Höfn 或附近的农场民宿。\n\n---\n\n# D7｜南部海岸（South Coast）\n**主题：瀑布与黑沙滩**\n\n![黑沙滩 Reynisfjara](./images/reynisfjara.jpg)\n*维克镇附近的雷尼斯黑沙滩与玄武岩柱*\n\n南部海岸是冰岛景点最密集的一段路，每隔几公里就有一个世界级景观。\n\n## 自驾路线\n- **路线**：霍芬 → 斯卡夫塔山 → 维克（Vík）→ 斯科加瀑布（Skógafoss）→ 塞里雅兰瀑布（Seljalandsfoss）→ 塞尔福斯（Selfoss）/ 维克。\n- **总里程**：约 200 公里。\n- **开车时间**：约 3～4 小时（不含徒步和拍照时间）。\n\n## 途中亮点\n\n### 斯卡夫塔山自然保护区（Skaftafell）\n- 瓦特纳冰川国家公园的一部分，拥有冰岛最好的徒步路线。\n- **斯瓦蒂瀑布（Svartifoss）**：往返徒步约 1.5 小时，瀑布被黑色的六角形玄武岩柱环绕，像一座天然管风琴。\n\n### 维克镇（Vík）与黑沙滩（Reynisfjara）\n- **维克镇**：冰岛最南端的村庄，红顶教堂（Vík í Mýrdal Church）坐落在山坡上，是经典的冰岛南部照片机位。\n- **雷尼斯黑沙滩（Reynisfjara）**：\n  - 黑色的火山沙、汹涌的白色海浪、海边矗立着巨大的**玄武岩柱**。\n  - 海中有 **Reynisdrangar 岩柱群**，传说是巨魔被阳光石化后形成的。\n  - **安全警告**：这里的海浪非常危险，存在\"疯狗浪（Sneaker Waves）\"，会突然冲上沙滩把人卷走。**请与海浪保持至少 30 米距离，绝对不要背对大海。**\n\n### 斯科加瀑布（Skógafoss）\n\n![斯科加瀑布](./images/skogafoss.jpg)\n*斯科加瀑布——冰岛最壮丽的瀑布之一*\n\n- 宽约 25 米，落差 60 米，水流从悬崖上直接砸下来，气势磅礴。\n- 瀑布右侧有步道可以爬到山顶，俯瞰瀑布和南岸平原。\n- 晴天时，瀑布水雾中几乎永远有双彩虹。\n\n### 塞里雅兰瀑布（Seljalandsfoss）\n- 冰岛最上镜的瀑布之一，因为可以**走到瀑布后方**。\n- 穿上防水外套和鞋，沿着小径绕到瀑布后面，从水帘内部看世界——这是一种独特的体验。\n- 瀑布旁边还有一个隐藏的 **Gljúfrabúi（秘密瀑布）**，藏在一个峡谷里，需要蹚水进入。\n\n## 住宿\n**塞尔福斯（Selfoss）或维克镇**\n- Selfoss 是南部较大的城镇，有超市和餐厅。推荐 **Hotel South Coast** 或 **The Greenhouse Hotel**（设计酒店，有屋顶温泉池）。\n\n---\n\n# D8｜黄金圈（Golden Circle）→ 雷克雅未克\n**主题：冰岛的心跳**\n\n![黄金瀑布 Gullfoss](./images/gullfoss.jpg)\n*黄金瀑布——欧洲最著名的瀑布之一*\n\n黄金圈是冰岛最经典的旅游路线，由三个景点组成：辛格维利尔国家公园、间歇泉地热区和黄金瀑布。这一天是环岛之旅的完美收尾。\n\n## 自驾路线\n- **路线**：塞尔福斯 → 辛格维利尔（Þingvellir）→ 间歇泉（Geysir）→ 黄金瀑布（Gullfoss）→ 雷克雅未克。\n- **总里程**：约 200 公里。\n- **开车时间**：约 3 小时（不含游览时间）。\n\n## 途中亮点\n\n### 辛格维利尔国家公园（Þingvellir）\n- **世界文化遗产**，世界上最古老的民主议会（Alþingi）于公元 930 年在此成立。\n- **板块裂缝**：这里是**欧亚板块与北美板块的交界处**。你们可以徒步走在两大洲之间的裂缝中，两侧的岩壁是板块撕裂后留下的痕迹。\n- **丝浮拉大裂缝（Silfra）浮潜**：\n  - 这是地球上最清澈的水域之一，能见度超过 100 米。\n  - 穿着干式潜水服，在冰川融水中浮潜，左手摸欧亚板块，右手摸北美板块。\n  - 需提前预订（推荐 Dive.is），价格约 2000 元人民币/人。\n\n### 盖歇尔地热区（Geysir Geothermal Area）\n\n![史托克间歇泉 Strokkur](./images/geysir.jpg)\n*史托克间歇泉喷发瞬间*\n\n- 这里的大间歇泉 Geysir 已很少喷发，但它的\"小弟弟\" **Strokkur** 非常活跃。\n- **Strokkur 每隔 5～10 分钟喷发一次**，滚烫的水柱直冲 20～30 米高空。每次喷发前，水面会先鼓起一个巨大的蓝色水泡，这是按下快门的最佳时机。\n\n### 黄金瀑布（Gullfoss）\n- 宽约 70 米，落差 32 米，分两层倾泻而下。\n- 晴天时，瀑布水雾中会出现彩虹；阳光照射在水面上时，瀑布会泛出金色光芒，因此得名\"黄金瀑布\"。\n\n## 晚上：雷克雅未克\n- **住宿**：回到雷克雅未克市区的酒店。\n- **晚餐**：\n  - **Dill**（冰岛唯一的米其林一星餐厅，新北欧料理，需提前预订，人均约 1500 元）\n  - 或 **Slippbarinn**（创意鸡尾酒和本地海鲜，氛围轻松）\n- **最后的午夜阳光**：晚上 10 点后去太阳航海者雕塑（Sólfar）或哈帕音乐厅（Harpa）看最后一次极昼日落。\n\n---\n\n# D9｜雷克雅未克 → 国内\n**主题：从异世界回到现实**\n\n![辛格维利尔国家公园](./images/thingvellir.jpg)\n*辛格维利尔国家公园的板块裂缝*\n\n- **上午**：如果航班在下午或晚上，可以前往 **雷克雅内斯半岛（Reykjanes）** 做最后的短途自驾（距离机场很近）。\n  - **横跨两大洲之桥（Bridge Between Continents）**：再次踏足欧亚与北美板块之间。\n  - **Gunnuhver 地热区**：蒸汽弥漫的火山地貌。\n  - **蓝湖温泉**：如果 D1 没来得及去，或者想再去一次，可以安排在返程当天。\n- **机场还车**：凯夫拉维克机场（KEF）还车，办理登机手续。\n- **购物**：机场免税店可以买到 **Bioeffect 精华**、**蓝湖面膜**、**冰岛羊毛毛衣（Lopapeysa）** 和 **OMNOM 巧克力**。\n\n---\n\n## 附录一：全程预算拆分（2 人总计）\n\n| 项目 | 金额（人民币） | 说明 |\n|:---|:---:|:---|\n| **国际往返机票** | 25,000～35,000 | 暑假直飞/一次转机经济舱，约 1.2～1.8 万/人 |\n| **租车（9 天）** | 12,000～18,000 | 四驱 SUV，含全险（碎石险、超级碰撞险强烈建议购买） |\n| **油费** | 3,500～5,000 | 环岛约 2000 公里，冰岛油价约 14～16 元/升 |\n| **住宿（8 晚）** | 20,000～32,000 | 旺季冰岛住宿紧张，普通酒店/民宿约 1500～3000 元/晚 |\n| **餐饮** | 12,000～18,000 | 外食人均 300～500 元/顿，超市自己做人均 100 元/顿 |\n| **门票/体验** | 4,000～7,000 | 蓝湖温泉、冰河湖船游、冰川徒步、浮潜（可选） |\n| **签证/保险/杂费** | 2,000～3,000 | 申根签证约 800 元/人，保险 200 元/人 |\n| **总计** | **约 78,500～118,000 元** | **人均 3.9～5.9 万** |\n\n> **省钱小贴士**：冰岛是北欧消费最高的国家。建议每天至少有一餐在超市（Bónus\"小猪超市\"、Krónan）买食材自己做。民宿通常带厨房，煮一碗泡面加煎三文鱼排，既省钱又温馨。\n\n---\n\n## 附录二：行前准备清单\n\n### 证件与签证\n- [ ] **申根签证（冰岛）**：至少提前 6～8 周申请。冰岛签证通常由丹麦签证中心代办（因为丹麦驻北京大使馆代管冰岛签证事务）。\n- [ ] 护照（有效期 6 个月以上）。\n- [ ] 驾照原件 + 英文翻译件（租租车 APP 可免费办理）。\n- [ ] 旅行保险（申根强制要求，保额 ≥ 3 万欧元）。\n\n### 预订确认（按优先级）\n1. [ ] 国际机票\n2. [ ] 凯夫拉维克机场租车（9 天四驱 SUV，建议购买全险）\n3. [ ] 雷克雅未克、阿克雷里、霍芬等地的住宿（夏季提前 2～3 个月预订）\n4. [ ] 蓝湖温泉门票（bluelagoon.com）\n5. [ ] 杰古沙龙冰河湖船游（jokulsarlon.is 或 Guide to Iceland）\n6. [ ] 冰川徒步团（Icelandic Mountain Guides / Troll Expeditions）\n7. [ ] 丝浮拉大裂缝浮潜（Dive.is，可选）\n\n### 衣物与装备\n- [ ] **防水冲锋衣 + 防水裤**：冰岛夏季多雨，瀑布区域水雾极大。\n- [ ] **防水徒步鞋/登山鞋**：黑沙滩、瀑布、冰川徒步都需要。\n- [ ] **抓绒衣 + 薄羽绒服**：夏季气温 10～15℃，山顶和海边风大时体感更低。\n- [ ] **防水手套 + 毛线帽**：冰川徒步和观鲸时必备。\n- [ ] **防晒霜 + 墨镜**：极昼下紫外线极强，雪地/冰川反射严重。\n- [ ] **转换插头**：冰岛使用欧标 C/F 型插头。\n- [ ] **保温杯/便携烧水壶**\n- [ ] **泳衣**：泡温泉用。\n- [ ] **少量零食/泡面/自热火锅**\n\n### APP 下载\n- **Google Maps**：离线地图必备（很多山区没信号）。\n- **Vedur**：冰岛气象局官方 APP，查询天气预报和极光指数。\n- **SafeTravel Iceland**：冰岛安全旅行官方 APP，查询道路封闭和路况预警。\n- **Parka / EasyPark**：冰岛停车缴费 APP。\n\n---\n\n## 附录三：关键决策说明（FAQ）\n\n### Q1：冰岛夏季自驾安全吗？\n只要遵守交通规则、时刻关注天气、不要开快车，**非常安全**。冰岛 1 号公路（Ring Road）维护极好，全程铺装路面。但需要注意：\n- **侧风极大**：冰岛常年刮大风，开门时要用双手扶住车门，否则车门可能被风吹断（这种损坏保险通常不赔）。\n- **羊群**：夏季公路两边常有羊群 wandering，它们可能会突然冲上马路。\n- **碎石路**：通往黛提瀑布、部分东部峡湾支路是碎石路，建议租底盘较高的 SUV。\n\n### Q2：为什么不顺时针环岛？\n逆时针和顺时针都可以。我们选择逆时针，是因为把南部海岸和黄金圈放在后半段。这样如果前几天在北部或东部因为天气原因耽搁了，后几天在南部（靠近首都和机场）更容易调整行程。另一个原因是：逆时针时，南部海岸的瀑布和黑沙滩是在你们的右侧（行车方向），停车观景更方便。\n\n### Q3：冰川徒步和浮潜需要经验吗？\n**不需要**。冰川徒步团会提供冰爪、冰镐、头盔和安全绳，向导会手把手教你。只要身体健康、能正常行走即可。浮潜（Silfra）需要会游泳，但不需要潜水证——穿着干式潜水服，人其实是浮在水面上的，只需要用嘴呼吸管呼吸即可。\n\n### Q4：冰岛能看到极光吗？\n夏季（6～8 月）**看不到极光**。因为午夜阳光的存在，天空始终不够黑。想看极光需要 9 月中旬以后。夏季的补偿是：你们有几乎 24 小时的日照，每天可以利用的时间非常长。\n\n### Q5：如果预算充裕，有什么可以提升体验的？\n- **直升机观光**：从空中俯瞰火山口、冰川舌和瀑布，震撼度翻倍。\n- **高地徒步（Landmannalaugar）**：冰岛高地是徒步圣地，但普通租车无法进入，需要租四驱越野车或参加越野团。\n- **米其林餐厅 Dill**：冰岛唯一的米其林一星，需提前数月预订。\n\n---\n\n## 附录四：一句话总结\n\n这 9 天，你们会一起走过两大洲的裂缝，一起在蓝湖的奶蓝色温泉里放松，一起在世界最清澈的湖水中浮潜，一起在黑沙滩上看巨浪拍打玄武岩柱，一起在午夜阳光下拍下钻石沙滩上的冰块。\n\n**这是冰岛在夏天唯一的样子，也是你们人生中最像电影的一场旅行。**\n\n---\n\n*文档生成时间：2026 年 4 月*  \n*祝你们旅途愉快，新婚快乐！*\n",
      c: "# 瑞典 + 丹麦｜群岛、生蚝与童话｜9 天婚假执行手册\n\n> **旅行时间**：6～8 月（夏季/白夜窗口）  \n> **旅行人数**：2 人（婚假）  \n> **总天数**：9 天 8 晚  \n> **核心目的地**：斯德哥尔摩 → 哥德堡 → 瑞典西海岸 → 马尔默 → 哥本哈根  \n> **人均预算**：2.5～3.5 万元人民币（2 人总计约 5～7 万元）\n\n---\n\n## 为什么选瑞典 + 丹麦？\n\n这是北欧**最轻松、最丰富、最无感跨国**的两国组合。\n\n瑞典和丹麦通过一座桥相连——从马尔默坐火车到哥本哈根只要 35 分钟，窗外就是厄勒海峡的蔚蓝海水。你们甚至不需要提前去机场、不需要安检、不需要托运行李。这更像是\"从一个城市去另一个城市\"，而不是\"从一个国家去另一个国家\"。\n\n- **瑞典**负责文艺与自然：斯德哥尔摩的地铁艺术、瓦萨沉船博物馆、西海岸的渔村与生蚝。\n- **丹麦**负责童话与美食：哥本哈根的新港彩色房子、米其林餐厅、北西兰岛的城堡与现代美术馆。\n\n作为婚假，这个组合是**\"好吃、好逛、好看、不累\"**的代名词。没有挪威峡湾的险峻山路，没有冰岛环岛的天气多变，只有铺装良好的公路、设计精美的城市和夏天 18 小时的白昼。\n\n**如果你们想要的是一场\"优雅且丰富\"的蜜月，这就是最好的答案。**\n\n---\n\n## 行程总览\n\n| 天数 | 星期 | 路线 | 住宿地 | 核心体验 | 开车距离 |\n|:---:|:---:|:---|:---|:---|:---:|\n| D1 | 六 | 国内 → 斯德哥尔摩 | 斯德哥尔摩 | 老城 Gamla Stan、王宫换岗、适应白夜 | — |\n| D2 | 日 | 斯德哥尔摩 | 斯德哥尔摩 | 瓦萨博物馆、地铁艺术巡礼、群岛游船 | — |\n| D3 | 一 | 斯德哥尔摩 → 哥德堡 | 哥德堡 | 高铁南下、鱼市教堂、Haga 区咖啡 | — |\n| D4 | 二 | 哥德堡 → 西海岸 | 斯莫根/菲亚巴卡 | 自驾西海岸景观路、出海捕生蚝、悬崖酒店 | 约 150 km |\n| D5 | 三 | 西海岸 → 马尔默 | 马尔默 | 厄勒海峡海滨、旋转大楼、西港漫步 | 约 200 km |\n| D6 | 四 | 马尔默 → 哥本哈根 | 哥本哈根 | 坐火车过厄勒海峡大桥、新港、阿美琳堡宫 | — |\n| D7 | 五 | 哥本哈根 | 哥本哈根 | 克里斯蒂安堡宫、Torvehallerne、趣伏里公园 | — |\n| D8 | 六 | 北西兰岛 | 哥本哈根 | 克伦堡城堡、路易斯安那现代美术馆 | 约 100 km |\n| D9 | 日 | 哥本哈根 → 国内 | — | 返程 | — |\n\n> **设计逻辑**：斯德哥尔摩 2 天城市文艺；哥德堡 1 天+西海岸 1.5 天海鲜与自然；马尔默 0.5 天中转；哥本哈根 2.5 天童话与美食。全程只有一次跨国（火车 35 分钟），自驾集中在瑞典西海岸一段。\n\n---\n\n# D1｜国内 → 斯德哥尔摩（Stockholm）\n**主题：北方威尼斯的初印象**\n\n![斯德哥尔摩老城 Gamla Stan](./images/gamla_stan.jpg)\n*斯德哥尔摩老城 Gamla Stan 的彩色房子与石板路*\n\n## 交通\n- **航班**：建议选择 **北欧航空 SAS**、**芬兰航空** 或 **中国国际航空** 的直飞/一次转机航班，**下午 14:00-17:00 抵达斯德哥尔摩阿兰达机场（ARN）** 最佳。\n- **机场 → 市区**：\n  - **机场快线（Arlanda Express）**：20 分钟直达中央车站（Stockholm C），最快但最贵（约 300 SEK/人）。\n  - **通勤火车（Pendeltåg）**：约 40 分钟，价格便宜（约 150 SEK/人）。\n- **市内交通**：斯德哥尔摩地铁和公交非常发达。建议购买 **72 小时交通卡（SL Access Card）**。\n\n## 住宿\n**推荐：Hotel Diplomat 或 Ett Hem**\n- **Hotel Diplomat**：位于 Strandvägen 海滨大道，面对 Nybroviken 港湾，Art Nouveau 建筑风格，位置极佳。\n- **Ett Hem**：位于 Östermalm 区，由一座 1910 年的私人宅邸改造而成的设计酒店，只有 12 间房，是斯德哥尔摩最浪漫的精品酒店之一（需提前数月预订）。\n- 价格：约 2500～4500 SEK/晚。\n\n## 活动\n- **傍晚**：在老城 **Gamla Stan** 散步。这里是欧洲保存最完好的中世纪老城之一，鹅卵石街道、彩色木屋、狭窄的巷道和金色的街灯，让人仿佛穿越回 17 世纪。\n- **晚餐**：\n  - **Den Gyldene Freden**：位于老城内的传统瑞典餐厅，诺贝尔奖得主每年都在这里聚餐。推荐瑞典肉丸（Köttbullar）和腌鲱鱼（Sill）。\n  - 或 **Oaxen Slip**：位于船岛上，米其林推荐，主打北欧海鲜，人均约 600 SEK。\n- **小贴士**：6～8 月的斯德哥尔摩晚上 10 点才天黑。吃完晚饭后可以在海滨步道上散步，看白色的游艇停泊在港湾里。\n\n---\n\n# D2｜斯德哥尔摩（Stockholm）\n**主题：世界最长画廊与沉船传奇**\n\n![瓦萨博物馆内的瓦萨号战船](./images/vasa_museum.jpg)\n*瓦萨博物馆内保存完好的 17 世纪战船*\n\n## 上午：瓦萨沉船博物馆（Vasa Museum）\n- 这是斯德哥尔摩**最受欢迎的博物馆**，也是世界上唯一一艘保存完好的 17 世纪战舰。\n- **瓦萨号（Vasa）**：1628 年首航当天就在斯德哥尔摩港沉没，因为在建造时上层建筑过重、吃水线设计错误。它在海底沉睡了 333 年，直到 1961 年才被打捞上岸。\n- **看点**：船体高约 52 米，船头和船尾雕刻着数百个神话人物和动物形象，极尽奢华。博物馆内还可以看到从沉船中打捞出的船员遗骸和随身物品。\n- **参观时间**：约 1.5～2 小时。\n\n## 下午：斯德哥尔摩地铁艺术巡礼\n\n![斯德哥尔摩地铁艺术](./images/stockholm_metro.jpg)\n*斯德哥尔摩地铁站内的岩洞艺术*\n\n斯德哥尔摩地铁被称为**\"世界最长画廊\"**，因为超过 90 个车站里都有艺术家的装置作品、壁画或雕塑。\n\n- **推荐站点**：\n  - **T-Centralen（蓝线）**：天花板和立柱上画着蓝色的藤蔓和花朵，像一座地下花园。\n  - **Stadion（红线）**： station 内有一道巨大的彩虹，纪念 1912 年斯德哥尔摩奥运会。\n  - **Rådhuset（蓝线）**：直接开凿在粉红色花岗岩中，像一座地下宫殿。\n  - **Kungsträdgården（蓝线）**： station 内有绿色的古典雕塑、喷泉遗迹和巴洛克风格的装饰。\n- **玩法**：买一张地铁票，沿着蓝线和红线打卡这几个站点。每个站停留 10～15 分钟拍照即可。\n\n## 傍晚：群岛游船（Archipelago Cruise）\n- 斯德哥尔摩被称为\"群岛之城\"，城外有**超过 3 万座岛屿**。\n- 夏季有很多 2～3 小时的群岛游船，从市中心码头出发，穿梭于森林覆盖的小岛之间。\n- 船上可以点一杯瑞典 cider，看夕阳把波罗的海染成金色。\n- **推荐公司**：Stromma 的 Archipelago Cruise。\n\n## 晚餐\n- **Frantzén**（米其林三星，北欧料理巅峰，位于老城，需提前数月预订）\n- 或 **Lilla Ego**（米其林一星，氛围轻松，性价比高，人均约 500 SEK）\n\n---\n\n# D3｜斯德哥尔摩 → 哥德堡（Göteborg）\n**主题：从群岛到海港**\n\n![哥德堡港口与歌剧院](./images/gothenburg.jpg)\n*哥德堡港口与天际线*\n\n## 交通\n- **高铁**：SJ 高速列车，斯德哥尔摩 C → 哥德堡 C，约 3 小时。\n- **体验**：火车穿过瑞典南部平原和森林，车厢干净整洁，沿途风景像一幅田园油画。建议提前在 SJ 官网购票，夏季热门时段需提前预订。\n- **市内交通**：哥德堡市区不大，步行+有轨电车即可。有轨电车是城市标志之一，复古的车型和叮叮当当的铃声很有味道。\n\n## 住宿\n**推荐：Hotel Pigalle 或 Avalon Hotel**\n- **Hotel Pigalle**：位于市中心，法式复古风情，红色天鹅绒和水晶吊灯，像一家巴黎妓院改造的酒店（褒义），极为浪漫。\n- **Avalon Hotel**：位于 Avenyn 大道旁，现代设计酒店，部分房间带私人露台和户外浴缸。\n\n## 活动\n- **下午**：\n  - **鱼市教堂（Feskekôrka）**：一座建于 1874 年的室内鱼市场，外形像一座哥特式教堂。里面可以吃到最新鲜的烟熏三文鱼、生蚝和龙虾汤。\n  - **Haga 区**：哥德堡最老牌的文艺街区，鹅卵石街道两旁是 19 世纪的木屋，有很多独立咖啡馆、古董店和面包房。\n    - **必吃**：Haga 区咖啡店里的 **kanelbulle（肉桂卷）**，这是瑞典\"菲卡（Fika）\"文化的灵魂。\n- **傍晚**：\n  - **Avenyn 大道**：哥德堡的主干道，尽头是 **海神波塞冬雕塑（Poseidon）**。\n  - 或在港口边散步，看日落把哥德堡歌剧院（Gothenburg Opera House）的玻璃幕墙染成红色。\n\n## 晚餐\n- **Sjömagasinet**（米其林一星，海鲜餐厅，位于港口边的一座旧仓库内，人均约 1000 SEK）\n- 或 **Heaven 23**（位于 Gothia Towers 酒店 23 层，可以俯瞰全城，以\"国王虾三明治\"闻名）\n\n---\n\n# D4｜哥德堡 → 瑞典西海岸（West Coast）\n**主题：生蚝与悬崖日落**\n\n![菲亚巴卡渔村](./images/fjallbacka.jpg)\n*瑞典西海岸的菲亚巴卡渔村*\n\n瑞典西海岸是欧洲最好的生蚝产地之一，夏季（6～8 月）是**生蚝季**。这里的海岸线由无数花岗岩小岛和礁石组成，渔村的小屋漆成红色或白色，散落在岩石海岸上。\n\n## 自驾路线\n- **取车**：早上在哥德堡市中心取车。推荐 Europcar、Hertz。\n- **路线**：哥德堡 → 菲亚巴卡（Fjällbacka，约 1.5 小时）→ 格雷贝斯塔（Grebbestad，约 30 分钟）→ 斯莫根（Smögen，约 1 小时）。\n- **总里程**：约 150 公里。\n\n## 途中亮点\n\n### 菲亚巴卡（Fjällbacka）\n- 瑞典犯罪小说女王 **Camilla Läckberg** 的故乡，她的小说都以这个渔村为背景。\n- 村庄建在一座小山下，红顶白墙的渔民小屋沿着海岸排列。可以爬到山顶的**Vetteberget 观景台**，俯瞰整个村庄和周围的群岛。\n- 村里的栈桥和渔船是很好的拍照背景。\n\n### 格雷贝斯塔（Grebbestad）：出海捕生蚝\n- **格雷贝斯塔是瑞典的生蚝之都**，这里的**flat oyster（扁平蚝）**被誉为欧洲最优质的生蚝之一。\n- **夏季限定体验**：参加当地的 **生蚝捕捞之旅（Oyster Safari）**。船长会带你们出海到养殖区，教你们如何分辨生蚝品质，现场开蚝，直接蘸柠檬汁生吃。\n  - 价格：约 800～1200 SEK/人，含 6～10 只生蚝和一杯白葡萄酒。\n  - 推荐公司：Everts Sjöbod 或 Grebbestad Rökeri。\n- **口感**：这里的生蚝体型不大，但海水味浓郁，带有淡淡的金属回甘和黄瓜清香。\n\n### 斯莫根（Smögen）\n\n![斯莫根的悬崖与红色小屋](./images/smogen.jpg)\n*斯莫根渔村的悬崖栈道与红色小屋*\n\n- 瑞典西海岸最著名也最热闹的渔村，有一条长长的**木栈道（Smögenbryggan）**沿着海边延伸，两侧是渔民小屋、海鲜餐厅和酒吧。\n- **Hotel Smögens Havsbad**：这是当地的标志性悬崖酒店，拥有私家海滩和桑拿房。即使不住这里，也可以在酒店的露天酒吧喝杯酒，看日落。\n- **免费桑拿**：斯莫根海边有一个公共的**木柴桑拿房（Bastu）**，夏季对游客免费开放。蒸完桑拿后可以直接跳进波罗的海里游泳——这是北欧人夏天的必修课。\n\n## 住宿\n**斯莫根（Smögen）**\n- **Hotel Smögens Havsbad**：终极之选，海景房+悬崖餐厅，约 2500～4000 SEK/晚。\n- **Grebbestad 民宿**：如果想安静一些，可以住在格雷贝斯塔的海边小屋，价格更实惠。\n\n---\n\n# D5｜西海岸 → 马尔默（Malmö）\n**主题：从渔村到海峡之城**\n\n![厄勒海峡大桥](./images/oresund_bridge.jpg)\n*连接瑞典与丹麦的厄勒海峡大桥*\n\n## 自驾路线\n- **路线**：斯莫根 → 赫尔辛堡（Helsingborg，约 2.5 小时）→ 马尔默（Malmö，约 1 小时）。\n- **总里程**：约 200 公里。\n- **开车时间**：约 3.5 小时。\n\n## 途中亮点\n\n### 赫尔辛堡（Helsingborg）\n- **Kärnan 城堡塔**：中世纪堡垒的遗迹，登顶后可以眺望海峡对岸的丹麦城市赫尔辛格（Helsingør），以及远处的克伦堡城堡。\n- **索菲罗城堡花园（Sofiero）**：瑞典王室的夏宫，夏季花园里种植了超过 500 种不同的植物和花卉，被称为\"北欧最美的花园\"。\n- **老城海滩（Strandvägen）**：在海边散步，看渡轮往返于瑞典和丹麦之间。\n\n### 马尔默（Malmö）\n- **旋转大楼（Turning Torso）**：北欧最高的住宅楼，高 190 米，从底部到顶部扭转了 90 度。最佳拍摄点在西港（Västra Hamnen）的海边步道上。\n- **Lilla Torg 小广场**：马尔默最 charming 的广场，四周是 16 世纪的彩色木屋，摆满了露天咖啡座。\n- **里伯斯堡浴场（Ribersborgs Kallbadhus）**：一座建于 1898 年的海边浴场，男女分开的露天桑拿房，蒸完后直接跳进波罗的海。夏天非常舒服。\n\n## 住宿\n**马尔默市中心**\n- **推荐：MJ's Hotel**：位于 Lilla Torg 旁边，设计酒店，复古与现代的结合。\n- 价格：约 1500～2500 SEK/晚。\n\n## 晚餐\n马尔默有很多创新的北欧餐厅。推荐 **Bloom in the Park**（米其林一星，位于一座老公园里，氛围轻松）或 **Saltholm**（海鲜餐厅，位于港口边）。\n\n---\n\n# D6｜马尔默 → 哥本哈根（Copenhagen）\n**主题：35 分钟的跨国浪漫**\n\n![哥本哈根新港](./images/nyhavn.jpg)\n*哥本哈根新港的彩色房子与帆船*\n\n## 交通\n- **Öresundståg 火车**：从马尔默中央车站（Malmö C）乘坐通勤火车，约 **35 分钟**直达哥本哈根中央车站（København H）。\n- **跨国体验**：火车会经过 **厄勒海峡大桥（Øresund Bridge）**——全长 16 公里，一半跨海、一半海底隧道。坐在靠窗的位置，可以看到蔚蓝的海水和远处的风车。\n- **行李**：不需要提前到机场、不需要安检、不需要托运行李。比国内跨省还方便。\n- **还车**：建议在马尔默或哥本哈根机场还掉瑞典租的车。哥本哈根市区不需要车。\n\n## 住宿\n**推荐：Hotel Sanders 或 Hotel Kong Arthur**\n- 同 D1 推荐。建议选择新港（Nyhavn）或 Indre By 区的酒店，方便步行游览。\n\n## 活动\n- **下午**：\n  - **新港（Nyhavn）**：再次或首次邂逅这片彩色房子。安徒生曾在这里的 18、20 和 67 号居住过。\n  - **阿美琳堡宫（Amalienborg）**：中午 12:00 看皇家卫队换岗仪式。\n- **晚餐**：\n  - **Kadeau**（新北欧料理一星，位于 Nyhavn 尽头的老仓库里，人均约 1500 DKK）\n  - 或 **Torvehallerne KBH**（食品市场，生蚝、开放三明治、新鲜海鲜）\n- **小贴士**：哥本哈根是全球米其林密度最高的城市之一。如果预算允许，这一晚可以安排一顿正式的北欧 fine dining。\n\n---\n\n# D7｜哥本哈根（Copenhagen）\n**主题：童话、设计与美食**\n\n![趣伏里公园 Tivoli Gardens](./images/tivoli.jpg)\n*趣伏里公园的夏季灯光与花园*\n\n## 活动\n\n### 上午：克里斯蒂安堡宫（Christiansborg Slot）\n- 丹麦议会、最高法院和首相办公室所在地。登塔免费，可以 360 度俯瞰哥本哈根全城和远处的瑞典海岸。\n- 地下还有罗马时期遗址博物馆，可以看到 1167 年城堡原址的地基。\n\n### 下午：设计区与 Torvehallerne\n- **设计区**：Strøget 步行街附近的 Hay House、Georg Jensen、Illums Bolighus。\n- **救主堂（Vor Frelsers Kirke）**：螺旋塔登顶，俯瞰克里斯钦自由城（Christiania）的彩色涂鸦屋顶。\n- **Torvehallerne KBH**：哥本哈根最美的室内食品市场，可以在这里买生蚝、奶酪、熏鱼和烘焙点心。\n\n### 晚上：趣伏里公园（Tivoli Gardens）\n- 世界上最古老的游乐园之一（1843 年开园），也是华特·迪士尼的灵感来源。\n- 夏季夜晚有超过 10 万盏灯装饰，还有现场古典音乐会和烟花表演。\n- 园内的 **Nimb** 餐厅是享用晚餐的浪漫之选。\n\n## 晚餐\n- **Noma**（三星，全球最佳餐厅之一，需提前数月预订）\n- **Geranium**（三星，位于公园体育场顶层，人均约 4000 DKK）\n- **Kadeau**（一星，性价比更高的新北欧料理）\n\n---\n\n# D8｜北西兰岛（Nordsjælland）\n**主题：城堡与现代艺术的对话**\n\n![克伦堡城堡](./images/kronborg.jpg)\n*克伦堡城堡——莎士比亚《哈姆雷特》的取景地*\n\n## 自驾路线\n- **租车**：早上在哥本哈根中央车站附近取车（仅租一天）。\n- **路线**：哥本哈根 → 赫尔辛格（Helsingør，约 45 分钟）→ 路易斯安那美术馆（约 20 分钟）→ 返回哥本哈根。\n- **总里程**：约 100 公里。\n\n## 上午：克伦堡宫（Kronborg Slot）\n- 莎士比亚《哈姆雷特》的故事发生地，每年夏天城堡里都会上演露天戏剧。\n- 位于厄勒海峡最窄处，正对瑞典赫尔辛堡。\n- **必看**：地下隧道（Kasematterne）——传说中丹麦英雄 Holger Danske 在这里沉睡。\n\n## 下午：路易斯安那现代艺术博物馆（Louisiana Museum of Modern Art）\n\n![路易斯安那美术馆雕塑花园](./images/louisiana.jpg)\n*路易斯安那美术馆的雕塑花园与厄勒海峡*\n\n- **全球最美的海边现代美术馆**。白色混凝土建筑依山而建，落地窗将海景框成活的画作。\n- **雕塑花园**：室外花园里摆放着亚历山大·考尔德的动态雕塑、亨利·摩尔的青铜人体。\n- **咖啡厅**：拥有全馆最佳海景位，点一杯咖啡和一块丹麦酥，是北西兰岛最惬意的下午茶。\n\n## 晚餐\n返回哥本哈根市区，推荐 **Marv & Ben**（新派丹麦菜，人均 400 DKK）或 **108**（Noma 系平替）。\n\n---\n\n# D9｜哥本哈根 → 国内\n**主题：从童话王国回家**\n\n- **上午**：如果航班在下午，可以在新港或国王新广场（Kongens Nytorv）做最后的散步和购物。\n- **购物推荐**：\n  - **Georg Jensen**：丹麦银器和珠宝。\n  - **Hay**：北欧家居设计。\n  - **LEGO**：丹麦特产，机场免税店有很多限定款。\n  - **Carlsberg**：丹麦啤酒（但注意行李限重和液体规定）。\n- **机场快线**：从中央车站到凯斯楚普机场（CPH）约 20 分钟。\n- 带着瑞典的群岛记忆、西海岸的生蚝滋味和丹麦的童话感回家。\n\n---\n\n## 附录一：全程预算拆分（2 人总计）\n\n| 项目 | 金额（人民币） | 说明 |\n|:---|:---:|:---|\n| **国际往返机票** | 20,000～30,000 | 暑假直飞/一次转机经济舱，约 1.0～1.5 万/人 |\n| **瑞典境内高铁** | 1,500～2,500 | 斯德哥尔摩 → 哥德堡，约 750～1200 元/人 |\n| **跨国火车** | 0～200 | 马尔默 → 哥本哈根，约 100 SEK/人（约 70 元人民币） |\n| **租车（2 天）** | 2,000～4,000 | 瑞典西海岸 2 天，紧凑型轿车即可 |\n| **油费/停车费** | 1,000～1,500 | 瑞典西海岸自驾约 400 公里 |\n| **住宿（8 晚）** | 16,000～24,000 | 北欧设计酒店约 1200～2000 元/晚 |\n| **餐饮** | 12,000～18,000 | 外食人均 250～400 元/顿，米其林一星约 800～1200 元/人 |\n| **门票/体验** | 2,000～3,500 | 瓦萨博物馆、地铁票、生蚝之旅、城堡门票 |\n| **签证/保险/杂费** | 2,000～3,000 | 申根签证约 800 元/人，保险 200 元/人 |\n| **总计** | **约 56,500～86,700 元** | **人均 2.8～4.3 万** |\n\n> **省钱小贴士**：瑞典和丹麦的超市（ICA、Coop、Rema 1000）价格合理。建议早餐在酒店吃（通常含早），午餐在食品市场或面包店解决，晚餐再享用正式餐厅。\n\n---\n\n## 附录二：行前准备清单\n\n### 证件与签证\n- [ ] **申根签证**：瑞典或丹麦均可作为主要申请国。如果瑞典停留 4 天、丹麦停留 3.5 天，向**瑞典签证中心**申请；如果想以丹麦为主，可将北西兰岛和哥本哈根延长到 4 天。\n- [ ] 护照（有效期 6 个月以上）。\n- [ ] 旅行保险（申根强制要求，保额 ≥ 3 万欧元）。\n\n### 预订确认（按优先级）\n1. [ ] 国际机票\n2. [ ] 斯德哥尔摩 → 哥德堡 SJ 火车票（sj.se）\n3. [ ] 斯德哥尔摩、哥德堡、马尔默、哥本哈根酒店\n4. [ ] 生蚝捕捞之旅（夏季热门，提前 2 周预订）\n5. [ ] 哥德堡租车（西海岸 2 天）\n6. [ ] 哥本哈根米其林餐厅（如需）\n\n### 衣物与装备\n- [ ] 轻便防风外套（夏季海边风大）\n- [ ] 舒适的 walking shoes（老城石板路多）\n- [ ] 防晒霜 + 墨镜（白夜期间日照长）\n- [ ] 转换插头（瑞典和丹麦均使用欧标 C/F 型插头）\n- [ ] 泳衣（如果想体验海边桑拿）\n- [ ] 轻便背包（跨国火车方便携带）\n\n### APP 下载\n- **Google Maps**：离线地图必备。\n- **SL**：斯德哥尔摩公共交通官方 APP。\n- **SJ**：瑞典铁路购票 APP。\n- **Rejseplanen**：丹麦公共交通查询。\n- **TheFork**：餐厅预订。\n\n---\n\n## 附录三：关键决策说明（FAQ）\n\n### Q1：为什么不全程自驾？\n斯德哥尔摩和哥本哈根都是非常适合步行+公共交通的城市，市区停车极贵（哥本哈根市中心约 200～300 DKK/天）。只在西海岸租车 2 天，可以省去大笔停车费和找车位的麻烦。斯德哥尔摩 → 哥德堡的高铁本身就是很好的体验，而且比开车快。\n\n### Q2：瑞典和丹麦的签证怎么处理？\n瑞典和丹麦都是申根国。如果你们瑞典停留更长（4 天 vs 3.5 天），就向瑞典申请签证；如果想以丹麦为主，稍微调整一下行程即可。两国签证材料和流程几乎一样。\n\n### Q3：生蚝之旅值得吗？\n**非常值得。** 格雷贝斯塔的 flat oyster 是欧洲顶级生蚝，出海捕捞是夏季限定体验。而且瑞典西海岸的风景本身就非常美，这段路不会让你们失望。\n\n### Q4：为什么不去斯德哥尔摩的群岛深度游？\n斯德哥尔摩群岛有超过 3 万座岛屿，深度游需要至少 2～3 天。9 天的双国行程中，我们选择了半天游船作为\"群岛初体验\"，把更多时间留给哥德堡和西海岸的海鲜之旅。如果你们特别喜欢跳岛，可以从哥德堡的行程中抽出一天专门去群岛。\n\n### Q5：如果预算充裕，有什么可以提升体验的？\n- **斯德哥尔摩直升机观光**：从空中俯瞰群岛和城区。\n- **Ett Hem 酒店**：斯德哥尔摩最浪漫的精品酒店。\n- **Noma 或 Geranium**：哥本哈根的两家米其林三星。\n- **私人游艇出海**：从斯莫根包一艘小游艇，在群岛间巡航。\n\n---\n\n## 附录四：一句话总结\n\n这 9 天，你们会在斯德哥尔摩的地铁岩洞里看艺术，在瓦萨博物馆里看一艘沉睡 333 年的战舰，在瑞典西海岸的海上亲手开一只生蚝，坐火车穿过厄勒海峡大桥去丹麦，在哥本哈根的新港运河边看彩色房子，在北西兰岛的城堡和现代美术馆之间切换时空。\n\n**这是瑞典的文艺与丹麦的童话，写给彼此最优雅的一封婚假情书。**\n\n---\n\n*文档生成时间：2026 年 4 月*  \n*祝你们旅途愉快，新婚快乐！*\n",
      no: "# 挪威 · 峡湾与午夜阳光｜9 天婚假执行手册\n\n> **旅行时间**：7～8 月（夏季黄金窗口）  \n> **旅行人数**：2 人（婚假）  \n> **总天数**：9 天 8 晚  \n> **核心目的地**：卑尔根 → 松恩峡湾 → 盖朗厄尔峡湾 → 大西洋公路 → 罗弗敦群岛  \n> **人均预算**：3.5～4.5 万元人民币（舒适不奢华，2 人总计约 7～9 万元）\n\n---\n\n## 为什么选挪威？\n\n如果你们想要的是**\"国内没有的壮丽风光\"**，那么 7～8 月的挪威几乎是唯一正确的答案。\n\n这个季节的挪威，气温只有 15～22℃，白昼长达 20 小时以上——这意味着你们可以在晚上 11 点坐在海边的红色渔民小屋里，看着太阳贴着海平面滑过，把天空染成粉紫色。这种体验叫做**\"午夜阳光\"**，只在北极圈附近的夏季出现。\n\n与冰岛相比，挪威的风景同样是世界级，但气质完全不同：\n- **冰岛**是荒凉、粗粝、像外星的\"探险\"，9 天环岛会很累，且住宿和餐饮条件有限；\n- **挪威**是深邃峡湾、垂直雪山、平静海面的\"壮丽度假\"，你们可以每天开车 2～3 小时，然后住进风景里，自己煮海鲜、看日落。\n\n作为婚假，挪威是**\"震撼\"与\"松弛\"**的最佳平衡点。\n\n---\n\n## 行程总览\n\n| 天数 | 星期 | 路线 | 住宿地 | 核心体验 | 开车距离 |\n|:---:|:---:|:---|:---|:---|:---:|\n| D1 | 六 | 国内 → 奥斯陆 | 奥斯陆 | 抵达、休整、适应极昼 | — |\n| D2 | 日 | 奥斯陆 → 卑尔根 | 卑尔根 | 布吕根彩色木屋、弗洛伊恩山、鱼市场 | — |\n| D3 | 一 | 卑尔根 → 弗洛姆 → 艾于兰 | 艾于兰 | **弗洛姆高山火车**（世界最陡铁路）+ 峡湾游船 | — |\n| D4 | 二 | 艾于兰 → 海尔西特 → 盖朗厄尔 | 盖朗厄尔 | 取车自驾：峡湾公路、**老鹰之路**俯瞰 | 约 200 km |\n| D5 | 三 | 盖朗厄尔 → 老鹰之路 → Gudbrandsjuvet → 大西洋公路 → 克里斯蒂安松 | 克里斯蒂安松 | **老鹰之路**峡湾俯瞰 + **Gudbrandsjuvet** + **大西洋公路**海上飞车 | 约 300 km |\n| D6 | 四 | 克里斯蒂安松 → 奥勒松 → 博德 → **雷讷（罗弗敦）** | 雷讷 | 长途转场，抵达北极圈，入住红色渔民小屋 | 陆路+轮渡 |\n| D7 | 五 | **罗弗敦群岛**（雷讷 + 亨宁斯韦尔） | 雷讷 | **Reinebringen 徒步** + \"世界最美足球场\" | 约 80 km |\n| D8 | 六 | 雷讷 → 斯沃尔韦尔 → 奥斯陆 | 奥斯陆 | 告别罗弗敦，飞回首都 | 约 120 km |\n| D9 | 日 | 奥斯陆 → 国内 | — | 返程 | — |\n\n> **设计逻辑**：奥斯陆只作出入口；卑尔根进峡湾，一路北上到罗弗敦，不走回头路；把最累的转场集中在 D6 一天，换取罗弗敦两天半的纯粹享受。\n\n---\n\n# D1｜国内 → 奥斯陆（Oslo）\n**主题：抵达，调整时差，轻松适应**\n\n![奥斯陆歌剧院与海港](./images/oslo.jpg)\n*奥斯陆歌剧院与比约维卡港区*\n\n## 交通\n- **航班**：建议选择 **北欧航空 SAS**、**汉莎航空** 或 **芬兰航空** 的直飞或一次转机航班，**下午 14:00-17:00 抵达奥斯陆加勒穆恩机场（OSL）** 最佳。\n- **机场 → 市区**：乘坐 **机场快线 Flytoget**，20 分钟直达奥斯陆中央车站（Oslo S），票价约 220 NOK/人。\n\n## 住宿\n**推荐：Thon Hotel Opera（索恩歌剧院酒店）**\n- 位置：中央车站步行 3 分钟，歌剧院正对面。\n- 价格：约 1800～2500 NOK/晚。\n- 理由：交通便利，方便第二天一早赶飞机去卑尔根；房间干净现代，景观房可直接看到歌剧院白色大理石屋顶滑入海中。\n\n## 活动\n- **傍晚**：沿着 **Aker Brygge（阿克尔码头）** 散步。这是奥斯陆最热闹的海滨步道，有餐厅、酒吧和街头艺人。\n- **晚餐**：推荐 **Vulkan Mathallen Oslo**，这是一个室内美食广场，集合了多家小餐馆、奶酪店、烘焙坊和海鲜摊位，可以吃到新鲜的生蚝、北极甜虾、烟熏三文鱼。人均约 300～400 元人民币。\n- **小贴士**：7～8 月的奥斯陆晚上 10 点天还亮着，吃完饭后在海边散步会有一种\"时间被偷走了\"的奇妙感。不要硬撑，早点休息调整时差。\n\n## 为什么不在奥斯陆多待？\n奥斯陆是一座精致的首都，有蒙克美术馆、维格兰雕塑公园和一流的北欧设计店。但这些都是**城市人文**，不是你们这次要的\"壮丽风光\"。9 天时间宝贵，我们把它当作**入口和出口**，把全部精力留给西部的峡湾和北部的罗弗敦。\n\n---\n\n# D2｜奥斯陆 → 卑尔根（Bergen）\n**主题：峡湾之门**\n\n![卑尔根布吕根彩色木屋](./images/bryggen.jpg)\n*卑尔根布吕根世界文化遗产港区*\n\n## 交通\n- **航班**：**SAS 或 Norwegian 早班机**（约 08:00 起飞，09:00 抵达）。航程仅 **55 分钟**。\n- **机场 → 市区**：轻轨 **Bybanen** 约 45 分钟到市中心，票价约 40 NOK/人；或机场大巴约 30 分钟。\n\n## 住宿\n**推荐：Radisson Blu Royal Hotel, Bergen**\n- 位置：布吕根（Bryggen）港口内，出门就是彩色木屋。\n- 价格：约 2000～2800 NOK/晚。\n- 备选：Hotel Bergen Børs（设计酒店，位于旧证券交易所大楼内，步行 5 分钟到港口）。\n\n## 活动\n\n### 上午：布吕根（Bryggen）\n这是卑尔根乃至挪威最具标志性的画面——一排排三角屋顶的**彩色木屋**沿着码头排列，颜色从赭黄到深红不等。布吕根是**世界文化遗产**，始建于汉萨同盟时期（14 世纪），曾是北欧最重要的贸易港口之一。\n\n- **看点**：木屋之间的狭窄巷道、古老的木结构、临海的咖啡馆。\n- **小贴士**：卑尔根被称为\"欧洲雨都\"，一年有 200 多天在下雨。但下雨时的布吕根反而更有味道——木屋颜色在湿润空气中更饱和，石板路倒映着灯光。**备好轻便雨衣和防水 walking shoes。**\n\n### 下午：弗洛伊恩山缆车（Fløibanen）\n- 缆车站就在布吕根旁边，步行 5 分钟。\n- 单程约 8 分钟登顶，山顶有观景台、徒步步道和一家景观餐厅。\n- **必做**：在山顶俯瞰卑尔根全景。你会看到红色屋顶的城市 nestled 在绿色的山谷与蓝色的海湾之间，远处是峡湾的入口。这是理解\"卑尔根为什么是峡湾之门\"的最佳视角。\n\n### 晚餐：卑尔根鱼市场（Fisketorget）\n- 位于港口边，步行可达。\n- **推荐**：**鱼汤（Bergensk fiskesuppe）**、**烟熏三文鱼（Røkt laks）**、**本地捕捞的鳕鱼（Torsk）**。这里是游客聚集地，价格不便宜，但海鲜非常新鲜——很多摊位是渔民自营，早上出海下午就摆上了摊。\n- 人均：400～600 元人民币。\n\n## 这一天的价值\n卑尔根本身不是终点，它是进入峡湾的门户。但在进入自然之前，先在这座城市里吃顿好的、买齐补给（防晒霜、零食、矿泉水），为后面几天的自驾做好准备。\n\n---\n\n# D3｜卑尔根 → 弗洛姆 → 艾于兰（Aurland）\n**主题：全世界最美的火车线路**\n\n![弗洛姆高山火车与瀑布](./images/flamsbana.jpg)\n*弗洛姆高山火车停靠在 Kjosfossen 瀑布站*\n\n## 行程详解（精华段\"挪威缩影\"）\n\n完整的\"挪威缩影（Norway in a Nutshell）\"是从奥斯陆到卑尔根的一整天旅程，但我们只取**卑尔根 → 弗洛姆 → 艾于兰**这一段公认的精华，既节省时间，又能住进峡湾里。\n\n### 1. 卑尔根 → Myrdal（高山火车站）\n- **交通**：乘坐 **Bergensbanen（卑尔根铁路）**。\n- 时长：约 2 小时。\n- 体验：这是欧洲海拔最高的干线铁路，穿越哈当厄高原（Hardangervidda），窗外是苔原、湖泊和雪山。\n\n### 2. Myrdal → 弗洛姆（Flåm）：弗洛姆高山火车（Flåmsbana）\n- **交通**：在 Myrdal 站台换乘 **Flåmsbana**。\n- 时长：约 1 小时。\n- 距离：仅 20 公里，但海拔从 **866 米骤降至海平面**。\n- **工程奇迹**：这是**全世界最陡的标准轨距铁路**，平均坡度 5.5%，20 条隧道中有 18 条是**手工开凿**的（1924-1940 年建造）。列车会在隧道中螺旋穿行，甚至从瀑布下方穿过。\n- **中途停靠 Kjosfossen 瀑布**：列车会在这里停车 5 分钟，乘客可以下车走到观景平台。瀑布落差 225 米，水雾扑面而来，夏季有时还有穿着传统服饰的\"Huldra（山妖）\"舞者在此表演——这是挪威铁路为游客准备的独特浪漫。\n\n> **选座技巧**：从 Myrdal **下行至弗洛姆**时，坐在**左侧**（列车前进方向的左边）风景更佳，可以看到瀑布和山谷。\n\n### 3. 弗洛姆 → 艾于兰：峡湾游船\n- **交通**：抵达弗洛姆后，换乘 **峡湾游船**（Fjord Cruise）。\n- 时长：约 2 小时。\n- 路线：游览 **艾于兰峡湾（Aurlandsfjorden）** 和 **纳柔依峡湾（Nærøyfjorden）**——后者是联合国教科文组织世界遗产，被誉为\"世界上最美丽的峡湾航行之一\"。\n- 体验：船在深邃狭窄的水道中穿行，两岸是垂直耸立 1000 多米的悬崖，山顶还有积雪。你会看到零星的山间农场（现在大多已废弃），它们像贴纸一样贴在悬崖上，让人感叹人类曾经的生存能力。\n- 终点：**Gudvangen**。\n\n### 4. Gudvangen → 艾于兰\n- **交通**：从 Gudvangen 乘大巴/出租车到艾于兰（Aurland），约 30 分钟。\n\n> **行李提示**：这一天的火车+游船+大巴换乘非常频繁，拖着大行李箱极不方便。建议前一晚在卑尔根将大件行李**寄存在酒店或寄送到后续酒店**（可通过挪威邮政 Posten 的行李托运服务，或请酒店协助 forwarding），只带轻便背包走这一程。\n\n## 住宿\n**强烈推荐：29|2 Aurland**\n- 类型：峡湾景观设计酒店/民宿。\n- 价格：约 2500～3500 NOK/晚。\n- 特点：房间极少（通常只有 4～6 间），安静私密，**落地窗正对艾于兰峡湾**。傍晚坐在露台或窗边，看着太阳慢慢滑向雪山背后，是这一天的高潮。\n- 备选：**Fretheim Hotel**，老牌峡湾酒店，历史悠久，花园可直接走到峡湾边。\n\n## 活动\n- **傍晚**：入住后不需要再出门。在房间露台发呆，看峡湾水面上的倒影。\n- **晚餐**：酒店通常提供晚餐预订，或可以步行到附近的艾于兰镇上找一家当地餐厅。推荐尝试 **sider（苹果酒）**——这是当地的特产。\n\n## 为什么这一天的交通换乘如此复杂，却依然值得？\n弗洛姆高山火车不是\"交通工具\"，它本身就是**挪威排名第一的旅游体验**。而峡湾游船则是从水面视角感受垂直悬崖的最佳方式。这两者组合在一起，构成了挪威峡湾的\"王炸开场\"。\n\n---\n\n# D4｜艾于兰 → 海尔西特（Hellesylt）→ 盖朗厄尔（Geiranger）\n**主题：峡湾自驾的巅峰**\n\n![艾于兰峡湾与雪山](./images/aurlandsfjorden.jpg)\n*从 Stegastein 观景台俯瞰艾于兰峡湾*\n\n## 自驾路线\n从今天起，你们正式开始**自驾**。这是体验挪威西部峡湾的唯一正确方式——因为很多世界级景观公路无法通过公共交通完整覆盖。\n\n- **取车**：上午在 **Sogndal 机场（SOG）** 或 **Sogndal 市区**取车（Sogndal 是艾于兰附近最大的城镇，有 Hertz、Avis 等租车点）。如果从艾于兰打车到 Sogndal 取车，车程约 40 分钟。\n- **路线**：Sogndal → **Lærdal 隧道**（世界最长公路隧道，24.5 公里）→ Stryn → **海尔西特（Hellesylt）** → 乘 **Hellesylt–Geiranger 轮渡** 进入盖朗厄尔峡湾 → 盖朗厄尔小镇。\n- **总里程**：约 200 公里（陆路）+ 轮渡。\n- **开车时间**：约 4.5～5.5 小时（含多次停车休息和拍照）。\n\n## 途中亮点\n\n### Lærdal 隧道（Lærdalstunnelen）\n- 全长 **24.5 公里**，是世界上最长的公路隧道。\n- 为了避免司机在单调的隧道中产生疲劳和幽闭恐惧，工程师在隧道中设置了**三个\"洞穴\"休息区**——用蓝色和黄色的灯光模拟日出，洞顶喷涂了淡蓝色，像一片人造天空。开车经过时，你会有一种在地下穿越到另一个世界的 surreal 感。\n\n### Hellesylt → Geiranger 轮渡\n- 这是盖朗厄尔峡湾的**入门体验**。轮渡沿着峡湾缓缓驶入，两岸是近乎垂直的岩壁。\n- 在船上可以远眺 **\"七姐妹瀑布（De Syv Søstre）\"**——七道水流从 250 米高的悬崖上同时倾泻而下，是盖朗厄尔峡湾最著名的地标。\n- 与瀑布隔峡相望的是 **\"求婚者瀑布（Friaren）\"**，传说中它试图追求七姐妹，但始终被拒绝。\n- **重要提示**：这趟轮渡在 7～8 月非常热门，建议提前在 **Fjord1** 或 **Geiranger Fjordservice** 官网预订船票。\n\n![盖朗厄尔峡湾七姐妹瀑布](./images/geirangerfjord.jpg)\n*盖朗厄尔峡湾的七姐妹瀑布*\n\n## 下午抵达后的活动：老鹰之路（Ørnevegen / Eagle Road）\n\n盖朗厄尔峡湾被《国家地理》评为\"世界最佳世界遗产\"之一，而**老鹰之路**则是俯瞰它的最佳方式。\n\n- **路线**：从盖朗厄尔小镇出发，沿 63 号公路向上攀爬。\n- 特点：**11 个发卡弯**，在约 6 公里内攀升 **620 米**海拔，坡度最陡处达 10%。\n- **观景台 Ørnesvingen**：位于最顶端的第 11 个发卡弯，建有现代化的玻璃与钢结构的观景平台。\n- **景观**：从这里俯瞰，盖朗厄尔峡湾像一条深蓝色的丝带蜿蜒在灰色的群山之间；七姐妹瀑布变成细细的白线；小镇如同模型般渺小；对面的悬崖上还能看到废弃的 **Knivsflå 农场**——它建在 250 米高的悬崖边缘，是挪威最险峻的废弃农场之一。\n\n![老鹰之路俯瞰盖朗厄尔峡湾](./images/ornevegen.jpg)\n*从老鹰之路 Ørnesvingen 观景台俯瞰盖朗厄尔峡湾*\n\n> **时间建议**：夏季邮轮通常在上午和中午抵达盖朗厄尔，会释放大量游客到观景台上。建议你们**下午 5 点后再开车上老鹰之路**，此时光线柔和，游客散去，拍照不用排队。\n\n## 住宿\n**推荐：Hotel Union Geiranger**\n- 位置：盖朗厄尔小镇上方的山坡，正对峡湾。\n- 价格：约 2500～4000 NOK/晚。\n- 特点：这是一家有 130 年历史的老牌酒店，拥有盖朗厄尔最好的**室外温水泳池**——泡在池子里看着峡湾和雪山，是婚假的正确打开方式。\n- 备选：Grande Fjord Hotel，位置稍偏但性价比高，同样拥有峡湾景观。\n\n## 晚餐\n推荐在酒店餐厅或镇上的 **Geiranger Fjordbuda** 用餐。这里的招牌是**当地捕捞的鳕鱼（Torsk）**和**羊肉（Lam）**。\n\n---\n\n# D5｜盖朗厄尔 → 老鹰之路 → Gudbrandsjuvet → 大西洋公路 → 克里斯蒂安松（Kristiansund）\n**主题：世界最美公路之一**\n\n![老鹰之路俯瞰](./images/ornevegen.jpg)\n*从老鹰之路 Ørnesvingen 观景台俯瞰盖朗厄尔峡湾*\n\n这一天是**整个自驾行程的高潮**。由于 **Trollstigen 截至 2026 年 4 月 11 日仍未恢复常规通行**，这里改为当前更稳妥的 **Valldal 绕行版**。虽然开车时间较长，但这条替代路线依旧极具景观价值。\n\n## 自驾路线\n**盖朗厄尔 → 老鹰之路（Ørnevegen）→ Eidsdal–Linge 轮渡 → Valldal → Gudbrandsjuvet → Vestnes / Molde → 大西洋公路（Atlanterhavsveien）→ 克里斯蒂安松**\n\n### 第一段：老鹰之路（Ørnevegen）+ Gudbrandsjuvet\n- 从盖朗厄尔先走 **老鹰之路** 翻上山脊，再经 **Eidsdal–Linge** 轮渡进入 Valldal 山谷。\n- **Gudbrandsjuvet** 位于 63 号公路旁，是一条 5 米宽、20 多米深的峡谷，现代化观景平台直接架在激流上方。它是当前这条绕行线上最值得下车的点。\n- **当前说明**：Trollstigen 因落石治理关闭，不纳入 2026 年主路线假设；如果未来重新开放，可在出发前再按官方路况调整。\n\n### 第二段：Valldal / Vestnes → Molde\n- 从 Valldal 山谷离开后，向西接主干路前往 **Vestnes / Molde** 方向。\n- 这段路相对平缓，是驾驶后的\"喘息期\"。Molde 被称为\"玫瑰之城\"，夏季满城玫瑰盛开，可以在超市补充补给，吃个简餐。\n\n### 第三段：大西洋公路（Atlanterhavsveien / Atlantic Ocean Road）\n\n![大西洋公路 Storseisundet 大桥](./images/atlantic_road.jpg)\n*大西洋公路的标志性桥梁 Storseisundet Bridge*\n\n这是《卫报》评选的**\"世界最佳公路旅行\"**之一，也是无数汽车广告的取景地。\n\n- **数据**：全长仅 **8.3 公里**，由 8 座桥梁连接一系列小岛和礁石组成。\n- **核心桥梁**：**Storseisundet Bridge**。这是最长、最著名的一座桥，长约 260 米。它的设计极具戏剧性——从某个角度望去，桥面在最高点突然弯曲下坠，仿佛**公路在前方断入大海**。开车驶上桥顶时，你会有一种\"要冲入海里\"的错觉。\n- **体验**：公路几乎与海平面齐平，一侧是平静的挪威海，另一侧是怪石嶙峋的礁石。如果运气好，还能看到海豹在礁石上晒太阳。公路沿线设有多个停车观景台，可以随时下车拍照。\n- **背景**：这条路 1989 年才通车，建造期间工人们经历了 12 次飓风。它不仅是工程奇迹，更是人类在极端自然环境中\"硬刚\"出来的艺术品。\n\n> **AutoPASS 提示**：挪威高速公路、隧道、桥梁普遍收费。租来的车通常会自带 **AutoPASS 电子标签**，过路费和隧道费会自动记录，还车时由租车公司统一结算。西部峡湾和进入克里斯蒂安松的途中会经过若干收费隧道，建议预留 **500～800 NOK** 的 toll 预算。\n\n## 住宿\n**克里斯蒂安松（Kristiansund）**\n- 这是一个安静的海滨小城，以大西洋鳕鱼（Klipfish）贸易闻名。\n- **推荐：Thon Hotel Kristiansund**，或港口附近的 Airbnb。\n- 价格：约 1500～2200 NOK/晚。\n- 特点：城市规模小，停车方便，晚上非常安静。明天一早要去机场，住在市区可以节省赶路时间。\n\n## 晚餐\n克里斯蒂安松的特产是 **Klipfish（盐渍鳕鱼）** 和 **Bacalao（鳕鱼炖菜）**。推荐餐厅 **Sørlandet**，主打本地海鲜，人均约 350～500 元人民币。\n\n---\n\n# D6｜克里斯蒂安松 → 奥勒松 → 博德 → 雷讷（Reine, Lofoten）\n**主题：痛苦的转场日，为了高潮**\n\n![罗弗敦雷讷的红色渔民小屋](./images/reine_rorbu.jpg)\n*雷讷村的传统红色渔民小屋（Rorbuer）*\n\n这一天是整个行程中**移动最多、最累的一天**。从挪威大陆中北部飞往北极圈内的罗弗敦群岛，没有直达航班，必须分三段走。但请相信，这一切都是值得的——因为罗弗敦是挪威最浪漫的象征。\n\n## 交通详解\n\n### 1. 克里斯蒂安松 → 奥勒松机场（Ålesund Vigra, AES）\n- **方式**：自驾。\n- 距离：约 110 公里。\n- 时间：约 2 小时。\n- 建议：**08:00 前出发**，确保赶上中午的航班。在奥勒松机场还掉第一段租的车，注意**异地还车费约 2000～3500 NOK**。\n\n### 2. 奥勒松 → 博德（Bodø）\n- **航班**：Widerøe 或 SAS 内陆航班。\n- 航程：约 1 小时。\n- 注意：这是小型螺旋桨飞机，行李限重较严格，建议提前购买行李额。\n\n### 3. 博德 → 罗弗敦（Moskenes 码头）\n- **方式**：轮渡。\n- 时长：约 **3.5 小时**。\n- 班次：夏季通常每天 1～2 班，**下午约 15:00 有一班**（具体时刻每年更新，需在 torghatten-nord.no 查询）。\n- 体验：轮渡从博德出发，穿过 Vestfjorden 海峡，逐渐接近罗弗敦群岛。当第一座锯齿状的山峰出现在海平面上时，你会知道\"真正的挪威\"从这里开始。\n\n### 4. Moskenes 码头 → 雷讷（Reine）\n- **方式**：取第二段租的车。\n- 距离：约 30 公里（沿 E10 公路）。\n- 时间：约 30 分钟。\n- **重要提示**：Moskenes 是小镇码头，**没有大型租车公司的门店**。这里的租车必须是**提前预订的本地小型租车公司送车上门服务**（如 Lofoten Car Rental、Arctic Rent-a-car），他们会把车直接送到码头停车场。这个服务**必须提前数周预订**，夏季非常紧张。如果订不到 Moskenes 取车，建议改为：\n  - **方案 B**：从博德乘飞机到 **Leknes（LKN）** 或 **Svolvær（SVJ）**，在机场租车柜台正常取车，再自驾南下到雷讷。这样会错过渡海体验，但更稳妥。\n\n> **E10 公路隧道费提示**：罗弗敦群岛的 E10 公路包含多条海底隧道（如 Nappstraumtunnelen），走 AutoPASS 自动扣费，全程约 **150～200 NOK**。\n\n## 住宿\n**强烈推荐：Eliassen Rorbuer 或 Reine Rorbuer**\n\n![雷讷渔民小屋近景](./images/reine_summer.jpg)\n*Hamnøy 村的 Eliassen Rorbuer 红色渔民小屋*\n\n- **什么是 Rorbuer？**\n  这是罗弗敦群岛最具代表性的传统**渔民小屋**。它们通常是红色的（因为红色鱼油油漆 historically 最便宜），建在木桩上，直接立于水面之上。过去是渔民冬季捕鳕鱼时的临时住所，现在被改造成了极具特色的度假小屋。\n- **Eliassen Rorbuer**：位于 Hamnøy 村，距离 Reine 约 5 分钟车程。这是社交媒体上最火的红色小屋机位——那一排排建在水上的红色房子，背景是尖锐的雪山，几乎就是\"挪威\"的代名词。\n- **Reine Rorbuer**：位于 Reine 村中心，设施更现代化，部分小屋带有私人露台和厨房。\n- 价格：约 2500～4000 NOK/晚。\n- **预订紧迫性**：这是整个行程**最难订的住宿**，7～8 月通常提前 3 个月售罄。如果现在还没订，这是第一件要做的事。\n\n## 晚间活动\n- **午夜阳光**：晚上 11 点，天还是亮的。太阳不会完全落下，它只是贴着西北方的海平面缓缓移动，把天空染成金色、粉色、紫色，然后再次升起。\n- **推荐活动**：坐在小屋的露台上，打开一瓶葡萄酒，或者煮一壶咖啡。看着雪山倒映在平静的海面上，四周安静得只有海鸥的叫声。这种时刻，你会明白为什么这里被称为\"欧洲最后一片净土\"。\n\n---\n\n# D7｜罗弗敦群岛（雷讷 + 亨宁斯韦尔）\n**主题：婚假的高潮**\n\n![Reinebringen 山顶俯瞰](./images/reinebringen.jpg)\n*从 Reinebringen 山顶俯瞰雷讷、Hamnøy 和 surrounding 峡湾*\n\n这一天是**整个 9 天行程情感价值最高的一天**。没有长途驾驶，只有两个世界级的体验：徒步俯瞰最美渔村，以及探访\"世界最美足球场\"。\n\n## 上午：Reinebringen 徒步\n\n这是罗弗敦**排名第一的徒步路线**，也是社交媒体上最火的挪威照片机位之一。\n\n- **起点**：位于 Reine 村西侧，Ramsvik 隧道旁边的老公路边。\n- **距离**：往返约 2.2 公里（从步道起点算起）。\n- **爬升**：约 450 米。\n- **时间**：往返 2～3 小时。\n- **难度**：中等偏上。2019 年当地政府请尼泊尔夏尔巴人用石头修建了约 **1500 级石阶**，取代了原来泥泞易滑的土路，但仍然全程爬坡，没有平路。\n\n### 景观价值\n登顶后，你会看到**罗弗敦最著名的全景**：\n- 脚下是 **Reine** 渔村的红色小屋，错落有致地分布在水边；\n- 左侧是 **Hamnøy** 村，Eliassen Rorbuer 的红色小屋一排排建在海面上；\n- 右侧是 **Sakrisøy** 村（以黄色小屋闻名）；\n- 背景是锯齿状的灰色花岗岩山峰（如 Olstind），山顶可能还有残雪；\n- 海水呈现出深绿或深蓝色，平静得像镜子。\n\n这张照片的价值在于：**它把\"山、海、人、屋\"四个元素压缩在一个画面里，而且比例完美**。这是国内任何风景都无法复制的——三峡没有海，川西没有渔民小屋，霞浦没有雪山。\n\n> **徒步建议**：\n> - 穿**登山鞋或防滑运动鞋**，石阶在雨后可能湿滑；\n> - 早上 8:00 前出发，避开人流和正午的阳光；\n> - 带上水和少量零食；\n> - 山顶风大，即使是 7 月也建议带一件防风外套。\n\n## 下午：亨宁斯韦尔（Henningsvær）\n\n![亨宁斯韦尔足球场](./images/henningsvaer_stadium.jpg)\n*亨宁斯韦尔 Idrettslag Stadion——被媒体广泛报道的\"世界最美足球场\"*\n\n从雷讷开车向北约 1 小时，抵达罗弗敦最文艺的渔村——**亨宁斯韦尔**。它被称为\"罗弗敦的威尼斯\"，因为整个村庄建在多个小岛之上，由几座小桥连接。\n\n### \"世界最美足球场\"（Henningsvær Idrettslag Stadion）\n这是被多家国际旅游媒体和足球博客评为\"世界最美足球场\"之一的超级网红场地，也曾出现在 UEFA 的 #PlayAnywhere 推广活动中。\n\n- **特点**：\n  - 没有看台，没有座位，只有一圈沥青路面充当场边站席；\n  - 球场建在一个小岛的南端，三面环海，背后是锯齿状的山峰；\n  - 球场周围是传统的**鳕鱼晾晒架（hjeller）**，夏季你可能会闻到淡淡的海腥味和鱼干味；\n  - 这里踢球的主要是当地业余队 Henningsvær IL 的孩子们，但午夜阳光下，凌晨 2 点都可能有人在踢球。\n- **拍摄**：最佳角度在小岛南端的山坡上（靠近灯塔的小路），无人机视角最震撼（但需注意当地可能有禁飞规定，请尊重）。\n\n### 亨宁斯韦尔的其他看点\n- **KaviarFactory**：一家由旧鱼酱工厂改造而成的当代艺术画廊，展出北欧和国际艺术家的作品。\n- **Galleri Lofoten**：收藏了大量北方挪威\"黄金时代\"绘画的私人画廊。\n- **咖啡馆与手工艺品店**：村庄虽小，但有很多独立设计师的小店，出售陶器、玻璃制品和羊毛制品。\n\n## 晚餐\n- **推荐**：回雷讷的渔民小屋里，**自己做饭**。\n- 食材：从超市（如 Coop 或 Joker）购买新鲜的三文鱼排、鳕鱼肉、青口贝、土豆和蔬菜。\n- 体验：在小屋的厨房里煎鱼，配一杯白葡萄酒，坐在露台上看午夜阳光。这种\"自己动手\"的晚餐，比米其林餐厅更浪漫。\n- 如果外食：推荐 **Anita's Sjømat**（位于 Sakrisøy，以鱼肉汉堡和海鲜汤闻名）或 **Lofotmat**（亨宁斯韦尔的高级海鲜餐厅）。\n\n---\n\n# D8｜雷讷 → 斯沃尔韦尔（Svolvær）→ 奥斯陆\n**主题：返程，带回城市**\n\n## 交通\n### 1. 雷讷 → 斯沃尔韦尔机场（Svolvær, SVJ）\n- **方式**：自驾。\n- 距离：约 120 公里。\n- 时间：约 1.5～2 小时。\n- **沿途亮点**：这是罗弗敦 E10 公路的精华段。你们会经过：\n  - **Ramberg 白沙滩**：一片令人难以置信的白色细沙滩，海水 turquoise，像热带海岛——但水温只有 10℃。下车拍个照即可，除非你想挑战极地游泳。\n  - **Sakrisøy 黄色小屋**：如果昨天没停，今天可以补拍。\n  - **Kabelvåg 和 Henningsvær**：如果时间充裕，可以再次停靠。\n\n### 2. 斯沃尔韦尔 → 奥斯陆\n- **航班**：SAS 或 Widerøe **飞往奥斯陆**（部分班次需在博德 Bodø 转机一次）。\n- 航程：直飞约 1.5 小时；经博德转机约 2.5～3.5 小时。\n- 建议预订**下午 14:00-16:00 的航班**，这样上午还有时间在罗弗敦做最后的停留。\n\n## 奥斯陆晚间\n- **住宿**：奥斯陆市中心（Thon Hotel Opera 或 Hotel Continental）。\n- **晚餐**：\n  - **Kontrast**（米其林一星，北欧新派料理，需提前预订，人均约 1500 元）；\n  - 或 **Mathallen Oslo** 的美食广场（更轻松，人均 300～500 元）。\n- **购物**：卡尔·约翰斯大道（Karl Johans gate）有户外品牌店（如 Bergans、Norrona）。**注意**：挪威物价极高，这些户外品牌的 base price 通常比德国、英国或中国代购更贵，即便退税后也未必划算。不建议为了\"省钱\"在这里大量采购，更适合买一两件纪念性质的单品。\n\n---\n\n# D9｜奥斯陆 → 国内\n**主题：回家**\n\n- **航班**：早班机返程（建议 10:00～12:00 起飞）。\n- **机场快线**：从中央车站到机场约 20 分钟。\n- 带着 9 天的峡湾记忆、午夜阳光的照片、和婚假的满足感回家。\n\n---\n\n## 附录一：全程预算拆分（2 人总计）\n\n| 项目 | 金额（人民币） | 说明 |\n|:---|:---:|:---|\n| **国际往返机票** | 25,000～35,000 | 暑假直飞/一次转机经济舱，约 1.2～1.8 万/人 |\n| **挪威境内机票** | 8,000～12,000 | 奥斯陆↔卑尔根、奥勒松↔博德、斯沃尔韦尔↔奥斯陆（部分经博德转机） |\n| **租车（2 段）** | 10,000～14,000 | 约 6 天租车，含第一段异地还车费（约 1500～2500 NOK），车型为沃尔沃/斯巴鲁四驱 |\n| **轮渡/火车/停车/油费/过路费** | 4,000～5,500 | 含峡湾轮渡（Hellesylt→Geiranger）、弗洛姆高山火车、博德→Moskenes 轮渡、油费、AutoPASS 隧道桥费 |\n| **住宿（8 晚）** | 20,000～28,000 | 峡湾民宿/渔民小屋 1500～3000 元/晚，城市酒店 1200～2000 元/晚 |\n| **餐饮** | 12,000～15,000 | 外食人均 300～500 元/顿，自己做人均 100～150 元/顿 |\n| **门票/体验** | 2,000～3,000 | 弗洛伊恩缆车、盖朗厄尔峡湾游船、少量徒步装备 |\n| **签证/保险/杂费** | 2,000～3,000 | 申根签证约 800 元/人，保险 200 元/人 |\n| **总计** | **约 83,000～115,500 元** | **人均 4.15～5.78 万** |\n\n> **省钱小贴士**：挪威餐饮极贵，但超市（Rema 1000、Coop、Bónus\"小猪超市\"）的三文鱼、鳕鱼和蔬菜价格合理。建议订带厨房的民宿，自己做早餐和晚餐，可以省下近一半的餐饮预算。\n\n---\n\n## 附录二：行前准备清单\n\n### 证件与签证\n- [ ] **申根签证（挪威）**：至少提前 **6～8 周** 申请。7～8 月是签证高峰期，slot 紧张。\n- [ ] 护照（有效期 6 个月以上）。\n- [ ] 驾照原件 + **英文翻译件**（租租车 APP 可免费办理国际驾照翻译认证件）。\n- [ ] 旅行保险（申根强制要求，保额 ≥ 3 万欧元）。\n\n### 预订确认（按优先级）\n1. [ ] **国际机票**\n2. [ ] **Eliassen Rorbuer 或 Reine Rorbuer**（最难订，瓶颈项）\n3. [ ] **29|2 Aurland 或 Hotel Union Geiranger**\n4. [ ] **挪威境内机票**（SAS / Widerøe / Norwegian）\n5. [ ] **第一段租车**：卑尔根机场取车 → 奥勒松机场还车（覆盖西部峡湾）\n6. [ ] **第二段租车**：Moskenes 码头取车（须为**本地小公司送车上门服务**，提前数周预订）→ Svolvær 机场还车。如订不到，改为 **博德→Leknes/Svolvær 飞机+机场取车**。\n7. [ ] **弗洛姆高山火车票 + 峡湾游船票**（旺季建议提前在 vy.no 购买）\n8. [ ] **Hellesylt → Geiranger 轮渡票**（7～8 月热门，提前在 Fjord1 官网预订）\n9. [ ] **博德 → Moskenes 轮渡票**（torghatten-nord.no，夏季时刻表每年 4～5 月更新）\n\n### 衣物与装备\n- [ ] **防水冲锋衣 + 软壳/抓绒内胆**：挪威夏季多雨，山区风大。\n- [ ] **防水徒步鞋/登山鞋**：Reinebringen 徒步必备。\n- [ ] **轻便雨衣**：比雨伞实用（峡湾风大）。\n- [ ] **薄羽绒服**：罗弗敦傍晚和山顶风大，7 月也可能只有 10℃。\n- [ ] **防晒霜 + 墨镜**：极昼下紫外线极强，且雪地/水面反射严重。\n- [ ] **转换插头**：挪威使用**欧标双圆孔插头**（C/F 型）。\n- [ ] **保温杯/便携烧水壶**：挪威人喜欢喝冷水，但中国人的胃需要热水。\n- [ ] **少量零食/泡面**：防止深夜抵达偏远小镇时餐厅关门。\n\n### APP 下载\n- **Google Maps**：离线地图必备（很多山区没信号）。\n- **Vy**：挪威铁路官方 APP，可买火车票。\n- **Fjord1 / Torghatten Nord**：轮渡时刻查询与购票。\n- **Booking.com / Airbnb**：住宿管理。\n- **TheFork**：餐厅预订（主要用于奥斯陆和卑尔根）。\n\n---\n\n## 附录三：关键决策说明（FAQ）\n\n### Q1：为什么不走完整的\"挪威缩影\"？\n完整版是从奥斯陆坐火车到卑尔根，耗时一整天，其中奥斯陆→Myrdal 的火车虽然漂亮，但和弗洛姆→卑尔根段有景观重复。我们只坐**卑尔根→弗洛姆→艾于兰**这段精华，既节省了整整一天时间，又避免了重复路线。\n\n### Q2：为什么租车要分两段？还要异地还车？\n从大陆开车到罗弗敦群岛需要多次轮渡，且异地还车费极高。更合理的方案是：\n- **第一段**：卑尔根机场取车 → 奥勒松机场还车（覆盖西部峡湾，产生一次性异地还车费约 2000～3500 NOK）；\n- **第二段**：Moskenes 码头取车（须提前预订本地小公司送车）→ Svolvær 机场还车（同岛还车，无异地费）。\n\n如果第二段在 Moskenes 订不到车，建议改为 **博德飞 Leknes/Svolvær**，直接在机场柜台取车。\n\n### Q3：Trollstigen 关闭后，这一天还值得吗？\n**值得。** 2026 版虽然少了 Trollstigen 发卡弯，但老鹰之路、Valldal 山谷的 Gudbrandsjuvet 和大西洋公路仍然足够震撼，而且路线执行风险更低。对只有 9 天的婚假来说，这种确定性比“赌当天开路”更重要。\n\n### Q4：罗弗敦真的值得这么折腾吗？\n**绝对值得。** 罗弗敦是挪威最独特的存在——北极圈内的群岛，却有墨西哥湾流带来的温和气候；雪山直接从海里升起，渔民小屋就建在水面上。D6 的转场虽然累，但 D7 站在 Reinebringen 山顶的那一刻，你会觉得一切都值了。那张俯瞰雷讷的全景，可能是你们这辈子见过最美的风景之一。\n\n### Q5：如果预算充裕，有什么可以提升体验的？\n- **直升机观光**：在盖朗厄尔或罗弗敦都有直升机观光项目，从空中俯瞰峡湾和雪山，震撼度翻倍（约 3000～5000 元/人/30 分钟）。\n- **海钓体验**：在罗弗敦报一个半日海钓团，钓上来的鳕鱼可以直接在民宿里做晚餐。\n- **米其林餐厅**：奥斯陆的 **Maaemo**（米其林三星）是北欧料理的巅峰，需提前数月预订。\n\n---\n\n## 附录四：一句话总结\n\n这 9 天，你们会从卑尔根的彩色港口出发，坐着世界上最陡的火车滑入峡湾，开车经过悬在空中的老鹰之路、Valldal 山谷的 Gudbrandsjuvet 和冲入海里的大西洋公路，最后住进北极圈内的红色渔民小屋，在晚上 11 点的阳光下看着雪山倒映在海面。\n\n**这是挪威在夏天唯一的样子，也是你们婚假最值得买的记忆。**\n\n---\n\n*文档生成时间：2026 年 4 月*  \n*祝你们旅途愉快，新婚快乐！*\n",
      d: "# 意大利多洛米蒂 + 威尼斯｜阿尔卑斯巅峰与文艺复兴｜9 天婚假执行手册\n\n> **旅行时间**：7～8 月（夏季黄金窗口）  \n> **旅行人数**：2 人（婚假）  \n> **总天数**：9 天 8 晚  \n> **核心目的地**：威尼斯 → 维罗纳 → 多洛米蒂（科尔蒂纳丹佩佐、三峰山、布莱斯湖、富纳斯山谷）→ 加尔达湖  \n> **人均预算**：2.5～3.5 万元人民币（2 人总计约 5～7 万元）\n\n---\n\n## 为什么选意大利多洛米蒂 + 威尼斯？\n\n如果你们想要的是**\"风景震撼与人文美食双满分\"**的婚假，那么这条线路是比北欧更热烈、更丰盈的答案。\n\n北欧的夏天是清冷克制的——漫长的白昼、灰蓝色的峡湾、寂静的雪山。它美得让人屏息，却也带着一种遥远的疏离感。而意大利北部完全是另一种气质：威尼斯的大运河上，贡多拉划过巴洛克宫殿的倒影；多洛米蒂的白云岩山峰在日出时被点燃成玫瑰金色，像阿尔卑斯山脉最后的狂想曲；傍晚在维罗纳的露天歌剧院听一场《卡门》，在加尔达湖畔的西尔苗内吃着手工意面和本地白葡萄酒——这里的美是**可以触摸、可以品尝、可以枕着入睡**的。\n\n7～8 月的多洛米蒂，高山草甸开满野花，气温凉爽宜人（15～25℃），是欧洲本地人最钟爱的避暑圣地。与瑞士相比，这里的景观同样世界级的壮丽，但物价更合理、美食更丰富、人文气息更浓郁。9 天时间，你们可以在水城里迷失，在山峰上相拥，在湖边小镇发呆。这是一段**既有史诗感，又有烟火气**的婚假。\n\n---\n\n## 行程总览\n\n| 天数 | 星期 | 路线 | 住宿地 | 核心体验 | 开车距离 |\n|:---:|:---:|:---|:---|:---|:---:|\n| D1 | 六 | 国内 → 威尼斯 | 威尼斯本岛 | 抵达水上之城，大运河日落 | — |\n| D2 | 日 | 威尼斯 | 威尼斯本岛 | 圣马可广场、彩色岛、贡多拉巡游 | — |\n| D3 | 一 | 威尼斯 → 维罗纳 → 科尔蒂纳丹佩佐 | 科尔蒂纳丹佩佐 | 朱丽叶故居、圆形剧场、开启多洛米蒂自驾 | 约 270 km |\n| D4 | 二 | 科尔蒂纳丹佩佐 | 科尔蒂纳丹佩佐 | 三峰山（Tre Cime）徒步、Sella Ronda 公路 | 约 80 km |\n| D5 | 三 | 科尔蒂纳丹佩佐 → 布莱斯湖 → 富纳斯山谷 | 圣玛格达莱纳/奥蒂塞伊 | 布莱斯湖泛舟、富纳斯山谷日落、Seceda 缆车 | 约 120 km |\n| D6 | 四 | 奥蒂塞伊 → Passo Giau → 马尔莫拉达 | 科尔蒂纳丹佩佐/卡纳泽伊 | Passo Giau 公路自驾、高山草甸徒步 | 约 100 km |\n| D7 | 五 | 多洛米蒂 → SS48 刀脊公路 → 加尔达湖 | 西尔苗内 | 高山公路自驾巅峰、抵达意大利最大湖泊 | 约 180 km |\n| D8 | 六 | 西尔苗内 → 米兰 | 米兰 | 加尔达湖畔温泉小镇、米兰大教堂与埃马努埃莱长廊 | 约 140 km |\n| D9 | 日 | 米兰 → 国内 | — | 马尔彭萨机场返程 | — |\n\n> **设计逻辑**：D1-D2 威尼斯公共交通慢游；D3 在维罗纳取车开启自驾；D4-D6 多洛米蒂核心三角深度探索；D7 经刀脊公路南下到加尔达湖过渡；D8 米兰作为出口，购物与休整兼备。\n\n---\n\n# D1｜国内 → 威尼斯（Venice）\n**主题：抵达水上之城**\n\n![威尼斯大运河日落](./images/venice_grand_canal.jpg)\n*威尼斯大运河的贡多拉与彩色宫殿*\n\n## 交通\n- **航班**：建议选择 **阿联酋航空**、**汉莎航空** 或 **中国国际航空** 经法兰克福/慕尼黑转机，或 **海南航空** 直飞米兰后转乘火车。**下午 14:00-17:00 抵达威尼斯马可波罗机场（VCE）** 最佳，可以在日落前入住并享受第一晚的大运河。\n- **机场 → 威尼斯本岛**：\n  - 最浪漫的方式是乘坐 **水上出租车（Water Taxi）**，约 30 分钟直达酒店门口，费用约 120～140 欧元/船（可坐 6-8 人，2 人坐略贵但值得体验一次）。\n  - 性价比之选是 **Alilaguna 水上巴士**，蓝线约 1 小时到圣马可广场附近，票价约 15 欧元/人。\n\n> **重要提示**：威尼斯本岛**完全没有汽车**。你们的行李箱需要靠自己提着走过石板桥和狭窄的巷子。建议行李尽量精简，或提前联系酒店是否提供码头接应服务。\n\n## 住宿\n**推荐：Hotel Metropole（大都会酒店）或 Bauer Palazzo**\n- 位置：圣马可广场步行 3～5 分钟，大运河沿岸。\n- 价格：约 350～600 欧元/晚。\n- 理由：推开窗就是大运河，清晨和黄昏的威尼斯最迷人。作为婚假，在威尼斯住一晚运河景观房是**必须的投资**。Bauer Palazzo 的露台餐厅是拍摄贡多拉和大运河的经典机位。\n- 备选：如果预算有限，可以选择 Cannaregio 或 Dorsoduro 区域的设计民宿（约 150～250 欧元/晚），更安静、更本地化。\n\n## 活动\n- **傍晚**：从酒店步行到 **里亚托桥（Ponte di Rialto）**，这是大运河上最古老、最壮观的桥梁。站在桥中央，左右两侧是威尼斯最经典的画面——粉色的宫殿、穿梭的贡多拉、橙红色的落日。\n- **晚餐**：推荐 **Antiche Carampane**，藏在巷弄深处的本地海鲜餐厅，招牌是**蜘蛛蟹意面（Tagliolini al Gransporco）**和**炸小海鲜（Fritto Misto）**。人均约 80～120 欧元。威尼斯游客餐厅很多，这家是本地人也会光顾的宝藏。\n- **小贴士**：威尼斯晚上 9 点后天色才完全暗下来。晚餐后沿着大运河散步，看灯火倒映在水面上，会有一种穿越到 16 世纪的恍惚感。\n\n---\n\n# D2｜威尼斯（Venice）\n**主题：迷失与巡游**\n\n![圣马可广场与总督宫](./images/st_marks_square.jpg)\n*圣马可广场上的钟楼与总督宫*\n\n## 上午：圣马可广场（Piazza San Marco）\n这是欧洲最美的客厅，也是威尼斯 1000 年海洋霸权的象征。\n\n- **圣马可大教堂（Basilica di San Marco）**：拜占庭风格的金色穹顶、马赛克镶嵌画、从君士坦丁堡掠夺来的青铜骏马——这座教堂是威尼斯作为\"东方女王\"的宣言。建议提前在网上预订 **Pala d'Oro 黄金祭坛屏**和**露台登临**的联票。\n- **总督宫（Palazzo Ducale）**：哥特式建筑的巅峰，内部有丁托列托的巨幅天顶画《天堂》，以及著名的**叹息桥（Ponte dei Sospiri）**——传说囚犯过桥时透过小窗看到外面的世界，会发出最后一声叹息。\n- **钟楼（Campanile）**：乘电梯登顶，俯瞰威尼斯 118 座岛屿和远处潟湖的碧蓝水面。\n\n> **时间建议**：早上 8:30 前到达广场，可以避开旅行团的人潮。广场上的露天咖啡馆（如 Florian 或 Quadri）一杯咖啡要 15～20 欧元，且伴有乐队演奏——这不是喝咖啡，是买座位和氛围。如果只是想休息，建议去旁边的巷子里找普通咖啡馆。\n\n## 下午：彩色岛（Burano）\n\n![布拉诺彩色房屋](./images/burano_colorful_houses.jpg)\n*布拉诺岛上的彩虹色渔民小屋*\n\n- **交通**：从圣马可广场附近的码头乘坐 **LN 号线水上巴士**，约 45 分钟抵达 Burano。\n- **看点**：岛上每一栋房子都被漆成了不同的颜色——柠檬黄、薄荷绿、珊瑚粉、天蓝色。传说渔民们出海归来时，需要通过房子的颜色在雾中辨认自己的家。如今这里是威尼斯最上镜的地方，也是**蕾丝工艺**的发源地。\n- **活动**：在岛上慢慢逛，买一盒手工蕾丝手帕作为婚假纪念；在运河边的冰淇淋店买一个 Gelato；找一家小餐馆吃**墨鱼面（Spaghetti al Nero di Seppia）**，吃完嘴唇会染成黑色——这是威尼斯特有的浪漫恶作剧。\n\n## 傍晚：贡多拉巡游\n\n![贡多拉在大运河上](./images/gondola_venice.jpg)\n*黄昏时分的贡多拉巡游*\n\n- **时长**：30 分钟。\n- **价格**：官方定价白天 80 欧元/船，晚上 19:00 后 100 欧元/船（最多坐 6 人）。可以拼船，也可以独享。\n- **路线**：从圣马可广场附近的码头出发，穿过小桥和狭窄的水巷（Rio），最终汇入大运河。船夫会唱几句意大利民歌，桨声欸乃，水波荡漾。\n- **婚假价值**：这也许是世界上最贵的 30 分钟划船体验，但在威尼斯，坐一次贡多拉不是\"旅游项目\"，而是**进入这座城市梦境的门票**。作为新婚夫妇，这一刻的仪式感无可替代。\n\n## 晚餐\n推荐 **Osteria alle Testiere**，一家只有 8 张桌子的小店，主打当天从潟湖捕捞的海鲜。没有固定菜单，厨师根据早晨鱼市的收获决定做什么。人均约 100～150 欧元，必须提前预订。\n\n---\n\n# D3｜威尼斯 → 维罗纳（Verona）→ 科尔蒂纳丹佩佐（Cortina d'Ampezzo）\n**主题：从罗密欧朱丽叶到白云岩大门**\n\n![维罗纳圆形剧场](./images/verona_arena.jpg)\n*维罗纳圆形剧场——世界上保存最完好的古罗马剧场之一*\n\n## 交通\n从今天起，你们正式开启**自驾**模式。\n- **威尼斯 → 维罗纳**：\n  - 上午退房后，乘坐水上巴士或酒店安排的接驳船到 **Tronchetto 停车场**（或前一晚提前将车停放在 **Mestre 火车站停车场**，乘火车到维罗纳取车——后者更便宜，停车费约 15～20 欧元/天）。\n  - 如果从 Tronchetto 开车，沿 A4 高速公路向东行驶约 120 公里，约 1.5 小时抵达维罗纳。\n- **维罗纳 → 科尔蒂纳丹佩佐**：\n  - 下午游览结束后，从维罗纳向北驶入多洛米蒂山区。前段是高速公路，进入山区后变为风景公路（SS51），约 150 公里，开车约 2.5 小时。\n- **总里程**：约 270 公里。\n\n> **租车提示**：建议在维罗纳机场或市区取车（Hertz、Avis、Sixt 均有门店），车型推荐**紧凑型 SUV 或旅行车**（如宝马 X1、奥迪 Q3、沃尔沃 V60），意大利山区公路弯道多、坡度大，动力充足且底盘较高的车更从容。\n\n## 维罗纳活动\n\n### 朱丽叶故居（Casa di Giulietta）\n- 位于市中心卡佩罗路（Via Cappello），是一座中世纪塔楼。\n-  courtyard 里有一座朱丽叶的青铜雕像，传说摸她的右胸会带来爱情好运——现在被无数游客摸得锃亮。\n- 墙上贴满了爱情便签，二楼是著名的\"朱丽叶阳台\"，据说罗密欧就是在这里向朱丽叶求爱的。\n- **婚假价值**：虽然这是一个半虚构的景点，但维罗纳作为\"爱之城\"的氛围是真实的。在便签墙上贴一张你们的名字，是新婚夫妇的可爱仪式。\n\n### 维罗纳圆形剧场（Arena di Verona）\n- 建于公元 1 世纪，是世界上保存最完好、仍在使用的古罗马圆形剧场之一，可容纳 3 万名观众。\n- 7～8 月是**维罗纳歌剧节（Arena di Verona Opera Festival）**的季节，晚上通常会上演《阿依达》《卡门》《托斯卡》等经典歌剧。\n- 如果你们时间允许且恰好有演出，强烈建议预订一场晚间歌剧——在星空下的古罗马剧场里听《卡门》的咏叹调，是意大利能给你们的最高级浪漫。\n\n## 午餐\n推荐 **Osteria Le Civette**，位于圆形剧场附近，主打维罗纳传统菜。**Amarone 红酒炖牛肉（Stracotto all'Amarone）**是当地名产，肉质酥烂，酱汁浓郁。人均约 40～60 欧元。\n\n## 住宿\n**推荐：Cristallo Resort & Spa（克里斯塔洛温泉度假酒店）**\n- 位置：科尔蒂纳丹佩佐小镇边缘，正对白云岩山峰。\n- 价格：约 400～700 欧元/晚。\n- 特点：多洛米蒂最传奇的酒店之一，建于 1901 年，曾接待过无数皇室和好莱坞明星。拥有绝佳的SPA设施和山景露台。\n- 备选：**Hotel Corona** 或小镇上的精品木屋民宿（约 200～350 欧元/晚）。\n\n> **设计逻辑**：科尔蒂纳是 1956 年冬奥会举办地，也是多洛米蒂最奢华、设施最完善的小镇。把它作为多洛米蒂自驾的大本营，可以辐射三峰山、Sella Ronda、Passo Giau 等核心景点。\n\n---\n\n# D4｜科尔蒂纳丹佩佐 → 三峰山（Tre Cime di Lavaredo）→ Sella Ronda\n**主题：多洛米蒂的图腾**\n\n![三峰山日出](./images/tre_cime.jpg)\n*三峰山（Tre Cime di Lavaredo）——多洛米蒂最具标志性的白云岩峰群*\n\n这是整个行程中**自然景观最震撼的一天**。三峰山是多洛米蒂的灵魂，也是阿尔卑斯山脉最上镜的山峰之一。\n\n## 上午：三峰山徒步\n\n### 交通\n- 从科尔蒂纳开车约 30 分钟到 **Misurina 湖**，再沿山路开约 15 分钟到达 **Rifugio Auronzo 停车场**（海拔 2320 米）。\n- **注意**：夏季三峰山公路极为热门，停车场每天 10:00 前就满员。建议**早上 7:30 前从酒店出发**，或者前一晚直接住在山里的 Rifugio（高山小屋）。\n- 停车费：约 30 欧元/车（夏季旺季）。\n\n### 徒步路线\n**经典环线路线：Rifugio Auronzo → Rifugio Lavaredo → Forcella Lavaredo → 三峰山北坡 → Rifugio Locatelli → 返回 Auronzo**\n- 距离：约 9.5 公里（环线）。\n- 爬升：约 400 米。\n- 时间：3.5～4.5 小时。\n- 难度：中等。路线清晰，大部分是碎石和土路，没有技术难度。\n\n### 景观价值\n- **三峰山本体**：三座锯齿状的白云岩巨峰从海拔 3000 米处拔地而起，岩壁垂直如刀削。清晨的阳光从东方照来，山峰会呈现出**玫瑰金色到亮白色的渐变**——这种现象被称为\"Enrosadira\"（阿尔卑斯之光），是多洛米蒂最独特的自然奇观。\n- **Rifugio Locatelli**：位于三峰山北坡的观景台，可以拍到三峰山倒映在高山小湖中的经典画面。这里也是拍摄婚纱照的热门机位。\n- **Cappella degli Alpini**：一座建在山坡上的小小教堂，背景就是三峰山的巨型岩壁，比例悬殊得令人敬畏。\n\n> **徒步建议**：\n> - 穿**登山鞋或高帮徒步鞋**，碎石路段容易崴脚；\n> - 带足水和防晒霜，高海拔紫外线极强；\n> - 山顶天气多变，即使是 7 月也要带一件**防风外套或薄羽绒**；\n> - 如果体力有限，可以只走到 Rifugio Lavaredo（约 1 小时往返），风景已经足够震撼。\n\n![三峰山北坡小教堂](./images/tre_cime_chapel.jpg)\n*三峰山脚下的 Cappella degli Alpini 小教堂*\n\n## 下午：Sella Ronda 公路自驾\n- 从三峰山返回科尔蒂纳后，可以开车绕一段 **Sella Ronda**——这是围绕 Sella 群山的一条环形高山公路，连接 Passo Gardena、Passo Sella、Passo Pordoi 和 Passo Campolongo 四个山口。\n- 即使不完成完整环线（约 4 小时），只开其中一段也足够惊艳。公路在海拔 2000 米以上的山脊间盘旋，一侧是垂直的白云岩悬崖，另一侧是深绿色的山谷和散落的木屋。\n- **Passo Giau** 不在 Sella Ronda 主环线上，但离科尔蒂纳很近（约 20 分钟车程），可以作为傍晚的加餐——日落时分这里是整个多洛米蒂最壮丽的山口之一。\n\n## 晚餐\n回到科尔蒂纳小镇，推荐 **El Camineto**。这家餐厅以**高山奶酪火锅（Fonduta）**、**野猪肉意面（Pappardelle al Cinghiale）**和**烤鹿肉**闻名。配上当地酿造的**Prosecco 起泡酒**，是对一天徒步最好的犒赏。人均约 60～90 欧元。\n\n---\n\n# D5｜科尔蒂纳丹佩佐 → 布莱斯湖（Lago di Braies）→ 富纳斯山谷（Val di Funes）\n**主题：阿尔卑斯的明信片**\n\n![布莱斯湖泛舟](./images/lago_braies.jpg)\n*布莱斯湖的祖母绿色湖水与木质划艇*\n\n## 上午：布莱斯湖（Lago di Braies）\n这是多洛米蒂最网红的湖泊，也是 Instagram 上出镜率最高的意大利高山湖之一。\n\n- **交通**：从科尔蒂纳开车约 1 小时（约 60 公里），沿风景公路向北进入 Pusteria 山谷。\n- **看点**：湖水呈现出不可思议的**祖母绿色到蓝绿色**，背景是垂直的 Croda del Becco 山峰（海拔 2810 米）。湖边有一座小教堂和一排木质划艇，是拍摄婚纱照的绝佳背景。\n- **活动**：\n  - **租划艇游湖**：约 25 欧元/小时。在平静的湖面上划船，山峰倒影触手可及，是多洛米蒂最浪漫的体验之一。\n  - **环湖徒步**：约 3.5 公里，平路，1～1.5 小时。可以避开人群，找到属于自己的湖边角落。\n\n> **时间建议**：布莱斯湖夏季 09:00 后停车场就开始排队。建议**早上 8:00 前抵达**，或者前一晚住在湖边附近的酒店。如果 10:00 后才到，体验会大打折扣。\n\n## 下午：富纳斯山谷（Val di Funes）与 Santa Maddalena\n\n![富纳斯山谷教堂日落](./images/val_di_funes.jpg)\n*富纳斯山谷的 Santa Maddalena 教堂与锯齿状白云岩山峰*\n\n- **交通**：从布莱斯湖开车约 1 小时（约 50 公里）到达富纳斯山谷。\n- **看点**：这里有多洛米蒂最具代表性的田园画面——一座小小的**Santa Maddalena 教堂**坐落在翠绿的草甸上，背景是锯齿状的 Odle 群峰。日落时分（约 19:30-20:30），山峰被染成玫瑰金色，教堂的尖顶剪影如同童话世界。\n- **拍摄机位**：\n  - 教堂后方的山坡是最佳机位，但需要尊重私人领地；\n  - 更推荐从村庄主路尽头的公共步道进入，视野开阔且合法。\n\n## 傍晚：Seceda 山顶（可选）\n- 如果你们体力尚好，可以从奥蒂塞伊（Ortisei）乘坐 **Seceda 缆车**（约 15 分钟）上到海拔 2500 米的山顶。\n- 这里是多洛米蒂另一个史诗级机位——从山顶俯瞰，Geisler/Odle 群峰像一堵巨大的刀锋墙突然从绿色草甸中拔起，落差超过 1000 米。日落时分的明暗对比极其强烈。\n- 缆车夏季运营到 18:00 左右，建议查好时间。\n\n## 住宿\n**推荐：Adler Spa Resort Dolomiti（奥蒂塞伊）或富纳斯山谷的精品民宿**\n- Adler 是多洛米蒂最著名的 Wellness 酒店之一，拥有顶级SPA和泳池，价格在 400～700 欧元/晚。\n- 更本地化且性价比更高的选择是富纳斯山谷或 Santa Cristina 的**家庭式木屋酒店（Garni）**，约 150～250 欧元/晚，通常包含丰盛的阿尔卑斯早餐。\n\n---\n\n# D6｜奥蒂塞伊 → Passo Giau → 马尔莫拉达（Marmolada）→ 科尔蒂纳\n**主题：高山公路的巅峰**\n\n![Passo Giau 蜿蜒公路](./images/passo_giau.jpg)\n*Passo Giau 山口——多洛米蒂最壮丽的自驾公路之一*\n\n这一天是**多洛米蒂自驾的精华日**。你们会穿越欧洲最美的高山公路之一，感受阿尔卑斯山脉的磅礴气势。\n\n## 上午：Passo Giau（海拔 2236 米）\n\n- **路线**：从奥蒂塞伊/科尔蒂纳出发，沿 SP638 公路 climbing 至 Passo Giau 山口。\n- **景观**：这条公路在多洛米蒂自驾爱好者心中排名第一。公路在陡峭的山坡上呈之字形攀升，每一个发卡弯都带来新的震撼视角。到达山口后，360 度被白云岩巨峰环绕——东南方向是 Cinque Torri，西北方向是 Nuvolau 和 Averau。\n- **山顶 Rifugio**：Passo Giau 山顶有一家 Rifugio Passo Giau，露台是拍摄山景和公路曲线的绝佳位置。在这里喝一杯高山咖啡，吃一块苹果派（Apfelstrudel），是对自驾最好的中场休息。\n\n## 下午：Cinque Torri 与马尔莫拉达\n\n- **Cinque Torri（五塔山）**：从 Passo Giau 下山约 15 分钟即到。这里是第一次世界大战的遗址区，山上有保存完好的战壕和露天博物馆。五座奇特的白云岩尖塔从草甸中升起，形状怪异而优美，是攀岩圣地，也适合轻松徒步。\n- **马尔莫拉达（Marmolada）**：多洛米蒂最高峰（海拔 3343 米），被称为\"多洛米蒂的女王\"。夏季可以乘坐缆车登上山顶的冰川区，俯瞰整个山脉。从 Passo Fedaia 看马尔莫拉达的北壁，是阿尔卑斯最壮观的冰岩混合山体之一。\n\n## 住宿\n建议返回**科尔蒂纳丹佩佐**住宿，方便第二天向南出发前往加尔达湖。如果不想移动，也可以住在 **Canazei（卡纳泽伊）**，这是 Dolomiti Superski 区域的另一个核心小镇，氛围更休闲。\n\n## 晚餐\n在科尔蒂纳尝试 **Ristorante Tivoli**，这是米其林推荐的餐厅，主打现代阿尔卑斯料理。**松露意面（Tagliolini al Tartufo）**和多洛米蒂本地奶酪是必点。人均约 80～120 欧元。\n\n---\n\n# D7｜多洛米蒂 → SS48 刀脊公路 → 加尔达湖（Sirmione）\n**主题：从雪山到湖泊的过渡**\n\n![加尔达湖西尔苗内](./images/sirmione_garda.jpg)\n*加尔达湖畔的西尔苗内小镇与斯卡利杰罗城堡*\n\n## 自驾路线\n- **多洛米蒂 → 特伦托（Trento）**：沿 SS48 公路向南，穿越 **Passo Costalunga 和 Passo Rolle**（如果走东线）或沿 A22 高速公路直下（更快）。\n- **特伦托 → 加尔达湖**：沿公路向南约 1 小时，抵达西尔苗内（Sirmione）。\n- **总里程**：约 180～220 公里（取决于具体路线）。\n- **开车时间**：约 3.5～4.5 小时（含休息和拍照）。\n\n> **路线建议**：如果时间充裕，可以走风景路线经过 **Passo Rolle** 和 **Pale di San Martino**，这是多洛米蒂另一个世界级的山景区域；如果想轻松一些，直接走 A22 高速公路南下，沿途欣赏阿尔卑斯山南麓的葡萄园和橄榄树林。\n\n## 西尔苗内（Sirmione）\n这是加尔达湖上最美丽的小镇，伸入湖中的狭长半岛上布满了柠檬树、温泉浴场和中世纪城堡。\n\n- **斯卡利杰罗城堡（Castello Scaligero）**：一座建于 13 世纪的水上城堡，通过一座木桥与陆地相连。登上塔楼可以俯瞰整个加尔达湖的碧蓝水面。\n- **卡图卢斯石窟（Grotte di Catullo）**：罗马诗人卡图卢斯的别墅遗址，位于半岛尽头的山坡上，可以远眺湖泊北岸的群山。\n- **温泉**：西尔苗内以硫磺温泉闻名，湖畔有多家温泉浴场（如 Terme di Sirmione 和 Aquaria Thermal SPA）。在阿尔卑斯徒步几天后，泡一个温泉是身体的救赎。\n\n## 住宿\n**推荐：Hotel Sirmione e Promessi Sposi**\n- 位置：西尔苗内老城入口附近，临湖。\n- 价格：约 250～450 欧元/晚。\n- 特点：拥有私人湖滩和露天泳池，部分房间带有湖景阳台。\n- 备选：老城内的精品民宿或湖畔的 Agriturismo（农家乐）。\n\n## 晚餐\n西尔苗内的餐厅以**柠檬风味料理**和**湖鱼**闻名。推荐 **Ristorante L'Arcimboldo**，招牌菜是**香煎白鱼（Coregone）**和**柠檬意式烩饭（Risotto al Limone）**。配上一杯加尔达湖本地的**Lugana 白葡萄酒**，在湖畔露台上看着夕阳沉入湖面。人均约 50～80 欧元。\n\n---\n\n# D8｜西尔苗内 → 米兰（Milano）\n**主题：从湖畔到时尚之都**\n\n![米兰大教堂](./images/milan_duomo.jpg)\n*米兰大教堂（Duomo di Milano）与埃马努埃莱二世长廊*\n\n## 上午：加尔达湖告别\n- 早上在西尔苗内再散步一圈，或者租一艘小船在湖中巡游（无需驾照，约 40 欧元/小时）。从水上看城堡和小镇，是另一种角度的美。\n- **购物**：西尔苗内有很多柠檬主题的纪念品店——柠檬酒（Limoncello）、柠檬香皂、柠檬巧克力，适合作为伴手礼。\n\n## 下午：米兰\n- **交通**：从西尔苗内开车约 1.5 小时（约 140 公里）抵达米兰市区。\n- **停车**：米兰 ZTL（限行区）非常严格，建议将车停放在酒店合作停车场或城外的 P+R，然后步行游览。\n\n## 活动\n\n### 米兰大教堂（Duomo di Milano）\n- 世界第二大教堂，哥特式建筑的巅峰，外墙上有 3400 多座雕像。\n- 建议购买**登顶电梯票**，到屋顶露台近距离欣赏尖塔和金色圣母像（La Madonnina），同时俯瞰整个米兰城。\n\n### 埃马努埃莱二世长廊（Galleria Vittorio Emanuele II）\n- 世界上最古老的购物中心之一，穹顶是玻璃和铁结构的杰作。\n- 地面上的公牛马赛克是一个著名传统——用脚跟踩着公牛的生殖器旋转三圈，会带来好运。现在那里已经磨出了一个小坑。\n- 长廊两侧是 Prada、Gucci、Louis Vuitton 等奢侈品牌的旗舰店。即使不购物，来这里喝咖啡、看人也足够愉悦。\n\n### 斯福尔扎城堡（Castello Sforzesco）与感恩圣母堂（Santa Maria delle Grazie）\n- 如果时间充裕，可以去感恩圣母堂看达·芬奇的《最后的晚餐》。但门票**必须提前数月预订**，现场几乎买不到。\n- 斯福尔扎城堡是米兰最大的历史建筑，内部有多家博物馆，城堡后的公园是市民休闲的好去处。\n\n## 住宿\n**推荐：Bulgari Hotel Milano 或 Hotel Spadari al Duomo**\n- Bulgari Hotel 位于蒙特拿破仑大街附近，是米兰最奢华的设计酒店之一（约 800～1500 欧元/晚）。\n- Hotel Spadari al Duomo 位置极佳，步行到大教堂 3 分钟，价格更合理（约 250～400 欧元/晚）。\n\n## 晚餐\n推荐 **Trattoria Milanese**，一家成立于 1933 年的传统米兰餐厅。招牌菜是**米兰炸肉排（Cotoletta alla Milanese）**——
