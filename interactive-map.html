192 \u5ca9\u89c1\u6cfd \u2192 \u4e09\u7b20 \u2192 \u5bcc\u826f\u91ce\uff0c\u6cbf **\u56fd\u9053 12 \u53f7\u8f6c\u56fd\u9053 38 \u53f7** \u884c\u9a76\u3002\n- **\u8ddd\u79bb**\uff1a\u7ea6 115 \u516c\u91cc\u3002\n- **\u5f00\u8f66\u65f6\u95f4**\uff1a\u7ea6 1.5\uff5e2 \u5c0f\u65f6\uff08\u8def\u51b5\u6781\u597d\uff0c\u590f\u5b63\u6cbf\u9014\u7a3b\u7530\u7fe0\u7eff\uff09\u3002\n\n> **\u81ea\u9a7e\u63d0\u793a**\uff1a\u5317\u6d77\u9053\u548c\u4e2d\u56fd\u4e00\u6837\u662f**\u5de6\u8235\u53f3\u884c**\uff0c\u65e0\u9700\u9002\u5e94\u3002\u9ad8\u901f\u516c\u8def\u6536\u8d39\u53ef\u7528 ETC \u5361\uff08\u79df\u8f66\u516c\u53f8\u901a\u5e38\u4f1a\u63d0\u4f9b\uff0c\u8fd8\u8f66\u65f6\u7ed3\u7b97\uff09\uff0c\u590f\u5b63\u8def\u9762\u5e72\u71e5\uff0c\u975e\u5e38\u8212\u9002\u3002\n\n## \u4f4f\u5bbf\n**\u63a8\u8350\uff1a\u65b0\u5bcc\u826f\u91ce\u738b\u5b50\u9152\u5e97\uff08Shin Furano Prince Hotel\uff09**\n- \u4f4d\u7f6e\uff1a\u5bcc\u826f\u91ce\u5e02\u533a\u4e1c\u4fa7\u7684\u5c71\u9e93\u5730\u5e26\u3002\n- \u4ef7\u683c\uff1a\u7ea6 1,000\uff5e1,600 \u5143\u4eba\u6c11\u5e01/\u665a\u3002\n- \u7279\u70b9\uff1a\u9152\u5e97\u65c1\u8fb9\u5c31\u662f**\u7cbe\u7075\u9732\u53f0\uff08Ningle Terrace\uff09**\u548c**\u68ee\u4e4b\u65f6\u8ba1\u5496\u5561\u5385**\uff0c\u6b65\u884c 5 \u5206\u949f\u53ef\u8fbe\u3002\u90e8\u5206\u623f\u95f4\u53ef\u76f4\u63a5\u770b\u5230\u5341\u80dc\u5cb3\u8fde\u5cf0\u3002\n- \u5907\u9009\uff1a**\u5bcc\u826f\u91ce Natulux Hotel**\uff08\u8bbe\u8ba1\u9152\u5e97\uff0c\u4f4d\u4e8e JR \u5bcc\u826f\u91ce\u7ad9\u65c1\uff0c\u4ea4\u901a\u66f4\u4fbf\u5229\uff09\u3002\n\n## \u6d3b\u52a8\n\n### \u4e0b\u5348\uff1a\u5bcc\u7530\u519c\u573a\uff08Farm Tomita\uff09\n\u8fd9\u662f\u5317\u6d77\u9053\u6700\u8d1f\u76db\u540d\u7684\u85b0\u8863\u8349\u82b1\u7530\uff0c\u4e5f\u662f\u65e0\u6570\u660e\u4fe1\u7247\u7684\u53d6\u666f\u5730\u3002\n\n- **\u770b\u70b9**\uff1a**\u4f20\u7edf\u85b0\u8863\u8349\u7530\uff08Traditional Lavender Field\uff09** \u4f4d\u4e8e\u519c\u573a\u4e2d\u5fc3\uff0c\u7d2b\u8272\u7684\u82b1\u6bef\u4e00\u76f4\u94fa\u5230\u5341\u80dc\u5cb3\u5c71\u811a\u4e0b\uff1b**\u5f69\u8272\u82b1\u7530\uff08Irodori Field\uff09** \u5219\u7531\u85b0\u8863\u8349\u3001\u7f42\u7c9f\u3001\u9f20\u5c3e\u8349\u7b49\u62fc\u6210\u6761\u7eb9\u56fe\u6848\uff0c\u50cf\u4e00\u5757\u5de8\u5927\u7684\u8c03\u8272\u677f\u3002\n- **\u6700\u4f73\u65f6\u95f4**\uff1a7 \u6708\u4e2d\u4e0b\u65ec\u662f\u85b0\u8863\u8349\u7684\u6ee1\u5f00\u671f\uff0c\u82b1\u6735\u989c\u8272\u6700\u6df1\u3001\u9999\u6c14\u6700\u6d53\u30028 \u6708\u4e0a\u65ec\u5f00\u59cb\u6536\u5272\uff0c\u4f46\u5f69\u8272\u82b1\u7530\u4f1a\u4e00\u76f4\u6301\u7eed\u5230 8 \u6708\u5e95\u3002\n- **\u7f8e\u98df**\uff1a\u519c\u573a\u7684**\u85b0\u8863\u8349\u51b0\u6dc7\u6dcb**\u548c**\u85b0\u8863\u8349\u6c7d\u6c34**\u662f\u5fc5\u8bd5\u7684\u2014\u2014\u6de1\u6de1\u7684\u7d2b\u8272\uff0c\u5165\u53e3\u662f\u82b1\u9999\u4e0e\u5976\u9999\u7684\u5947\u5999\u878d\u5408\u3002\n- **\u5c0f\u8d34\u58eb**\uff1a\u4e0b\u5348 3 \u70b9\u540e\u6e38\u5ba2\u9010\u6e10\u51cf\u5c11\uff0c\u5149\u7ebf\u4e5f\u66f4\u67d4\u548c\u3002\u5982\u679c\u60f3\u62cd\u5230\u6ca1\u6709\u6e38\u5ba2\u7684\u7167\u7247\uff0c\u53ef\u4ee5\u508d\u665a\u518d\u53bb\u4e00\u6b21\uff08\u519c\u573a\u514d\u8d39\u5f00\u653e\u533a\u57df\u81f3\u65e5\u843d\uff09\u3002\n\n### \u508d\u665a\uff1a\u7cbe\u7075\u9732\u53f0\uff08Ningle Terrace\uff09\n\n![\u5bcc\u826f\u91ce\u7cbe\u7075\u9732\u53f0\u9ec4\u660f](./F_\u5317\u6d77\u9053/images/ningle_terrace.jpg)\n*\u68ee\u6797\u4e2d\u7684\u7cbe\u7075\u9732\u53f0\u4e0e\u624b\u5de5\u6728\u5c4b*\n\n\u8fd9\u662f\u4e00\u7247\u5efa\u5728\u68ee\u6797\u4e2d\u7684**\u624b\u5de5\u5de5\u827a\u54c1\u6751\u843d**\uff0c\u7531\u4f5c\u5bb6\u4ed3\u672c\u806a\u8bbe\u8ba1\u300215 \u5ea7\u5c0f\u6728\u5c4b\u5206\u5e03\u5728\u873f\u8712\u7684\u6728\u677f\u8def\u4e0a\uff0c\u6bcf\u95f4\u5c4b\u5b50\u91cc\u90fd\u6709\u4e00\u4f4d\u5320\u4eba\u5728\u73b0\u573a\u5236\u4f5c\u73bb\u7483\u3001\u6728\u96d5\u3001\u76ae\u9769\u6216\u8721\u70db\u3002\u508d\u665a\u65f6\u5206\uff0c\u6728\u5c4b\u7684\u6696\u9ec4\u8272\u706f\u5149\u5728\u68ee\u6797\u4e2d\u4eae\u8d77\uff0c\u914d\u4e0a\u5bcc\u826f\u91ce\u51c9\u723d\u7684\u665a\u98ce\uff0c\u6d6a\u6f2b\u5f97\u50cf\u7ae5\u8bdd\u573a\u666f\u3002\n\n---\n\n# D4\uff5c\u5bcc\u826f\u91ce \u2192 \u7f8e\u745b \u2192 \u5c42\u4e91\u5ce1\uff08Sounkyo\uff09\n**\u4e3b\u9898\uff1a\u62fc\u5e03\u4e4b\u8def\u4e0e\u9752\u6c60\u5e7b\u5883**\n\n![\u7f8e\u745b\u56db\u5b63\u5f69\u4e4b\u4e18\u82b1\u7530](./F_\u5317\u6d77\u9053/images/shikisai_no_oka.jpg)\n*\u7f8e\u745b\u56db\u5b63\u5f69\u4e4b\u4e18\u7684\u5c55\u671b\u82b1\u7530*\n\n## \u81ea\u9a7e\u8def\u7ebf\n- **\u8def\u7ebf**\uff1a\u5bcc\u826f\u91ce \u2192 \u7f8e\u745b\uff08\u7ea6 25 \u516c\u91cc\uff09\u2192 \u767d\u91d1\u9752\u6c60\uff08\u7ea6 30 \u516c\u91cc\uff09\u2192 \u5c42\u4e91\u5ce1\u6e29\u6cc9\uff08\u7ea6 60 \u516c\u91cc\uff09\u3002\n- **\u603b\u91cc\u7a0b**\uff1a\u7ea6 115 \u516c\u91cc\u3002\n- **\u5f00\u8f66\u65f6\u95f4**\uff1a\u7ea6 2.5\uff5e3 \u5c0f\u65f6\uff08\u542b\u591a\u6b21\u505c\u8f66\u62cd\u7167\uff09\u3002\n\n## \u6d3b\u52a8\n\n### \u4e0a\u5348\uff1a\u7f8e\u745b\u62fc\u5e03\u4e4b\u8def\uff08Patchwork Road\uff09\u4e0e\u56db\u5b63\u5f69\u4e4b\u4e18\n\u7f8e\u745b\u7684\u4e18\u9675\u5730\u5e26\u88ab\u79f0\u4e3a\"\u62fc\u5e03\u4e4b\u8def\"\uff0c\u56e0\u4e3a\u4e0d\u540c\u989c\u8272\u7684\u519c\u7530\uff08\u5c0f\u9ea6\u3001\u9a6c\u94c3\u85af\u3001\u7389\u7c73\u3001\u85b0\u8863\u8349\uff09\u50cf\u62fc\u5e03\u4e00\u6837\u4e00\u5757\u5757\u62fc\u63a5\u5728\u4e00\u8d77\u3002\n\n- **\u56db\u5b63\u5f69\u4e4b\u4e18\uff08Shikisai-no-Oka\uff09**\uff1a\u4f4d\u4e8e\u7f8e\u745b\u5e02\u533a\u4e1c\u4fa7\uff0c\u662f\u4e00\u7247\u5360\u5730 15 \u516c\u9877\u7684\u5c55\u671b\u82b1\u7530\u3002\u8fd9\u91cc\u7684\u7279\u8272\u662f**\u4e18\u9675\u5730\u5f62**\u2014\u2014\u82b1\u7530\u6cbf\u7740\u7f13\u5761\u5411\u4e0a\u5ef6\u4f38\uff0c\u7ad9\u5728\u9ad8\u5904\u53ef\u4ee5\u4fef\u77b0\u6574\u7247\u5f69\u8272\u82b1\u6d77\u548c\u8fdc\u5904\u7684\u5341\u80dc\u5cb3\u30027\uff5e8 \u6708\u6709\u85b0\u8863\u8349\u3001\u5411\u65e5\u8475\u3001\u6ce2\u65af\u83ca\u7b49\u6570\u5341\u79cd\u82b1\u5349\u540c\u65f6\u5f00\u653e\u3002\n  - \u4f53\u9a8c\uff1a\u53ef\u4ee5\u4e58\u5750** tractor \u6e38\u89c8\u8f66**\u6216**\u56db\u8f6e\u8d8a\u91ce\u8f66\uff08ATV\uff09**\u5728\u82b1\u7530\u95f4\u7a7f\u68ad\u3002\n  - \u7f8e\u98df\uff1a**\u85b0\u8863\u8349\u51b0\u6dc7\u6dcb**\u548c**\u54c8\u5bc6\u74dc\uff08\u5915\u5f20\u871c\u74dc\uff09**\u5207\u7247\u2014\u2014\u5317\u6d77\u9053\u7684\u871c\u74dc\u751c\u5ea6\u6781\u9ad8\uff0c\u662f\u590f\u5b63\u9650\u5b9a\u7f8e\u5473\u3002\n\n### \u4e0b\u5348\uff1a\u767d\u91d1\u9752\u6c60\uff08Shirogane Blue Pond\uff09\n\n![\u767d\u91d1\u9752\u6c60\u68a6\u5e7b\u84dd\u6c34](./F_\u5317\u6d77\u9053/images/blue_pond.jpg)\n*\u7f8e\u745b\u767d\u91d1\u9752\u6c60\u7684\u94b4\u84dd\u8272\u6c34\u9762\u4e0e\u767d\u6866\u67af\u6728*\n\n\u8fd9\u662f\u5317\u6d77\u9053\u6700\u8457\u540d\u7684\"\u5e7b\u5883\"\u4e4b\u4e00\u3002\u6c60\u6c34\u5448\u73b0\u51fa\u4e0d\u771f\u5b9e\u7684**\u94b4\u84dd\u8272**\uff0c\u539f\u56e0\u662f\u9644\u8fd1\u767d\u91d1\u6e29\u6cc9\u7684\u94dd\u6210\u5206\u4e0e\u7f8e\u745b\u5ddd\u7684\u6c34\u6df7\u5408\u540e\uff0c\u5728\u9633\u5149\u4e0b\u53d1\u751f\u4e86\u6298\u5c04\u3002\u6c60\u4e2d\u77d7\u7acb\u7740\u51e0\u68f5\u67af\u6b7b\u7684\u767d\u6866\u6811\uff0c\u84dd\u8272\u7684\u6c34\u9762\u4e0e\u767d\u8272\u7684\u6811\u5e72\u5f62\u6210\u5f3a\u70c8\u7684\u89c6\u89c9\u5bf9\u6bd4\u3002\n\n- **\u6700\u4f73\u65f6\u95f4**\uff1a\u6674\u6717\u7684\u4e0a\u5348 10 \u70b9\u81f3\u4e0b\u5348 2 \u70b9\uff0c\u9633\u5149\u76f4\u5c04\u65f6\u84dd\u8272\u6700\u9c9c\u8273\u3002\u508d\u665a\u65f6\u5206\u5219\u4f1a\u53d8\u6210\u7fe1\u7fe0\u7eff\u3002\n- **\u5c0f\u8d34\u58eb**\uff1a\u9752\u6c60\u5468\u8fb9\u868a\u866b\u8f83\u591a\uff0c\u5efa\u8bae\u643a\u5e26\u9a71\u868a\u6db2\u3002\u505c\u8f66\u573a\u5230\u6c60\u8fb9\u53ea\u9700\u6b65\u884c 5 \u5206\u949f\u3002\n\n### \u508d\u665a\uff1a\u62b5\u8fbe\u5c42\u4e91\u5ce1\u6e29\u6cc9\n\u4ece\u9752\u6c60\u51fa\u53d1\uff0c\u6cbf **\u56fd\u9053 39 \u53f7** \u5411\u5317\u884c\u9a76\u7ea6 1 \u5c0f\u65f6\u5373\u53ef\u62b5\u8fbe\u5c42\u4e91\u5ce1\u3002\u8fd9\u662f\u5927\u96ea\u5c71\u56fd\u7acb\u516c\u56ed\u5185\u6700\u8457\u540d\u7684\u6e29\u6cc9\u4e61\uff0c\u5ce1\u8c37\u4e24\u4fa7\u662f\u67f1\u72b6\u8282\u7406\u7684\u60ac\u5d16\uff0c\u6e29\u6cc9\u65c5\u9986\u6cbf\u5ce1\u8c37\u6392\u5217\u3002\n\n## \u4f4f\u5bbf\n**\u63a8\u8350\uff1a\u5c42\u4e91\u5ce1\u671d\u9633\u4ead\uff08Sounkyo Onsen Choyo-tei\uff09**\n- \u7c7b\u578b\uff1a\u4f20\u7edf\u65e5\u5f0f\u6e29\u6cc9\u65c5\u9986\u3002\n- \u4ef7\u683c\uff1a\u7ea6 1,200\uff5e2,000 \u5143\u4eba\u6c11\u5e01/\u665a\uff08\u542b\u4e00\u6cca\u4e8c\u98df\uff09\u3002\n- \u7279\u70b9\uff1a\u62e5\u6709**\u9732\u5929\u98ce\u5415\uff08\u9732\u5929\u6e29\u6cc9\uff09**\uff0c\u53ef\u4ee5\u4e00\u8fb9\u6ce1\u6e29\u6cc9\u4e00\u8fb9\u4ef0\u671b\u5ce1\u8c37\u5ca9\u58c1\u548c\u661f\u7a7a\u3002\u665a\u9910\u662f\u65e5\u5f0f\u4f1a\u5e2d\u6599\u7406\uff0c\u4f7f\u7528\u5317\u6d77\u9053\u4ea7\u7684\u5e1d\u738b\u87f9\u3001\u9c91\u9c7c\u548c\u5c71\u91ce\u83dc\u3002\n\n---\n\n# D5\uff5c\u5c42\u4e91\u5ce1 \u2192 \u963f\u5bd2\u6e56\uff08Lake Akan\uff09\n**\u4e3b\u9898\uff1a\u5ce1\u8c37\u7f06\u8f66\u4e0e\u706b\u5c71\u6e56\u6cca**\n\n![\u5c42\u4e91\u5ce1\u9ed1\u5cb3\u7f06\u8f66\u5c71\u9876](./F_\u5317\u6d77\u9053/images/kurodake_ropeway.jpg)\n*\u4ece\u9ed1\u5cb3\u7f06\u8f66\u4e0a\u7ad9\u4fef\u77b0\u5c42\u4e91\u5ce1\u4e0e\u5927\u96ea\u5c71\u8fde\u5cf0*\n\n## \u81ea\u9a7e\u8def\u7ebf\n- **\u8def\u7ebf**\uff1a\u5c42\u4e91\u5ce1 \u2192 \u4e0a\u5ddd \u2192 \u65ed\u5ddd \u2192 \u5bcc\u826f\u91ce/\u5e26\u5e7f\u65b9\u5411 \u2192 \u963f\u5bd2\u6e56\uff0c\u4e3b\u8981\u6cbf **\u56fd\u9053 39 \u53f7\u8f6c\u56fd\u9053 241 \u53f7/\u56fd\u9053 273 \u53f7**\u3002\n- **\u8ddd\u79bb**\uff1a\u7ea6 170 \u516c\u91cc\u3002\n- **\u5f00\u8f66\u65f6\u95f4**\uff1a\u7ea6 3\uff5e3.5 \u5c0f\u65f6\uff08\u4e2d\u9014\u53ef\u5728\u5e26\u5e7f\u6216\u8db3\u5bc4\u4f11\u606f\u7ad9\u7528\u9910\uff09\u3002\n\n## \u6d3b\u52a8\n\n### \u4e0a\u5348\uff1a\u9ed1\u5cb3\u7f06\u8f66\uff08Kurodake Ropeway\uff09\u6216\u5ce1\u8c37\u5f92\u6b65\n- **\u9ed1\u5cb3\u7f06\u8f66**\uff1a\u4ece\u5c42\u4e91\u5ce1\u6e29\u6cc9\u8857\u4e58\u5750\u7f06\u8f66+\u540a\u6905\u76f4\u8fbe\u6d77\u62d4 1,520 \u7c73\u7684**\u9ed1\u5cb3\u4e94\u5408\u76ee**\u3002\u590f\u5b63\u8fd9\u91cc\u662f\u9ad8\u5c71\u690d\u7269\u56ed\uff0c\u53ef\u4ee5\u770b\u5230\u5927\u96ea\u5c71\u7279\u6709\u7684\u9ad8\u5c71\u82b1\u5349\uff08\u5982\u9a79\u8349\u3001\u9ad8\u5c71\u9f99\u80c6\uff09\u3002\u5929\u6c14\u6674\u597d\u65f6\uff0c\u53ef\u4ee5\u8fdc\u773a\u5317\u6d77\u9053\u6700\u9ad8\u5cf0**\u65ed\u5cb3\uff082,291 \u7c73\uff09**\u3002\n  - \u5f80\u8fd4\u65f6\u95f4\uff1a\u7ea6 2\uff5e2.5 \u5c0f\u65f6\u3002\n  - \u5c71\u9876\u6c14\u6e29\uff1a\u7ea6 15\u2103\uff0c\u5efa\u8bae\u5e26\u4e00\u4ef6\u9632\u98ce\u5916\u5957\u3002\n- **\u5c42\u4e91\u5ce1\u5f92\u6b65**\uff1a\u5982\u679c\u4e0d\u60f3\u4e0a\u5c71\uff0c\u53ef\u4ee5\u9009\u62e9\u6cbf\u5ce1\u8c37\u5e95\u90e8\u7684**\u6d41\u661f\u7011\u5e03\u30fb\u94f6\u6cb3\u7011\u5e03\u6b65\u9053**\u6563\u6b65\u3002\u4e24\u6761\u7011\u5e03\u4ece 90 \u7c73\u9ad8\u7684\u60ac\u5d16\u503e\u6cfb\u800c\u4e0b\uff0c\u6b65\u9053\u5168\u7a0b\u7ea6 40 \u5206\u949f\uff0c\u51e0\u4e4e\u6ca1\u6709\u722c\u5347\uff0c\u975e\u5e38\u9002\u5408\u5a5a\u5047\u7684\u8f7b\u677e\u8282\u594f\u3002\n\n### \u4e0b\u5348\uff1a\u6469\u5468\u6e56\u4e0e\u786b\u78fa\u5c71\uff08Mt. I\u014d\uff09\n\u4ece\u5c42\u4e91\u5ce1\u5f00\u5f80\u963f\u5bd2\u6e56\u7684\u9014\u4e2d\uff0c\u4f1a\u7ecf\u8fc7\u4e24\u4e2a\u9053\u4e1c\u6700\u8457\u540d\u7684\u706b\u5c71\u666f\u89c2\uff1a\n\n![\u6469\u5468\u6e56\u5168\u666f\u4e0e\u706b\u5c71\u53e3](./F_\u5317\u6d77\u9053/images/mashu_lake.jpg)\n*\u6469\u5468\u6e56\u7b2c\u4e09\u5c55\u671b\u53f0\u7684\u5168\u666f\u2014\u2014\u65e5\u672c\u900f\u660e\u5ea6\u6700\u9ad8\u7684\u6e56\u6cca*\n\n- **\u6469\u5468\u6e56\uff08Lake Mash\u016b\uff09**\uff1a\u8fd9\u662f\u4e00\u4e2a\u706b\u5c71\u53e3\u6e56\uff0c\u6e56\u6c34\u900f\u660e\u5ea6\u5e38\u5e74\u4f4d\u5c45\u65e5\u672c\u7b2c\u4e00\uff0c\u88ab\u79f0\u4e3a\"\u795e\u79d8\u4e4b\u6e56\"\u3002\u4ece **\u7b2c\u4e09\u5c55\u671b\u53f0** \u4fef\u77b0\uff0c\u78a7\u84dd\u7684\u6e56\u6c34\u88ab 200 \u7c73\u9ad8\u7684\u706b\u5c71\u53e3\u58c1\u73af\u7ed5\uff0c\u6e56\u5fc3\u6709\u4e00\u5ea7\u5c0f\u5c9b\uff08\u795e\u5a46\u5c9b\uff09\u3002\u5982\u679c\u8fd0\u6c14\u597d\u9047\u5230\"\u6469\u5468\u84dd\"\uff08\u65e0\u98ce\u65f6\u7684\u955c\u9762\u6548\u679c\uff09\uff0c\u6574\u4e2a\u6e56\u9762\u4f1a\u50cf\u4e00\u5757\u5de8\u5927\u7684\u84dd\u5b9d\u77f3\u3002\n- **\u786b\u78fa\u5c71\uff08Mt. I\u014d / Atosanupuri\uff09**\uff1a\u4e00\u5ea7\u6d3b\u706b\u5c71\uff0c\u5c71\u4f53\u8868\u9762\u8986\u76d6\u7740\u9ec4\u8272\u7684\u786b\u78fa\u7ed3\u6676\uff0c\u7a7a\u6c14\u4e2d\u5f25\u6f2b\u7740\u6d53\u70c8\u7684\u786b\u78fa\u5473\u3002\u53ef\u4ee5\u6cbf\u7740\u6728\u6808\u9053\u8fd1\u8ddd\u79bb\u89c2\u5bdf\u55b7\u6c14\u5b54\u548c\u706b\u5c71\u6d3b\u52a8\uff0c\u6709\u4e00\u79cd\u6765\u5230\u5916\u661f\u7684 surreal \u611f\u3002\n\n### \u508d\u665a\uff1a\u963f\u5bd2\u6e56\u6e29\u6cc9\n\u963f\u5bd2\u6e56\u662f\u5317\u6d77\u9053\u539f\u4f4f\u6c11\u963f\u4f0a\u52aa\u4eba\u7684\u5723\u5730\uff0c\u6e56\u7554\u7684\u6e29\u6cc9\u8857\u5df2\u6709\u767e\u5e74\u5386\u53f2\u3002\n\n## \u4f4f\u5bbf\n**\u63a8\u8350\uff1a\u963f\u5bd2\u9e64\u96c5\u522b\u5885\u9119\u4e4b\u5ea7\uff08Akan Tsuruga Besso Hinanoza\uff09**\n- \u7c7b\u578b\uff1a\u9ad8\u7aef\u6e29\u6cc9\u65c5\u9986\u3002\n- \u4ef7\u683c\uff1a\u7ea6 2,500\uff5e4,000 \u5143\u4eba\u6c11\u5e01/\u665a\uff08\u542b\u4e00\u6cca\u4e8c\u98df\uff09\u3002\n- \u7279\u70b9\uff1a\u6bcf\u95f4\u5ba2\u623f\u90fd\u5e26\u6709**\u79c1\u4eba\u9732\u5929\u6e29\u6cc9**\uff0c\u662f\u5317\u6d77\u9053\u6700\u6d6a\u6f2b\u7684\u6e29\u6cc9\u4f4f\u5bbf\u4e4b\u4e00\u3002\u665a\u9910\u662f\u6000\u77f3\u6599\u7406\uff0c\u4f7f\u7528\u963f\u5bd2\u6e56\u7684\u6bec\u85fb\uff08Marimo\uff09\u548c\u5317\u6d77\u9053\u4ea7\u7684\u548c\u725b\u3002\n- \u5907\u9009\uff1a**\u963f\u5bd2\u6e56\u9e64\u96c5\u4e4b\u7ffc\uff08Akan Yuku no Sato Tsuruga\uff09**\uff0c\u540c\u5c5e\u9e64\u96c5\u96c6\u56e2\uff0c\u4ef7\u683c\u7a0d\u4f4e\uff0c\u4f46\u540c\u6837\u53ef\u4ee5\u4eab\u7528\u5927\u578b\u516c\u5171\u6e29\u6cc9\u8bbe\u65bd\u3002\n\n---\n\n# D6\uff5c\u963f\u5bd2\u6e56 \u2192 \u77e5\u5e8a\u534a\u5c9b\uff08Shiretoko\uff09\n**\u4e3b\u9898\uff1a\u4e16\u754c\u9057\u4ea7\u4e0e\u91ce\u751f\u68d5\u718a**\n\n![\u77e5\u5e8a\u4e94\u6e56\u6728\u6808\u9053\u4e0e\u539f\u59cb\u68ee\u6797](./F_\u5317\u6d77\u9053/images/shiretoko_goko.jpg)\n*\u77e5\u5e8a\u4e94\u6e56\u7684\u6728\u6808\u9053\u7a7f\u8d8a\u539f\u59cb\u68ee\u6797\u4e0e\u6e7f\u5730*\n\n## \u81ea\u9a7e\u8def\u7ebf\n- **\u8def\u7ebf**\uff1a\u963f\u5bd2\u6e56 \u2192 \u5ddd\u6c64\u6e29\u6cc9 \u2192 \u77e5\u5e8a\u5ce0 \u2192 \u77e5\u5e8a\u4e94\u6e56 \u2192 \u5b87\u767b\u5415\u6e29\u6cc9\u3002\n- **\u8ddd\u79bb**\uff1a\u7ea6 140 \u516c\u91cc\u3002\n- **\u5f00\u8f66\u65f6\u95f4**\uff1a\u7ea6 2.5\uff5e3 \u5c0f\u65f6\uff08\u6cbf\u9014\u98ce\u666f\u6781\u4f73\uff0c\u4f1a\u591a\u6b21\u505c\u8f66\uff09\u3002\n\n## \u6d3b\u52a8\n\n### \u4e0a\u5348\uff1a\u963f\u5bd2\u6e56\u6e38\u8239\u4e0e\u6bec\u85fb\uff08Marimo\uff09\n- **\u963f\u5bd2\u6e56\u6e38\u8239**\uff1a\u4e0a\u5348\u53ef\u4ee5\u4e58\u5750\u89c2\u5149\u6e38\u8239\u6e38\u89c8\u963f\u5bd2\u6e56\uff0c\u8239\u7a0b\u7ea6 1 \u5c0f\u65f6\u3002\u6e38\u8239\u4f1a\u505c\u9760 **Churui \u5c9b**\uff0c\u5c9b\u4e0a\u6709**\u6bec\u85fb\u5c55\u793a\u89c2\u5bdf\u4e2d\u5fc3**\u3002\u6bec\u85fb\uff08Marimo\uff09\u662f\u4e00\u79cd\u7a00\u6709\u7684\u7eff\u85fb\u7403\uff0c\u53ea\u5728\u9ad8\u7eac\u5ea6\u5730\u533a\u7684\u5c11\u6570\u6e56\u6cca\u4e2d\u5f62\u6210\uff0c\u88ab\u963f\u4f0a\u52aa\u4eba\u89c6\u4e3a\u5e78\u8fd0\u7684\u8c61\u5f81\u3002\n- **\u5c0f\u8d34\u58eb**\uff1a\u590f\u5b63\u963f\u5bd2\u6e56\u6c34\u6e29\u51c9\u723d\uff0c\u6e05\u6668\u6e56\u9762\u5e38\u6709\u8584\u96fe\uff0c\u5750\u8239\u7a7f\u884c\u5176\u4e2d\u6709\u4e00\u79cd\u4ed9\u5883\u611f\u3002\n\n### \u4e0b\u5348\uff1a\u77e5\u5e8a\u4e94\u6e56\uff08Shiretoko Goko\uff09\n\u77e5\u5e8a\u534a\u5c9b\u662f\u5317\u6d77\u9053\u552f\u4e00\u7684\u4e16\u754c\u81ea\u7136\u9057\u4ea7\uff0c\u88ab\u79f0\u4e3a\"\u65e5\u672c\u6700\u540e\u7684\u79d8\u5883\"\u3002**\u77e5\u5e8a\u4e94\u6e56**\u662f\u534a\u5c9b\u6700\u7cbe\u534e\u7684\u5f92\u6b65\u8def\u7ebf\u4e4b\u4e00\u3002\n\n- **\u8def\u7ebf\u9009\u62e9**\uff1a\n  - **\u9ad8\u67b6\u6728\u6808\u9053\uff08\u514d\u8d39\uff09**\uff1a\u5168\u7a0b\u7ea6 1.6 \u516c\u91cc\uff0c\u7ea6 40 \u5206\u949f\u3002\u6cbf\u7740\u5730\u9762\u94fa\u8bbe\u7684\u6728\u6808\u9053\u7a7f\u8d8a\u539f\u59cb\u68ee\u6797\u548c\u6e7f\u5730\uff0c\u53ef\u4ee5\u8fd1\u8ddd\u79bb\u89c2\u8d4f\u77e5\u5e8a\u7684\u539f\u59cb\u68ee\u6797\u548c\u6e56\u6cca\u5012\u5f71\u3002\n  - **\u5730\u4e0a\u6b65\u9053\uff08\u9700\u4ed8\u8d39\uff0c\u6709\u5bfc\u6e38\u966a\u540c\uff09**\uff1a\u5168\u7a0b\u7ea6 3 \u516c\u91cc\uff0c\u7ea6 2.5 \u5c0f\u65f6\u3002\u66f4\u6df1\u5165\u5730\u8d70\u8fdb\u4e94\u6e56\u533a\u57df\uff0c\u6709\u673a\u4f1a\u770b\u5230\u91ce\u751f\u68d5\u718a\u3001\u867e\u5937\u9e7f\u548c\u72d0\u72f8\u3002\n- **\u68d5\u718a\u89c2\u5bdf**\uff1a\u77e5\u5e8a\u662f\u65e5\u672c\u68d5\u718a\u5bc6\u5ea6\u6700\u9ad8\u7684\u5730\u533a\u4e4b\u4e00\u3002\u590f\u5b63\uff087\uff5e8 \u6708\uff09\u662f\u68d5\u718a\u6d3b\u52a8\u7684\u9ad8\u5cf0\u671f\u3002\u5982\u679c\u8d70\u5730\u4e0a\u6b65\u9053\uff0c\u4f1a\u6709**\u4e13\u4e1a\u62a4\u6797\u5458\u643a\u5e26\u9632\u718a\u55b7\u96fe\u966a\u540c**\uff0c\u5b89\u5168\u6709\u4fdd\u969c\u3002\u5728\u9ad8\u67b6\u6728\u6808\u9053\u4e0a\u4e5f\u6709\u53ef\u80fd\u8fdc\u773a\u5230\u6e56\u8fb9\u89c5\u98df\u7684\u68d5\u718a\u3002\n- **\u6700\u4f73\u65f6\u95f4**\uff1a\u4e0b\u5348 3 \u70b9\u81f3 5 \u70b9\uff0c\u9633\u5149\u659c\u5c04\u8fdb\u68ee\u6797\uff0c\u6e56\u9762\u7684\u5012\u5f71\u6700\u6e05\u6670\uff0c\u4e5f\u662f\u91ce\u751f\u52a8\u7269\u6700\u6d3b\u8dc3\u7684\u65f6\u6bb5\u3002\n\n### \u508d\u665a\uff1a\u77e5\u5e8a\u5ce0\uff08Shiretoko Pass\uff09\u4e0e\u5b87\u767b\u5415\u6e29\u6cc9\n\n![\u77e5\u5e8a\u5ce0\u8fdc\u773a\u9102\u970d\u6b21\u514b\u6d77](./F_\u5317\u6d77\u9053/images/shiretoko_pass.jpg)\n*\u4ece\u77e5\u5e8a\u5ce0\u4fef\u77b0\u9102\u970d\u6b21\u514b\u6d77\u4e0e\u77e5\u5e8a\u8fde\u5cf0*\n\n- **\u77e5\u5e8a\u5ce0**\uff1a\u6d77\u62d4 738 \u7c73\uff0c\u662f\u8fde\u63a5\u963f\u5bd2\u6e56\u4e0e\u5b87\u767b\u5415\u7684\u516c\u8def\u6700\u9ad8\u70b9\u3002\u4ece\u8fd9\u91cc\u53ef\u4ee5\u4fef\u77b0\u9102\u970d\u6b21\u514b\u6d77\u548c\u77e5\u5e8a\u8fde\u5cf0\u2014\u2014\u952f\u9f7f\u72b6\u7684\u5c71\u5cf0\u76f4\u63a5\u4ece\u6d77\u9762\u5347\u8d77\uff0c\u6c14\u52bf\u78c5\u7934\u3002\u590f\u5b63\u5c71\u9876\u53ef\u80fd\u8fd8\u6709\u6b8b\u96ea\uff0c\u9053\u8def\u4e24\u4fa7\u5e38\u6709\u867e\u5937\u9e7f\u51fa\u6ca1\u3002\n- **\u5b87\u767b\u5415\u6e29\u6cc9\uff08Utoro Onsen\uff09**\uff1a\u77e5\u5e8a\u534a\u5c9b\u6700\u5927\u7684\u6e29\u6cc9\u4e61\uff0c\u9762\u4e34\u9102\u970d\u6b21\u514b\u6d77\u3002\u8fd9\u91cc\u7684\u7279\u8272\u662f**\u6d77\u8fb9\u9732\u5929\u6e29\u6cc9**\u2014\u2014\u6ce1\u5728\u6e29\u6cc9\u91cc\uff0c\u8033\u8fb9\u662f\u6d77\u6d6a\u62cd\u6253\u7901\u77f3\u7684\u58f0\u97f3\uff0c\u62ac\u5934\u662f\u77e5\u5e8a\u8fde\u5cf0\u7684\u526a\u5f71\u3002\n\n## \u4f4f\u5bbf\n**\u63a8\u8350\uff1a\u77e5\u5e8a\u7b2c\u4e00\u9152\u5e97\uff08Shiretoko Daiichi Hotel\uff09**\n- \u7c7b\u578b\uff1a\u65e5\u5f0f\u6e29\u6cc9\u65c5\u9986\u3002\n- \u4ef7\u683c\uff1a\u7ea6 1,500\uff5e2,500 \u5143\u4eba\u6c11\u5e01/\u665a\uff08\u542b\u4e00\u6cca\u4e8c\u98df\uff09\u3002\n- \u7279\u70b9\uff1a\u62e5\u6709**\u4e34\u6d77\u9732\u5929\u6e29\u6cc9\u5927\u6d74\u573a**\uff0c\u53ef\u4ee5\u4e00\u8fb9\u6ce1\u6c64\u4e00\u8fb9\u770b\u65e5\u843d\u548c\u661f\u7a7a\u3002\u665a\u9910\u662f\u5317\u6d77\u9053\u6d77\u9c9c\u4f1a\u5e2d\uff0c\u5305\u62ec\u77e5\u5e8a\u4ea7\u7684\u6bdb\u87f9\u3001\u6d77\u80c6\u548c\u9c91\u9c7c\u3002\n- \u5907\u9009\uff1a**\u77e5\u5e8a\u5b63\u4e4b\u98ce\uff08Shiretoko no Mori Ikkei\uff09**\uff0c\u66f4\u5c0f\u5de7\u7cbe\u81f4\u7684\u6e29\u6cc9\u65c5\u9986\uff0c\u5ba2\u623f\u8f83\u5c11\u4f46\u670d\u52a1\u66f4\u79c1\u5bc6\u3002\n\n---\n\n# D7\uff5c\u77e5\u5e8a \u2192 \u5e26\u5e7f\uff08Obihiro\uff09\n**\u4e3b\u9898\uff1a\u534a\u5c9b\u6668\u5149\u4e0e\u548c\u725b\u671d\u5723**\n\n![\u5e26\u5e7f\u548c\u725b\u70e4\u8089](./F_\u5317\u6d77\u9053/images/obihiro_wagyu.jpg)\n*\u5e26\u5e7f\u5341\u80dc\u548c\u725b\u70ad\u706b\u70e4\u8089\u2014\u2014\u5165\u53e3\u5373\u5316\u7684\u68a6\u5e7b\u53e3\u611f*\n\n## \u81ea\u9a7e\u8def\u7ebf\n- **\u8def\u7ebf**\uff1a\u5b87\u767b\u5415 \u2192 \u6e05\u91cc\u753a \u2192 \u4e2d\u6a19\u6d25 \u2192 \u5e26\u5e7f\uff0c\u4e3b\u8981\u6cbf **\u56fd\u9053 244 \u53f7\u8f6c\u56fd\u9053 236 \u53f7/\u56fd\u9053 38 \u53f7**\u3002\n- **\u8ddd\u79bb**\uff1a\u7ea6 210 \u516c\u91cc\u3002\n- **\u5f00\u8f66\u65f6\u95f4**\uff1a\u7ea6 3.5 \u5c0f\u65f6\uff08\u8def\u51b5\u826f\u597d\uff0c\u6cbf\u9014\u662f\u5e7f\u9614\u7684\u5341\u80dc\u5e73\u539f\u7267\u573a\u98ce\u5149\uff09\u3002\n\n## \u6d3b\u52a8\n\n### \u4e0a\u5348\uff1a\u77e5\u5e8a\u534a\u5c9b\u6668\u5149\u4e0e\u6700\u540e\u7684\u79d8\u5883\n- **\u6e05\u6668\u81ea\u7531\u6d3b\u52a8**\uff1a\u5982\u679c\u8d77\u5f97\u65e9\uff0c\u53ef\u4ee5\u5728\u5b87\u767b\u5415\u6e2f\u8fb9\u6563\u6b65\u3002\u590f\u5b63\u7684\u9102\u970d\u6b21\u514b\u6d77\u5e73\u9759\u800c\u6e5b\u84dd\uff0c\u8fdc\u5904\u7684\u77e5\u5e8a\u8fde\u5cf0\u7b3c\u7f69\u5728\u6668\u96fe\u4e2d\u3002\u8fd0\u6c14\u597d\u7684\u8bdd\uff0c\u53ef\u4ee5\u770b\u5230\u6d77\u8c79\u5728\u6d77\u9762\u4e0a\u9732\u5934\u3002\n- **\u77e5\u5e8a\u81ea\u7136\u4e2d\u5fc3\uff08Shiretoko Nature Center\uff09**\uff1a\u8fd9\u91cc\u662f\u77e5\u5e8a\u4e16\u754c\u9057\u4ea7\u7684\u6e38\u5ba2\u4e2d\u5fc3\uff0c\u6709\u514d\u8d39\u7684\u5c55\u89c8\u548c\u7eaa\u5f55\u7247\uff0c\u53ef\u4ee5\u66f4\u6df1\u5165\u5730\u4e86\u89e3\u77e5\u5e8a\u7684\u751f\u6001\u7cfb\u7edf\u3002\u4e2d\u5fc3\u540e\u9762\u6709\u4e00\u6761\u77ed\u9014\u6b65\u9053\uff0c\u7ea6 20 \u5206\u949f\uff0c\u53ef\u4ee5\u8d70\u5230\u7011\u5e03\u89c2\u666f\u53f0\u2014\u2014**Furepe \u7011\u5e03**\u4ece\u60ac\u5d16\u4e0a\u76f4\u63a5\u843d\u5165\u6d77\u4e2d\uff0c\u88ab\u79f0\u4e3a\"\u5c11\u5973\u4e4b\u6cea\"\u3002\n\n### \u4e0b\u5348\uff1a\u5341\u80dc\u5e73\u539f\u81ea\u9a7e\n\u4ece\u77e5\u5e8a\u5f00\u5f80\u5e26\u5e7f\u7684\u9014\u4e2d\uff0c\u4f1a\u7a7f\u8d8a\u5317\u6d77\u9053\u6700\u5e7f\u9614\u7684\u519c\u4e1a\u533a\u2014\u2014**\u5341\u80dc\u5e73\u539f**\u3002\u8fd9\u91cc\u7684\u9053\u8def\u7b14\u76f4\u800c\u7a7a\u65f7\uff0c\u4e24\u4fa7\u662f\u4e00\u671b\u65e0\u9645\u7684\u9ea6\u7530\u3001\u9a6c\u94c3\u85af\u7530\u548c\u653e\u7267\u7684\u725b\u7fa4\u3002\u590f\u5b63\uff087\uff5e8 \u6708\uff09\u6b63\u662f\u519c\u4f5c\u7269\u751f\u957f\u7684\u65fa\u5b63\uff0c\u7eff\u8272\u7684\u7530\u91ce\u5ef6\u4f38\u5230\u5730\u5e73\u7ebf\uff0c\u4e0e\u84dd\u5929\u767d\u4e91\u76f8\u63a5\u3002\n\n- **\u9014\u4e2d\u4f11\u606f\u7ad9**\uff1a\u63a8\u8350\u5728 **\u9e7f\u8ffd\u753a** \u6216 **\u7136\u522b\u6e56\u7554** \u77ed\u6682\u505c\u7559\u3002\u7136\u522b\u6e56\u662f\u5317\u6d77\u9053\u6d77\u62d4\u6700\u9ad8\u7684\u6e56\u6cca\uff0c\u6e56\u6c34\u6e05\u6f88\u89c1\u5e95\uff0c\u6e56\u7554\u6709\u5929\u7136\u6e29\u6cc9\u8db3\u6c64\u53ef\u4ee5\u514d\u8d39\u6ce1\u811a\u3002\n\n### \u508d\u665a\uff1a\u5e26\u5e7f\u548c\u725b\u70e4\u8089\n\u5e26\u5e7f\u662f**\u5341\u80dc\u548c\u725b**\u7684\u6545\u4e61\uff0c\u8fd9\u91cc\u7684\u548c\u725b\u4ee5\u8089\u8d28\u7ec6\u817b\u3001\u6cb9\u82b1\u5747\u5300\u95fb\u540d\uff0c\u662f\u65e5\u672c\u9876\u7ea7\u548c\u725b\u4ea7\u5730\u4e4b\u4e00\u3002\n\n- **\u63a8\u8350\u9910\u5385**\uff1a**\u732a\u8089\u996d Panch\u014d \u672c\u5e97**\uff08\u867d\u7136\u53eb\u732a\u8089\u996d\uff0c\u4f46\u4e5f\u6709\u9876\u7ea7\u548c\u725b\uff09\u6216 **\u70ad\u706b\u70e7\u8089 Furusato**\u3002\u66f4\u9ad8\u7aef\u7684\u53ef\u4ee5\u9009\u62e9 **Kita no Ryoba** \u6216 **\u5341\u80dc\u7cbe\u8089\u5e97\u76f4\u8425\u70e4\u8089\u5e97**\u3002\n- **\u5fc5\u70b9**\u 6 **\u963f\u8054\u914b\u822a\u7a7a EK** \u7684\u8054\u7a0b\u822a\u73ed\uff0c**\u4e0b\u5348 14:00-17:00 \u62b5\u8fbe\u7231\u4e01\u5821\u673a\u573a\uff08EDI\uff09** \u6700\u4f73\u3002\u56fd\u5185\u65e0\u76f4\u98de\uff0c\u901a\u5e38\u7ecf\u4f26\u6566\u5e0c\u601d\u7f57\u6216\u963f\u59c6\u65af\u7279\u4e39\u8f6c\u673a\u4e00\u6b21\u3002\n- **\u673a\u573a \u2192 \u5e02\u533a**\uff1a\u4e58\u5750 **Airlink 100 \u5feb\u7ebf\u5927\u5df4**\uff0c\u7ea6 30 \u5206\u949f\u5230\u8fbe\u738b\u5b50\u8857\uff08Waverley Bridge\uff09\uff0c\u7968\u4ef7\u7ea6 5.5 \u82f1\u9551/\u4eba\uff1b\u6216\u6253\u8f66\u7ea6 25 \u5206\u949f\uff0c\u8d39\u7528 20\uff5e25 \u82f1\u9551\u3002\n\n## \u4f4f\u5bbf\n**\u63a8\u8350\uff1aThe Scotsman Hotel \u6216 Kimpton Charlotte Square Hotel**\n- **The Scotsman Hotel**\uff1a\u4f4d\u4e8e\u5317\u6865\uff08North Bridge\uff09\uff0c\u7531\u65e7\u82cf\u683c\u5170\u4eba\u62a5\u793e\u5927\u697c\u6539\u9020\uff0c\u6b63\u5bf9\u5361\u5c14\u987f\u5c71\u3002\u4ef7\u683c\u7ea6 180\uff5e280 \u82f1\u9551/\u665a\u3002\n- **Kimpton Charlotte Square**\uff1a\u4e54\u6cbb\u5f0f\u8054\u6392\u522b\u5885\u9152\u5e97\uff0c\u5185\u90e8\u5ead\u9662\u5b89\u9759\uff0c\u6b65\u884c 5 \u5206\u949f\u5230\u738b\u5b50\u8857\u3002\u4ef7\u683c\u7ea6 200\uff5e320 \u82f1\u9551/\u665a\u3002\n- \u5907\u9009\uff1a\u8001\u57ce\u7687\u5bb6\u82f1\u91cc\u6cbf\u7ebf\u7684\u7cbe\u54c1\u6c11\u5bbf\uff08Airbnb\uff09\uff0c\u53ef\u4ee5\u4f53\u9a8c\u300c\u4f4f\u5728 300 \u5e74\u5386\u53f2\u7684\u77f3\u5934\u623f\u5b50\u91cc\u300d\u7684\u611f\u89c9\u3002\n\n## \u6d3b\u52a8\n- **\u508d\u665a**\uff1a\u4ece\u9152\u5e97\u6b65\u884c\u81f3 **\u738b\u5b50\u8857\u82b1\u56ed\uff08Princes Street Gardens\uff09**\uff0c\u4ef0\u671b\u77d7\u7acb\u5728\u706b\u5c71\u5ca9\u4e0a\u7684\u7231\u4e01\u5821\u57ce\u5821\u3002\u8fd9\u662f\u4f60\u4eec\u5bf9\u8fd9\u5ea7\u57ce\u5e02\u7684\u7b2c\u4e00\u5370\u8c61\u2014\u2014\u4e00\u5ea7\u57ce\u5e02\u4e0e\u4e00\u5ea7\u57ce\u5821\u5171\u751f 900 \u5e74\u3002\n- **\u665a\u9910**\uff1a\u63a8\u8350 **The Witchery by the Castle**\uff0c\u4f4d\u4e8e\u57ce\u5821\u811a\u4e0b\u7684\u7687\u5bb6\u82f1\u91cc\u5927\u9053\u4e0a\uff0c\u662f Edinburgh \u6700\u5177\u54e5\u7279\u6d6a\u6f2b\u6c14\u8d28\u7684\u9910\u5385\u300216 \u4e16\u7eaa\u7684\u5730\u4e0b\u77f3\u7a96\u3001\u5929\u9e45\u7ed2\u5ea7\u6905\u3001\u70db\u5149\u6447\u66f3\uff0c\u62db\u724c\u83dc\u662f\u82cf\u683c\u5170\u9f99\u867e\u548c\u9e7f\u8089\u3002\u4eba\u5747\u7ea6 60\uff5e90 \u82f1\u9551\uff0c**\u5efa\u8bae\u63d0\u524d\u9884\u8ba2**\u3002\n- **\u591c\u95f4**\uff1a\u5982\u679c\u7cbe\u529b\u5c1a\u53ef\uff0c\u5728\u7687\u5bb6\u82f1\u91cc\u5927\u9053\u4e0a\u968f\u4fbf\u627e\u4e00\u5bb6 pub \u542c\u4e00\u573a\u73b0\u573a\u6c11\u8c23\u3002\u82cf\u683c\u5170\u98ce\u7b1b\u5728\u8fd9\u91cc\u4e0d\u662f\u65c5\u6e38\u8868\u6f14\uff0c\u800c\u662f\u5f53\u5730\u4eba\u7684\u97f3\u4e50\u8bed\u8a00\u3002\n\n## \u5c0f\u8d34\u58eb\n\u62b5\u8fbe\u5f53\u665a\u4e0d\u8981\u5b89\u6392\u592a\u591a\u884c\u7a0b\u3002\u7231\u4e01\u5821\u662f\u4e00\u5ea7\u9700\u8981\u300c\u7528\u811a\u6b65\u4e08\u91cf\u5761\u5ea6\u300d\u7684\u57ce\u5e02\uff0c\u8001\u57ce\u7684\u77f3\u677f\u8def\u548c 7 \u5c42\u697c\u9ad8\u7684\u9661\u5761\u4f1a\u5728\u7b2c\u4e00\u5929\u5c31\u7ed9\u4f60\u4e0b\u9a6c\u5a01\u3002\u65e9\u70b9\u4f11\u606f\uff0c\u660e\u5929\u624d\u662f\u771f\u6b63\u7684\u9ad8\u80fd\u5f00\u59cb\u3002\n\n---\n\n# D2\uff5c\u7231\u4e01\u5821\uff08Edinburgh\uff09\n**\u4e3b\u9898\uff1a\u5728\u77f3\u4e0e\u706b\u4e4b\u95f4\u6f2b\u6b65**\n\n![\u7231\u4e01\u5821\u8001\u57ce\u8857\u9053](./G_\u82cf\u683c\u5170/images/edinburgh_old_town.jpg)\n*\u7231\u4e01\u5821\u8001\u57ce\u873f\u8712\u7684\u77f3\u677f\u8857\u9053*\n\n## \u4e0a\u5348\uff1a\u7231\u4e01\u5821\u57ce\u5821\uff08Edinburgh Castle\uff09\n\n![\u7231\u4e01\u5821\u57ce\u5821\u5165\u53e3](./G_\u82cf\u683c\u5170/images/edinburgh_castle_gate.jpg)\n*\u7231\u4e01\u5821\u57ce\u5821\u6b63\u95e8\u4e0e\u534a\u6708\u70ae\u53f0*\n\n- **\u65f6\u95f4**\uff1a\u5efa\u8bae 09:00 \u5f00\u95e8\u5373\u5165\u573a\uff0c\u907f\u5f00\u65c5\u884c\u56e2\u9ad8\u5cf0\u3002\n- **\u95e8\u7968**\uff1a\u7ea6 19.5 \u82f1\u9551/\u4eba\uff0c\u5efa\u8bae\u63d0\u524d\u5b98\u7f51\u9884\u8ba2\u3002\n- **\u770b\u70b9**\uff1a\n  - **\u7687\u51a0\u73e0\u5b9d\u5ba4\uff08Crown Jewels\uff09**\uff1a\u82cf\u683c\u5170\u738b\u51a0\u3001\u6743\u6756\u548c\u547d\u8fd0\u4e4b\u77f3\uff0c\u662f\u82cf\u683c\u5170\u72ec\u7acb\u7684\u8c61\u5f81\u3002\n  - **\u5723\u739b\u683c\u4e3d\u7279\u793c\u62dc\u5802\uff08St Margaret's Chapel\uff09**\uff1a\u57ce\u5821\u5185\u6700\u53e4\u8001\u7684\u5efa\u7b51\uff0c\u7ea6 1130 \u5e74\uff0c\u6bd4\u57ce\u5821\u672c\u8eab\u8fd8\u65e9\u3002\n  - **\u534a\u6708\u70ae\u53f0\uff08Half Moon Battery\uff09**\uff1a\u4fef\u77b0\u5168\u57ce\u7684\u6700\u4f73\u4f4d\u7f6e\uff0c\u53ef\u4ee5\u6e05\u6670\u5730\u770b\u5230\u65b0\u57ce\u533a\u4e54\u6cbb\u5f0f\u5efa\u7b51\u7684\u7f51\u683c\u4e0e\u8001\u57ce\u4e2d\u4e16\u7eaa\u8ff7\u5bab\u7684\u5bf9\u6bd4\u3002\n  - **\u4e00\u70b9\u949f\u9e23\u70ae\uff08One O'Clock Gun\uff09**\uff1a\u6bcf\u5929 13:00 \u9e23\u70ae\uff0c\u8fd9\u9879\u4f20\u7edf\u81ea 1861 \u5e74\u5ef6\u7eed\u81f3\u4eca\uff08\u9664\u4e86\u5468\u65e5\uff09\u3002\n\n> **\u5386\u53f2\u611f**\uff1a\u8fd9\u5ea7\u57ce\u5821\u4e0d\u662f\u7ae5\u8bdd\u91cc\u7684\u738b\u5b50\u516c\u4e3b\u57ce\u5821\uff0c\u800c\u662f\u4e00\u5ea7\u771f\u6b63\u7684\u519b\u4e8b\u8981\u585e\u3002\u5b83\u89c1\u8bc1\u4e86\u82cf\u683c\u5170\u4e0e\u82f1\u683c\u5170\u6570\u767e\u5e74\u7684\u6218\u4e89\u3001\u8a79\u59c6\u65af\u516d\u4e16\u5357\u4e0b\u7ee7\u627f\u82f1\u683c\u5170\u738b\u4f4d\u3001\u4ee5\u53ca\u739b\u4e3d\u5973\u738b\u7684\u60b2\u5267\u3002\u7ad9\u5728\u57ce\u5899\u4e0a\uff0c\u4f60\u4f1a\u7406\u89e3\u4e3a\u4ec0\u4e48\u82cf\u683c\u5170\u4eba\u603b\u8bf4\u300cWe were a country before we were a region\u300d\u3002\n\n## \u4e0b\u5348\uff1a\u7687\u5bb6\u82f1\u91cc\u5927\u9053\uff08Royal Mile\uff09\u4e0e\u5a01\u58eb\u5fcc\u4f53\u9a8c\u4e2d\u5fc3\n\n- **\u8def\u7ebf**\uff1a\u4ece\u57ce\u5821\u6b63\u95e8\u6cbf **Royal Mile** \u4e00\u8def\u5411\u4e1c\u8d70\u5230\u5e95\uff0c\u7ea6 1.8 \u516c\u91cc\u3002\u8fd9\u662f\u7231\u4e01\u5821\u8001\u57ce\u7684\u4e3b\u8f74\uff0c\u4e24\u65c1\u662f 16-17 \u4e16\u7eaa\u7684\u9ad8\u8038\u77f3\u5c4b\u3001\u5173\u95ed\uff08Close\uff0c\u72ed\u7a84\u7684\u5df7\u9053\uff09\u3001\u6559\u5802\u548c\u8bae\u4f1a\u5927\u697c\u3002\n- **\u8377\u91cc\u8def\u5fb7\u5bab\uff08Palace of Holyroodhouse\uff09**\uff1aRoyal Mile \u7684\u7ec8\u70b9\uff0c\u82f1\u56fd\u738b\u5ba4\u5728\u82cf\u683c\u5170\u7684\u5b98\u90b8\u3002\u5982\u679c\u5174\u8da3\u4e0d\u5927\uff0c\u53ef\u4ee5\u5728\u5bab\u6bbf\u82b1\u56ed\u5916\u62cd\u7167\u5373\u53ef\u3002\n- **\u82cf\u683c\u5170\u5a01\u58eb\u5fcc\u4f53\u9a8c\u4e2d\u5fc3\uff08The Scotch Whisky Experience\uff09**\uff1a\u4f4d\u4e8e Royal Mile \u9760\u8fd1\u57ce\u5821\u7684\u4e00\u7aef\u3002\u63a8\u8350\u9884\u8ba2 **Silver Tour**\uff08\u7ea6 23 \u82f1\u9551/\u4eba\uff09\uff0c\u4e58\u5750\u6a61\u6728\u6876\u5f62\u72b6\u7684\u5c0f\u706b\u8f66\u7a7f\u8d8a\u5a01\u58eb\u5fcc\u917f\u9020\u8fc7\u7a0b\uff0c\u6700\u540e\u54c1\u5c1d 3 \u79cd\u4e0d\u540c\u4ea7\u533a\u7684\u5a01\u58eb\u5fcc\u3002\u5bf9\u4e8e\u65b0\u624b\uff0c\u8fd9\u662f\u6700\u9ad8\u6548\u7684\u5165\u95e8\u65b9\u5f0f\u3002\n\n## \u508d\u665a\uff1a\u5361\u5c14\u987f\u5c71\uff08Calton Hill\uff09\u65e5\u843d\n\n![\u5361\u5c14\u987f\u5c71\u65e5\u843d](./G_\u82cf\u683c\u5170/images/calton_hill_sunset.jpg)\n*\u4ece\u5361\u5c14\u987f\u5c71\u4fef\u77b0\u7231\u4e01\u5821\u65b0\u57ce\u4e0e\u798f\u65af\u6e7e*\n\n- **\u65f6\u95f4**\uff1a\u590f\u5b63\u65e5\u843d\u7ea6 21:30-22:00\uff0c\u4f46\u6700\u7f8e\u7684\u5149\u7ebf\u5728 20:00-21:00\u3002\n- **\u8def\u7ebf**\uff1a\u4ece\u738b\u5b50\u8857\u5411\u4e1c\u6b65\u884c 10 \u5206\u949f\u5373\u53ef\u767b\u9876\uff0c\u51e0\u4e4e\u6ca1\u6709\u96be\u5ea6\u3002\n- **\u666f\u89c2**\uff1a\u5c71\u9876\u6709\u4eff\u53e4\u5e0c\u814a\u7684\u672a\u5b8c\u5de5\u7eaa\u5ff5\u7891\u3001\u7eb3\u5c14\u900a\u7eaa\u5ff5\u5854\uff0c\u4ee5\u53ca\u4fef\u77b0\u5168\u57ce\u7684\u6700\u4f73\u89c6\u89d2\u3002\u5411\u4e1c\u53ef\u4ee5\u770b\u5230\u798f\u65af\u6e7e\uff08Firth of Forth\uff09\u548c\u8fdc\u5904\u7684\u5317\u6d77\uff1b\u5411\u897f\u53ef\u4ee5\u770b\u5230\u57ce\u5821\u526a\u5f71\u5728\u5915\u9633\u4e2d\u53d8\u6210\u91d1\u8272\u3002\n- **\u6d6a\u6f2b\u65f6\u523b**\uff1a\u5e26\u4e00\u74f6\u8d85\u5e02\u4e70\u7684\u767d\u8461\u8404\u9152\u6216\u672c\u5730\u7cbe\u917f\u5564\u9152\uff0c\u5750\u5728\u5c71\u9876\u7684\u8349\u5730\u4e0a\u7b49\u5f85\u5929\u9ed1\u3002\u8fd9\u662f\u7231\u4e01\u5821\u6700\u50cf\u7535\u5f71\u7684\u4e00\u5e55\u3002\n\n## \u665a\u9910\n\u63a8\u8350 **Ondori\u300d\uff0c\u4f4d\u4e8e Leith \u533a\u7684\u610f\u5927\u5229/\u82cf\u683c\u5170\u878d\u5408\u9910\u5385\uff0c\u6216\u8005\u8001\u57ce\u91cc\u7684 **The Dogs**\uff08\u73b0\u4ee3\u82cf\u683c\u5170\u83dc\uff0c\u6027\u4ef7\u6bd4\u6781\u9ad8\uff09\u3002\u5982\u679c\u60f3\u66f4 casual\uff0c\u53ef\u4ee5\u5728 **Stockbridge** \u8857\u533a\u627e\u4e00\u5bb6 gastro pub\u3002\n\n---\n\n# D3\uff5c\u7231\u4e01\u5821 \u2192 \u65af\u7279\u7075\uff08Stirling\uff09\u2192 \u683c\u62c9\u65af\u54e5\uff08Glasgow\uff09\u2192 \u6d1b\u8499\u5fb7\u6e56\uff08Loch Lomond\uff09\n**\u4e3b\u9898\uff1a\u4ece\u738b\u56fd\u4e4b\u5fc3\u9a76\u5165\u9ad8\u5730\u95e8\u6237**\n\n![\u65af\u7279\u7075\u57ce\u5821](./G_\u82cf\u683c\u5170/images/stirling_castle.jpg)\n*\u65af\u7279\u7075\u57ce\u5821\u4fef\u77b0\u82cf\u683c\u5170\u4e2d\u90e8\u5e73\u539f*\n\n## \u81ea\u9a7e\u5f00\u59cb\n- **\u53d6\u8f66**\uff1a\u4e0a\u5348\u5728\u7231\u4e01\u5821 Waverley \u706b\u8f66\u7ad9\u9644\u8fd1\u6216\u673a\u573a\u53d6\u8f66\u3002\u82cf\u683c\u5170\u9ad8\u5730\u516c\u5171\u4ea4\u901a\u4e0d\u4fbf\uff0c**\u4ece\u4eca\u5929\u8d77\u5f00\u542f\u81ea\u9a7e**\u3002\n- **\u91cd\u8981\u63d0\u9192**\uff1a\u82f1\u56fd\u662f**\u53f3\u8235\u5de6\u884c**\u3002\u524d 30 \u5206\u949f\u8bf7\u683c\u5916\u5c0f\u5fc3\u73af\u5c9b\uff08Roundabout\uff09\u7684\u884c\u9a76\u65b9\u5411\uff0c\u5efa\u8bae\u5148\u5728\u5e02\u533a\u4f4e\u901f\u9002\u5e94\u3002\n\n## \u4e0a\u5348\uff1a\u65af\u7279\u7075\u57ce\u5821\uff08Stirling Castle\uff09\n- **\u8ddd\u79bb**\uff1a\u7231\u4e01\u5821 \u2192 \u65af\u7279\u7075\u7ea6 60 \u516c\u91cc\uff0c\u8f66\u7a0b 1 \u5c0f\u65f6\u3002\n- **\u95e8\u7968**\uff1a\u7ea6 17 \u82f1\u9551/\u4eba\u3002\n- **\u770b\u70b9**\uff1a\n  - \u65af\u7279\u7075\u88ab\u79f0\u4e3a\u300c\u82cf\u683c\u5170\u7684\u54bd\u5589\u300d\uff0c\u56e0\u4e3a\u5b83\u662f\u4f4e\u5730\u901a\u5f80\u9ad8\u5730\u7684\u8981\u585e\u3002\n  - \u57ce\u5821\u5185\u8fd8\u539f\u4e86 16 \u4e16\u7eaa\u8a79\u59c6\u65af\u4e94\u4e16\u7684\u5bab\u5ef7\u88c5\u9970\uff0c\u662f\u82cf\u683c\u5170\u57ce\u5821\u4e2d\u300c\u738b\u5ba4\u751f\u6d3b\u611f\u300d\u6700\u5f3a\u7684\u4e00\u5ea7\u3002\n  - \u4ece\u57ce\u5899\u53ef\u4ee5\u8fdc\u773a **\u534e\u83b1\u58eb\u7eaa\u5ff5\u7891\uff08Wallace Monument\uff09**\u2014\u2014\u4e00\u5ea7\u7ef4\u591a\u5229\u4e9a\u65f6\u4ee3\u7684\u54e5\u7279\u5f0f\u5c16\u5854\uff0c\u7eaa\u5ff5\u300a\u52c7\u6562\u7684\u5fc3\u300b\u4e3b\u4eba\u516c\u5a01\u5ec9\u00b7\u534e\u83b1\u58eb\u3002\n\n> **\u5386\u53f2\u611f**\uff1a\u5982\u679c\u8bf4\u7231\u4e01\u5821\u57ce\u5821\u662f\u519b\u4e8b\u8981\u585e\uff0c\u65af\u7279\u7075\u57ce\u5821\u5c31\u662f\u82cf\u683c\u5170\u738b\u5ba4\u7684\u6447\u7bee\u3002\u739b\u4e3d\u5973\u738b\u5728\u8fd9\u91cc\u52a0\u5195\uff0c\u8a79\u59c6\u65af\u516d\u4e16\u5728\u8fd9\u91cc\u957f\u5927\u3002\u5b83\u7684\u6218\u7565\u5730\u4f4d\u8ba9\u82cf\u683c\u5170\u4eba\u76f8\u4fe1\uff1a\u300c\u8c01\u63a7\u5236\u4e86\u65af\u7279\u7075\uff0c\u8c01\u5c31\u63a7\u5236\u4e86\u82cf\u683c\u5170\u3002\u300d\n\n## \u4e0b\u5348\uff1a\u683c\u62c9\u65af\u54e5\u897f\u533a\uff08Glasgow West End\uff09\n- **\u8ddd\u79bb**\uff1a\u65af\u7279\u7075 \u2192 \u683c\u62c9\u65af\u54e5\u7ea6 40 \u516c\u91cc\uff0c\u8f66\u7a0b 40 \u5206\u949f\u3002\n- **\u6d3b\u52a8**\uff1a\u683c\u62c9\u65af\u54e5\u662f\u82cf\u683c\u5170\u6700\u5927\u7684\u57ce\u5e02\uff0c\u4f46\u4e0e\u7231\u4e01\u5821\u7684\u53e4\u5178\u6c14\u8d28\u622a\u7136\u4e0d\u540c\u2014\u2014\u8fd9\u91cc\u662f\u5de5\u4e1a\u9769\u547d\u7684\u5f15\u64ce\u3001\u670b\u514b\u97f3\u4e50\u7684\u53d1\u6e90\u5730\u3001\u4ee5\u53ca\u82cf\u683c\u5170\u6700\u70ed\u60c5\uff08\u4e5f\u6700\u7c97\u72b7\uff09\u7684\u57ce\u5e02\u3002\n- **\u63a8\u8350\u505c\u7559**\uff1a\n  - **\u51ef\u6587\u845b\u7f57\u592b\u827a\u672f\u535a\u7269\u9986\uff08Kelvingrove Art Museum\uff09**\uff1a\u514d\u8d39\u5165\u573a\uff0c\u6536\u85cf\u4e86\u8428\u5c14\u74e6\u591a\u00b7\u8fbe\u5229\u7684\u300a\u5341\u5b57\u67b6\u4e0a\u7684\u5723\u7ea6\u7ff0\u57fa\u7763\u300b\u3002\n  - **\u963f\u4ec0\u987f\u5df7\uff08Ashton Lane\uff09**\uff1a\u4e00\u6761\u9e45\u5375\u77f3\u94fa\u6210\u7684\u5c0f\u5df7\uff0c\u4e24\u65c1\u662f\u9152\u5427\u3001\u9910\u5385\u548c\u72ec\u7acb\u7535\u5f71\u9662\uff0c\u6302\u6ee1\u4e86\u4e32\u706f\uff0c\u975e\u5e38\u9002\u5408\u62cd\u7167\u548c\u559d\u4e00\u676f\u5496\u5561\u3002\n\n## \u508d\u665a\uff1a\u8fdb\u5165\u9ad8\u5730\uff0c\u62b5\u8fbe\u6d1b\u8499\u5fb7\u6e56\n- **\u8ddd\u79bb**\uff1a\u683c\u62c9\u65af\u54e5 \u2192 \u6d1b\u8499\u5fb7\u6e56\uff08Balloch \u6216 Luss \u5c0f\u9547\uff09\u7ea6 30 \u516c\u91cc\uff0c\u8f66\u7a0b 35 \u5206\u949f\u3002\n- **\u8def\u7ebf**\uff1a\u6cbf A82 \u516c\u8def\u5411\u5317\uff0c\u8fd9\u662f\u82cf\u683c\u5170\u6700\u8457\u540d\u7684\u666f\u89c2\u516c\u8def\u4e4b\u4e00\u3002\u5f53\u57ce\u5e02\u7684\u75d5\u8ff9\u9010\u6e10\u6d88\u5931\uff0c\u53d6\u800c\u4ee3\u4e4b\u7684\u662f\u6e56\u6cca\u3001\u677e\u6811\u6797\u548c\u8fdc\u5904\u5f00\u59cb\u51fa\u73b0\u7684\u9ad8\u5730\u5c71\u5f71\u65f6\uff0c\u4f60\u4eec\u4f1a\u6709\u4e00\u79cd\u300c\u771f\u6b63\u5f00\u59cb\u65c5\u884c\u300d\u7684\u4eea\u5f0f\u611f\u3002\n\n## \u4f4f\u5bbf\n**\u63a8\u8350\uff1aLodge on Loch Lomond Hotel \u6216 Loch Lomond \u6e56\u7554 Airbnb**\n- \u4ef7\u683c\uff1a\u7ea6 150\uff5e250 \u82f1\u9551/\u665a\u3002\n- \u7279\u70b9\uff1a\u6e56\u7554\u666f\u89c2\u623f\uff0c\u590f\u5b63\u508d\u665a\u53ef\u4ee5\u5728\u6e56\u8fb9\u6563\u6b65\uff0c\u770b\u5929\u9e45\u548c\u6c34\u9e1f\u3002\n\n## \u665a\u9910\n\u9152\u5e97\u9910\u5385\u6216 **The Drovers Inn**\uff0c\u4e00\u5bb6 1705 \u5e74\u5f00\u4e1a\u7684\u8001\u9152\u9986\uff0c\u636e\u8bf4\u95f9\u9b3c\uff0c\u4f46\u6c1b\u56f4\u6781\u597d\uff0c\u58c1\u7089\u91cc\u70e7\u7740\u771f\u6b63\u7684\u67f4\u706b\u3002\n\n---\n\n# D4\uff5c\u6d1b\u8499\u5fb7\u6e56 \u2192 \u683c\u4f26\u79d1\u5ce1\u8c37\uff08Glencoe\uff09\u2192 \u9a6c\u83b1\u683c\uff08Mallaig\uff09\u2192 \u65af\u51ef\u5c9b\uff08Isle of Skye\uff09\n**\u4e3b\u9898\uff1a\u7a7f\u8d8a\u82cf\u683c\u5170\u6700\u7f8e\u7684\u516c\u8def**\n\n![\u683c\u4f26\u79d1\u5ce1\u8c37\u4e09\u59d0\u59b9\u5c71](./G_\u82cf\u683c\u5170/images/glencoe_three_sisters.jpg)\n*\u683c\u4f26\u79d1\u5ce1\u8c37\u6807\u5fd7\u6027\u7684\u4e09\u59d0\u59b9\u5c71*\n\n## \u81ea\u9a7e\u8def\u7ebf\n- **\u6d1b\u8499\u5fb7\u6e56 \u2192 \u683c\u4f26\u79d1**\uff1a\u6cbf A82 \u516c\u8def\u7ee7\u7eed\u5411\u5317\uff0c\u7ea6 70 \u516c\u91cc\uff0c\u8f66\u7a0b 1.5 \u5c0f\u65f6\u3002\u8fd9\u662f\u5168\u4e16\u754c\u6700\u7f8e\u7684\u516c\u8def\u4e4b\u4e00\uff0c\u6cbf\u9014\u7ecf\u8fc7 **\u7279\u7f57\u8428\u514b\u65af\u56fd\u5bb6\u516c\u56ed\uff08Trossachs\uff09**\u3001**\u5170\u8bfa\u514b\u6cbc\u5730\uff08Rannoch Moor\uff09** \u548c\u6700\u7ec8\u62b5\u8fbe\u683c\u4f26\u79d1\u5ce1\u8c37\u3002\n- **\u683c\u4f26\u79d1 \u2192 \u9a6c\u83b1\u683c**\uff1a\u7ea6 75 \u516c\u91cc\uff0c\u8f66\u7a0b 1.5 \u5c0f\u65f6\u3002\u8fd9\u6bb5\u8def\u4f1a\u7ecf\u8fc7\u5a01\u5ec9\u5821\uff08Fort William\uff09\uff0c\u82f1\u56fd\u672c\u571f\u6700\u9ad8\u5cf0 **\u672c\u5c3c\u7ef4\u65af\u5c71\uff08Ben Nevis\uff09** \u5c31\u5728\u897f\u4fa7\u3002\n- **\u9a6c\u83b1\u683c \u2192 \u65af\u51ef\u5c9b\uff08Armadale\uff09**\uff1a\u4e58 **Caledonian MacBrayne \u8f6e\u6e21**\uff0c\u822a\u7a0b\u7ea6 30 \u5206\u949f\u3002\u590f\u5b63\u73ed\u6b21\u5bc6\u96c6\uff0c\u7ea6\u6bcf\u5c0f\u65f6\u4e00\u73ed\u3002\n\n## \u4e0a\u5348\uff1a\u683c\u4f26\u79d1\u5ce1\u8c37\uff08Glencoe\uff09\n\n\u683c\u4f26\u79d1\u662f\u82cf\u683c\u5170\u9ad8\u5730\u7684\u4ee3\u540d\u8bcd\u3002\u8fd9\u91cc\u7684\u5c71\u4f53\u5448\u73b0\u51fa\u4e00\u79cd\u5947\u5f02\u7684\u9636\u68af\u72b6\u7eb9\u7406\uff0c\u662f\u51b0\u5ddd\u4fb5\u8680\u7559\u4e0b\u7684\u75d5\u8ff9\u3002\u5c71\u8c37\u5e38\u5e74\u7b3c\u7f69\u5728\u4e91\u96fe\u4e2d\uff0c\u9633\u5149\u5076\u5c14\u7a7f\u900f\u4e91\u5c42\uff0c\u7167\u4eae\u67d0\u4e00\u5ea7\u5c71\u5cf0\u7684\u9876\u90e8\u2014\u2014\u8fd9\u79cd\u666f\u8c61\u88ab\u79f0\u4e3a\u300c\u4e0a\u5e1d\u7684\u805a\u5149\u706f\u300d\u3002\n\n- **\u4e09\u59d0\u59b9\u5c71\uff08Three Sisters\uff09**\uff1a\u4f4d\u4e8e A82 \u516c\u8def\u65c1\uff0c\u6709\u4e09\u6761\u6e05\u6670\u7684\u505c\u8f66\u573a\u3002\u6700\u7ecf\u5178\u7684\u673a\u4f4d\u5728 **Three Sisters Carpark**\uff0c\u53ef\u4ee5\u62cd\u5230\u4e09\u5ea7\u952f\u9f7f\u72b6\u5c71\u5cf0\u5e76\u6392\u800c\u7acb\u3002\n- **Glencoe Visitor Centre**\uff1a\u4e86\u89e3 1692 \u5e74\u300c\u683c\u4f26\u79d1\u5927\u5c60\u6740\u300d\u7684\u5386\u53f2\u2014\u2014\u574e\u8d1d\u5c14\u6c0f\u65cf\u5728 hospitality \u7684\u540d\u4e49\u4e0b\u5c60\u6740\u4e86\u9ea6\u514b\u5510\u7eb3\u6c0f\u65cf 38 \u4eba\u3002\u8fd9\u662f\u82cf\u683c\u5170\u5386\u53f2\u4e0a\u6700\u9ed1\u6697\u7684\u80cc\u53db\u4e4b\u4e00\uff0c\u4e5f\u8ba9\u8fd9\u7247\u571f\u5730\u591a\u4e86\u4e00\u5c42\u60b2\u6006\u7684\u6c1b\u56f4\u3002\n- **\u5f92\u6b65\u63a8\u8350**\uff1a\u5982\u679c\u6709 1.5 \u5c0f\u65f6\uff0c\u53ef\u4ee5\u8d70 **Glencoe Lochan Trail**\uff0c\u4e00\u6761\u8f7b\u677e\u7684\u73af\u6e56\u6b65\u9053\uff0c\u6e56\u6c34\u5012\u6620\u7740\u677e\u6797\u548c\u8fdc\u5c71\u3002\n\n> **\u6444\u5f71\u5efa\u8bae**\uff1a\u683c\u4f26\u79d1\u7684\u5929\u6c14\u53d8\u5316\u6781\u5feb\uff0c\u524d\u4e00\u79d2\u5927\u96fe\u5f25\u6f2b\uff0c\u540e\u4e00\u79d2\u9633\u5149\u666e\u7167\u3002\u4e0d\u8981\u6025\u7740\u79bb\u5f00\uff0c\u5728\u505c\u8f66\u573a\u591a\u7b49 15 \u5206\u949f\uff0c\u5929\u6c14\u53ef\u80fd\u4f1a\u7ed9\u4f60\u60ca\u559c\u3002\n\n## \u4e0b\u5348\uff1a\u9a6c\u83b1\u683c\u8f6e\u6e21\u4e0e\u4e0a\u5c9b\n- **\u9a6c\u83b1\u683c** \u662f\u4e00\u4e2a\u5b81\u9759\u7684\u767d\u8272\u6e14\u6751\uff0c\u8f6e\u6e21\u7801\u5934\u9644\u8fd1\u6709\u51e0\u5bb6\u6d77\u9c9c\u9910\u9986\u3002\u63a8\u8350\u5728 **The Tea Garden** \u5403\u4e00\u4efd\u9f99\u867e\u5377\u6216\u87f9\u8089\u4e09\u660e\u6cbb\u3002\n- **\u8f6e\u6e21\u4f53\u9a8c**\uff1a\u5f53\u8239\u9a76\u79bb\u9a6c\u83b1\u683c\uff0c\u4f60\u4eec\u4f1a\u9010\u6e10\u770b\u5230\u65af\u51ef\u5c9b\u952f\u9f7f\u72b6\u7684 **\u5e93\u6797\u5c71\u8109\uff08Cuillin Mountains\uff09** \u51fa\u73b0\u5728\u6d77\u5e73\u9762\u4e0a\u3002\u9ed1\u8272\u7684\u5c71\u4f53\u50cf\u4e00\u5835\u5899\u4ece\u6d77\u4e2d\u5347\u8d77\uff0c\u8fd9\u79cd\u89c6\u89c9\u51b2\u51fb\u51e0\u4e4e\u548c\u632a\u5a01\u7f57\u5f17\u6566\u7684\u96ea\u5c71\u4e00\u6837\u9707\u64bc\u3002\n\n## \u4f4f\u5bbf\n**\u5f3a\u70c8\u63a8\u8350\uff1a\u6ce2\u7279\u91cc\uff08Portree\uff09\u7684 The Royal Hotel \u6216 Cuillin Hills Hotel**\n- **Cuillin Hills Hotel**\uff1a\u4f4d\u4e8e\u6ce2\u7279\u91cc\u90ca\u533a\u7684\u5c0f\u5c71\u5761\u4e0a\uff0c\u6240\u6709\u623f\u95f4\u90fd\u9762\u5411\u6ce2\u7279\u91cc\u6d77\u6e7e\u548c\u8fdc\u5904\u7684\u5e93\u6797\u5c71\u3002\u4ef7\u683c\u7ea6 200\uff5e350 \u82f1\u9551/\u665a\u3002\n- \u5907\u9009\uff1a\u6ce2\u7279\u91cc\u9547\u4e2d\u5fc3\u7684\u7cbe\u54c1\u6c11\u5bbf\u6216 B&B\u3002\u65af\u51ef\u5c9b\u7684\u4f4f\u5bbf\u5728\u590f\u5b63\u975e\u5e38\u7d27\u5f20\uff0c\u5efa\u8bae\u63d0\u524d 2-3 \u4e2a\u6708\u9884\u8ba2\u3002\n\n## \u665a\u9910\n\u6ce2\u7279\u91cc\u6e2f\u53e3\u8fb9\u6709\u4e00\u6392\u5f69\u8272\u623f\u5b50\uff0c\u5176\u4e2d\u6700\u8457\u540d\u7684\u662f **The Seafood Restaurant**\uff0c\u4e3b\u6253\u5f53\u5929\u6355\u635e\u7684\u9f99\u867e\u3001\u6247\u8d1d\u548c\u9cd5\u9c7c\u3002\u9700\u8981\u63d0\u524d\u9884\u8ba2\uff0c\u4eba\u5747\u7ea6 40\uff5e60 \u82f1\u9551\u3002\u5982\u679c\u8ba2\u4e0d\u5230\uff0c\u65c1\u8fb9\u7684 **Sea Breezes** \u4e5f\u662f\u5f53\u5730\u4eba\u63a8\u8350\u7684\u6d77\u9c9c\u9910\u5385\u3002\n\n---\n\n# D5\uff5c\u65af\u51ef\u5c9b\uff08\u5317/\u4e1c\u73af\u7ebf\uff09\n**\u4e3b\u9898\uff1a\u5728\u7cbe\u7075\u4e0e\u5de8\u4eba\u7684\u571f\u5730\u4e0a\u884c\u8d70**\n\n![\u65af\u51ef\u5c9b\u8001\u4eba\u5cf0](./G_\u82cf\u683c\u5170/images/old_man_of_storr.jpg)\n*\u6668\u66e6\u4e2d\u7684\u8001\u4eba\u5cf0\u5f92\u6b65\u8def\u7ebf*\n\n## \u4e0a\u5348\uff1a\u8001\u4eba\u5cf0\uff08Old Man of Storr\uff09\u5f92\u6b65\n\n\u8fd9\u662f\u65af\u51ef\u5c9b\u4e43\u81f3\u82cf\u683c\u5170\u6392\u540d\u7b2c\u4e00\u7684\u5f92\u6b65\u8def\u7ebf\u3002\n\n- **\u8d77\u70b9**\uff1a\u4f4d\u4e8e A855 \u516c\u8def\u65c1\uff0c\u6ce2\u7279\u91cc\u4ee5\u5317\u7ea6 15 \u5206\u949f\u8f66\u7a0b\u3002\n- **\u8ddd\u79bb**\uff1a\u5f80\u8fd4\u7ea6 3.8 \u516c\u91cc\u3002\n- **\u722c\u5347**\uff1a\u7ea6 270 \u7c73\u3002\n- **\u65f6\u95f4**\uff1a\u5f80\u8fd4 1.5\uff5e2.5 \u5c0f\u65f6\u3002\n- **\u96be\u5ea6**\uff1a\u4e2d\u7b49\u3002\u524d\u534a\u6bb5\u662f\u788e\u77f3\u5761\u548c\u571f\u8def\uff0c\u540e\u534a\u6bb5\u9700\u8981\u5728\u5ca9\u77f3\u95f4\u6500\u722c\uff0c\u4f46\u4e0d\u9700\u8981\u4e13\u4e1a\u88c5\u5907\u3002\n\n### \u666f\u89c2\u4ef7\u503c\n\u767b\u9876\u540e\uff0c\u4f60\u4eec\u4f1a\u770b\u5230\u82cf\u683c\u5170\u6700\u8457\u540d\u7684\u81ea\u7136\u5730\u6807\u4e4b\u4e00\u2014\u2014**\u8001\u4eba\u5cf0**\uff0c\u4e00\u5ea7\u4ece\u5c71\u5761\u7a81\u5140\u5347\u8d77\u7684\u5de8\u5927\u7384\u6b66\u5ca9\u67f1\u3002\u4f20\u8bf4\u8fd9\u662f\u4e00\u4f4d\u5de8\u4eba\u5728\u6b7b\u540e\u77f3\u5316\u6210\u7684\u5c71\u5cf0\u3002\u80cc\u666f\u662f\u7279\u7f57\u7279\u5c3c\u4ec0\u534a\u5c9b\uff08Trotternish Ridge\uff09\u952f\u9f7f\u72b6\u7684\u5c71\u810a\u7ebf\uff0c\u4ee5\u53ca\u8fdc\u5904\u84dd\u8272\u7684\u5927\u897f\u6d0b\u3002\n\n> **\u5f92\u6b65\u5efa\u8bae**\uff1a\n> - \u65e9\u4e0a 7:00-8:00 \u51fa\u53d1\uff0c\u907f\u5f00\u65c5\u884c\u56e2\u548c\u6b63\u5348\u7684\u98ce\uff1b\n> - \u7a7f\u9632\u6c34\u767b\u5c71\u978b\uff0c\u82cf\u683c\u5170\u9ad8\u5730\u590f\u5b63\u591a\u96e8\uff0c\u5ca9\u77f3\u6e7f\u6ed1\uff1b\n> - \u5c71\u9876\u98ce\u6781\u5927\uff0c\u5373\u4f7f\u662f 7 \u6708\u4e5f\u5efa\u8bae\u5e26\u9632\u98ce\u51b2\u950b\u8863\uff1b\n> - \u8001\u4eba\u5cf0\u672c\u8eab\u4e0d\u662f\u6700\u9ad8\u70b9\uff0c\u7ee7\u7eed\u5411\u524d\u8d70\u5230\u4e3b\u89c2\u666f\u53f0\u624d\u662f\u6700\u4f73\u673a\u4f4d\u3002\n\n## \u4e0b\u5348\uff1a\u88d9\u5ca9\u60ac\u5d16\uff08Kilt Rock\uff09\u4e0e\u4ed9\u5973\u6c60\uff08Fairy Pools\uff09\n\n![\u88d9\u5ca9\u60ac\u5d16](./G_\u82cf\u683c\u5170/images/kilt_rock.jpg)\n*\u88d9\u5ca9\u60ac\u5d16\u4e0e Mealt \u7011\u5e03*\n\n### \u88d9\u5ca9\u60ac\u5d16\uff08Kilt Rock & Mealt Falls\uff09\n- **\u4f4d\u7f6e**\uff1aA855 \u516c\u8def\u6cbf\u7ebf\uff0c\u8001\u4eba\u5cf0\u4ee5\u5317\u7ea6 15 \u5206\u949f\u8f66\u7a0b\u3002\n- **\u770b\u70b9**\uff1a\u9ad8\u8fbe 55 \u7c73\u7684\u7384\u6b66\u5ca9\u60ac\u5d16\uff0c\u5ca9\u67f1\u5782\u76f4\u6392\u5217\u5982\u540c\u82cf\u683c\u5170\u4f20\u7edf\u683c\u88d9\uff08Kilt\uff09\u7684\u8936\u76b1\u3002\u60ac\u5d16\u8fb9\u6709\u4e00\u6761 **Mealt \u7011\u5e03** \u76f4\u63a5\u5760\u5165\u5927\u6d77\u3002\u89c2\u666f\u53f0\u4e0a\u8bbe\u6709\u514d\u8d39\u7684\u671b\u8fdc\u955c\u548c\u8bf4\u660e\u724c\u3002\n\n### \u4ed9\u5973\u6c60\uff08Fairy Pools\uff09\n- **\u4f4d\u7f6e**\uff1a\u4f4d\u4e8e Cuillin \u5c71\u8109\u811a\u4e0b\uff0c\u6ce2\u7279\u91cc\u4ee5\u897f\u7ea6 30 \u5206\u949f\u8f66\u7a0b\uff08\u6cbf B8009 \u548c Glen Brittle \u8def\uff09\u3002\n- **\u770b\u70b9**\uff1a\u4e00\u7cfb\u5217\u6e05\u6f88\u7684\u78a7\u84dd\u8272\u6c34\u6f6d\uff0c\u7531\u5c71\u95f4\u6eaa\u6d41\u4e32\u8054\u800c\u6210\uff0c\u80cc\u666f\u662f\u9ed1\u8272\u7684\u5e93\u6797\u5c71\u3002\u6c34\u6e29\u5e38\u5e74\u51b0\u51b7\uff0c\u4f46\u590f\u5b63\u6709\u52c7\u6562\u8005\u5728\u6b64\u8df3\u6c34\u6e38\u6cf3\u3002\n- **\u5f92\u6b65**\uff1a\u4ece\u505c\u8f66\u573a\u5230\u7b2c\u4e00\u4e2a\u6c34\u6f6d\u7ea6 20 \u5206\u949f\u6b65\u884c\uff0c\u8def\u51b5\u5e73\u5766\u4f46\u53ef\u80fd\u6ce5\u6cde\u3002\n\n> **\u51ef\u5c14\u7279\u4f20\u8bf4**\uff1a\u65af\u51ef\u5c9b\u7684\u540d\u5b57\u6765\u6e90\u4e8e\u53e4\u8bfa\u5c14\u65af\u8bed\u300cSkye\u300d\uff0c\u610f\u4e3a\u300c\u4e91\u96fe\u7b3c\u7f69\u7684\u5c9b\u5c7f\u300d\u3002\u8fd9\u91cc\u6d41\u4f20\u7740\u5927\u91cf\u7cbe\u7075\u3001\u5de8\u4eba\u548c\u4ed9\u5973\u7684\u4f20\u8bf4\u3002\u5f53\u5730\u4eba\u81f3\u4eca\u4ecd\u76f8\u4fe1\u67d0\u4e9b\u5c71\u4e18\u548c\u6e56\u6cca\u662f\u7cbe\u7075\u7684\u9886\u5730\uff0c\u665a\u4e0a\u6700\u597d\u4e0d\u8981\u6253\u6270\u3002\n\n## \u665a\u9910\n\u56de\u5230\u6ce2\u7279\u91cc\uff0c\u5982\u679c\u6628\u665a\u6ca1\u6709\u5403\u5230\u6d77\u9c9c\uff0c\u4eca\u665a\u52a1\u5fc5\u8865\u4e0a\u3002\u6216\u8005\u53ef\u4ee5\u5728\u9547\u4e0a\u7684\u8d85\u5e02\uff08Co-op\uff09\u8d2d\u4e70\u5f53\u5730\u98df\u6750\uff0c\u56de\u6c11\u5bbf\u81ea\u5df1\u505a\u4e00\u987f\u9ad8\u5730\u725b\u6392\u914d\u7ea2\u9152\u2014\u2014\u65af\u51ef\u5c9b\u7684\u81ea\u708a\u4f53\u9a8c\u4e5f\u662f\u4e00\u79cd\u6d6a\u6f2b\u3002\n\n---\n\n# D6\uff5c\u65af\u51ef\u5c9b\uff08\u897f/\u5357\u73af\u7ebf\uff09\n**\u4e3b\u9898\uff1a\u5927\u9646\u5c3d\u5934\u7684\u706f\u5854\u4e0e\u53e4\u5821**\n\n![\u5185\u65af\u7279\u89d2\u706f\u5854](./G_\u82cf\u683c\u5170/images/neist_point_lighthouse.jpg)\n*\u5185\u65af\u7279\u89d2\u706f\u5854\u2014\u2014\u82cf\u683c\u5170\u6700\u897f\u7aef\u7684\u5730\u6807*\n\n## \u4e0a\u5348\uff1a\u5185\u65af\u7279\u89d2\u706f\u5854\uff08Neist Point Lighthouse\uff09\n\n![\u5185\u65af\u7279\u89d2\u60ac\u5d16](./G_\u82cf\u683c\u5170/images/neist_point_cliffs.jpg)\n*\u5185\u65af\u7279\u89d2\u706f\u5854\u4e0e\u5468\u56f4\u7684\u6d77\u8680\u60ac\u5d16*\n\n- **\u4f4d\u7f6e**\uff1a\u65af\u51ef\u5c9b\u6700\u897f\u7aef\uff0c\u6ce2\u7279\u91cc\u4ee5\u897f\u7ea6 1 \u5c0f\u65f6\u8f66\u7a0b\uff08\u6cbf B8009 \u548c single-track \u516c\u8def\uff09\u3002\n- **\u770b\u70b9**\uff1a\n  - \u8fd9\u5ea7\u706f\u5854\u5efa\u4e8e 1909 \u5e74\uff0c\u77d7\u7acb\u5728\u4e00\u6761\u72ed\u7a84\u6d77\u5cac\u7684\u5c3d\u5934\uff0c\u88ab\u300a\u56fd\u5bb6\u5730\u7406\u300b\u8bc4\u4e3a\u300c\u5168\u7403\u6700\u7f8e\u706f\u5854\u300d\u4e4b\u4e00\u3002\n  - \u4ece\u505c\u8f66\u573a\u6b65\u884c\u5230\u706f\u5854\u7ea6 20 \u5206\u949f\uff08\u4e0b\u5761\uff09\uff0c\u56de\u7a0b\u4e0a\u5761\u7ea6 30 \u5206\u949f\u3002\u6cbf\u9014\u53ef\u4ee5\u770b\u5230\u58ee\u89c2\u7684\u6d77\u8680\u60ac\u5d16\uff0c\u590f\u5b63\u5e38\u6709\u9cb8\u9c7c\u3001\u6d77\u8c5a\u548c\u6d77\u8c79\u51fa\u6ca1\u3002\n  - \u6700\u4f73\u62cd\u6444\u70b9\u5728\u901a\u5f80\u706f\u5854\u7684\u77f3\u677f\u8def\u4e2d\u6bb5\uff0c\u4ee5\u53ca\u706f\u5854\u4e1c\u4fa7\u7684\u60ac\u5d16\u8fb9\uff08\u6ce8\u610f\u5b89\u5168\uff09\u3002\n\n> **\u81ea\u9a7e\u63d0\u9192**\uff1a\u901a\u5f80\u5185\u65af\u7279\u89d2\u7684\u8def\u662f\u4e00\u6761\u72ed\u7a84\u7684\u5355\u8f66\u9053\uff08Single-track road\uff09\uff0c\u6bcf\u9694\u4e00\u6bb5\u8bbe\u6709\u4f1a\u8f66\u70b9\uff08Passing place\uff09\u3002\u9047\u5230\u5bf9\u5411\u6765\u8f66\u65f6\uff0c\u8bf7\u4e3b\u52a8\u5012\u8f66\u8fdb\u5165 passing place \u907f\u8ba9\u3002\u82f1\u56fd\u53f8\u673a\u901a\u5e38\u4f1a\u7528\u6325\u624b\u6216\u95ea\u706f\u8868\u793a\u611f\u8c22\u3002\n\n## \u4e0b\u5348\uff1a\u9093\u97e6\u6839\u57ce\u5821\uff08Dunvegan Castle\uff09\u4e0e\u73ca\u745a\u6d77\u6ee9\uff08Coral Beach\uff09\n\n### \u9093\u97e6\u6839\u57ce\u5821\n- **\u4f4d\u7f6e**\uff1a\u6ce2\u7279\u91cc\u4ee5\u897f\u7ea6 30 \u5206\u949f\u8f66\u7a0b\uff0c\u662f**\u82cf\u683c\u5170\u4e00\u76f4\u6709\u4eba\u5c45\u4f4f\u7684\u6700\u53e4\u8001\u57ce\u5821**\uff08\u81ea 13 \u4e16\u7eaa\u8d77\uff09\u3002\n- **\u770b\u70b9**\uff1a\n  - \u57ce\u5821\u662f\u9ea6\u514b\u52b3\u5fb7\u6c0f\u65cf\uff08Clan MacLeod\uff09\u7684\u7956\u5b85\uff0c\u5185\u90e8\u6536\u85cf\u4e86\u5927\u91cf\u5bb6\u65cf\u6587\u7269\u548c\u6cb9\u753b\u3002\n  - \u82b1\u56ed\u975e\u5e38\u7cbe\u7f8e\uff0c\u5c24\u5176\u662f\u590f\u5b63\uff0c\u73ab\u7470\u548c\u7ee3\u7403\u82b1\u76db\u5f00\u3002\n  - \u53ef\u4ee5\u4e58\u8239\u5230\u9644\u8fd1\u7684 **\u6d77\u8c79\u6b96\u6c11\u5730** \u89c2\u8d4f\u6d77\u8c79\u3002\n\n### \u73ca\u745a\u6d77\u6ee9\uff08Coral Beach\uff09\n- **\u4f4d\u7f6e**\uff1a\u9093\u97e6\u6839\u4ee5\u5317\u7ea6 10 \u5206\u949f\u8f66\u7a0b\u3002\n- **\u770b\u70b9**\uff1a\u8fd9\u91cc\u7684\u300c\u6c99\u5b50\u300d\u5176\u5b9e\u662f\u6d77\u85fb\u9499\u5316\u540e\u5f62\u6210\u7684\u767d\u8272\u788e\u5c51\uff0c\u5728\u9633\u5149\u4e0b\u5448\u73b0\u51fa\u5947\u5f02\u7684\u767d\u8272\u3002\u6d77\u6c34\u5448\u73b0\u51fa\u52a0\u52d2\u6bd4\u6d77\u822c\u7684 turquoise \u8272\uff0c\u4e0e\u5468\u56f4\u6df1\u8272\u9ad8\u5730\u5f62\u6210\u5f3a\u70c8\u5bf9\u6bd4\u3002\n- **\u5f92\u6b65**\uff1a\u4ece\u505c\u8f66\u573a\u5230\u6d77\u6ee9\u7ea6 25 \u5206\u949f\u6b65\u884c\uff0c\u8def\u51b5\u5e73\u7f13\u3002\n\n> **\u6d6a\u6f2b\u65f6\u523b**\uff1a\u5982\u679c\u5929\u6c14\u6674\u6717\uff0c\u73ca\u745a\u6d77\u6ee9\u662f\u65af\u51ef\u5c9b\u6700\u50cf\u70ed\u5e26\u6d77\u5c9b\u7684\u5730\u65b9\u3002\u5e26\u4e00\u6761\u6bef\u5b50\u548c\u4e00\u4e9b\u96f6\u98df\uff0c\u5750\u5728\u767d\u8272\u7684\u300c\u6c99\u6ee9\u300d\u4e0a\uff0c\u770b\u7740\u7eff\u677e\u77f3\u8272\u7684\u6d77\u6c34\u62cd\u6253\u5cb8\u8fb9\u2014\u2014\u8fd9\u662f\u5a5a\u5047\u91cc\u6700\u9002\u5408\u91ce\u9910\u7684\u4e00\u7ad9\u3002\n\n## \u665a\u9910\n\u56de\u5230\u6ce2\u7279\u91cc\uff0c\u63a8\u8350\u5c1d\u8bd5 **The Cellar**\uff0c\u4e00\u5bb6\u7c73\u5176\u6797\u6307\u5357\u63a8\u8350\u7684\u73b0\u4ee3\u82cf\u683c\u5170\u6d77\u9c9c\u9910\u5385\uff0c\u4eba\u5747\u7ea6 60\uff5e80 \u82f1\u9551\uff0c\u9700\u63d0\u524d\u9884\u8ba2\u3002\n\n---\n\n# D7\uff5c\u65af\u51ef\u5c9b \u2192 \u683c\u4f26\u79d1\u5ce1\u8c37 \u2192 \u5c3c\u65af\u6e56\uff08Loch Ness\uff09\n**\u4e3b\u9898\uff1a\u91cd\u8fd4\u5ce1\u8c37\uff0c\u8ffd\u5bfb\u6c34\u602a\u4f20\u8bf4**\n\n![\u683c\u4f26\u79d1\u89c2\u666f\u53f0](./G_\u82cf\u683c\u5170/images/glencoe_viewpoint.jpg)\n*\u4ece Glencoe \u89c2\u666f\u53f0\u4fef\u77b0\u5ce1\u8c37\u5168\u666f*\n\n## \u81ea\u9a7e\u8def\u7ebf\n- **\u65af\u51ef\u5c9b \u2192 \u683c\u4f26\u79d1**\uff1a\u4ece\u65af\u51ef\u6865\uff08Skye Bridge\uff09\u79bb\u5f00\u5c9b\u5c7f\uff0c\u6cbf A87 \u516c\u8def\u5411\u4e1c\u81f3\u5a01\u5ec9\u5821\u9644\u8fd1\uff0c\u518d\u6cbf A82 \u516c\u8def\u5411\u5357\u8fdb\u5165\u683c\u4f26\u79d1\u5ce1\u8c37\uff0c\u7ea6 120 \u516c\u91cc\uff0c\u8f66\u7a0b 2 \u5c0f\u65f6\u3002\n- **\u683c\u4f26\u79d1 \u2192 \u5c3c\u65af\u6e56\uff08\u5384\u514b\u7279\u57ce\u5821\uff09**\uff1a\u4ece\u683c\u4f26\u79d1\u6cbf A82 \u5411\u5317\u6298\u8fd4\u7ecf\u8fc7\u5a01\u5ec9\u5821\uff0c\u7ee7\u7eed\u6cbf A82 \u5411\u5317\u6cbf\u5c3c\u65af\u6e56\u524d\u884c\uff0c\u7ea6 80 \u516c\u91cc\uff0c\u8f66\u7a0b 1.5 \u5c0f\u65f6\u3002\n- **\u5c3c\u65af\u6e56 \u2192 \u56e0\u5f17\u5185\u65af**\uff1a\u7ea6 25 \u516c\u91cc\uff0c\u8f66\u7a0b 30 \u5206\u949f\u3002\n\n## \u4e0a\u5348\uff1a\u91cd\u8fd4\u683c\u4f26\u79d1\uff0c\u4e09\u59d0\u59b9\u5c71\u89c2\u666f\u53f0\u6df1\u5ea6\u505c\u7559\n\n\u7531\u4e8e D4 \u662f\u4ece\u5357\u5411\u5317\u7a7f\u8fc7\u683c\u4f26\u79d1\uff0c\u800c\u4eca\u5929\u662f\u4ece\u5317\u5411\u5357\uff08\u4ece\u65af\u51ef\u5c9b\u8fc7\u6765\uff09\uff0c\u6240\u4ee5\u4f60\u4eec\u4f1a\u4ece\u53e6\u4e00\u4e2a\u89d2\u5ea6\u91cd\u65b0\u6b23\u8d4f\u8fd9\u5ea7\u5ce1\u8c37\u3002\n\n- **Three Sisters Carpark**\uff1a\u4eca\u5929\u53ef\u4ee5\u82b1\u65f6\u95f4\u8d70\u5230 **Lost Valley\uff08Coire Gabhail\uff09** \u7684\u5165\u53e3\u3002\u8fd9\u662f\u4e00\u6761\u901a\u5f80\u9690\u85cf\u5c71\u8c37\u7684\u5f92\u6b65\u8def\u7ebf\uff0c\u636e\u8bf4 1692 \u5e74\u683c\u4f26\u79d1\u5927\u5c60\u6740\u65f6\uff0c\u90e8\u5206\u9ea6\u514b\u5510\u7eb3\u6c0f\u65cf\u6210\u5458\u9003\u5165\u8fd9\u4e2a\u5c71\u8c37\u907f\u96be\u3002\n  - \u5f80\u8fd4\u7ea6 4 \u516c\u91cc\uff0c\u722c\u5347\u7ea6 300 \u7c73\uff0c\u96be\u5ea6\u4e2d\u7b49\u504f\u4e0a\uff0c\u9700\u8981\u7a7f\u8d8a\u6eaa\u6d41\u548c\u788e\u77f3\u5761\u3002\n  - \u5982\u679c\u65f6\u95f4\u6216\u4f53\u529b\u6709\u9650\uff0c\u53ef\u4ee5\u5728\u505c\u8f66\u573a\u9644\u8fd1\u7684\u5c71\u8c37\u5e95\u90e8\u62cd\u7167\uff0c\u540c\u6837\u58ee\u89c2\u3002\n- **Glencoe Viewpoint**\uff1a\u4f4d\u4e8e A82 \u516c\u8def\u5357\u4fa7\uff0c\u662f\u62cd\u6444\u5ce1\u8c37\u5168\u666f\u7684\u6700\u4f73\u673a\u4f4d\u4e4b\u4e00\u3002\n\n## \u4e0b\u5348\uff1a\u5c3c\u65af\u6e56\u4e0e\u5384\u514b\u7279\u57ce\u5821\uff08Urquhart Castle\uff09\n\n![\u5384\u514b\u7279\u57ce\u5821](./G_\u82cf\u683c\u5170/images/urquhart_castle.jpg)\n*\u5384\u514b\u7279\u57ce\u5821\u9057\u5740\u77d7\u7acb\u5728\u5c3c\u65af\u6e56\u7554*\n\n- **\u5384\u514b\u7279\u57ce\u5821**\uff1a\u4f4d\u4e8e\u5c3c\u65af\u6e56\uff08Loch Ness\uff09\u897f\u5cb8\uff0c\u662f\u82cf\u683c\u5170\u51fa\u955c\u7387\u6700\u9ad8\u7684\u57ce\u5821\u9057\u5740\u4e4b\u4e00\u3002\n  - \u95e8\u7968\uff1a\u7ea6 14 \u82f1\u9551/\u4eba\u3002\n  - \u5386\u53f2\uff1a\u8fd9\u5ea7\u57ce\u5821\u59cb\u5efa\u4e8e 13 \u4e16\u7eaa\uff0c\u5728 17 \u4e16\u7eaa\u82f1\u56fd\u5185\u6218\u671f\u95f4\u88ab\u90e8\u5206\u70b8\u6bc1\uff0c\u5982\u4eca\u53ea\u5269\u4e0b\u65ad\u58c1\u6b8b\u57a3\u3002\u4f46\u6b63\u662f\u8fd9\u4e9b\u5e9f\u589f\u4e0e\u5c3c\u65af\u6e56\u7684\u6df1\u7eff\u8272\u6e56\u6c34\u5f62\u6210\u4e86\u6781\u5177\u620f\u5267\u6027\u7684\u753b\u9762\u3002\n  - **\u6c34\u602a\u4f20\u8bf4**\uff1a\u5c3c\u65af\u6e56\u6c34\u602a\uff08Nessie\uff09\u7684\u6545\u4e8b\u59cb\u4e8e 1933 \u5e74\uff0c\u4f46\u5f53\u5730\u4f20\u8bf4\u53ef\u4ee5\u8ffd\u6eaf\u5230 6 \u4e16\u7eaa\u3002\u57ce\u5821\u8bbe\u6709\u4e13\u95e8\u7684\u300c\u6c34\u602a\u5c55\u89c8\u300d\uff0c\u5c55\u793a\u4e86\u5386\u5e74\u6765\u7684\u76ee\u51fb\u8bb0\u5f55\u548c\uff08\u5927\u90e8\u5206\u662f\u9020\u5047\u7684\uff09\u7167\u7247\u3002\n\n> **\u6709\u8da3\u7684\u4e8b\u5b9e**\uff1a\u5c3c\u65af\u6e56\u662f\u82f1\u56fd\u6de1\u6c34\u5bb9\u91cf\u6700\u5927\u7684\u6e56\u6cca\uff0c\u6700\u6df1\u5904\u8fbe 227 \u7c73\u3002\u6e56\u6c34\u56e0\u6ce5\u70ad\u800c\u5448\u73b0\u51fa\u4e0d\u900f\u660e\u7684\u6df1\u7eff\u8272/\u9ed1\u8272\uff0c\u8fd9\u4e3a\u6c34\u602a\u4f20\u8bf4\u63d0\u4f9 n## \u65b9\u6848 B\uff1a\u98de\u5b89\u5854\u5229\u4e9a\uff08\u66f4\u8f7b\u677e\uff09\n\n- **\u822a\u73ed**\uff1a\u5f00\u585e\u5229\u673a\u573a \u2708 \u5b89\u5854\u5229\u4e9a\u673a\u573a\uff0c\u7ea6 1.5 \u5c0f\u65f6\uff08\u6bcf\u5468\u73ed\u6b21\u6709\u9650\uff0c\u9700\u63d0\u524d\u67e5\u597d\uff09\u3002\n- **\u79df\u8f66**\uff1a\u62b5\u8fbe\u5b89\u5854\u5229\u4e9a\u673a\u573a\u540e\u53d6\u8f66\uff0c\u5f00\u542f\u5730\u4e2d\u6d77\u81ea\u9a7e\u6bb5\u3002\n- **\u9002\u5408\u4eba\u7fa4**\uff1a\u4e0d\u60f3\u5f00\u957f\u9014\u3001\u6216\u62c5\u5fc3\u5c71\u8def\u9a7e\u9a76\u7684\u65b0\u624b\u53f8\u673a\u3002\n\n## \u4f4f\u5bbf\n**\u63a8\u8350\uff1a\u5361\u83b1\u4f0a\u5947\u8001\u57ce\u533a\uff08Kalei\u00e7i\uff09**\n\n- **Tuvana Hotel**\uff1a\u5965\u65af\u66fc\u8001\u5b85\u6539\u9020\u7684\u7cbe\u54c1\u9152\u5e97\uff0c\u5ead\u9662\u79cd\u6ee1\u67e0\u6aac\u6811\u548c\u4e5d\u91cd\u845b\uff0c\u7ea6 800\uff5e1,500 \u5143/\u665a\u3002\n- **Puding Marina Residence**\uff1a\u4f4d\u4e8e\u7f57\u9a6c\u6e2f\u8fb9\uff0c\u5730\u4e2d\u6d77\u666f\u89c2\u623f\u53ef\u76f4\u63a5\u770b\u5230\u6e38\u8247\u548c\u5915\u9633\uff0c\u7ea6 600\uff5e1,000 \u5143/\u665a\u3002\n- **La Boutique Hotel**\uff1a\u8bbe\u8ba1\u9152\u5e97\uff0c\u5c4b\u9876\u9732\u53f0\u6709\u5c0f\u578b\u65e0\u8fb9\u6cf3\u6c60\uff0c\u7ea6 700\uff5e1,200 \u5143/\u665a\u3002\n\n## \u6d3b\u52a8\n- **\u508d\u665a**\uff1a\u6f2b\u6b65 **\u54c8\u5fb7\u826f\u95e8\uff08Hadrian's Gate\uff09**\uff0c\u8fd9\u5ea7\u5927\u7406\u77f3\u62f1\u95e8\u5efa\u4e8e\u516c\u5143 130 \u5e74\uff0c\u662f\u7f57\u9a6c\u7687\u5e1d\u54c8\u5fb7\u826f\u8bbf\u95ee\u5e15\u52a0\u9a6c\u738b\u56fd\u65f6\u7684\u7eaa\u5ff5\u5efa\u7b51\u3002\n- **\u7f57\u9a6c\u6e2f\uff08Roman Harbour\uff09**\uff1a\u8001\u57ce\u8fb9\u7f18\u7684\u53e4\u8001\u6e2f\u53e3\uff0c\u73b0\u5728\u505c\u6ee1\u4e86\u6e38\u8247\u548c\u6d77\u76d7\u8239\u3002\u5750\u5728\u6e2f\u53e3\u8fb9\u7684\u5496\u5561\u9986\uff0c\u770b\u5730\u4e2d\u6d77\u7684\u65e5\u843d\u628a\u5929\u7a7a\u67d3\u6210\u6a58\u7ea2\u4e0e\u7c89\u7d2b\u3002\n\n## \u665a\u9910\n- **Arma Restaurant**\uff1a\u4f4d\u4e8e\u8001\u57ce\u60ac\u5d16\u8fb9\uff0c\u62e5\u6709\u5b89\u5854\u5229\u4e9a\u6700\u4f73\u6d77\u666f\u9732\u53f0\u3002\u4e3b\u6253\u5730\u4e2d\u6d77\u6d77\u9c9c\u548c\u571f\u8033\u5176\u6599\u7406\uff0c\u4eba\u5747\u7ea6 200\uff5e350 \u5143\uff0c\u9700\u63d0\u524d\u9884\u8ba2\u3002\n- **\u9c7c\u5e02\u573a\uff08Bal\u0131k Pazar\u0131\uff09**\uff1a\u4f4d\u4e8e\u5e02\u4e2d\u5fc3\uff0c\u81ea\u9009\u65b0\u9c9c\u6d77\u9c9c\u540e\u4ea4\u7ed9\u5468\u8fb9\u9910\u5385\u73b0\u573a\u70f9\u996a\uff0c\u4ef7\u683c\u66f4\u5b9e\u60e0\uff0c\u4eba\u5747\u7ea6 150 \u5143\u3002\n\n---\n\n# D5\uff5c\u5b89\u5854\u5229\u4e9a \u2192 \u5361\u4ec0\uff08Ka\u015f\uff09\n**\u4e3b\u9898\uff1aD400\uff0c\u5168\u7403\u6700\u7f8e\u6cbf\u6d77\u516c\u8def\u4e4b\u4e00**\n\n![\u5361\u4ec0\u5c0f\u9547\u6e2f\u53e3](./H_\u571f\u8033\u5176/images/kas_harbor.jpg)\n*\u5361\u4ec0\u5c0f\u9547\u7684\u5f69\u8272\u623f\u5c4b\u4e0e\u5730\u4e2d\u6d77\u6e2f\u53e3*\n\n\u4ece\u4eca\u5929\u8d77\uff0c\u4f60\u4eec\u6b63\u5f0f\u5f00\u59cb**D400 \u6cbf\u6d77\u516c\u8def\u81ea\u9a7e**\u2014\u2014\u8fd9\u6761\u88ab\u65e0\u6570\u65c5\u884c\u5a92\u4f53\u8bc4\u4e3a\"\u5168\u7403\u6700\u7f8e\u6cbf\u6d77\u516c\u8def\"\u7684\u8def\u7ebf\uff0c\u662f\u571f\u8033\u5176\u4e4b\u884c\u7684\u81ea\u9a7e\u9ad8\u5149\u3002\n\n## \u81ea\u9a7e\u8def\u7ebf\n- **\u8def\u7ebf**\uff1a\u5b89\u5854\u5229\u4e9a \u2192 Kemer \u2192 Phaselis \u2192 Olympos \u2192 \u5361\u4ec0\uff08Ka\u015f\uff09\u3002\n- **\u8ddd\u79bb**\uff1a\u7ea6 180 \u516c\u91cc\u3002\n- **\u65f6\u95f4**\uff1a\u7ea6 3.5\uff5e4.5 \u5c0f\u65f6\uff08\u542b\u505c\u9760\uff09\u3002\n- **\u8def\u51b5**\uff1aD400 \u516c\u8def\u8def\u51b5\u6781\u597d\uff0c\u6cbf\u6d77\u6bb5\u9650\u901f 70\uff5e90 km/h\u3002\u6ce8\u610f\u5f2f\u9053\u591a\uff0c\u4e0d\u8981\u76f2\u76ee\u8d85\u8f66\u3002\u571f\u8033\u5176\u4e0e\u4e2d\u56fd\u4e00\u6837**\u53f3\u8235\u5de6\u884c**\u3002\n\n## \u9014\u4e2d\u4eae\u70b9\n\n### Phaselis \u53e4\u57ce\n- \u4f4d\u4e8e\u68ee\u6797\u4e0e\u6d77\u6ee9\u4e4b\u95f4\u7684\u53e4\u7f57\u9a6c\u6e2f\u53e3\u57ce\u5e02\u9057\u5740\u3002\n- \u7279\u8272\uff1a\u4e09\u6761\u53e4\u7f57\u9a6c\u5927\u9053\u3001\u6d74\u573a\u9057\u5740\u3001\u4ee5\u53ca\u76f4\u63a5\u4f38\u5411\u5730\u4e2d\u6d77\u7684\u7801\u5934\u3002\u53ef\u4ee5\u5728\u53e4\u7801\u5934\u7684\u6d77\u6c34\u4e2d\u6e38\u6cf3\uff0c\u80cc\u666f\u662f\u4e24\u5343\u5e74\u7684\u77f3\u67f1\u3002\n- \u95e8\u7968\uff1a\u7ea6 10 \u6b27\u5143/\u4eba\u3002\n\n### Olympos \u6d77\u6ee9\n- \u4e00\u6761\u6cb3\u6d41\u5165\u6d77\u53e3\u5f62\u6210\u7684\u6c99\u6ee9\uff0c\u4e24\u5cb8\u662f\u8302\u5bc6\u7684\u60ac\u94c3\u6728\u68ee\u6797\u3002\n- \u8fd9\u91cc\u4e5f\u662f\u706b\u866b\uff08Chimaera\uff09\u548c Olympos \u53e4\u57ce\u7684\u6240\u5728\u5730\uff0c\u5982\u679c\u65f6\u95f4\u5145\u88d5\u53ef\u4ee5\u505c\u7559 1 \u5c0f\u65f6\u3002\n\n## \u5361\u4ec0\uff08Ka\u015f\uff09\n\n\u5361\u4ec0\u662f\u5730\u4e2d\u6d77\u6cbf\u5cb8\u6700\u8ff7\u4eba\u7684\u5c0f\u9547\u4e4b\u4e00\u2014\u2014\u5f69\u8272\u623f\u5c4b\u6cbf\u7740\u5c71\u5761\u5c42\u5c42\u53e0\u53e0\uff0c\u6e2f\u53e3\u505c\u6ee1\u4e86\u6728\u5236\u7684\u53e4\u5e06\u8239\uff08Gulet\uff09\uff0c\u8857\u5934\u79cd\u6ee1\u4e5d\u91cd\u845b\u548c\u67e0\u6aac\u6811\u3002\n\n- **\u6d3b\u52a8**\uff1a\n  - \u508d\u665a\u5728\u5c0f\u9547\u4e2d\u5fc3\u6563\u6b65\uff0c\u901b\u72ec\u7acb\u8bbe\u8ba1\u5e08\u7684\u5c0f\u5e97\u548c\u624b\u5de5\u73e0\u5b9d\u5e97\uff1b\n  - \u5361\u4ec0\u662f\u571f\u8033\u5176\u9876\u7ea7\u7684\u6f5c\u6c34\u80dc\u5730\uff0c\u53ef\u4ee5\u62a5\u540d\u4f53\u9a8c\u6f5c\u6c34\uff08\u7ea6 300\uff5e400 \u5143/\u4eba\uff09\uff1b\n  - \u5728\u6e2f\u53e3\u8fb9\u627e\u4e00\u5bb6\u60ac\u5d16\u9152\u5427\uff0c\u70b9\u4e00\u676f\u571f\u8033\u5176\u7ea2\u8336\u6216 Efes \u5564\u9152\uff0c\u770b\u5915\u9633\u6c89\u5165\u6d77\u5e73\u9762\u3002\n\n## \u4f4f\u5bbf\n- **Lukka Exclusive Hotel**\uff1a\u60ac\u5d16\u6d77\u666f\u7cbe\u54c1\u9152\u5e97\uff0c\u65e0\u8fb9\u6cf3\u6c60\u \u5361\u4ec0\u7ea6 25 \u5206\u949f\u8f66\u7a0b\uff09\u4e0a\u8239\uff0c\u5168\u7a0b\u7ea6 4\uff5e5 \u5c0f\u65f6\u3002\n- **\u4eae\u70b9**\uff1a\n  - **Kekova \u6c89\u6ca1\u4e4b\u57ce**\uff1a\u7531\u4e8e\u516c\u5143 2 \u4e16\u7eaa\u7684\u4e00\u573a\u5730\u9707\uff0c\u8fd9\u5ea7\u53e4\u7f57\u9a6c\u6e2f\u53e3\u57ce\u5e02\u7684\u5927\u534a\u6c89\u5165\u6c34\u4e0b\u3002\u4eca\u5929\uff0c\u900f\u8fc7\u6e05\u6f88\u7684\u6d45\u6c34\uff0c\u4f60\u4eec\u53ef\u4ee5\u770b\u5230 submerged \u7684\u53f0\u9636\u3001\u5899\u58c1\u548c\u7801\u5934\u9057\u8ff9\uff1b\n  - **Simena \u57ce\u5821**\uff1a\u8239\u4f1a\u5728 Kalek\u00f6y\uff08Simena\uff09\u505c\u9760\uff0c\u4f60\u4eec\u53ef\u4ee5\u722c\u4e0a\u4e00\u5ea7\u4e2d\u4e16\u7eaa\u57ce\u5821\uff0c\u4fef\u77b0 Kekova \u6d77\u6e7e\u7684\u5168\u666f\uff1b\n  - **\u6e38\u6cf3\u505c\u9760**\uff1a\u8239\u4f1a\u5728\u591a\u4e2a\u65e0\u4eba\u6d77\u6e7e\u629b\u951a\uff0c\u8ba9\u4f60\u4eec\u76f4\u63a5\u8df3\u5165\u5730\u4e2d\u6d77\u7684\u78a7\u84dd\u6c34\u4e2d\u3002\n\n![Kekova \u6c89\u6ca1\u4e4b\u57ce](./H_\u571f\u8033\u5176/images/kekova_sunken_city.jpg)\n*Kekova \u6d77\u6e7e\u4e2d\u6c34\u4e0b\u7684\u53e4\u7f57\u9a6c\u5efa\u7b51\u9057\u8ff9*\n\n## \u4e0b\u5348\uff1aKaputas Beach\n\n- **\u4f4d\u7f6e**\uff1aD400 \u516c\u8def\u4ece\u5361\u4ec0\u5f80\u8d39\u7279\u5e0c\u8036\u65b9\u5411\u7ea6 20 \u516c\u91cc\u5904\uff0c\u516c\u8def\u76f4\u63a5\u4ece\u60ac\u5d16\u4e0a\u65b9\u4fef\u51b2\u5230\u6d77\u6ee9\u3002\n- **\u7279\u8272**\uff1a\u4e24\u7247\u9ad8\u8038\u7684\u60ac\u5d16\u5939\u51fa\u4e00\u6761\u72ed\u7a84\u7684\u5ce1\u8c37\uff0c\u8c37\u5e95\u662f\u4e00\u7247\u5976\u84dd\u8272\u4e0e\u7eff\u677e\u77f3\u8272\u6e10\u53d8\u7684\u6c99\u6ee9\u3002\u6d77\u6c34\u6e05\u6f88\u89c1\u5e95\uff0c\u88ab\u79f0\u4e3a\"\u571f\u8033\u5176\u6700\u7f8e\u6d77\u6ee9\"\u3002\n- **\u505c\u8f66**\uff1a\u8def\u8fb9\u6709\u514d\u8d39\u505c\u8f66\u573a\uff0c\u65fa\u5b63\u4e0b\u5348\u4eba\u8f83\u591a\uff0c\u5efa\u8bae\u508d\u665a 4 \u70b9\u540e\u5230\u8fbe\u3002\n- **\u5c0f     let map, markersLayer, linesLayer, currentPlan = 'a';
    const docPanel = document.getElementById('docPanel');
    const docBackdrop = document.getElementById('docBackdrop');
    const docContent = document.getElementById('docContent');
    const docTitle = document.getElementById('docTitle');

    // Configure marked renderer for anchor injection
    const renderer = new marked.Renderer();
    renderer.heading = function(token) {
      // marked v14+ passes a token object { text, depth, raw }, older versions pass (text, level)
      const text = (typeof token === 'string') ? token : (token.text || '');
      const level = (typeof token === 'string') ? arguments[1] : (token.depth || 1);
      const m = text.match(/D(\d+)/i);
      const id = m ? `id="anchor-d${m[1]}"` : '';
      return `<h${level} ${id}>${text}</h${level}>`;
    };
    marked.setOptions({ renderer });

    function initMap() {
      map = L.map('map', {
        zoomControl: false,
        attributionControl: false,
        minZoom: 3
      }).setView(plans.a.center, plans.a.zoom);

      L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; OpenStreetMap &copy; CARTO',
        subdomains: 'abcd',
        maxZoom: 19
      }).addTo(map);

      L.control.zoom({ position: 'bottomright' }).addTo(map);
      L.control.attribution({ position: 'bottomright' }).addTo(map);

      markersLayer = L.layerGroup().addTo(map);
      linesLayer = L.layerGroup().addTo(map);

      renderPlan('a');
    }

    function getLineStyle(type) {
      switch(type) {
        case 'fly': return { color: '#ff8b94', weight: 2, opacity: 0.9, dashArray: '6,6' };
        case 'ferry': return { color: '#9ecbf3', weight: 2.5, opacity: 0.85, dashArray: '4,4' };
        case 'train': return { color: '#b4a7d6', weight: 2.5, opacity: 0.85, dashArray: '8,6' };
        default: return { color: '#ffd3b6', weight: 2.5, opacity: 0.85 };
      }
    }

    function iconFor(p) {
      const text = (p.name || '') + ',' + (p.tags || []).join(',');
      if (/热气球/.test(text)) return '🎈';
      if (/滑翔伞/.test(text)) return '🪂';
      if (/潜水/.test(text)) return '🤿';
      if (/红酒|葡萄酒/.test(text)) return '🍷';
      if (/和牛|烤肉/.test(text)) return '🥩';
      if (/花田|薰衣草/.test(text)) return '🌸';
      if (/灯塔/.test(text)) return '🔦';
      if (/蓝湖|海滩|海岸/.test(text)) return '🏖️';
      if (/地下城/.test(text)) return '🏰';
      if (/峡湾|瀑布|冰川|地热|间歇泉|岩石|悬崖|山峰|峡谷|火山|自然|山口|山谷/.test(text)) return '⛰️';
      if (/城堡|教堂|博物馆|美术馆|歌剧院/.test(text)) return '🏰';
      if (/火车|轮渡|机场|大桥|运河/.test(text)) return '🚆';
      if (/温泉|桑拿|泳池/.test(text)) return '♨️';
      if (/公园|乐园|花园|森林/.test(text)) return '🌲';
      if (/足球|球场/.test(text)) return '⚽';
      if (/生蚝|海鲜|美食|鱼市|餐厅/.test(text)) return '🦪';
      if (/徒步|登山|裂缝/.test(text)) return '🥾';
      return '📍';
    }

    function makeMarker(p, planKey) {
      const color = plans[planKey].color;
      const iconHtml = `<div class="marker-ring" style="color:${color}"></div><div style="font-size:16px; filter:drop-shadow(0 1px 2px rgba(0,0,0,.6));">${iconFor(p)}</div>`;
      const icon = L.divIcon({
        className: 'custom-marker',
        html: iconHtml,
        iconSize: [36,36],
        iconAnchor: [18,18],
        popupAnchor: [0,-20]
      });
      icon.options.color = color;
      const marker = L.marker([p.lat, p.lng], { icon });
      marker.pointId = p.id;

      const imgPath = p.img ? images[planKey] + p.img : '';
      const imgHtml = imgPath
        ? `<img class="popup-media" src="${imgPath}" alt="${p.name}" onerror="this.style.display='none'">`
        : `<div class="popup-media" style="display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#1a2540,#0b1020);color:#9fb3d8;font-size:12px;">暂无图片</div>`;

      const tagsHtml = (p.tags || []).map(t => `<span class="popup-tag">${t}</span>`).join(' ');

      const popupContent = `
        ${imgHtml}
        <div class="popup-body">
          <div class="popup-title">${p.name}</div>
          <p class="popup-desc">${p.desc}</p>
          <div style="margin-top:8px;">${tagsHtml}</div>
          <button class="popup-doc-btn" data-point-id="${p.id}" data-plan="${planKey}" data-anchor="${p.docAnchor || ''}">📖 查看本日行程详情</button>
        </div>
      `;

      marker.bindPopup(popupContent, { maxWidth: 280, className: 'nordic-popup' });
      let closeTimeout;
      marker.on('mouseover', function () { clearTimeout(closeTimeout); this.openPopup(); });
      marker.on('mouseout', function () { closeTimeout = setTimeout(() => this.closePopup(), 200); });
      marker.on('popupopen', function () {
        const el = this.getPopup().getElement();
        if (el) {
          el.addEventListener('mouseenter', () => clearTimeout(closeTimeout));
          el.addEventListener('mouseleave', () => { closeTimeout = setTimeout(() => this.closePopup(), 200); });
        }
      });
      return marker;
    }

    function renderPlan(key) {
      currentPlan = key;
      markersLayer.clearLayers();
      linesLayer.clearLayers();
      const plan = plans[key];

      // Draw lines first (under markers)
      plan.routes.forEach(r => {
        const fromP = plan.points.find(p => p.id === r.from);
        const toP = plan.points.find(p => p.id === r.to);
        if (!fromP || !toP) return;
        const latlngs = [[fromP.lat, fromP.lng], [toP.lat, toP.lng]];
        const line = L.polyline(latlngs, getLineStyle(r.type));
        line.addTo(linesLayer);
      });

      // Draw markers
      plan.points.forEach(p => {
        makeMarker(p, key).addTo(markersLayer);
      });

      // Fit bounds with padding
      const group = new L.featureGroup(markersLayer.getLayers());
      map.flyToBounds(group.getBounds(), { padding: [60,60], duration: 1.2 });
    }

    // Doc Panel functions
    function openDocPanel(planKey, anchor = null) {
      const plan = plans[planKey];
      docTitle.textContent = plan ? `${plan.name} · 行程详情` : '行程详情';
      docPanel.style.setProperty('--accent-doc', plan ? plan.color : '#9ecbf3');
      docPanel.classList.add('open');
      docBackdrop.classList.add('open');
      docPanel.dataset.plan = planKey;

      const md = mdContent[planKey] || '';
      if (!md) {
        docContent.innerHTML = '<div style="padding:40px 20px;text-align:center;color:var(--text-sub);">暂无文档内容</div>';
        return;
      }
      try {
        const htmlParsed = marked.parse(md);
        docContent.innerHTML = htmlParsed;
        linkifyPointNamesInDOM(docContent, planKey);
        if (anchor) {
          setTimeout(() => highlightAnchor(anchor), 60);
        }
      } catch (err) {
        docContent.innerHTML = `<div style="padding:40px 20px;text-align:center;color:var(--text-sub);">
          <div style="font-size:32px;margin-bottom:12px;">⚠️</div>
          <p>文档渲染失败</p>
          <pre style="margin-top:12px;text-align:left;background:rgba(255,255,255,0.05);padding:10px;border-radius:8px;font-size:12px;overflow:auto;">${err.message}</pre>
        </div>`;
      }
    }

    function closeDocPanel() {
      docPanel.classList.remove('open');
      docBackdrop.classList.remove('open');
      // Remove anchor highlights
      docPanel.querySelectorAll('.anchor-highlight').forEach(el => el.classList.remove('anchor-highlight'));
    }

    function highlightAnchor(anchor) {
      const el = document.getElementById(`anchor-${anchor}`);
      if (!el) return;
      el.scrollIntoView({ behavior: 'smooth', block: 'start' });
      docPanel.querySelectorAll('.anchor-highlight').forEach(e => e.classList.remove('anchor-highlight'));
      el.classList.add('anchor-highlight');
      setTimeout(() => {
        el.classList.remove('anchor-highlight');
      }, 2500);
    }

    function linkifyPointNamesInDOM(container, planKey) {
      const plan = plans[planKey];
      if (!plan) return;
      plan.points.forEach(p => {
        const walker = document.createTreeWalker(container, NodeFilter.SHOW_TEXT, null, false);
        const nodesToReplace = [];
        while (walker.nextNode()) {
          const node = walker.currentNode;
          if (node.parentElement && node.parentElement.closest('a, .doc-to-map')) continue;
          if (node.textContent.includes(p.name)) {
            nodesToReplace.push(node);
          }
        }
        nodesToReplace.forEach(node => {
          const parts = node.textContent.split(p.name);
          if (parts.length <= 1) return;
          const frag = document.createDocumentFragment();
          parts.forEach((part, i) => {
            frag.appendChild(document.createTextNode(part));
            if (i < parts.length - 1) {
              const a = document.createElement('a');
              a.href = '#';
              a.className = 'doc-to-map';
              a.dataset.pointId = p.id;
              a.dataset.plan = planKey;
              a.textContent = p.name;
              frag.appendChild(a);
            }
          });
          node.parentNode.replaceChild(frag, node);
        });
      });
    }

    function showDocPulse(lat, lng) {
      const pulseMarker = L.marker([lat, lng], {
        icon: L.divIcon({
          className: 'doc-pulse-marker',
          html: '<div class="doc-pulse-ring"></div>',
          iconSize: [80, 80],
          iconAnchor: [40, 40]
        }),
        zIndexOffset: 1000
      }).addTo(map);
      setTimeout(() => {
        if (map.hasLayer(pulseMarker)) map.removeLayer(pulseMarker);
      }, 3000);
    }

    function flyToPoint(planKey, pointId) {
      if (currentPlan !== planKey) {
        document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
        const tabBtn = document.querySelector(`.tab[data-plan="${planKey}"]`);
        if (tabBtn) tabBtn.classList.add('active');
        renderPlan(planKey);
      }
      setTimeout(() => {
        let targetMarker = null;
        markersLayer.eachLayer(layer => {
          if (layer.pointId === pointId) targetMarker = layer;
        });
        if (targetMarker) {
          const latlng = targetMarker.getLatLng();
          map.flyTo(latlng, Math.max(map.getZoom(), 8), { duration: 1.2 });
          targetMarker.openPopup();
          showDocPulse(latlng.lat, latlng.lng);
        }
      }, currentPlan === planKey ? 50 : 1300);
    }

    // Event listeners
    document.querySelectorAll('.tab').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderPlan(btn.dataset.plan);
      });
    });

    document.querySelectorAll('.tab-doc-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        openDocPanel(btn.dataset.plan);
      });
    });

    document.getElementById('map').addEventListener('click', (e) => {
      const btn = e.target.closest('.popup-doc-btn');
      if (btn) {
        e.stopPropagation();
        e.preventDefault();
        openDocPanel(btn.dataset.plan, btn.dataset.anchor);
      }
    });

    docBackdrop.addEventListener('click', closeDocPanel);
    document.getElementById('docClose').addEventListener('click', closeDocPanel);

    docContent.addEventListener('click', (e) => {
      const link = e.target.closest('.doc-to-map');
      if (link) {
        e.preventDefault();
        const planKey = link.dataset.plan;
        const pointId = link.dataset.pointId;
        flyToPoint(planKey, pointId);
      }
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && docPanel.classList.contains('open')) {
        closeDocPanel();
      }
    });

    window.addEventListener('DOMContentLoaded', initMap);
  </script>
</body>
</html>
