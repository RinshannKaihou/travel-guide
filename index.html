<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>互动旅行地图</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    :root {
      --bg-deep: #0b1020;
      --bg-panel: rgba(16, 22, 42, 0.85);
      --text-main: #f2f5fa;
      --text-sub: #b8c2d8;
      --line-drive: #ffd3b6;
      --line-fly: #ff8b94;
      --line-ferry: #9ecbf3;
      --line-train: #b4a7d6;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      font-family: 'Inter', 'Noto Serif SC', sans-serif;
      background: var(--bg-deep);
      color: var(--text-main);
      overflow: hidden;
    }
    #map { position: absolute; inset: 0; z-index: 1; }

    /* UI Panel */
    .ui-layer {
      position: absolute;
      z-index: 10;
      pointer-events: none;
      inset: 0;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 22px;
    }
    .top-bar {
      pointer-events: auto;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: flex-start;
      justify-content: space-between;
    }
    .title-card {
      background: var(--bg-panel);
      backdrop-filter: blur(12px) saturate(140%);
      -webkit-backdrop-filter: blur(12px) saturate(140%);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 18px;
      padding: 14px 18px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.25);
    }
    .title-card h1 {
      margin: 0;
      font-family: 'Noto Serif SC', serif;
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 0.5px;
    }
    .title-card p {
      margin: 4px 0 0;
      font-size: 12px;
      color: var(--text-sub);
    }

    /* Continent bar */
    .continent-bar {
      display: flex;
      gap: 6px;
      background: var(--bg-panel);
      backdrop-filter: blur(12px) saturate(140%);
      -webkit-backdrop-filter: blur(12px) saturate(140%);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px;
      padding: 6px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.25);
      margin-bottom: 8px;
      flex-wrap: wrap;
    }
    .continent-btn {
      appearance: none;
      border: none;
      background: transparent;
      color: var(--text-sub);
      padding: 6px 10px;
      border-radius: 10px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all .2s ease;
      white-space: nowrap;
    }
    .continent-btn:hover { color: var(--text-main); background: rgba(255,255,255,0.05); }
    .continent-btn.active { background: rgba(255,255,255,0.12); color: var(--text-main); }

    /* Tabs */
    .tabs {
      display: flex;
      gap: 8px;
      background: var(--bg-panel);
      backdrop-filter: blur(12px) saturate(140%);
      -webkit-backdrop-filter: blur(12px) saturate(140%);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px;
      padding: 6px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.25);
      overflow-x: auto;
      max-width: 100%;
      flex-wrap: nowrap;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .tabs::-webkit-scrollbar { display: none; }
    .tab {
      appearance: none;
      border: none;
      background: transparent;
      color: var(--text-sub);
      padding: 8px 12px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all .2s ease;
      display: flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .tab:hover { color: var(--text-main); background: rgba(255,255,255,0.05); }
    .tab.active { color: #0b1020; font-weight: 600; }

    .tab-doc-btn {
      margin-left: 4px;
      padding: 2px 5px;
      border-radius: 6px;
      font-size: 11px;
      background: rgba(255,255,255,0.1);
      cursor: pointer;
      transition: background .2s;
      line-height: 1;
    }
    .tab-doc-btn:hover { background: rgba(255,255,255,0.25); }
    .tab.active .tab-doc-btn { background: rgba(0,0,0,0.12); }
    .tab.active .tab-doc-btn:hover { background: rgba(0,0,0,0.22); }

    /* Legend */
    .legend {
      pointer-events: auto;
      align-self: flex-start;
      background: var(--bg-panel);
      backdrop-filter: blur(12px) saturate(140%);
      -webkit-backdrop-filter: blur(12px) saturate(140%);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px;
      padding: 12px 14px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.25);
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-top: 10px;
    }
    .legend-row {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 12px;
      color: var(--text-sub);
    }
    .line-dot { width: 22px; height: 2px; border-radius: 2px; }
    .line-dot.drive { background: var(--line-drive); }
    .line-dot.fly { background: repeating-linear-gradient(90deg, var(--line-fly), var(--line-fly) 4px, transparent 4px, transparent 7px); height: 2px; }
    .line-dot.ferry { background: repeating-linear-gradient(90deg, var(--line-ferry), var(--line-ferry) 3px, transparent 3px, transparent 6px); height: 2px; }
    .line-dot.train { background: repeating-linear-gradient(90deg, var(--line-train), var(--line-train) 5px, transparent 5px, transparent 8px); height: 2px; }

    /* Leaflet custom popup */
    .leaflet-popup-content-wrapper {
      background: rgba(16, 22, 42, 0.95);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 14px;
      color: var(--text-main);
      box-shadow: 0 20px 50px rgba(0,0,0,0.35);
      padding: 0;
      overflow: hidden;
    }
    .leaflet-popup-content {
      margin: 0;
      width: 280px !important;
    }
    .leaflet-popup-tip {
      background: rgba(16, 22, 42, 0.95);
    }
    .popup-media {
      width: 100%;
      height: 150px;
      object-fit: cover;
      display: block;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .popup-body { padding: 12px 14px 14px; }
    .popup-title {
      font-family: 'Noto Serif SC', serif;
      font-size: 15px;
      font-weight: 700;
      margin: 0 0 6px;
    }
    .popup-desc {
      font-size: 12px;
      color: var(--text-sub);
      line-height: 1.6;
      margin: 0;
    }
    .popup-tag {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 999px;
      background: rgba(255,255,255,0.08);
      color: var(--text-sub);
      margin-top: 10px;
    }
    .popup-doc-btn {
      appearance: none;
      border: none;
      background: rgba(255,255,255,0.1);
      color: var(--text-sub);
      padding: 6px 10px;
      border-radius: 8px;
      font-size: 12px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      transition: all .2s;
      margin-top: 10px;
    }
    .popup-doc-btn:hover { background: rgba(255,255,255,0.18); color: var(--text-main); }

    /* Custom marker */
    .custom-marker {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.25), rgba(255,255,255,0) 60%), rgba(16,22,42,0.9);
      border: 2px solid currentColor;
      display: grid;
      place-items: center;
      font-size: 14px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.35), 0 0 0 4px rgba(0,0,0,0.15);
      transition: transform .2s ease;
    }
    .custom-marker:hover { transform: scale(1.1); }

    /* pulse ring */
    .marker-ring {
      position: absolute;
      inset: -8px;
      border-radius: 50%;
      border: 1px solid currentColor;
      opacity: .35;
      animation: pulse 2.2s infinite ease-out;
    }
    @keyframes pulse {
      0% { transform: scale(0.85); opacity: .45; }
      100% { transform: scale(1.35); opacity: 0; }
    }

    /* Doc Panel */
    #docPanel {
      position: fixed;
      top: 0; right: 0; bottom: 0;
      width: 460px;
      max-width: 92vw;
      background: var(--bg-panel);
      backdrop-filter: blur(16px) saturate(150%);
      -webkit-backdrop-filter: blur(16px) saturate(150%);
      border-left: 1px solid rgba(255,255,255,0.08);
      transform: translateX(100%);
      transition: transform .35s cubic-bezier(.2,.8,.2,1);
      z-index: 100;
      display: flex;
      flex-direction: column;
    }
    #docPanel.open { transform: translateX(0); }
    #docBackdrop {
      position: fixed; inset: 0; background: rgba(0,0,0,.45);
      opacity: 0; pointer-events: none; transition: opacity .3s;
      z-index: 99;
    }
    #docBackdrop.open { opacity: 1; pointer-events: auto; }

    #docHeader {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 18px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      flex-shrink: 0;
    }
    #docTitle {
      font-family: 'Noto Serif SC', serif;
      font-size: 16px;
      font-weight: 600;
      margin: 0;
    }
    #docHeaderActions {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    #docHeaderHint {
      font-size: 12px;
      color: var(--text-sub);
    }
    #docClose {
      appearance: none;
      border: none;
      background: rgba(255,255,255,0.08);
      color: var(--text-sub);
      width: 32px;
      height: 32px;
      border-radius: 8px;
      font-size: 18px;
      cursor: pointer;
      display: grid;
      place-items: center;
      transition: background .2s;
    }
    #docClose:hover { background: rgba(255,255,255,0.15); color: var(--text-main); }

    #docContent {
      flex: 1;
      overflow-y: auto;
      padding: 18px 22px 40px;
      font-size: 14px;
      line-height: 1.75;
      color: var(--text-main);
    }
    #docContent h1 {
      font-family: 'Noto Serif SC', serif;
      font-size: 18px;
      margin: 28px 0 14px;
      padding-bottom: 8px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    #docContent h2 {
      font-size: 15px;
      margin: 22px 0 12px;
      color: var(--text-main);
    }
    #docContent h3 {
      font-size: 14px;
      margin: 16px 0 8px;
      color: var(--text-sub);
    }
    #docContent p { margin: 10px 0; }
    #docContent img {
      max-width: 100%;
      border-radius: 10px;
      margin: 10px 0;
      display: block;
    }
    #docContent a { color: #9ecbf3; text-decoration: none; }
    #docContent a:hover { text-decoration: underline; }
    #docContent table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
      margin: 12px 0;
    }
    #docContent th, #docContent td {
      border: 1px solid rgba(255,255,255,0.1);
      padding: 6px 8px;
      text-align: left;
    }
    #docContent th { background: rgba(255,255,255,0.05); }
    #docContent blockquote {
      border-left: 3px solid rgba(255,255,255,0.15);
      margin: 12px 0;
      padding-left: 14px;
      color: var(--text-sub);
    }
    #docContent ul, #docContent ol { padding-left: 20px; margin: 10px 0; }
    #docContent hr { border: none; border-top: 1px solid rgba(255,255,255,0.08); margin: 20px 0; }
    #docContent code {
      background: rgba(255,255,255,0.08);
      padding: 2px 6px;
      border-radius: 6px;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 12px;
    }

    #docContent h1[id^="anchor-"],
    #docContent h2[id^="anchor-"] {
      transition: background .3s, border-color .3s, padding-left .3s, margin-left .3s;
      border-left: 3px solid transparent;
      padding-left: 0;
      margin-left: 0;
      border-radius: 0 8px 8px 0;
    }
    #docContent h1.anchor-highlight,
    #docContent h2.anchor-highlight {
      background: rgba(255,255,255,0.08);
      border-left: 3px solid var(--accent-doc, #9ecbf3);
      padding-left: 12px;
      margin-left: -15px;
    }

    .doc-to-map {
      color: #ffd3b6 !important;
      font-weight: 500;
      border-bottom: 1px dashed rgba(255,211,182,0.4);
    }
    .doc-to-map:hover {
      border-bottom-style: solid;
    }

    @keyframes pulse-gold {
      0% { transform: scale(0.5); opacity: .9; }
      100% { transform: scale(2); opacity: 0; }
    }
    .doc-pulse-ring {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      border: 2px solid #ffd700;
      background: rgba(255, 215, 0, 0.15);
      animation: pulse-gold 3s ease-out forwards;
    }

    /* Responsive */
    @media (max-width: 640px) {
      .ui-layer { padding: 12px; }
      .title-card h1 { font-size: 16px; }
      .tab { font-size: 12px; padding: 6px 10px; }
      #docPanel { max-width: 92vw; }
    }
  </style>
</head>
<body>
  <div id="map"></div>
  <div class="ui-layer">
    <div class="top-bar">
      <div class="title-card">
        <h1>互动旅行地图</h1>
        <p>鼠标悬停地点查看简介，点击标签切换方案</p>
      </div>
      <div id="controls" style="display:flex;flex-direction:column;align-items:flex-end;gap:6px;max-width:100%;">
        <div class="continent-bar" id="continentBar"></div>
        <div class="tabs" id="tabs"></div>
      </div>
    </div>
    <div class="legend">
      <div class="legend-row"><div class="line-dot drive"></div>自驾 / 公路</div>
      <div class="legend-row"><div class="line-dot fly"></div>航班</div>
      <div class="legend-row"><div class="line-dot ferry"></div>轮渡 / 游船</div>
      <div class="legend-row"><div class="line-dot train"></div>火车 / 高铁</div>
    </div>
  </div>

  <!-- Doc Panel -->
  <div id="docBackdrop"></div>
  <div id="docPanel">
    <div id="docHeader">
      <h2 id="docTitle">行程详情</h2>
      <div id="docHeaderActions">
        <span id="docHeaderHint">点击地图地点可返回</span>
        <button id="docClose" title="关闭">×</button>
      </div>
    </div>
    <div id="docContent"></div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="map-data.bundle.js"></script>
  <script>
    // Load data from bundle
    const index = window.ITINERARY_INDEX || [];
    const plans = window.ITINERARY_PLANS || {};
    const mdContent = window.ITINERARY_CONTENTS || {};
    const imageDirs = window.ITINERARY_IMAGE_DIRS || {};

    // Build images helper from imageDirs
    const images = imageDirs;

    // Continent display names
    const continentNames = {
      europe: '欧洲',
      asia: '亚洲',
      africa: '非洲',
      oceania: '大洋洲',
      americas: '美洲'
    };

    const continents = [...new Set(index.map(p => p.continent))];
    let currentPlan = index[0]?.plan_id || '';
    let currentContinent = index[0]?.continent || '';

    let map, markersLayer, linesLayer;
    const docPanel = document.getElementById('docPanel');
    const docBackdrop = document.getElementById('docBackdrop');
    const docContent = document.getElementById('docContent');
    const docTitle = document.getElementById('docTitle');

    // Configure marked renderer for anchor injection
    const renderer = new marked.Renderer();
    renderer.heading = function(token) {
      const text = (typeof token === 'string') ? token : (token.text || '');
      const level = (typeof token === 'string') ? arguments[1] : (token.depth || 1);
      const m = text.match(/D(\d+)/i);
      const id = m ? `id="anchor-d${m[1]}"` : '';
      return `<h${level} ${id}>${text}</h${level}>`;
    };
    marked.setOptions({ renderer });

    function initMap() {
      const initialPlan = plans[currentPlan] || plans[Object.keys(plans)[0]];
      const initialCenter = index.find(p => p.plan_id === currentPlan)?.center || [20, 0];
      const initialZoom = index.find(p => p.plan_id === currentPlan)?.zoom || 3;

      map = L.map('map', {
        zoomControl: false,
        attributionControl: false,
        minZoom: 3
      }).setView(initialCenter, initialZoom);

      L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; OpenStreetMap &copy; CARTO',
        subdomains: 'abcd',
        maxZoom: 19
      }).addTo(map);

      L.control.zoom({ position: 'bottomright' }).addTo(map);
      L.control.attribution({ position: 'bottomright' }).addTo(map);

      markersLayer = L.layerGroup().addTo(map);
      linesLayer = L.layerGroup().addTo(map);

      renderUI();
      if (currentPlan) renderPlan(currentPlan);
    }

    function renderUI() {
      const continentBar = document.getElementById('continentBar');
      const tabsContainer = document.getElementById('tabs');
      continentBar.innerHTML = '';
      tabsContainer.innerHTML = '';

      // Add "All" button
      const allBtn = document.createElement('button');
      allBtn.className = 'continent-btn';
      allBtn.textContent = '全部';
      allBtn.dataset.continent = '__all__';
      allBtn.addEventListener('click', () => {
        currentContinent = '__all__';
        updateContinentUI();
      });
      continentBar.appendChild(allBtn);

      continents.forEach(c => {
        const btn = document.createElement('button');
        btn.className = 'continent-btn';
        btn.textContent = continentNames[c] || c;
        btn.dataset.continent = c;
        btn.addEventListener('click', () => {
          currentContinent = c;
          // Auto-select first plan of this continent if current is not in it
          const plansInContinent = index.filter(p => p.continent === c);
          if (plansInContinent.length && !plansInContinent.some(p => p.plan_id === currentPlan)) {
            currentPlan = plansInContinent[0].plan_id;
            renderPlan(currentPlan);
          }
          updateContinentUI();
        });
        continentBar.appendChild(btn);
      });

      // Build tabs for all plans
      index.forEach(item => {
        const btn = document.createElement('button');
        btn.className = 'tab';
        btn.dataset.plan = item.plan_id;
        btn.dataset.continent = item.continent;
        btn.innerHTML = `${labelFor(item)}<span class="tab-doc-btn" data-plan="${item.plan_id}" title="查看行程文档">📄</span>`;
        btn.addEventListener('click', () => {
          currentPlan = item.plan_id;
          currentContinent = item.continent;
          renderPlan(item.plan_id);
          updateContinentUI();
        });
        tabsContainer.appendChild(btn);
      });

      // Doc button listeners inside tabs
      tabsContainer.querySelectorAll('.tab-doc-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          openDocPanel(btn.dataset.plan);
        });
      });

      updateContinentUI();
    }

    function updateContinentUI() {
      const continentBar = document.getElementById('continentBar');
      const tabs = document.querySelectorAll('.tab');

      continentBar.querySelectorAll('.continent-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.continent === currentContinent);
      });

      tabs.forEach(tab => {
        const visible = currentContinent === '__all__' || tab.dataset.continent === currentContinent;
        tab.style.display = visible ? 'flex' : 'none';
        const isActive = tab.dataset.plan === currentPlan;
        tab.classList.toggle('active', isActive);
        if (isActive) {
          const color = index.find(p => p.plan_id === currentPlan)?.color || '#9ecbf3';
          tab.style.background = color;
          tab.style.color = '#0b1020';
        } else {
          tab.style.background = '';
          tab.style.color = '';
        }
      });
    }

    function labelFor(item) {
      // Simple emoji mapping
      const name = item.name;
      if (name.includes('埃及')) return '🇪🇬 ' + name;
      if (name.includes('土耳其')) return '🇹🇷 ' + name;
      if (name.includes('日本') || name.includes('北海道')) return '🇯🇵 ' + name;
      if (name.includes('冰岛')) return '🇮🇸 ' + name;
      if (name.includes('挪威') && name.includes('丹麦')) return '🇩🇰🇳🇴 ' + name;
      if (name.includes('挪威')) return '🇳🇴 ' + name;
      if (name.includes('瑞典') && name.includes('丹麦')) return '🇸🇪🇩🇰 ' + name;
      if (name.includes('瑞典')) return '🇸🇪 ' + name;
      if (name.includes('意大利')) return '🇮🇹 ' + name;
      if (name.includes('苏格兰')) return '🏴󠁧󠁢󠁳󠁣󠁴󠁿 ' + name;
      if (name.includes('格鲁吉亚')) return '🇬🇪 ' + name;
      return name;
    }

    function getLineStyle(type) {
      switch(type) {
        case 'fly': return { color: '#ff8b94', weight: 2, opacity: 0.9, dashArray: '6,6' };
        case 'ferry': return { color: '#9ecbf3', weight: 2.5, opacity: 0.85, dashArray: '4,4' };
        case 'train': return { color: '#b4a7d6', weight: 2.5, opacity: 0.85, dashArray: '8,6' };
        default: return { color: '#ffd3b6', weight: 2.5, opacity: 0.85 };
      }
    }

    function iconFor(p) {
      const text = (p.name || '') + ',' + (p.tags || []).join(',');
      if (/热气球/.test(text)) return '🎈';
      if (/滑翔伞/.test(text)) return '🪂';
      if (/潜水/.test(text)) return '🤿';
      if (/红酒|葡萄酒/.test(text)) return '🍷';
      if (/和牛|烤肉/.test(text)) return '🥩';
      if (/花田|薰衣草/.test(text)) return '🌸';
      if (/灯塔/.test(text)) return '🔦';
      if (/蓝湖|海滩|海岸/.test(text)) return '🏖️';
      if (/地下城/.test(text)) return '🏰';
      if (/峡湾|瀑布|冰川|地热|间歇泉|岩石|悬崖|山峰|峡谷|火山|自然|山口|山谷/.test(text)) return '⛰️';
      if (/城堡|教堂|博物馆|美术馆|歌剧院/.test(text)) return '🏰';
      if (/火车|轮渡|机场|大桥|运河/.test(text)) return '🚆';
      if (/温泉|桑拿|泳池/.test(text)) return '♨️';
      if (/公园|乐园|花园|森林/.test(text)) return '🌲';
      if (/足球|球场/.test(text)) return '⚽';
      if (/生蚝|海鲜|美食|鱼市|餐厅/.test(text)) return '🦪';
      if (/徒步|登山|裂缝/.test(text)) return '🥾';
      return '📍';
    }

    function makeMarker(p, planKey, color) {
      const iconHtml = `<div class="marker-ring" style="color:${color}"></div><div style="font-size:16px; filter:drop-shadow(0 1px 2px rgba(0,0,0,.6));">${iconFor(p)}</div>`;
      const icon = L.divIcon({
        className: 'custom-marker',
        html: iconHtml,
        iconSize: [36,36],
        iconAnchor: [18,18],
        popupAnchor: [0,-20]
      });
      icon.options.color = color;
      const marker = L.marker([p.lat, p.lng], { icon });
      marker.pointId = p.id;

      const imgPath = p.img ? imageDirs[planKey] + p.img : '';
      const imgHtml = imgPath
        ? `<img class="popup-media" src="${imgPath}" alt="${p.name}" onerror="this.style.display='none'">`
        : `<div class="popup-media" style="display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#1a2540,#0b1020);color:#9fb3d8;font-size:12px;">暂无图片</div>`;

      const tagsHtml = (p.tags || []).map(t => `<span class="popup-tag">${t}</span>`).join(' ');

      const popupContent = `
        ${imgHtml}
        <div class="popup-body">
          <div class="popup-title">${p.name}</div>
          <p class="popup-desc">${p.desc}</p>
          <div style="margin-top:8px;">${tagsHtml}</div>
          <button class="popup-doc-btn" data-point-id="${p.id}" data-plan="${planKey}" data-anchor="${p.docAnchor || ''}">📖 查看本日行程详情</button>
        </div>
      `;

      marker.bindPopup(popupContent, { maxWidth: 280, className: 'nordic-popup' });
      let closeTimeout;
      marker.on('mouseover', function () { clearTimeout(closeTimeout); this.openPopup(); });
      marker.on('mouseout', function () { closeTimeout = setTimeout(() => this.closePopup(), 200); });
      marker.on('popupopen', function () {
        const el = this.getPopup().getElement();
        if (el) {
          el.addEventListener('mouseenter', () => clearTimeout(closeTimeout));
          el.addEventListener('mouseleave', () => { closeTimeout = setTimeout(() => this.closePopup(), 200); });
        }
      });
      return marker;
    }

    function renderPlan(key) {
      currentPlan = key;
      markersLayer.clearLayers();
      linesLayer.clearLayers();
      const plan = plans[key];
      if (!plan) return;
      const meta = index.find(p => p.plan_id === key);
      const color = meta?.color || '#9ecbf3';

      // Draw lines first (under markers)
      plan.routes.forEach(r => {
        const fromP = plan.points.find(p => p.id === r.from);
        const toP = plan.points.find(p => p.id === r.to);
        if (!fromP || !toP) return;
        const latlngs = [[fromP.lat, fromP.lng], [toP.lat, toP.lng]];
        const line = L.polyline(latlngs, getLineStyle(r.type));
        line.addTo(linesLayer);
      });

      // Draw markers
      plan.points.forEach(p => {
        makeMarker(p, key, color).addTo(markersLayer);
      });

      // Fit bounds with padding
      const group = new L.featureGroup(markersLayer.getLayers());
      map.flyToBounds(group.getBounds(), { padding: [60,60], duration: 1.2 });

      updateContinentUI();
    }

    // Doc Panel functions
    async function openDocPanel(planKey, anchor = null) {
      const meta = index.find(p => p.plan_id === planKey);
      docTitle.textContent = meta ? `${meta.name} · 行程详情` : '行程详情';
      docPanel.style.setProperty('--accent-doc', meta?.color || '#9ecbf3');
      docPanel.classList.add('open');
      docBackdrop.classList.add('open');
      docPanel.dataset.plan = planKey;

      let md = mdContent[planKey] || '';
      if (!md) {
        docContent.innerHTML = '<div style="padding:40px 20px;text-align:center;color:var(--text-sub);">暂无文档内容</div>';
        return;
      }
      try {
        const htmlParsed = marked.parse(md);
        docContent.innerHTML = htmlParsed;
        // Fix relative image paths for each plan's images folder
        docContent.querySelectorAll('img').forEach(img => {
          const src = img.getAttribute('src');
          if (src && src.startsWith('./images/')) {
            img.src = imageDirs[planKey] + src.replace('./images/', '');
          }
        });
        linkifyPointNamesInDOM(docContent, planKey);
        if (anchor) {
          setTimeout(() => highlightAnchor(anchor), 60);
        }
      } catch (err) {
        docContent.innerHTML = `<div style="padding:40px 20px;text-align:center;color:var(--text-sub);">
          <div style="font-size:32px;margin-bottom:12px;">⚠️</div>
          <p>文档渲染失败</p>
          <pre style="margin-top:12px;text-align:left;background:rgba(255,255,255,0.05);padding:10px;border-radius:8px;font-size:12px;overflow:auto;">${err.message}</pre>
        </div>`;
      }
    }

    function closeDocPanel() {
      docPanel.classList.remove('open');
      docBackdrop.classList.remove('open');
      docPanel.querySelectorAll('.anchor-highlight').forEach(el => el.classList.remove('anchor-highlight'));
    }

    function highlightAnchor(anchor) {
      const el = document.getElementById(`anchor-${anchor}`);
      if (!el) return;
      el.scrollIntoView({ behavior: 'smooth', block: 'start' });
      docPanel.querySelectorAll('.anchor-highlight').forEach(e => e.classList.remove('anchor-highlight'));
      el.classList.add('anchor-highlight');
      setTimeout(() => {
        el.classList.remove('anchor-highlight');
      }, 2500);
    }

    function linkifyPointNamesInDOM(container, planKey) {
      const plan = plans[planKey];
      if (!plan) return;

      const candidates = [];
      plan.points.forEach(p => {
        const texts = [p.name, ...(p.aliases || [])];
        texts.forEach(text => {
          if (text) candidates.push({ text, pointId: p.id, planKey });
        });
      });
      candidates.sort((a, b) => b.text.length - a.text.length || a.text.localeCompare(b.text));

      const seen = new Set();
      const uniqueCandidates = candidates.filter(c => {
        if (seen.has(c.text)) return false;
        seen.add(c.text);
        return true;
      });

      uniqueCandidates.forEach(c => {
        const walker = document.createTreeWalker(container, NodeFilter.SHOW_TEXT, null, false);
        const nodesToReplace = [];
        while (walker.nextNode()) {
          const node = walker.currentNode;
          if (node.parentElement && node.parentElement.closest('a, .doc-to-map')) continue;
          if (node.textContent.includes(c.text)) {
            nodesToReplace.push(node);
          }
        }
        nodesToReplace.forEach(node => {
          const parts = node.textContent.split(c.text);
          if (parts.length <= 1) return;
          const frag = document.createDocumentFragment();
          parts.forEach((part, i) => {
            frag.appendChild(document.createTextNode(part));
            if (i < parts.length - 1) {
              const a = document.createElement('a');
              a.href = '#';
              a.className = 'doc-to-map';
              a.dataset.pointId = c.pointId;
              a.dataset.plan = c.planKey;
              a.textContent = c.text;
              frag.appendChild(a);
            }
          });
          node.parentNode.replaceChild(frag, node);
        });
      });
    }

    function showDocPulse(lat, lng) {
      const pulseMarker = L.marker([lat, lng], {
        icon: L.divIcon({
          className: 'doc-pulse-marker',
          html: '<div class="doc-pulse-ring"></div>',
          iconSize: [80, 80],
          iconAnchor: [40, 40]
        }),
        zIndexOffset: 1000
      }).addTo(map);
      setTimeout(() => {
        if (map.hasLayer(pulseMarker)) map.removeLayer(pulseMarker);
      }, 3000);
    }

    function flyToPoint(planKey, pointId) {
      if (currentPlan !== planKey) {
        currentPlan = planKey;
        const meta = index.find(p => p.plan_id === planKey);
        if (meta) currentContinent = meta.continent;
        renderPlan(planKey);
      }
      setTimeout(() => {
        let targetMarker = null;
        markersLayer.eachLayer(layer => {
          if (layer.pointId === pointId) targetMarker = layer;
        });
        if (targetMarker) {
          const latlng = targetMarker.getLatLng();
          map.flyTo(latlng, Math.max(map.getZoom(), 8), { duration: 1.2 });
          targetMarker.openPopup();
          showDocPulse(latlng.lat, latlng.lng);
        }
      }, currentPlan === planKey ? 50 : 1300);
    }

    // Event listeners
    document.getElementById('map').addEventListener('click', (e) => {
      const btn = e.target.closest('.popup-doc-btn');
      if (btn) {
        e.stopPropagation();
        e.preventDefault();
        openDocPanel(btn.dataset.plan, btn.dataset.anchor);
      }
    });

    docBackdrop.addEventListener('click', closeDocPanel);
    document.getElementById('docClose').addEventListener('click', closeDocPanel);

    docContent.addEventListener('click', (e) => {
      const link = e.target.closest('.doc-to-map');
      if (link) {
        e.preventDefault();
        const planKey = link.dataset.plan;
        const pointId = link.dataset.pointId;
        flyToPoint(planKey, pointId);
      }
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && docPanel.classList.contains('open')) {
        closeDocPanel();
      }
    });

    window.addEventListener('DOMContentLoaded', initMap);
  </script>
</body>
</html>
